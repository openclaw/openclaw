      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/310798523454980098/gogcli:/home/node/.config/gogcli
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/shared/auth/auth-profiles.json:/home/node/.openclaw/agents/main/agent/auth-profiles.json
    ports:
      - "${OPENCLAW_310798523454980098_PORT:-18791}:18789"
    command:
