      ]

  openclaw-483870022134136842:
    <<: *openclaw-base
    container_name: openclaw-483870022134136842
    environment:
      <<: *openclaw-env
      OPENCLAW_GATEWAY_PORT: "18789"
      GOG_KEYRING_PASSWORD: ${OPENCLAW_483870022134136842_GOG_PASSWORD:-openclaw}
    volumes:
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/483870022134136842:/home/node/.openclaw
