# Multi-instance OpenClaw deployment (Discord-first).
#
# Each instance is keyed by Discord user ID. Config/data lives under
# ~/.openclaw-instances/{discordUserId}/.
#
# Usage:
#   pnpm gateway:docker:deploy                          # build + start all instances
#   pnpm gateway:docker:deploy -- 263176934089949194    # deploy single instance
#
# Instance config:
#   ~/.openclaw-instances/263176934089949194/openclaw.json   — gateway config, Discord token, etc.
#   ~/.openclaw-instances/263176934089949194/agents/         — agent memory, sessions, auth profiles
#   ~/.openclaw-instances/263176934089949194/workspace/      — working directory
#
# First-time setup per instance:
#   1. Create the instance directory
#   2. Run onboarding: docker compose ... run --rm openclaw-{discordUserId} onboard
#   3. Start: docker compose ... up -d openclaw-{discordUserId}

x-openclaw-base: &openclaw-base
  image: ${OPENCLAW_IMAGE:-openclaw:local}
  init: true
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:18789/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
      ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s
  environment: &openclaw-env
    HOME: /home/node
    TERM: xterm-256color
    NODE_ENV: production
    TZ: ${OPENCLAW_DEFAULT_TZ:-America/Chicago}
    # GPU disabled by default in containers (no CUDA support)
    OPENCLAW_LLAMA_GPU: "off"
    # Gateway process skips channel monitors (discord-router handles Discord).
    OPENCLAW_SKIP_CHANNELS: "1"

services:
  openclaw-263176934089949194:
    <<: *openclaw-base
    container_name: openclaw-263176934089949194
    environment:
      <<: *openclaw-env
      TZ: America/Los_Angeles
      OPENCLAW_GATEWAY_PORT: "18789"
      GOG_KEYRING_PASSWORD: ${OPENCLAW_263176934089949194_GOG_PASSWORD:-openclaw}
    volumes:
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/263176934089949194:/home/node/.openclaw
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/263176934089949194/workspace:/home/node/.openclaw/workspace
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/263176934089949194/gogcli:/home/node/.config/gogcli
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/shared/auth/auth-profiles.json:/home/node/.openclaw/agents/main/agent/auth-profiles.json
    ports:
      - "${OPENCLAW_263176934089949194_PORT:-18789}:18789"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  openclaw-310798523454980098:
    <<: *openclaw-base
    container_name: openclaw-310798523454980098
    environment:
      <<: *openclaw-env
      OPENCLAW_GATEWAY_PORT: "18789"
      GOG_KEYRING_PASSWORD: ${OPENCLAW_310798523454980098_GOG_PASSWORD:-openclaw}
