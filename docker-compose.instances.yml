# Multi-instance OpenClaw deployment (Discord-first).
#
# Service definitions are generated dynamically by scripts/instance-compose.sh
# based on the instance directories in ~/.openclaw-instances/.
#
# Usage:
#   scripts/instance-compose.sh                     # generate docker-compose.generated.yml
#   docker compose -f docker-compose.generated.yml up -d   # start all instances
#
# Instance lifecycle:
#   scripts/instance-create.sh <discord-user-id>    # create a new instance
#   scripts/instance-compose.sh                     # regenerate compose file
#   docker compose -f docker-compose.generated.yml up -d   # start/restart
#
# Instance config:
#   ~/.openclaw-instances/{discordUserId}/openclaw.json   — gateway config
#   ~/.openclaw-instances/{discordUserId}/agents/         — agent memory, sessions
#   ~/.openclaw-instances/{discordUserId}/workspace/      — working directory

x-openclaw-base: &openclaw-base
  image: ${OPENCLAW_IMAGE:-openclaw:local}
  init: true
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:18789/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
      ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s
  environment: &openclaw-env
    HOME: /home/node
    TERM: xterm-256color
    NODE_ENV: production
    TZ: ${OPENCLAW_DEFAULT_TZ:-America/Chicago}
    # GPU disabled by default in containers (no CUDA support)
    OPENCLAW_LLAMA_GPU: "off"
    # Gateway process skips channel monitors (discord-router handles Discord).
    OPENCLAW_SKIP_CHANNELS: "1"

# Services are generated by scripts/instance-compose.sh — do not add them here.
services: {}
