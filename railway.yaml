services:
  - type: web
    name: openclaw
    runtime: docker
    port: 8080
    envVars:
      - key: PORT
        value: 8080
      - key: OPENCLAW_GATEWAY_PORT
        value: 8080
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    volumes:
      - path: /data
