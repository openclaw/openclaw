<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenFinClaw — Trader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>/*__SHARED_CSS__*/</style>
<style>/*__PAGE_CSS__*/</style>
</head>
<body>
<script>var pageData = /*__PAGE_DATA__*/ {};</script>

<!-- RISK HALO -->
<div class="risk-halo" id="riskHalo"></div>

<!-- TOP BAR -->
<header class="topbar">
  <span class="topbar__logo">OPENFINCLAW</span>
  <div class="topbar__sep"></div>
  <div class="topbar__eq"><span class="topbar__eq-val num" id="eqVal">--</span><span class="topbar__eq-chg num" id="eqChg"></span></div>
  <div class="topbar__sep"></div>
  <nav class="topbar__nav">
    <a class="topbar__nav-item" href="/plugins/findoo-trader/dashboard/overview">Overview</a>
    <a class="topbar__nav-item" href="/plugins/findoo-trader/dashboard/strategy">Strategy</a>
    <a class="topbar__nav-item active" href="/plugins/findoo-trader/dashboard/trader">Trader</a>
    <a class="topbar__nav-item" href="/plugins/findoo-trader/dashboard/flow">Flow</a>
    <a class="topbar__nav-item" href="/plugins/findoo-trader/dashboard/setting">Setting</a>
  </nav>
  <div class="topbar__fill"></div>
  <div class="topbar__agents" id="agentDots"></div>
  <div class="topbar__sep"></div>
  <span class="topbar__risk" id="riskBadge">--</span>
  <div class="topbar__sse" id="sseDots" title="SSE"><span class="sse-dot" id="sseTrade"></span><span class="sse-dot" id="sseFund"></span><span class="sse-dot" id="sseEvents"></span></div>
  <span class="topbar__clock num" id="clock">--:--</span>
  <button class="btn-estop" id="estopBtn">&#9632; STOP</button>
</header>

<!-- DOMAIN SWITCHER -->
<div class="domain-bar">
  <a class="domain-tab" href="?domain=live" id="domLive">&#128308; 实盘</a>
  <a class="domain-tab" href="?domain=paper" id="domPaper">&#128221; 模拟</a>
  <a class="domain-tab" href="?domain=backtest" id="domBt">&#128202; 回测</a>
</div>

<!-- LAYOUT: soul + data -->
<div class="layout layout--trader">
  <!-- SOUL PANEL -->
  <aside class="soul soul--desktop" id="soulDesktop">
    <div class="soul__header">
      <div class="soul__top">
        <div class="lobster"><div class="lobster__glow"></div><div class="lobster__face">&#129438;</div><div class="lobster__mood" id="lobMood">&#9889;</div></div>
        <div class="soul__identity">
          <div class="soul__name">FINCLAW <span class="heartbeat"></span></div>
          <div class="soul__last" id="soulLast">Trader Agent</div>
        </div>
      </div>
      <div><span class="soul__equity num" id="soulEquity">--</span><span class="soul__pnl soul__pnl--up num" id="soulPnl"></span></div>
      <div class="soul__badges"><span class="sbadge sbadge--regime" id="domainBadge">PAPER</span></div>
    </div>
    <div class="soul__feed" id="soulFeed">
      <div class="soul__sep">&#9889; 待处理</div>
      <div id="pendingCards"></div>
      <div class="soul__sep">今日交易</div>
      <div id="tradeCards"></div>
    </div>
  </aside>

  <!-- DATA PANEL -->
  <main class="data" id="dataPanel">
    <div class="metrics fade-up" id="metricsRow">
      <div class="metric-card"><div class="metric-card__label">总权益</div><div class="metric-card__value num" id="mEquity">--</div></div>
      <div class="metric-card"><div class="metric-card__label">今日 P&amp;L</div><div class="metric-card__value num" id="mPnl">--</div><div class="metric-card__sub num" id="mPnlPct"></div></div>
      <div class="metric-card"><div class="metric-card__label">持仓数</div><div class="metric-card__value num" id="mPositions">0</div></div>
      <div class="metric-card"><div class="metric-card__label">胜率</div><div class="metric-card__value num" id="mWinRate">--</div><div class="metric-card__sub num" id="mSharpe"></div></div>
    </div>

    <div class="section fade-up d1">
      <div class="section__head"><span class="section__title">活跃持仓</span><span class="section__badge num" id="posCount" style="background:var(--info-dim);color:var(--info)">0</span></div>
      <div class="section__body" id="positionCards"><div class="empty-state"><div class="empty-state__icon">&#128230;</div><div class="empty-state__text">暂无活跃持仓</div></div></div>
    </div>

    <div class="section fade-up d2">
      <div class="section__head"><span class="section__title">近期订单</span><span class="section__badge num" id="ordCount" style="background:var(--purple-dim);color:var(--purple)">0</span></div>
      <div class="section__body" style="padding:0">
        <table class="fin-table"><thead><tr><th>时间</th><th>标的</th><th>方向</th><th class="right">数量</th><th class="right">价格</th><th>状态</th></tr></thead><tbody id="ordTable"></tbody></table>
      </div>
    </div>

    <div class="section fade-up d3" id="alertSection" style="display:none">
      <div class="section__head"><span class="section__title">活跃告警</span></div>
      <div class="section__body" id="alertList"></div>
    </div>
    <div id="btSection" style="display:none"></div>
  </main>
</div>

<!-- MOBILE -->
<button class="soul-fab" id="soulFab" onclick="TD.openSoul()"><div class="soul-fab__pulse"></div>&#129438;</button>
<div class="soul-overlay" id="soulOverlay">
  <button class="soul-overlay__close" onclick="TD.closeSoul()">&times;</button>
  <aside class="soul" id="soulMobile"></aside>
</div>

<!-- BOTTOM BAR -->
<footer class="botbar"><div class="botbar__avatar"></div><div class="botbar__msg" id="botMsg">Loading Trader...</div><div class="botbar__sse" id="botSse"></div></footer>
<div class="toast" id="toast"></div>

<script>
const D=pageData, domain=D.domain||"paper", AP="/plugins/findoo-trader/api";
const TD={openSoul(){const o=document.getElementById("soulOverlay"),m=document.getElementById("soulMobile");m.innerHTML=document.getElementById("soulDesktop").innerHTML;o.classList.add("open")},closeSoul(){document.getElementById("soulOverlay").classList.remove("open")}};

/* Domain init */
(function(){const id=domain==="live"?"domLive":domain==="backtest"?"domBt":"domPaper";const el=document.getElementById(id);if(el)el.classList.add("domain-tab--active");const db=document.getElementById("domainBadge");if(db){db.textContent={live:"LIVE",paper:"PAPER",backtest:"BACKTEST"}[domain]||"PAPER";if(domain==="live"){db.style.background="var(--gain-dim)";db.style.color="var(--gain)"}else if(domain==="backtest"){db.className="sbadge";db.style.background="rgba(255,255,255,0.04)";db.style.color="var(--text-dim)"}}})();

/* Helpers */
function $(s){return document.getElementById(s)}
function fmt(n,d){if(n==null||isNaN(n))return"--";return d!=null?Number(n).toFixed(d):Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function pc(v){return v>=0?"gain":"loss"}
function ago(ts){if(!ts)return"";const d=Date.now()-new Date(ts).getTime();if(d<6e4)return"刚刚";if(d<36e5)return(d/6e4|0)+"m";if(d<864e5)return(d/36e5|0)+"h";return(d/864e5|0)+"d"}
function toast(m,ok){const t=$("toast");t.textContent=m;t.style.background=ok?"var(--gain)":"var(--loss)";t.style.color=ok?"#052e16":"#fff";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)}

/* Metrics */
function renderMetrics(){
  const s=(domain==="paper"||domain==="live")?D.trading?.summary:null;if(!s)return;
  $("mEquity").textContent="$"+fmt(s.totalEquity);$("eqVal").textContent="$"+fmt(s.totalEquity);$("soulEquity").textContent="$"+fmt(s.totalEquity);
  const p=s.dailyPnl??0;$("mPnl").textContent=(p>=0?"+$":"-$")+fmt(Math.abs(p));$("mPnl").className="metric-card__value num "+pc(p);
  $("mPnlPct").textContent=(p>=0?"+":"")+fmt(s.dailyPnlPct,2)+"%";$("mPnlPct").className="metric-card__sub num metric-card__sub--"+(p>=0?"g":"r");
  $("eqChg").textContent=(p>=0?"+":"")+fmt(s.dailyPnlPct,2)+"%";$("eqChg").className="topbar__eq-chg num "+pc(p);
  $("soulPnl").textContent=(p>=0?"+":"")+fmt(s.dailyPnlPct,2)+"%";$("soulPnl").className="soul__pnl num soul__pnl--"+(p>=0?"up":"down");
  $("mPositions").textContent=s.positionCount??0;$("mWinRate").textContent=s.winRate!=null?fmt(s.winRate,1)+"%":"--";
  $("mSharpe").textContent=s.avgSharpe!=null?"Sharpe "+fmt(s.avgSharpe,2):"";
}

/* Positions */
function renderPositions(){
  const pos=D.trading?.positions??[];$("posCount").textContent=pos.length;const el=$("positionCards");
  if(!pos.length){el.innerHTML='<div class="empty-state"><div class="empty-state__icon">&#128230;</div><div class="empty-state__text">暂无活跃持仓</div></div>';return}
  el.innerHTML=pos.map(p=>{const s=(p.side||"long").toLowerCase(),pnl=p.unrealizedPnl??p.pnl??0;
    return`<div class="pos-card"><div class="pos-card__top"><span class="pos-card__symbol">${p.symbol}</span><span class="pos-card__side pos-card__side--${s}">${s.toUpperCase()}</span><span class="pos-card__pnl ${pc(pnl)}">${pnl>=0?"+":""}$${fmt(Math.abs(pnl))}</span></div><div class="pos-card__row"><span>数量 <em>${fmt(p.quantity||p.qty,4)}</em></span><span>入场 <em>$${fmt(p.entryPrice||p.avgEntry)}</em></span><span>现价 <em>$${fmt(p.currentPrice||p.markPrice)}</em></span></div><div class="pos-card__actions"><button class="pos-card__btn pos-card__btn--close" onclick="closePos('${p.symbol}')">平仓</button><button class="pos-card__btn pos-card__btn--tp">止盈</button><button class="pos-card__btn pos-card__btn--sl">止损</button></div></div>`}).join("");
}

/* Orders */
function renderOrders(){
  const ord=D.trading?.orders??[];$("ordCount").textContent=ord.length;const tb=$("ordTable");
  if(!ord.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:16px">暂无订单记录</td></tr>';return}
  tb.innerHTML=ord.slice(0,20).map(o=>{const s=(o.side||"buy").toLowerCase(),st=o.status||"filled",sc=st==="filled"?"var(--gain)":st==="canceled"?"var(--text-dim)":"var(--warn)";
    return`<tr><td>${ago(o.timestamp||o.createdAt)}</td><td style="color:var(--text-hi)">${o.symbol}</td><td><span class="tag tag--${s==="buy"?"long":"flat"}">${s.toUpperCase()}</span></td><td class="right">${fmt(o.quantity||o.amount,4)}</td><td class="right">$${fmt(o.price)}</td><td style="color:${sc}">${st}</td></tr>`}).join("");
}

/* Feed cards */
function renderFeed(){
  const ev=D.events?.events??[],pend=ev.filter(e=>e.status==="pending"||e.requiresApproval);
  const trades=ev.filter(e=>["trade-executed","order-placed","order-filled","position-opened","position-closed","trade-signal"].includes(e.type)).slice(0,15);
  $("pendingCards").innerHTML=pend.length?pend.map(e=>`<div class="fc fc--appr"><div class="fc__head"><span class="fc__icon">&#9888;</span><span class="fc__type">${e.title||e.type}</span><span class="fc__time">${ago(e.timestamp)}</span></div><div class="fc__detail">${e.summary||e.description||""}</div>${e.metrics?`<div class="fc__metrics">${Object.entries(e.metrics).map(([k,v])=>`<span class="fm">${k}: ${v}</span>`).join("")}</div>`:""}<div class="fc__actions"><button class="fc__btn fc__btn--ok" onclick="approveEvent('${e.id}')">&#10003; 批准</button><button class="fc__btn fc__btn--no" onclick="rejectEvent('${e.id}')">&#10005; 拒绝</button></div></div>`).join(""):'<div style="font-size:11px;color:var(--text-muted);padding:8px 0">无待处理事项 &#10004;</div>';
  $("tradeCards").innerHTML=trades.length?trades.map(e=>{const c=(e.type||"").includes("buy")||(e.type||"").includes("open")?"fc--buy":"";return`<div class="fc ${c}"><div class="fc__head"><span class="fc__icon">${e.icon||"&#128200;"}</span><span class="fc__type">${e.title||e.type}</span><span class="fc__time">${ago(e.timestamp)}</span></div><div class="fc__detail">${e.summary||e.description||""}</div>${e.narration?`<div class="fc__narration">${e.narration}</div>`:""}</div>`}).join(""):'<div style="font-size:11px;color:var(--text-muted);padding:8px 0">今日尚无交易事件</div>';
}

/* Backtest domain */
function renderBacktest(){
  if(domain!=="backtest")return;$("metricsRow").style.display="none";$("btSection").style.display="block";
  const r=D.backtestResults??[];$("btSection").innerHTML=r.length?`<div class="section fade-up"><div class="section__head"><span class="section__title">回测结果</span></div><div class="section__body">${r.map(b=>`<div class="bt-card"><div class="bt-card__head"><span class="bt-card__name">${b.strategyName||b.strategyId}</span></div><div class="bt-card__metrics"><span>收益 <em class="${pc(b.totalReturn)}">${fmt(b.totalReturn,2)}%</em></span><span>Sharpe <em>${fmt(b.sharpe,2)}</em></span><span>最大回撤 <em class="loss">${fmt(b.maxDrawdown,2)}%</em></span><span>胜率 <em>${fmt(b.winRate,1)}%</em></span></div></div>`).join("")}</div></div>`:'<div class="section fade-up"><div class="section__body"><div class="empty-state"><div class="empty-state__icon">&#128202;</div><div class="empty-state__text">暂无回测数据</div></div></div></div>';
}

/* Alerts (live) */
function renderAlerts(){
  if(domain!=="live")return;const a=D.alerts??[];if(!a.length)return;$("alertSection").style.display="block";
  $("alertList").innerHTML=a.map(x=>`<div class="alert-row"><span class="alert-row__icon">${x.severity==="critical"?"&#128680;":"&#9888;"}</span><span class="alert-row__msg">${x.message||x.condition}</span><span class="alert-row__time">${ago(x.triggeredAt||x.createdAt)}</span></div>`).join("");
}

/* Risk + Clock */
function updateRisk(){const r=D.risk||{},b=$("riskBadge");if(!r.enabled){b.textContent="OFF";return}b.textContent="NORMAL";$("riskHalo").className="risk-halo"}
function tickClock(){$("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false})}
tickClock();setInterval(tickClock,3e4);

/* API */
async function closePos(sym){if(!confirm("确认平仓 "+sym+"？"))return;try{const r=await fetch(AP+"/position/close",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({symbol:sym,domain})});toast(r.ok?"平仓指令已发送":"平仓失败",r.ok)}catch{toast("网络错误",false)}}
async function approveEvent(id){try{const r=await fetch(AP+"/events/"+id+"/approve",{method:"POST"});toast(r.ok?"已批准":"操作失败",r.ok);if(r.ok)setTimeout(()=>location.reload(),800)}catch{toast("网络错误",false)}}
async function rejectEvent(id){try{const r=await fetch(AP+"/events/"+id+"/reject",{method:"POST"});toast(r.ok?"已拒绝":"操作失败",r.ok);if(r.ok)setTimeout(()=>location.reload(),800)}catch{toast("网络错误",false)}}

/* E-STOP */
$("estopBtn").onclick=async()=>{if(!confirm("紧急停止将平掉所有持仓并暂停交易，确认？"))return;try{const r=await fetch(AP+"/emergency-stop",{method:"POST"});toast(r.ok?"已触发紧急停止":"停止失败",r.ok)}catch{toast("网络错误",false)}};

/* SSE */
(function(){const src=new EventSource(AP+"/sse/trading"),dot=$("sseTrade");
  src.onopen=()=>{if(dot)dot.classList.add("connected")};src.onerror=()=>{if(dot){dot.classList.remove("connected");dot.classList.add("error")}};
  src.addEventListener("trading-update",e=>{try{const d=JSON.parse(e.data);if(d.summary){D.trading={...D.trading,summary:d.summary};renderMetrics()}if(d.positions){D.trading={...D.trading,positions:d.positions};renderPositions()}}catch{}});
  src.addEventListener("event",e=>{try{const ev=JSON.parse(e.data);if(D.events?.events)D.events.events.unshift(ev);renderFeed()}catch{}});
})();

/* Bot msg */
const pC=D.events?.pendingCount??0,posN=D.trading?.summary?.positionCount??D.trading?.positions?.length??0;
$("botMsg").innerHTML=[pC>0?pC+" pending":"",posN+" positions",domain.toUpperCase()+" mode"].filter(Boolean).join(" &middot; ");

/* INIT */
renderMetrics();renderPositions();renderOrders();renderFeed();renderBacktest();renderAlerts();updateRisk();
</script>
</body>
</html>
