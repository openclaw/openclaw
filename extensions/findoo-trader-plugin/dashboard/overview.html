<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenFinClaw — Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>/*__SHARED_CSS__*/</style>
<style>/*__PAGE_CSS__*/</style>
</head>
<body>
<script>var pageData = /*__PAGE_DATA__*/ {};</script>

<!-- Risk Halo + Scanline -->
<div class="risk-halo" id="riskHalo"></div>
<div class="scanline"></div>

<!-- Top Bar -->
<header class="topbar">
  <span class="topbar__logo">OPENFINCLAW</span>
  <div class="topbar__sep"></div>
  <nav class="topbar__nav">
    <a class="topbar__tab topbar__tab--active" href="overview">Overview</a>
    <a class="topbar__tab" href="strategy">Strategy</a>
    <a class="topbar__tab" href="trader">Trader</a>
    <a class="topbar__tab" href="setting">Setting</a>
  </nav>
  <div class="topbar__spacer"></div>
  <div class="topbar__dots">
    <span><span class="topbar__dot topbar__dot--g" id="dotGw"></span>Gateway</span>
    <span><span class="topbar__dot topbar__dot--g" id="dotHb"></span>Heartbeat</span>
    <span><span class="topbar__dot topbar__dot--y" id="dotPaper"></span>Paper</span>
  </div>
  <div class="topbar__sep"></div>
  <span class="topbar__risk" id="riskLabel">NORMAL</span>
  <span class="topbar__clock num" id="clock">--:--</span>
  <button class="topbar__estop" id="btnEstop">E-STOP</button>
</header>

<!-- Main Layout: Soul + Data -->
<div class="layout">
  <!-- SOUL PANEL -->
  <aside class="soul soul--desktop" id="soulDesktop">
    <div class="soul__header">
      <div class="soul__top">
        <div class="lobster">
          <div class="lobster__glow"></div>
          <span class="lobster__face" id="lobsterFace">&#x1F99E;</span>
          <span class="lobster__mood" id="lobsterMood">&#x1F60A;</span>
        </div>
        <div class="soul__identity">
          <div class="soul__name">&#x91D1;&#x878D;&#x9F99;&#x867E; <span class="heartbeat"></span></div>
          <div class="soul__last" id="lastAction">&#x6700;&#x8FD1;&#x64CD;&#x4F5C;: --</div>
        </div>
      </div>
      <div>
        <span class="soul__equity num" id="soulEq">$0</span>
        <span class="soul__pnl num" id="soulPnl">--</span>
      </div>
      <div class="soul__badges">
        <span class="sbadge sbadge--regime" id="regimeBadge">--</span>
        <span class="sbadge sbadge--matrix" id="matrixBadge">
          <span class="sbadge__dots" id="matrixDots"></span>
          <span id="matrixText">0&middot;0&middot;0</span>
        </span>
        <span class="sbadge sbadge--risk"><span class="rdot" id="riskDot"></span><span id="riskText">--</span></span>
      </div>
    </div>
    <!-- Feed Timeline -->
    <div class="soul__feed" id="soulFeed">
      <div class="soul__sep">&#x4ECA;&#x65E5;&#x52A8;&#x6001;</div>
    </div>
  </aside>

  <!-- DATA PANEL -->
  <main class="data">
    <!-- 4 Metric Cards -->
    <div class="metrics" id="metricsRow">
      <div class="metric-card"><div class="metric-card__label">&#x603B;&#x6743;&#x76CA;</div><div class="metric-card__value num" id="metricEq">$0</div><div class="metric-card__sub num" id="metricEqSub">--</div></div>
      <div class="metric-card"><div class="metric-card__label">&#x4ECA;&#x65E5; P&amp;L</div><div class="metric-card__value num" id="metricPnl">$0</div><div class="metric-card__sub num" id="metricPnlSub">--</div></div>
      <div class="metric-card"><div class="metric-card__label">&#x6D3B;&#x8DC3;&#x7B56;&#x7565;</div><div class="metric-card__value num" id="metricStrat">0</div><div class="metric-card__sub" id="metricStratSub">--</div></div>
      <div class="metric-card"><div class="metric-card__label">Sharpe</div><div class="metric-card__value num" id="metricSharpe">--</div><div class="metric-card__sub" id="metricSharpeSub">--</div></div>
    </div>

    <!-- Equity Chart + Strategy Matrix -->
    <div class="row2">
      <div class="section">
        <div class="section__head"><span class="section__title">&#x6743;&#x76CA;&#x66F2;&#x7EBF;</span><span class="section__badge num" id="eqBadge">--</span></div>
        <div class="section__body"><div class="chart-wrap" id="eqChart"></div></div>
      </div>
      <div class="section">
        <div class="section__head"><span class="section__title">&#x7B56;&#x7565;&#x77E9;&#x9635;</span></div>
        <div class="section__body" id="stratMatrix"></div>
      </div>
    </div>

    <!-- Positions + Orders -->
    <div class="row2">
      <div class="section">
        <div class="section__head"><span class="section__title">&#x6D3B;&#x8DC3;&#x6301;&#x4ED3;</span><span class="section__badge num" id="posBadge">0</span></div>
        <div class="section__body"><table><thead><tr><th>&#x6807;&#x7684;</th><th>&#x65B9;&#x5411;</th><th>&#x6570;&#x91CF;</th><th>P&amp;L</th></tr></thead><tbody id="posTable"></tbody></table></div>
      </div>
      <div class="section">
        <div class="section__head"><span class="section__title">&#x8FD1;&#x671F;&#x8BA2;&#x5355;</span><span class="section__badge num" id="ordBadge">0</span></div>
        <div class="section__body"><table><thead><tr><th>&#x65F6;&#x95F4;</th><th>&#x6807;&#x7684;</th><th>&#x65B9;&#x5411;</th><th>&#x72B6;&#x6001;</th></tr></thead><tbody id="ordTable"></tbody></table></div>
      </div>
    </div>
  </main>
</div>

<!-- Bottom Bar -->
<footer class="botbar">
  <div class="botbar__left">
    <span><span class="botbar__dot botbar__dot--g" id="sseDot"></span>SSE <span id="sseStatus">--</span></span>
    <span>Heartbeat: <span id="hbAge">--</span></span>
  </div>
  <div class="botbar__right"><span id="version">v2026.3.13</span></div>
</footer>

<!-- Mobile FAB -->
<button class="soul-fab" id="soulFab" onclick="openSoulOverlay()">&#x1F99E;<div class="soul-fab__pulse"></div></button>
<div class="soul-overlay" id="soulOverlay">
  <button class="soul-overlay__close" onclick="closeSoulOverlay()">&#x2715;</button>
  <aside class="soul" id="soulMobile"></aside>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
  var d = pageData || {};
  var trading = d.trading || {};
  var summary = trading.summary || {};
  var events = (d.events || {}).events || [];
  var pendingCount = (d.events || {}).pendingCount || 0;
  var pipeline = d.pipeline || {};
  var topStrategies = d.topStrategies || [];
  var positions = trading.positions || [];
  var orders = trading.orders || [];
  var snapshots = trading.snapshots || [];

  function $(id){ return document.getElementById(id); }
  function fmt(n){ return typeof n==='number' ? (n>=0?'+':'')+n.toFixed(2)+'%' : '--'; }
  function fmtUsd(n){ return typeof n==='number' ? '$'+n.toLocaleString(undefined,{maximumFractionDigits:0}) : '$0'; }
  function timeStr(ts){ var d=new Date(ts); return (d.getHours()+'').padStart(2,'0')+':'+(d.getMinutes()+'').padStart(2,'0'); }

  // ── Metrics ──
  $('metricEq').textContent = fmtUsd(summary.totalEquity);
  $('soulEq').textContent = fmtUsd(summary.totalEquity);
  var pnl = summary.dailyPnl || 0;
  var pnlPct = summary.dailyPnlPct || 0;
  $('metricPnl').textContent = fmtUsd(pnl);
  $('metricPnlSub').textContent = fmt(pnlPct);
  $('metricPnlSub').className = 'metric-card__sub num ' + (pnl>=0?'metric-card__sub--g':'metric-card__sub--r');
  $('soulPnl').textContent = (pnl>=0?'+':'') + fmtUsd(pnl) + ' (' + fmt(pnlPct) + ')';
  $('soulPnl').className = 'soul__pnl num ' + (pnl>=0?'soul__pnl--up':'soul__pnl--down');
  $('metricEqSub').textContent = fmt(pnlPct);
  $('metricEqSub').className = 'metric-card__sub num ' + (pnl>=0?'metric-card__sub--g':'metric-card__sub--r');
  $('metricStrat').textContent = (pipeline.total || 0);
  $('metricStratSub').textContent = 'L3:' + (pipeline.l3||0) + ' L2:' + (pipeline.l2||0);
  var sharpe = summary.avgSharpe;
  $('metricSharpe').textContent = sharpe!=null ? sharpe.toFixed(2) : '--';
  $('metricSharpeSub').textContent = summary.winRate!=null ? 'Win ' + (summary.winRate*100).toFixed(0) + '%' : '--';

  // ── Strategy Matrix ──
  var levels = [
    { label: 'L3 \u5B9E\u76D8', color: 'var(--l3)', items: topStrategies.filter(function(s){return s.level==='L3_LIVE'}) },
    { label: 'L2 \u6A21\u62DF', color: 'var(--l2)', items: topStrategies.filter(function(s){return s.level==='L2_PAPER'}) },
    { label: 'L1 \u56DE\u6D4B', color: 'var(--l1)', items: topStrategies.filter(function(s){return s.level==='L1_BACKTEST'}) },
    { label: 'L0 \u5B75\u5316', color: 'var(--l0)', items: topStrategies.filter(function(s){return s.level==='L0_INCUBATE'}) },
  ];
  var matrixHtml = '';
  levels.forEach(function(lv){
    matrixHtml += '<div class="strat-level"><div class="strat-level__label" style="color:'+lv.color+'">'+lv.label+'</div><div class="strat-level__bar">';
    if(lv.items.length===0) matrixHtml += '<span style="font-size:10px;color:var(--text-muted)">\u2014</span>';
    lv.items.forEach(function(s){ matrixHtml += '<span class="strat-pill" data-level="'+s.level.split('_')[0]+'">'+s.name+'</span>'; });
    matrixHtml += '</div></div>';
  });
  $('stratMatrix').innerHTML = matrixHtml;
  $('matrixText').textContent = (pipeline.l3||0)+'\xB7'+(pipeline.l2||0)+'\xB7'+((pipeline.l1||0)+(pipeline.l0||0));

  // ── Positions Table ──
  var posHtml = '';
  positions.slice(0,8).forEach(function(p){
    var pnlVal = p.unrealizedPnl || p.pnl || 0;
    posHtml += '<tr><td>'+(p.symbol||'--')+'</td><td>'+(p.side||'--')+'</td><td class="num">'+(p.amount||p.qty||'--')+'</td><td class="num '+(pnlVal>=0?'g':'r')+'">'+fmtUsd(pnlVal)+'</td></tr>';
  });
  $('posTable').innerHTML = posHtml || '<tr><td colspan="4" style="color:var(--text-muted);text-align:center">\u6682\u65E0\u6301\u4ED3</td></tr>';
  $('posBadge').textContent = positions.length;

  // ── Orders Table ──
  var ordHtml = '';
  orders.slice(0,8).forEach(function(o){
    ordHtml += '<tr><td class="num">'+timeStr(o.createdAt||o.timestamp||Date.now())+'</td><td>'+(o.symbol||'--')+'</td><td>'+(o.side||'--')+'</td><td><span class="tag tag--'+(o.status==='filled'?'filled':'open')+'">'+(o.status||'--')+'</span></td></tr>';
  });
  $('ordTable').innerHTML = ordHtml || '<tr><td colspan="4" style="color:var(--text-muted);text-align:center">\u6682\u65E0\u8BA2\u5355</td></tr>';
  $('ordBadge').textContent = orders.length;

  // ── Equity Chart (SVG polyline) ──
  if(snapshots.length > 1){
    var vals = snapshots.map(function(s){return s.equity || 0;});
    var min = Math.min.apply(null,vals), max = Math.max.apply(null,vals);
    var range = max-min || 1;
    var w = 400, h = 140, pad = 4;
    var pts = vals.map(function(v,i){ return ((i/(vals.length-1))*(w-pad*2)+pad)+','+(h-pad-((v-min)/range)*(h-pad*2)); }).join(' ');
    $('eqChart').innerHTML = '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:160px"><defs><linearGradient id="eqG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--gain)" stop-opacity="0.15"/><stop offset="100%" stop-color="var(--gain)" stop-opacity="0"/></linearGradient></defs><polygon points="'+pad+','+h+' '+pts+' '+(w-pad)+','+h+'" fill="url(#eqG)"/><polyline points="'+pts+'" fill="none" stroke="var(--gain)" stroke-width="1.5" stroke-linejoin="round"/></svg>';
    var ret = ((vals[vals.length-1]-vals[0])/vals[0]*100);
    $('eqBadge').textContent = (ret>=0?'+':'')+ret.toFixed(1)+'%';
    $('eqBadge').style.color = ret>=0?'var(--gain)':'var(--loss)';
    $('eqBadge').style.background = ret>=0?'var(--gain-dim)':'var(--loss-dim)';
  }

  // ── Feed Cards ──
  var feedTypeMap = {
    trade_executed:'buy', trade_pending:'appr', alert_triggered:'risk',
    strategy_promoted:'evo', strategy_killed:'risk', order_filled:'buy',
    order_cancelled:'risk', emergency_stop:'risk', system:'brief'
  };
  var feedIconMap = { buy:'\uD83D\uDFE2', appr:'\u26A1', risk:'\uD83D\uDD34', evo:'\uD83E\uDDEC', brief:'\uD83D\uDCCB', sleep:'\uD83D\uDE34' };
  function renderFeedCard(evt){
    var ft = evt.feedType || feedTypeMap[evt.type] || 'brief';
    var icon = feedIconMap[ft] || '\uD83D\uDCCB';
    var html = '<article class="fc fc--'+ft+'">';
    html += '<div class="fc__head"><span class="fc__icon">'+icon+'</span><span class="fc__type">'+evt.title+'</span><span class="fc__time num">'+timeStr(evt.timestamp)+'</span></div>';
    if(evt.detail) html += '<div class="fc__detail">'+evt.detail+'</div>';
    if(evt.chips && evt.chips.length){
      html += '<div class="fc__metrics">';
      evt.chips.forEach(function(c){ html += '<span class="fm'+(c.color?' fm--'+c.color:'')+'">'+c.label+': '+c.value+'</span>'; });
      html += '</div>';
    }
    if(evt.narration) html += '<div class="fc__narration">\uD83E\uDD9E '+evt.narration+'</div>';
    if(evt.status==='pending'){
      html += '<div class="fc__actions" id="actions-'+evt.id+'"><button class="fc__btn fc__btn--ok" onclick="doApprove(\''+evt.id+'\')">\u2705 \u6279\u51C6</button><button class="fc__btn fc__btn--no" onclick="doReject(\''+evt.id+'\')">\u6682\u4E0D</button></div>';
    }
    html += '</article>';
    return html;
  }
  var feedEl = $('soulFeed');
  events.slice(0,20).forEach(function(evt){ feedEl.insertAdjacentHTML('beforeend', renderFeedCard(evt)); });

  // ── Clock ──
  function tickClock(){ var n=new Date(); $('clock').textContent=(n.getHours()+'').padStart(2,'0')+':'+(n.getMinutes()+'').padStart(2,'0'); }
  tickClock(); setInterval(tickClock, 30000);

  // ── Mood rotation ──
  var moods=['\uD83D\uDE0A','\uD83E\uDD29','\uD83E\uDD14','\u26A1','\uD83D\uDE0A'], mi=0;
  setInterval(function(){ mi=(mi+1)%moods.length; $('lobsterMood').textContent=moods[mi]; }, 7000);

  // ── SSE ──
  function connectSSE(){
    try {
      var es = new EventSource('/api/v1/finance/events/stream');
      es.onopen = function(){ $('sseDot').className='botbar__dot botbar__dot--g'; $('sseStatus').textContent='Connected'; };
      es.onmessage = function(e){
        try {
          var msg = JSON.parse(e.data);
          if(msg.type==='new_event' && msg.event){
            feedEl.children[1] ? feedEl.children[1].insertAdjacentHTML('afterend', renderFeedCard(msg.event)) : feedEl.insertAdjacentHTML('beforeend', renderFeedCard(msg.event));
          }
        } catch(ex){}
      };
      es.onerror = function(){ $('sseDot').className='botbar__dot botbar__dot--y'; $('sseStatus').textContent='Reconnecting...'; };
    } catch(ex){ $('sseStatus').textContent='Unavailable'; }
  }
  connectSSE();

  // ── E-STOP ──
  $('btnEstop').onclick = function(){
    if(!confirm('\u26D4 \u7D27\u6025\u505C\u6B62\uFF1A\u6682\u505C\u6240\u6709\u4EA4\u6613\u6D3B\u52A8\uFF1F')) return;
    fetch('/api/v1/finance/emergency-stop', {method:'POST'}).then(function(r){ return r.json(); }).then(function(){
      showToast('\u26D4 \u7D27\u6025\u505C\u6B62\u5DF2\u6267\u884C');
    }).catch(function(){ showToast('\u26D4 \u7D27\u6025\u505C\u6B62\u8BF7\u6C42\u5931\u8D25'); });
  };

  // ── Approve/Reject ──
  window.doApprove = function(id){
    fetch('/api/v1/finance/events/approve', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:id})})
    .then(function(r){ return r.json(); })
    .then(function(){
      var el = $('actions-'+id);
      if(el) el.innerHTML = '<div style="color:var(--gain);font-size:11px">\u2705 \u5DF2\u6279\u51C6</div>';
      showToast('\u2705 \u5DF2\u6279\u51C6');
    });
  };
  window.doReject = function(id){
    fetch('/api/v1/finance/events/reject', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:id})})
    .then(function(r){ return r.json(); })
    .then(function(){
      var el = $('actions-'+id);
      if(el) el.innerHTML = '<div style="color:var(--text-dim);font-size:11px">\u5DF2\u62D2\u7EDD</div>';
    });
  };

  // ── Toast ──
  window.showToast = function(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); };

  // ── Mobile overlay ──
  window.openSoulOverlay = function(){ $('soulMobile').innerHTML=$('soulDesktop').innerHTML; $('soulOverlay').classList.add('open'); };
  window.closeSoulOverlay = function(){ $('soulOverlay').classList.remove('open'); };
})();
</script>
</body>
</html>
