<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="base.css"></head>
<body>
  <div class="slide gradient-bg" style="text-align: center; align-items: center;">
    <h1 class="slide-title">{{ title }}</h1>
    <ul class="bullet-list" style="text-align: left; max-width: 800px;">
      {% for line in body_lines %}
      <li>{{ line }}</li>
      {% endfor %}
    </ul>
    <div class="cta-text">Subscribe for daily tech updates!</div>
    <div class="slide-number">{{ slideIndex }} / {{ totalSlides }}</div>
  </div>
</body>
</html>
