services:
  graphiti:
    image: juliopx/graphiti-mcp:latest
    container_name: graphiti
    ports:
      - "8001:8000"
      - "6379:6379"
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-local}
      - OPENAI_API_URL=${OPENAI_API_URL:-http://192.168.1.250:8081/v1}
      - EMBEDDER_API_URL=${EMBEDDER_API_URL:-http://192.168.1.250:8082/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen-3.5-4B}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-bge-m3}
      - EMBEDDER_DIMENSIONS=${EMBEDDER_DIMENSIONS:-1024}
      - FALKORDB_URL=redis://localhost:6379
      - FALKORDB_DATABASE=global_user_memory
      - GRAPHITI_GROUP_ID=global_user_memory
      - SEMAPHORE_LIMIT=1
      - LOG_LEVEL=DEBUG
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    restart: unless-stopped

volumes:
  falkordb_data:
