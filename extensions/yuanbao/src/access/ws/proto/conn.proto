// Final proto file, source: https://zhiyan.woa.com/plugin_ifbook/17187/repo/#/ifbook/repo/ifbook-managed/ver/baseline/proto/ifbpf-Uk92tPKKKC/content
// For changes, confirm with elvinsyang
syntax = "proto3";
// package code generated by ifbook，edit if necessary.
package trpc.yuanbao.conn_common;
// Follow Google protobuf style guide: https://developers.google.com/protocol-buffers/docs/style

//code generated by ifbook，edit if necessary.
option go_package = "git.woa.com/ifBookProtocol/hunyuanbot/yuanbao_conn/conn_common";

// Avoid google/protobuf/any.proto (tightly coupled to package naming).
// Import within the same module: import "Test/your_proto.proto"

// ---------- Long-connection access layer: error code definitions ----------
// RPC error codes
enum RetCode {
    SUCCESS = 0; // Success
    // Client error codes
    PARAMS_INVALID      = 40011; // Invalid parameters
    AUTH_FAIL           = 40100; // Authentication failed
    UNKNOWN_ROUTE       = 40300; // Invalid route
    ALREADY_AUTH        = 41101; // Already authenticated
    SAME_KIND_DEV_LOGIN = 41102; // Same-device login conflict
    // Internal server errors
    INNER_SVR_FAIL     = 50400; // Server program error
    OVERLOAD_CONTROL   = 50503; // System overload protection
    SET_STATE_CONFLICT = 51001; // Heartbeat state conflict
    CONN_OVER_LIMIT    = 51002; // Connection limit exceeded
    NO_USER_ONLINE     = 51003; // All users offline
    PARTIAL_FAIL       = 51004; // Partial success
	// System error codes
	NET_FAIL            = 90001; // Downstream network error
	BACKEND_RETURN_FAIL = 90003; // Downstream dependency failure (non-zero return code)

    // User connection status
	USER_OFFLINE   = 20001; // User/device offline
    USER_NOT_EXIST = 20002; // User/device not found
}


// ---------- Long-connection access layer: client channel protocol ----------
// Client-server interaction protocol header (aligned with XMPP private binary protocol).
message Head
{
    uint32 cmd_type = 1;  // 0=upstream req, 1=upstream rsp, 2=downstream push, 3=push ack
    string cmd = 2; // Command name
    uint32 seq_no = 3;  // Auto-increment sequence number
	string msg_id = 4; // Message ID for req-rsp correlation and unique push ID (UUID without dashes)
    string module = 5; // Module name for upstream routing or client-side push dispatch
    bool need_ack = 6;  // Whether push requires ack (for cmd_type=2)

    // Used only in upstream responses
    int32 status = 10; // Access layer error code
}

// Non-sticky packet framing (e.g. WebSocket)
message ConnMsg {
	Head head = 1;
	bytes data = 2;
}
message DirectedPush {
	unit type = 1;
	string content = 2;
}
// QUIC/TCP framing: magic(2B, 0x86bb) + head_len(2B, uint16) + body_len(4B, uint32) + Head binary + Body binary

// Auth info
message AuthInfo {
    string uid = 1; // User UID
    string source = 2; // Source (app/web/miniprogram)
    string token = 3; // Auth token
}
// Client device info
message DeviceInfo {
    string app_version = 1; // Client version
    string app_operation_system = 2; // Client OS
    string app_bundle_id = 3; // App bundle ID
    string qimei = 4; // X-A3
    string qimei36 = 5; // X-A153
    string h38 = 6; // Web-only, browser QimeiSDK ID (similar to qimei36)
    string language = 7; // Language
    string device_id = 8; // Device ID
    string device_name = 9; // Device name
    string instance_id = 10; // Device terminal type
    string tid = 11; // Turing ID
    string uskey = 12; // X-Uskey
    string bus_params_md5 = 13; // X-Bus-Params-Md5
    string package_type = 14; // release/dev/pre
    string app_publish_channel = 15; // Publish channel
    string sign_version = 16; // App signature encryption type: 1=app
    string package_signature = 17; // App signature encryption string
    string brand = 18; // Device brand (X-A9 header)
    string h42 = 19; // Web-only, browser QimeiSDK (X-HY93 header)
    string x_device_id = 20; // Device ID for data reporting (X-Device-Id header)
    string x_platform = 21; // Web device OS (X-Platform header)
}
// Virtual container for distinguishing multiple connections on a single device
message Container {
    int32 type = 1; // Container type. 1: browser multi-tab (unique_key is 16-char random string)
    string unique_key = 2; // Unique identifier key
}

// Auth bind request
// Command: auth-bind
// Module: conn_access
message AuthBindReq {
    string biz_id = 1; // Business tenant ID (issued by access layer; Yuanbao Bot uses: ybBot)
    // Auth info
    AuthInfo auth_info = 2;
    // Client device info
    DeviceInfo device_info = 3;
    // Virtual container for multi-connection scenarios on a single device.
    // Default: one connection per device (e.g. app global connection); leave empty.
    Container container_info = 4;
    // Environment name (for multi-lane test environments)
    string env_name = 5;

    // Strategy for session_id conflicts (e.g. same-device login).
    // Mode 0 (default): kick old connection without confirmation (used for browser multi-tab).
    // Mode 1: returns error code (e.g. 41102) + force_token; client confirms then re-sends auth-bind with force_token.
    uint32 bind_mode = 6;
    string force_token = 7; // Same-device conflict control token
}
// On auth failure, server disconnects.
message AuthBindRsp {
    int32 code = 1; // 0=success
    string message = 2; // Error message. For bind_mode=1 with same-device conflict (41102): JSON {"force_token":"xxx","other_device_name":"xxxx"}

    string connect_id = 3; // Current connection UUID
    uint64 timestamp = 4; // Server timestamp
    string client_ip =5; // Client IP as seen by access layer
}

// Heartbeat. Upstream request can be empty (data field can be empty).
// Command: ping
// Module: conn_access
message PingReq {
}
message PingRsp {
    uint32 heart_interval = 1; // Max heartbeat interval in seconds (controlled by server)
    uint64 timestamp = 2; // Server timestamp
}

// Server-initiated disconnect notification. No client response needed; WebSocket uses close_frame.
// cmd_type: push (2)
// Command: kickout
// Module: conn_access
message KickoutMsg {
	int32 status = 1;
	string reason = 2;
    string other_device_name = 3; // Other device name (for same-device conflict)
}

message Meta {
    string key = 1;
    string value = 2;
}
// Update connection metadata. Currently supports: language switch (key: language), lane switch (key: env_name)
// Command: update-meta
// Module: conn_access
message UpdateMetaReq {
	repeated Meta meta_infos = 1;
}
message UpdateMetaRsp {
    int32 code = 1; // 0=success
    string message = 2; // Error message
}

// Access layer supports direct upstream request dispatch to trpc, oidb(v0.2.16) etc. Client info obtained via common params SDK: https://git.woa.com/phoenixs/yuanbao/transmeta

message PushMsg {
    string cmd = 1; // Command (URL path style)
    string module = 2; // Module name
    string msg_id = 3; // Message ID for req-rsp correlation and unique push ID (UUID without dashes)
    bytes data = 4; // Passthrough data
}
