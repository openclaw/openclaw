// ---------- 长连接接入层: 错误码定义 ----------
// rpc错误码
enum RetCode {
    SUCCESS = 0; // 成功
    // 客户端错误码
    PARAMS_INVALID      = 40011; // 参数非法
    AUTH_FAIL           = 40100; // 鉴权认证失败
    UNKNOWN_ROUTE       = 40300; // 路由非法
    ALREADY_AUTH        = 41101; // 已经鉴权通过
    SAME_KIND_DEV_LOGIN = 41102; // 同端互踢拦截
    // 服务内部错误
    INNER_SVR_FAIL     = 50400; // 服务程序错误
    OVERLOAD_CONTROL   = 50503; // 系统过载保护
    SET_STATE_CONFLICT = 51001; // 设置心跳状态冲突
    CONN_OVER_LIMIT    = 51002; // 用户连接数超出限制
    NO_USER_ONLINE     = 51003; // 所有用户均不在线
    PARTIAL_FAIL       = 51004; // 部分用户/设备成功
	// 系统错误码
	NET_FAIL            = 90001; // 下游网络错误
	BACKEND_RETURN_FAIL = 90003; // 下游依赖处理失败，返回码不为0

    // 用户连接状态类
	USER_OFFLINE   = 20001; // 用户/设备用户下线
    USER_NOT_EXIST = 20002; // 用户/设备不存在
}


// ---------- 长连接接入层: 客户端通道协议定义 ----------
// 客户端和conn_access服务的交互协议头，对齐xmpp私有化二进制协议。
message Head
{
    uint32 cmd_type = 1;  // 0-上行req，1-上行req的回包rsp，2-下行的push，3-下行push的回包（ack）
    string cmd = 2; // 命令字
    uint32 seq_no = 3;  // 自增序列号
	string msg_id = 4; // 消息id，用于确定上行req-rsp的对应关系，以及push的唯一消息id。基于uuid生成(要去除中间的"-")
    string module = 5; // 模块名，用于上行请求分发路由，或者push数据的客户端分发
    bool need_ack = 6;  // push是否需要ack，用于cmd_type为2(下行push)时

    // 仅上行回包用到
    int32 status = 10; // 接入层错误码
}

// 无粘包情况的组包方式，如: websocket
message ConnMsg {
	Head head = 1;
	bytes data = 2;
}
message DirectedPush {
	unit type = 1;
	string content = 2;
}
// quic/tcp 组包方式: magic(2 bytes, 0x86bb) + head_len(2 bytes，uint16) + body_len(4 bytes，uint32) + Head包头二进制data + Body包体二进制data

// 登录态信息
message AuthInfo {
    string uid = 1; // 用户uid
    string source = 2; // 来源(app/web/miniprogram)
    string token = 3; // 校验的token
}
// 客户端设备信息
message DeviceInfo {
    string app_version = 1; // 客户端版本
    string app_operation_system = 2; // 客户端操作系统
    string app_bundle_id = 3; // 应用包名
    string qimei = 4; // X-A3
    string qimei36 = 5; // X-A153
    string h38 = 6; // Web端专用,浏览器使用QimeiSDK id，类似qimei36
    string language = 7; // 语言
    string device_id = 8; // 设备id
    string device_name = 9; // 设备名
    string instance_id = 10; // 设备终端类型
    string tid = 11; //图灵顿id
    string uskey = 12; // X-Uskey
    string bus_params_md5 = 13; // X-Bus-Params-Md5；
    string package_type = 14; // release/dev/pre
    string app_publish_channel = 15; // 发布渠道
    string sign_version = 16; // 应用程序签名加密串对应的包类型：1表示app
    string package_signature = 17; // 应用程序签名加密串
    string brand = 18; // 设备品牌，对应http header: X-A9
    string h42 = 19; // Web端专用, 浏览器使用QimeiSDK获取，对应http header: X-HY93
    string x_device_id = 20; // 用于数据上报的设备id, 对应http header: X-Device-Id，具体解释看: https://iwiki.woa.com/p/4013661382#X-Device-Id
    string x_platform = 21; // web端设备操作系统，对应http header: X-Platform
}
// 虚拟容器，用于表示在单一设备上构建多个连接时，对每个连接的唯一区分
message Container {
    int32 type = 1; // 容器类型。1: 浏览器网页多开场景(每一个container代表一个网页),对应unique_key为16位随机字符串
    string unique_key = 2; // 唯一标识key
}

// 长链接鉴权绑定包
// 命令字：auth-bind
// module: conn_access
message AuthBindReq {
    string biz_id = 1; // 业务租户id // 由接入层颁发，目前元宝Bot统一填: ybBot
    // 登录态信息
    AuthInfo auth_info = 2;
    // 客户端设备信息
    DeviceInfo device_info = 3;
    // 设备虚拟容器，用于同一设备上构建多个连接的场景
    // 默认一个设备构建一个连接(如app上的长连接，全局一个连接)，不需要填此字段信息。
    Container container_info = 4;
    // 环境名，测试环境多泳道设计环境名
    string env_name = 5;

    // 当遇到 session_id 冲突时(如：同端互踢)，采用的处理策略。
    // 模式 0(默认模式): 直接将老连接踢下线，无需向发起新连接的客户端进行确认。（当前浏览器多开窗口使用）
    // 模式 1: 新连接发起auth-bind时，如发现有同类型设备已登陆，会阻隔返回特定错误码(如：41102)和force_token；用户确认用新设备登陆后，携带force_token再次发起auth-bind请求。
    uint32 bind_mode = 6;
    string force_token = 7; // 同端互踢逻辑控制, 用户确认后再次发起auth-bind 携带给后台
}
// 校验失败，后台直接断开连接。
message AuthBindRsp {
    int32 code = 1; // 0:成功
    string message = 2; // 错误提示。当使用bind_mode=1时，如果遇到同端情况(错误码：41102)，返回一个特定的json串：{"force_token":"xxx","other_device_name":"xxxx"}

    string connect_id = 3; // 当前连接uuid
    uint64 timestamp = 4; // 对时时间戳
    string client_ip =5; // 接入层感知到的客户端ip
}

// 长连接心跳包。上行请求直接是空包即可，即data可为空
// 命令字：ping
// module: conn_access
message PingReq {
}
message PingRsp {
    uint32 heart_interval = 1; // 下次最大心跳间隔，单位秒。间隔由后台来控制
    uint64 timestamp = 2; // 服务端时间戳
}

// 长连接后台主动断连包，通知客户端主动断开连接。不需要客户端回包。websocket则是使用close_frame。
// cmd_type类型为: push类型 2
// 命令字：kickout
// module: conn_access
message KickoutMsg {
	int32 status = 1;
	string reason = 2;
    string other_device_name = 3; // 用于同端互踢时，另外一端的设备名
}

message Meta {
    string key = 1;
    string value = 2;
}
// 更新连接维护的相关元数据, 目前支持：切换语言(key: language)，切换泳道(key: env_name)
// 命令字：update-meta
// module: conn_access
message UpdateMetaReq {
	repeated Meta meta_infos = 1;
}
message UpdateMetaRsp {
    int32 code = 1; // 0:成功
    string message = 2; // 错误提示
}

// ---------------------------------- 分发下游服务协议 -----------------------------------------------
// 本接入层上行请求分发可以直接支持trpc、oidb(v0.2.16)等后台服务协议. 客户端信息通过公参sdk获取: https://git.woa.com/phoenixs/yuanbao/transmeta

// ---------------------------------- 业务服务请求conn_gateway进行push的消息体结构 -----------------------------------------------
message PushMsg {
    string cmd = 1; // 命令字，url_path方式
    string module = 2; // 模块名
    string msg_id = 3; // 消息id，用于确定上行req-rsp的对应关系，以及push的唯一消息id。基于uuid生成(要去除中间的"-")
    bytes data = 4; // 透传数据
}
