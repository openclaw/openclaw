option java_package= "com.tencent.ifbookprotocol.yuanbao_backend.yuanbao_conn.yuanbao_openclaw_proxy.msg_body";
option java_multiple_files = false;
option java_outer_classname = "msg_body"; // Must not collide with message/service/enum names

// Avoid google/protobuf/any.proto (tightly coupled to package naming).
