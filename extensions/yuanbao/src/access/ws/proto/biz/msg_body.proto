// 图片相关数据 
message ImImageInfoArray {
    uint32  type  = 1;   // 原图
    uint32  size  = 2;
    uint32  width = 3;
    uint32  height= 4;
    string  url   = 5; 
}

// 消息内容
message MsgContent {
    string  text  = 1 ;                    // 文字聊天内容 
    string  uuid  = 2 ;                    // 图片
    uint32  image_format = 3 ;             // 图片
    string  data  = 4 ; 
    string  desc  = 5 ; 
    string  ext   = 6 ; 
    string  sound = 7 ; 
    repeated ImImageInfoArray image_info_array = 8 ;  // 图片内容 
    uint32  index = 9 ;              // 表情索引，用户自定义。
    string  url = 10;                // 文件下载地址，可通过该 URL 地址直接下载相应文件
    uint32  file_size = 11;           // 文件数据大小，单位：字节
    string  file_name = 12;           // 文件名称
}

// 消息体元素（对应 YuanbaoMsgBodyElement）
message MsgBodyElement {
  string msg_type = 1;            // TIMTextElem / TIMImageElem / TIMFileElem / TIMCustomElem / TIMFaceElem 等
  MsgContent msg_content = 2;
}

// 云 IM 消息序列号
message ImMsgSeq {
    optional uint64 msg_seq = 1;
    optional string msg_id = 2; // 客户端消息唯一标识
}

message LogInfoExt {
 string trace_id = 1;
}
