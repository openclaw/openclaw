// Image-related data
message ImImageInfoArray {
    uint32  type  = 1;   // Original image
    uint32  size  = 2;
    uint32  width = 3;
    uint32  height= 4;
    string  url   = 5; 
}

// Message content
message MsgContent {
    string  text  = 1 ;                    // Text chat content
    string  uuid  = 2 ;                    // Image UUID
    uint32  image_format = 3 ;             // Image format
    string  data  = 4 ; 
    string  desc  = 5 ; 
    string  ext   = 6 ; 
    string  sound = 7 ; 
    repeated ImImageInfoArray image_info_array = 8 ;  // Image info
    uint32  index = 9 ;              // Emoji index (user-defined)
    string  url = 10;                // File download URL
    uint32  file_size = 11;           // File size in bytes
    string  file_name = 12;           // File name
}

// Message body element (maps to YuanbaoMsgBodyElement)
message MsgBodyElement {
  string msg_type = 1;            // TIMTextElem / TIMImageElem / TIMFileElem / TIMCustomElem / TIMFaceElem etc.
  MsgContent msg_content = 2;
}

// IM message sequence number
message ImMsgSeq {
    optional uint64 msg_seq = 1;
    optional string msg_id = 2; // Client-side unique message identifier
}

message LogInfoExt {
 string trace_id = 1;
}
