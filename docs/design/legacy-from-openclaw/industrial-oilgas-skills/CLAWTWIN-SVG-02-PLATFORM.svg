  <line x1="432" y1="99" x2="454" y2="99" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="454" y="76" width="132" height="46" rx="8" fill="#1E40AF" stroke="#1E3A8A"/>
