  <text x="290" y="284" font-size="9" fill="#059669" text-anchor="middle">●</text>
  <text x="380" y="284" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="470" y="284" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="580" y="284" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>

  <text x="48" y="308" font-size="8.8" fill="#374151">对话智能体</text>
