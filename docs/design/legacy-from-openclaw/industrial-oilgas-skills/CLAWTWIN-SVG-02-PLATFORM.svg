  <rect x="500" y="142" width="200" height="44" rx="8" fill="#F5F3FF" stroke="#7C3AED"/>
  <text x="600" y="160" font-size="9" font-weight="700" fill="#5B21B6" text-anchor="middle">MCP · 智能体运行时</text>
