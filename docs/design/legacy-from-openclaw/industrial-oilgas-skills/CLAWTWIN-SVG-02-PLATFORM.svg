  <text x="290" y="308" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="380" y="308" font-size="9" fill="#059669" text-anchor="middle">●</text>
  <text x="470" y="308" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="580" y="308" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>

  <text x="48" y="332" font-size="8.8" fill="#374151">企业 IT/OT</text>
  <text x="200" y="332" font-size="8" fill="#94A3B8" text-anchor="middle">△</text>
  <text x="290" y="332" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="380" y="332" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="470" y="332" font-size="9" fill="#059669" text-anchor="middle">●</text>
  <text x="580" y="332" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>

  <text x="48" y="356" font-size="8.8" fill="#374151">运维 / 自动化</text>
  <text x="200" y="356" font-size="8" fill="#94A3B8" text-anchor="middle">△</text>
  <text x="290" y="356" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="380" y="356" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="470" y="356" font-size="8" fill="#94A3B8" text-anchor="middle">—</text>
  <text x="580" y="356" font-size="9" fill="#059669" text-anchor="middle">●</text>

  <text x="48" y="376" font-size="7.8" fill="#64748B">图例：● 常用　△ 次要　— 不经此通道</text>

  <!-- apps workers -->
  <rect x="796" y="218" width="384" height="168" rx="10" fill="#F8FAFC" stroke="#94A3B8"/>
  <text x="988" y="238" font-size="10.5" font-weight="700" fill="#334155" text-anchor="middle">运行分工</text>
  <rect x="812" y="248" width="352" height="52" rx="8" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="988" y="266" font-size="9" font-weight="700" fill="#1E40AF" text-anchor="middle">在线业务进程</text>
  <text x="988" y="282" font-size="8.5" fill="#475569" text-anchor="middle">API · 推送 · MCP · Webhook · 管理端</text>
  <rect x="812" y="306" width="352" height="72" rx="8" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="988" y="324" font-size="9" font-weight="700" fill="#166534" text-anchor="middle">后台任务进程</text>
  <text x="988" y="340" font-size="8.5" fill="#374151" text-anchor="middle">采集 · 定时调度 · 可靠外发 · 结果回收（示意）</text>

  <!-- IndustryPack -->
  <rect x="20" y="396" width="1160" height="52" rx="10" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="600" y="416" font-size="10.5" font-weight="700" fill="#5B21B6" text-anchor="middle">④ 行业与场景扩展（插件化交付）</text>
  <text x="600" y="434" font-size="8.8" fill="#4C1D95" text-anchor="middle">注册连接器、流水线与处置模板；支持扩展清单与健康自检，避免内核分叉。</text>

  <!-- Ops strip -->
  <rect x="20" y="456" width="1160" height="44" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-dasharray="7,3"/>
  <text x="600" y="474" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">⑤ 运行保障</text>
  <text x="600" y="490" font-size="8.5" fill="#15803D" text-anchor="middle">健康自检 · 运维诊断 · 可靠外发 · 限流去重 · 配置热更新 · AI 用量可控</text>

  <!-- A/B 工程含义 -->
  <rect x="20" y="508" width="1160" height="56" rx="10" fill="#FFFBEB" stroke="#FBBF24"/>
  <text x="600" y="528" font-size="10" font-weight="700" fill="#92400E" text-anchor="middle">两种推理形态（可组合）</text>
  <text x="80" y="548" font-size="9" fill="#78350F">内置：结构化单次推理 · 低时延 · 多数场景默认够用</text>
  <text x="620" y="548" font-size="9" fill="#5B21B6">外接：对话智能体走 MCP · 工具白名单 · 回调续跑 · 按需启用</text>

