  <text x="290" y="258" font-size="8.5" fill="#475569" text-anchor="middle">SSE</text>
  <text x="380" y="258" font-size="8.5" fill="#475569" text-anchor="middle">MCP</text>
  <text x="470" y="258" font-size="8.5" fill="#475569" text-anchor="middle">Webhook</text>
  <text x="580" y="258" font-size="8.5" fill="#475569" text-anchor="middle">CLI</text>

  <text x="48" y="284" font-size="8.8" fill="#374151">工作台</text>
