  <text x="36" y="40" font-size="9.5" fill="#94A3B8">数据主链路 · 集成方式 · 运行形态</text>

  <!-- 主数据流 横向 -->
  <text x="600" y="68" font-size="10.5" font-weight="700" fill="#334155" text-anchor="middle">端到端数据流</text>

