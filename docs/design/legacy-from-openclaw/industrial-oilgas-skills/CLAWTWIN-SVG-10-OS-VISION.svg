<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" xml:lang="zh-Hans" role="img">
  <title>ClawTwin Platform 企业智能运营 OS 全景架构（图 10/11）</title>
  <desc>三色标注：绿=已实现 · 黄=骨架待填 · 红虚=缺失待建。Provider 适配层是最关键缺口。</desc>
  <defs>
    <style type="text/css">
      text, tspan { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Microsoft YaHei UI',
                    'WenQuanYi Micro Hei', 'Noto Sans CJK SC', sans-serif;
                    text-rendering: geometricPrecision; }
    </style>
  </defs>
  <rect width="1920" height="1080" fill="#F8FAFD"/>
  <g transform="translate(0,0) scale(1.6)">

  <rect x="0" y="0" width="1200" height="52" fill="#0D2340"/>
  <text x="600" y="30" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">ClawTwin Platform · 企业智能运营 OS 全景架构</text>
  <text x="600" y="45" font-size="9.5" fill="#94A3B8" text-anchor="middle">从 OpenClaw 架构师视角的三色诊断：绿=已实现 · 黄=骨架待填充 · 红虚=缺失/未连线</text>

  <!-- 图例 -->
  <rect x="20" y="56" width="1160" height="20" rx="4" fill="#F1F5F9" stroke="#E2E8F0"/>
  <rect x="28" y="60" width="14" height="12" rx="2" fill="#DCFCE7" stroke="#16A34A"/>
  <text x="46" y="70" font-size="8" fill="#166534">已实现（代码可用）</text>
  <rect x="168" y="60" width="14" height="12" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="186" y="70" font-size="8" fill="#92400E">骨架/占位（文件存在但未填充逻辑）</text>
  <rect x="390" y="60" width="14" height="12" rx="2" fill="#FEE2E2" stroke="#DC2626" stroke-dasharray="3,2"/>
  <text x="408" y="70" font-size="8" fill="#991B1B">缺失/待建（docker-compose有但代码未连线）</text>
  <rect x="660" y="60" width="14" height="12" rx="2" fill="#EFF6FF" stroke="#1E40AF"/>
  <text x="678" y="70" font-size="8" fill="#1E40AF">核心内核（稳定）</text>
  <text x="790" y="70" font-size="8" fill="#64748B">Eclipse Ditto / TimescaleDB / Kafka / Milvus / Redis 均在 docker-compose 但 Python 代码未连线</text>

