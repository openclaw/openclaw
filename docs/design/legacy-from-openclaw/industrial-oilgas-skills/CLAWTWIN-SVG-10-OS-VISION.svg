  <text x="20" y="88" font-size="8.5" fill="#64748B" font-weight="700">① 外部调用层</text>
  <rect x="20" y="92" width="220" height="44" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="130" y="108" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">Studio / REST · SSE</text>
  <text x="130" y="122" font-size="7.5" fill="#047857" text-anchor="middle">已实现 · 40+ 端点</text>
  <rect x="248" y="92" width="220" height="44" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="358" y="108" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">Agent / MCP Server</text>
  <text x="358" y="122" font-size="7.5" fill="#047857" text-anchor="middle">已实现 · GET /mcp</text>
  <rect x="476" y="92" width="220" height="44" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="586" y="108" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">CLI（typer）</text>
  <text x="586" y="122" font-size="7.5" fill="#047857" text-anchor="middle">已实现 · apps/cli</text>
  <rect x="704" y="92" width="220" height="44" rx="6" fill="#FFFBEB" stroke="#D97706"/>
  <text x="814" y="108" font-size="9" font-weight="700" fill="#92400E" text-anchor="middle">Feishu / Webhook 接收</text>
  <text x="814" y="122" font-size="7.5" fill="#B45309" text-anchor="middle">骨架 · 事件路由待完善</text>
  <rect x="932" y="92" width="248" height="44" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-dasharray="4,3"/>
  <text x="1056" y="108" font-size="9" font-weight="700" fill="#991B1B" text-anchor="middle">Gateway WebSocket</text>
  <text x="1056" y="122" font-size="7.5" fill="#DC2626" text-anchor="middle">缺失 · REST-only 实时性不足</text>

  <!-- ② 平台服务层 -->
  <text x="20" y="150" font-size="8.5" fill="#64748B" font-weight="700">② 平台服务层（核心价值 — 多项待补齐）</text>
  <!-- Row 2a -->
  <rect x="20" y="154" width="272" height="72" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="156" y="170" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">HITL 工单流转引擎</text>
  <text x="156" y="184" font-size="7.5" fill="#374151" text-anchor="middle">FSM · 审批 · 飞书 / OA 回调</text>
  <text x="156" y="196" font-size="7" fill="#047857" text-anchor="middle">✅ 已实现（test 覆盖）</text>
  <text x="156" y="208" font-size="7" fill="#64748B" text-anchor="middle">PlaybookEngine 骨架可扩展</text>
  <rect x="300" y="154" width="272" height="72" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="436" y="170" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">KB + pgvector 知识库</text>
  <text x="436" y="184" font-size="7.5" fill="#374151" text-anchor="middle">文档入库 · 语义检索</text>
  <text x="436" y="196" font-size="7" fill="#047857" text-anchor="middle">✅ 已实现（test 覆盖）</text>
  <text x="436" y="208" font-size="7" fill="#64748B" text-anchor="middle">Milvus 版本待 provider 化</text>
  <rect x="580" y="154" width="272" height="72" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="716" y="170" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">Doctor · Health · Outbox</text>
  <text x="716" y="184" font-size="7.5" fill="#374151" text-anchor="middle">自检 · 健康维度 · 可靠投递</text>
  <text x="716" y="196" font-size="7" fill="#047857" text-anchor="middle">✅ 已实现（参考 OpenClaw）</text>
  <text x="716" y="208" font-size="7" fill="#64748B" text-anchor="middle">强项，对标 openclaw doctor</text>
  <rect x="860" y="154" width="320" height="72" rx="6" fill="#FFFBEB" stroke="#D97706"/>
  <text x="1020" y="170" font-size="9" font-weight="700" fill="#92400E" text-anchor="middle">Context Engine（AI 上下文组装）</text>
  <text x="1020" y="184" font-size="7.5" fill="#374151" text-anchor="middle">LLM 调用前的上下文构建</text>
  <text x="1020" y="196" font-size="7" fill="#D97706" text-anchor="middle">⚡ 无独立模块·ad-hoc 拼接</text>
  <text x="1020" y="208" font-size="7" fill="#64748B" text-anchor="middle">应对照 openclaw context-engine</text>
  <!-- Row 2b -->
  <rect x="20" y="232" width="272" height="72" rx="6" fill="#FFFBEB" stroke="#D97706"/>
  <text x="156" y="248" font-size="9" font-weight="700" fill="#92400E" text-anchor="middle">AI Job / FunctionExecutor</text>
  <text x="156" y="262" font-size="7.5" fill="#374151" text-anchor="middle">AI 推理任务编排</text>
  <text x="156" y="276" font-size="7" fill="#D97706" text-anchor="middle">⚡ 骨架·FunctionTypes 目录为空</text>
  <text x="156" y="288" font-size="7" fill="#64748B" text-anchor="middle">需注册具体 FunctionType</text>
  <rect x="300" y="232" width="272" height="72" rx="6" fill="#FFFBEB" stroke="#D97706"/>
  <text x="436" y="248" font-size="9" font-weight="700" fill="#92400E" text-anchor="middle">LLM Trace · Eval Runner</text>
  <text x="436" y="262" font-size="7.5" fill="#374151" text-anchor="middle">推理可观测 · 质量评估</text>
  <text x="436" y="276" font-size="7" fill="#D97706" text-anchor="middle">⚡ aip/ 骨架·未实现</text>
  <text x="436" y="288" font-size="7" fill="#64748B" text-anchor="middle">对标 openclaw eval_runner</text>
  <rect x="580" y="232" width="272" height="72" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-dasharray="4,3"/>
  <text x="716" y="248" font-size="9" font-weight="700" fill="#991B1B" text-anchor="middle">Memory SDK（CBR 案例库）</text>
  <text x="716" y="262" font-size="7.5" fill="#374151" text-anchor="middle">经验沉淀 · 可插拔后端</text>
  <text x="716" y="276" font-size="7" fill="#DC2626" text-anchor="middle">❌ 无独立模块·需建</text>
  <text x="716" y="288" font-size="7" fill="#64748B" text-anchor="middle">参考 openclaw memory-host-sdk</text>
  <rect x="860" y="232" width="320" height="72" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-dasharray="4,3"/>
  <text x="1020" y="248" font-size="9" font-weight="700" fill="#991B1B" text-anchor="middle">Skill 系统 · Config Migration</text>
  <text x="1020" y="262" font-size="7.5" fill="#374151" text-anchor="middle">可重用业务单元 · Schema 版本迁移</text>
  <text x="1020" y="276" font-size="7" fill="#DC2626" text-anchor="middle">❌ 两项均缺失</text>
  <text x="1020" y="288" font-size="7" fill="#64748B" text-anchor="middle">参考 openclaw skill / registerConfigMigration</text>

