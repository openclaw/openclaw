# ═══════════════════════════════════════════════════════════
# FEP v1.2 — Findoo Extension Package 完整参考模板
# ═══════════════════════════════════════════════════════════
# 本文件包含 FEP v1.2 全部字段说明，供开发者参考。
# 实际使用时只需保留必要字段，参见 l1-minimal/fep.yaml。

fep: "1.2"

# ── 身份标识 (必填) ───────────────────────────────────────
identity:
  id: my-strategy-id              # 必填：策略唯一标识（英文 + 连字符）
  type: strategy                  # strategy | indicator | connector
  name: "My Strategy"             # 策略显示名称
  version: "1.0.0"                # 语义化版本号
  style: trend                    # trend | mean_reversion | dca | momentum | swing | hybrid
  visibility: public              # public | private | unlisted
  summary: "一句话策略描述"
  description: "详细策略说明，支持 Markdown"
  tags: [crypto, btc, dca]
  license: MIT                    # MIT | CC-BY-4.0 | proprietary
  author:
    name: "Author Name"
    wallet: "0x..."               # 可选：收益分配地址
  createdAt: "2024-01-01"
  updatedAt: "2024-06-01"
  changelog:
    - version: "1.0.0"
      date: "2024-01-01"
      changes: "Initial release"

# ── 技术配置 ──────────────────────────────────────────────
technical:
  language: python
  entryPoint: strategy.py         # scripts/ 下的入口脚本

# ── 策略参数 ──────────────────────────────────────────────
parameters:
  - name: base_amount
    default: 100
    type: number
    label: "基础定投金额"
    range: { min: 10, max: 10000, step: 10 }
  - name: sma_fast
    default: 20
    type: integer
    range: { min: 5, max: 50 }
  - name: sma_slow
    default: 50
    type: integer
    range: { min: 20, max: 200 }

# ── 回测配置 ──────────────────────────────────────────────
backtest:
  defaultPeriod:
    startDate: "2024-01-01"
    endDate: "2024-12-31"
  frequencyDays: 7                # 回测频率（天），覆盖 parameters.frequency_days
  initialCapital: 10000           # 初始资金 (USD)
  currency: USD
  benchmark: BTC-USD              # 基准标的 symbol
  commissionRate: 0.001           # 手续费率 0.1%
  slippageRate: 0.0005            # 滑点率 0.05%
  dataSource: synthetic           # synthetic | datahub | csv

# ── 分类 ──────────────────────────────────────────────────
classification:
  archetype: systematic           # systematic | discretionary | hybrid
  market: Crypto                  # Crypto | US | CN | HK | Forex | Commodity
  assetClasses: [crypto]
  frequency: weekly               # daily | weekly | monthly
  riskProfile: medium             # low | medium | high (fallback for risk.riskLevel)

# ── 风控 ──────────────────────────────────────────────────
risk:
  riskLevel: medium               # low | medium | high
  maxPositionSizePct: 100         # 单标的最大仓位 %
  maxExposurePct: 100             # 总敞口 %
  maxConcurrentPositions: 3       # 最大同时持仓数
  maxLeverage: 1.0                # 最大杠杆
  maxDrawdownThreshold: 25        # 最大回撤阈值 %
  stopLoss:
    type: trailing                # fixed | trailing | atr-based
    value: 15                     # 止损百分比或 ATR 倍数

# ── 完整性证明 (v1.2 新增，系统自动生成) ─────────────────
# 用户无需手动编辑此节。Fork 时系统自动写入 parentCID。
# 回测完成后系统自动计算 contentHash/codeHash/fepHash。
# integrity:
#   parentCID: ""                 # fork 时系统自动填入父策略 IPFS CID

# ── 进化谱系 ──────────────────────────────────────────────
# evolution:
#   originId: ""                  # 策略谱系根节点 ID
#   parentId: ""                  # 直接父策略 ID
#   forkSource: ""                # fork 来源 URL

# ── 验证配置 (Phase 2) ───────────────────────────────────
# validation:
#   enabled: true
#   benchmark: BTC-USD            # 验证用标的（覆盖 backtest.benchmark）
#   windows: [30, 90]             # 验证窗口期（天）
#   decayThreshold: 0.5           # 策略衰退阈值

# ── L2 Agent 配置 (仅 L2 策略需要) ───────────────────────
# agent:
#   engine: agent                 # 触发 L2 Agent 引擎
#   mode: hybrid                  # script | sample | hybrid | full | research
#   model: claude-sonnet-4-6-20250514
#   budgetCapUsd: 5.0             # LLM 推理成本上限 (USD)
#   maxTurnsPerPeriod: 10
#   reflectionInterval: 20       # 每 N 周期执行一次反思
#   drawdownAlertPct: 15.0       # 触发深度分析的回撤阈值
#   priceSpikePct: 5.0           # 触发深度分析的价格波动阈值
