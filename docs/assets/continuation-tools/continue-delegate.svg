<?xml version='1.0' encoding='UTF-8'?><svg xmlns='http://www.w3.org/2000/svg' width='1800' height='1200' viewBox='0 0 1800 1200' role='img' aria-labelledby='title desc'><title id='title'>continue_delegate infographic</title><desc id='desc'>Delegated continuation: the parent dispatches child agents through a TaskFlow-backed queue, then routes completion envelopes by mode and target policy.</desc><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#07101F'/><stop offset='50%' stop-color='#0B1932'/><stop offset='100%' stop-color='#161327'/></linearGradient><radialGradient id='aura' cx='50%' cy='45%' r='65%'><stop offset='0%' stop-color='#42FFD2' stop-opacity='0.25'/><stop offset='44%' stop-color='#3F7DFF' stop-opacity='0.16'/><stop offset='100%' stop-color='#000000' stop-opacity='0'/></radialGradient><linearGradient id='panel' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#142447' stop-opacity='0.98'/><stop offset='100%' stop-color='#0B142A' stop-opacity='0.98'/></linearGradient><linearGradient id='panel2' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#1B2B4F' stop-opacity='0.97'/><stop offset='100%' stop-color='#10162E' stop-opacity='0.97'/></linearGradient><linearGradient id='green' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#8AF2D1'/><stop offset='100%' stop-color='#41C7FF'/></linearGradient><filter id='shadow' x='-25%' y='-25%' width='150%' height='150%'><feDropShadow dx='0' dy='14' stdDeviation='18' flood-color='#000000' flood-opacity='0.34'/></filter><filter id='glow' x='-60%' y='-60%' width='220%' height='220%'><feGaussianBlur stdDeviation='4' result='blur'/><feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge></filter><marker id='arrow' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#8AF2D1'/></marker><marker id='arrowBlue' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#7DA7FF'/></marker><style>    .font { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; }    .h { font-weight: 800; letter-spacing: -0.02em; }    .muted { fill: #A9BEE8; }    .tiny { fill: #86A1D0; }    .wire { fill: none; stroke: #8AF2D1; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }    .wire2 { fill: none; stroke: #7DA7FF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }    .dash { stroke-dasharray: 10 13; }  </style></defs><g class='font'><rect width='1800' height='1200' fill='url(#bg)'/><circle cx='900' cy='600' r='520' fill='url(#aura)'/><circle cx='1545' cy='980' r='320' fill='#7D3BFF' opacity='0.08'/><circle cx='220' cy='260' r='300' fill='#00FFD1' opacity='0.055'/><path d='M 60 1050 C 310 960, 520 1110, 790 995 S 1300 930, 1740 1045' fill='none' stroke='#2C548B' stroke-width='2' opacity='0.32' stroke-dasharray='7 13'/><path d='M 70 160 C 330 88, 550 190, 760 130 S 1240 118, 1720 170' fill='none' stroke='#2C548B' stroke-width='2' opacity='0.27' stroke-dasharray='7 13'/><text x='80' y='82' font-size='52' fill='#F7FBFF' class='h'>continue_delegate()</text><text x='82' y='121' font-size='22' fill='#B9CCF5'><tspan x='82' dy='0'>Delegated continuation: “spin this work out to a child worker, then return the result where it belongs.”</tspan></text><rect x='82' y='166' width='158' height='38' rx='19' fill='#14213E' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='161.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>sub-agent shard</text><rect x='254' y='166' width='192' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='350.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>typed return modes</text><rect x='460' y='166' width='160' height='38' rx='19' fill='#14213E' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='540.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>fan-out / fan-in</text><rect x='634' y='166' width='190' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='729.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>same-host targeting</text><g filter='url(#shadow)'><rect x='80' y='250' width='1640' height='605' rx='34' fill='url(#panel)' stroke='#36598C' stroke-width='1.5'/></g><text x='120' y='305' font-size='30' fill='#FFFFFF' class='h'>The parent arranges future cognition, then keeps moving</text><text x='120' y='342' font-size='20' fill='#BFD4FF'><tspan x='120' dy='0'>Each call creates a fresh child session. The child receives the task; the completion envelope is what</tspan><tspan x='120' dy='26'>gets routed to parent, targets, tree, or host.</tspan></text><rect x='120' y='455' width='275' height='160' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='142' y='488' font-size='20' fill='#FFFFFF' font-weight='750'>Parent session</text><text x='142' y='513' font-size='16' fill='#A9BEE8'><tspan x='142' dy='0'>Reads current work;</tspan><tspan x='142' dy='21'>elects one or more</tspan><tspan x='142' dy='21'>delegate shards in the</tspan><tspan x='142' dy='21'>same turn.</tspan></text><rect x='470' y='435' width='330' height='205' rx='28' fill='#081225' stroke='#8AF2D1' stroke-width='2' filter='url(#shadow)'/><text x='635' y='482' font-size='23' fill='#FFFFFF' text-anchor='middle' class='h'>TaskFlow pending delegates</text><rect x='505' y='515' width='122' height='32' rx='10' fill='#132447' stroke='#78A6FF' stroke-opacity='0.55'/><text x='566.0' y='537' font-size='15' fill='#DDEAFF' text-anchor='middle' class='mono'>task</text><rect x='647' y='515' width='122' height='32' rx='10' fill='#132447' stroke='#78A6FF' stroke-opacity='0.55'/><text x='708.0' y='537' font-size='15' fill='#DDEAFF' text-anchor='middle' class='mono'>mode</text><rect x='505' y='558' width='122' height='32' rx='10' fill='#132447' stroke='#78A6FF' stroke-opacity='0.55'/><text x='566.0' y='580' font-size='15' fill='#DDEAFF' text-anchor='middle' class='mono'>delay</text><rect x='647' y='558' width='122' height='32' rx='10' fill='#132447' stroke='#78A6FF' stroke-opacity='0.55'/><text x='708.0' y='580' font-size='15' fill='#DDEAFF' text-anchor='middle' class='mono'>model?</text><rect x='505' y='601' width='264' height='32' rx='10' fill='#132447' stroke='#78A6FF' stroke-opacity='0.55'/><text x='637.0' y='623' font-size='15' fill='#DDEAFF' text-anchor='middle' class='mono'>return target</text><path class='wire' d='M 395 535 C 425 535, 440 535, 465 535'/><circle cx='940' cy='425' r='66' fill='#101B33' stroke='#8AF2D1' stroke-width='3' filter='url(#shadow)'/><text x='940' y='418' font-size='19' fill='#FFFFFF' font-weight='800' text-anchor='middle'>child A</text><text x='940' y='446' font-size='16' fill='#A9BEE8' text-anchor='middle' class='mono'>research</text><path class='wire2' d='M 800 535 C 845 425, 880 425, 870 425'/><circle cx='1080' cy='565' r='66' fill='#101B33' stroke='#8AF2D1' stroke-width='3' filter='url(#shadow)'/><text x='1080' y='558' font-size='19' fill='#FFFFFF' font-weight='800' text-anchor='middle'>child B</text><text x='1080' y='586' font-size='16' fill='#A9BEE8' text-anchor='middle' class='mono'>verify</text><path class='wire2' d='M 800 535 C 845 565, 880 565, 1010 565'/><circle cx='940' cy='705' r='66' fill='#101B33' stroke='#8AF2D1' stroke-width='3' filter='url(#shadow)'/><text x='940' y='698' font-size='19' fill='#FFFFFF' font-weight='800' text-anchor='middle'>child C</text><text x='940' y='726' font-size='16' fill='#A9BEE8' text-anchor='middle' class='mono'>draft</text><path class='wire2' d='M 800 535 C 845 705, 880 705, 870 705'/><rect x='1190' y='490' width='230' height='98' rx='24' fill='#0A1428' stroke='#8AF2D1' stroke-width='2'/><text x='1305' y='527' font-size='22' fill='#FFFFFF' text-anchor='middle' class='h'>completion</text><text x='1305' y='557' font-size='20' fill='#9CF7D9' text-anchor='middle' class='mono'>envelope</text><path class='wire' d='M 1006 425 C 1110 425, 1135 540, 1184 540'/><path class='wire' d='M 1146 565 C 1110 565, 1135 540, 1184 540'/><path class='wire' d='M 1006 705 C 1110 705, 1135 540, 1184 540'/><rect x='1490' y='370' width='190' height='76' rx='18' fill='#101B33' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1512' y='403' font-size='18' fill='#FFFFFF' font-weight='750'>normal</text><text x='1512' y='428' font-size='15' fill='#A9BEE8'><tspan x='1512' dy='0'>echo + wake</tspan></text><rect x='1490' y='465' width='190' height='76' rx='18' fill='#101B33' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1512' y='498' font-size='18' fill='#FFFFFF' font-weight='750'>silent</text><text x='1512' y='523' font-size='15' fill='#A9BEE8'><tspan x='1512' dy='0'>context only</tspan></text><rect x='1490' y='560' width='190' height='76' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='1512' y='593' font-size='18' fill='#FFFFFF' font-weight='750'>silent-wake</text><text x='1512' y='618' font-size='15' fill='#A9BEE8'><tspan x='1512' dy='0'>quiet + wake</tspan></text><rect x='1490' y='655' width='190' height='76' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='1512' y='688' font-size='18' fill='#FFFFFF' font-weight='750'>post-compaction</text><text x='1512' y='713' font-size='15' fill='#A9BEE8'><tspan x='1512' dy='0'>release after cut</tspan></text><path class='wire2' d='M 1420 540 C 1450 540, 1460 408, 1484 408'/><path class='wire2' d='M 1420 540 C 1450 540, 1460 503, 1484 503'/><path class='wire2' d='M 1420 540 C 1450 540, 1460 598, 1484 598'/><path class='wire2' d='M 1420 540 C 1450 540, 1460 693, 1484 693'/><rect x='120' y='680' width='640' height='120' rx='26' fill='#0A1428' stroke='#36598C'/><text x='154' y='724' font-size='22' fill='#FFFFFF' class='h'>Return targeting chooses where the envelope lands</text><rect x='154' y='746' width='170' height='38' rx='19' fill='#14213E' stroke='#78A6FF' stroke-opacity='0.58'/><text x='239.0' y='771' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>default parent</text><rect x='344' y='746' width='170' height='38' rx='19' fill='#14213E' stroke='#78A6FF' stroke-opacity='0.58'/><text x='429.0' y='771' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>targetSessionKey</text><rect x='534' y='746' width='170' height='38' rx='19' fill='#14213E' stroke='#78A6FF' stroke-opacity='0.58'/><text x='619.0' y='771' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>targetSessionKeys</text><rect x='154' y='789' width='170' height='38' rx='19' fill='#14213E' stroke='#78A6FF' stroke-opacity='0.58'/><text x='239.0' y='814' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>fanout: tree</text><rect x='344' y='789' width='170' height='38' rx='19' fill='#14213E' stroke='#78A6FF' stroke-opacity='0.58'/><text x='429.0' y='814' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>fanout: all</text><g filter='url(#shadow)'><rect x='80' y='900' width='1640' height='190' rx='30' fill='url(#panel2)' stroke='#36598C' stroke-width='1.5'/></g><text x='120' y='950' font-size='27' fill='#FFFFFF' class='h'>Bounded orchestration</text><rect x='120' y='962' width='450' height='44' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='140' y='990' font-size='18' fill='#FFFFFF' font-weight='750'>width cap</text><text x='260' y='990' font-size='16' fill='#A9BEE8' class='mono'>maxDelegatesPerTurn</text><rect x='640' y='962' width='450' height='44' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='660' y='990' font-size='18' fill='#FFFFFF' font-weight='750'>chain cap</text><text x='780' y='990' font-size='16' fill='#A9BEE8' class='mono'>maxChainLength</text><rect x='1160' y='962' width='450' height='44' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1180' y='990' font-size='18' fill='#FFFFFF' font-weight='750'>cost cap</text><text x='1300' y='990' font-size='16' fill='#A9BEE8' class='mono'>costCapTokens</text><rect x='120' y='1024' width='450' height='44' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='140' y='1052' font-size='18' fill='#FFFFFF' font-weight='750'>target gate</text><text x='260' y='1052' font-size='16' fill='#A9BEE8' class='mono'>crossSessionTargeting default-deny</text><rect x='640' y='1024' width='450' height='44' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='660' y='1052' font-size='18' fill='#FFFFFF' font-weight='750'>leaf policy</text><text x='780' y='1052' font-size='16' fill='#A9BEE8' class='mono'>leaf sub-agents denied</text><rect x='1160' y='1024' width='450' height='44' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1180' y='1052' font-size='18' fill='#FFFFFF' font-weight='750'>trace stitch</text><text x='1300' y='1052' font-size='16' fill='#A9BEE8' class='mono'>traceparent across queue boundary</text><text x='80' y='1158' font-size='15' fill='#8198C8'>continue_delegate runs fresh child sessions; the child sees the task, while completion envelopes return by mode and target policy.</text></g></svg>