<?xml version='1.0' encoding='UTF-8'?><svg xmlns='http://www.w3.org/2000/svg' width='1800' height='1200' viewBox='0 0 1800 1200' role='img' aria-labelledby='title desc'><title id='title'>continue_work infographic</title><desc id='desc'>Same-session continuation: the agent elects one future turn, persisted in TaskFlow and bounded by opt-in, chain, cost, and delay guards.</desc><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#07101F'/><stop offset='50%' stop-color='#0B1932'/><stop offset='100%' stop-color='#161327'/></linearGradient><radialGradient id='aura' cx='50%' cy='45%' r='65%'><stop offset='0%' stop-color='#42FFD2' stop-opacity='0.25'/><stop offset='44%' stop-color='#3F7DFF' stop-opacity='0.16'/><stop offset='100%' stop-color='#000000' stop-opacity='0'/></radialGradient><linearGradient id='panel' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#142447' stop-opacity='0.98'/><stop offset='100%' stop-color='#0B142A' stop-opacity='0.98'/></linearGradient><linearGradient id='panel2' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#1B2B4F' stop-opacity='0.97'/><stop offset='100%' stop-color='#10162E' stop-opacity='0.97'/></linearGradient><linearGradient id='green' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#8AF2D1'/><stop offset='100%' stop-color='#41C7FF'/></linearGradient><filter id='shadow' x='-25%' y='-25%' width='150%' height='150%'><feDropShadow dx='0' dy='14' stdDeviation='18' flood-color='#000000' flood-opacity='0.34'/></filter><filter id='glow' x='-60%' y='-60%' width='220%' height='220%'><feGaussianBlur stdDeviation='4' result='blur'/><feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge></filter><marker id='arrow' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#8AF2D1'/></marker><marker id='arrowBlue' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#7DA7FF'/></marker><style>    .font { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; }    .h { font-weight: 800; letter-spacing: -0.02em; }    .muted { fill: #A9BEE8; }    .tiny { fill: #86A1D0; }    .wire { fill: none; stroke: #8AF2D1; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }    .wire2 { fill: none; stroke: #7DA7FF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }    .dash { stroke-dasharray: 10 13; }  </style></defs><g class='font'><rect width='1800' height='1200' fill='url(#bg)'/><circle cx='900' cy='600' r='520' fill='url(#aura)'/><circle cx='1545' cy='980' r='320' fill='#7D3BFF' opacity='0.08'/><circle cx='220' cy='260' r='300' fill='#00FFD1' opacity='0.055'/><path d='M 60 1050 C 310 960, 520 1110, 790 995 S 1300 930, 1740 1045' fill='none' stroke='#2C548B' stroke-width='2' opacity='0.32' stroke-dasharray='7 13'/><path d='M 70 160 C 330 88, 550 190, 760 130 S 1240 118, 1720 170' fill='none' stroke='#2C548B' stroke-width='2' opacity='0.27' stroke-dasharray='7 13'/><text x='80' y='82' font-size='52' fill='#F7FBFF' class='h'>continue_work()</text><text x='82' y='121' font-size='22' fill='#B9CCF5'><tspan x='82' dy='0'>Same-session self-continuation: “wake me back up with this task” after the current turn ends.</tspan></text><rect x='82' y='166' width='150' height='38' rx='19' fill='#14213E' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='157.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>self-elected</text><rect x='246' y='166' width='152' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='322.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>same session</text><rect x='412' y='166' width='210' height='38' rx='19' fill='#14213E' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='517.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>TaskFlow durable row</text><rect x='636' y='166' width='120' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='696.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>not a loop</text><g filter='url(#shadow)'><rect x='80' y='250' width='1640' height='470' rx='34' fill='url(#panel)' stroke='#36598C' stroke-width='1.5'/></g><text x='120' y='305' font-size='30' fill='#FFFFFF' class='h'>The same session carries the thread across a turn boundary</text><text x='120' y='342' font-size='20' fill='#BFD4FF'><tspan x='120' dy='0'>The tool call is fire-and-forget. It schedules one successor turn, then the current</tspan><tspan x='120' dy='26'>turn completes normally.</tspan></text><rect x='120' y='415' width='300' height='170' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='142' y='448' font-size='20' fill='#FFFFFF' font-weight='750'>Current turn</text><text x='142' y='473' font-size='16' fill='#A9BEE8'><tspan x='142' dy='0'>Agent sees task state,</tspan><tspan x='142' dy='21'>tools, cost caps, and</tspan><tspan x='142' dy='21'>context. It chooses</tspan><tspan x='142' dy='21'>whether to continue.</tspan></text><rect x='520' y='415' width='300' height='170' rx='18' fill='#101B33' stroke='#78A6FF' stroke-opacity='0.55'/><text x='542' y='448' font-size='20' fill='#FFFFFF' font-weight='750'>Tool call</text><text x='542' y='473' font-size='16' fill='#A9BEE8'><tspan x='542' dy='0'>continue_work({</tspan><tspan x='542' dy='21'>delaySeconds?, reason })</tspan><tspan x='542' dy='21'>Timer anchors after</tspan><tspan x='542' dy='21'>finalization.</tspan></text><rect x='920' y='415' width='300' height='170' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='942' y='448' font-size='20' fill='#FFFFFF' font-weight='750'>TaskFlow election</text><text x='942' y='473' font-size='16' fill='#A9BEE8'><tspan x='942' dy='0'>Persist continuation_work</tspan><tspan x='942' dy='21'>row:</tspan><tspan x='942' dy='21'>session key · dueAt · hop</tspan><tspan x='942' dy='21'>· budget · reason</tspan></text><rect x='1320' y='415' width='300' height='170' rx='18' fill='#101B33' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1342' y='448' font-size='20' fill='#FFFFFF' font-weight='750'>Successor turn</text><text x='1342' y='473' font-size='16' fill='#A9BEE8'><tspan x='1342' dy='0'>Same session wakes with</tspan><tspan x='1342' dy='21'>[continuation:wake] and</tspan><tspan x='1342' dy='21'>re-evaluates before</tspan><tspan x='1342' dy='21'>acting.</tspan></text><path class='wire' d='M 420 500 C 455 500, 482 500, 515 500'/><path class='wire' d='M 820 500 C 855 500, 882 500, 915 500'/><path class='wire' d='M 1220 500 C 1255 500, 1282 500, 1315 500'/><line x1='520' y1='632' x2='1620' y2='632' stroke='#36598C' stroke-width='4' stroke-linecap='round'/><circle cx='520' cy='632' r='9' fill='#8AF2D1' filter='url(#glow)'/><text x='520' y='668' font-size='15' fill='#A9BEE8' text-anchor='middle'>tool emitted</text><circle cx='760' cy='632' r='9' fill='#8AF2D1' filter='url(#glow)'/><text x='760' y='668' font-size='15' fill='#A9BEE8' text-anchor='middle'>turn finalizes</text><circle cx='1040' cy='632' r='9' fill='#8AF2D1' filter='url(#glow)'/><text x='1040' y='668' font-size='15' fill='#A9BEE8' text-anchor='middle'>delay starts</text><circle cx='1320' cy='632' r='9' fill='#8AF2D1' filter='url(#glow)'/><text x='1320' y='668' font-size='15' fill='#A9BEE8' text-anchor='middle'>dueAt matures</text><circle cx='1620' cy='632' r='9' fill='#8AF2D1' filter='url(#glow)'/><text x='1620' y='668' font-size='15' fill='#A9BEE8' text-anchor='middle'>wake granted</text><text x='1030' y='616' font-size='17' fill='#9CF7D9' text-anchor='middle' class='mono'>semantic time starts after the current turn completes</text><g filter='url(#shadow)'><rect x='80' y='770' width='780' height='310' rx='30' fill='url(#panel2)' stroke='#36598C' stroke-width='1.5'/></g><text x='120' y='824' font-size='27' fill='#FFFFFF' class='h'>What it is</text><circle cx='128' cy='860' r='5' fill='#8AF2D1'/><text x='146' y='866' font-size='20' fill='#D8E7FF'>A voluntary “I am not done yet” signal.</text><circle cx='128' cy='905' r='5' fill='#8AF2D1'/><text x='146' y='911' font-size='20' fill='#D8E7FF'>One future same-session turn, not recursive execution inside the active turn.</text><circle cx='128' cy='950' r='5' fill='#8AF2D1'/><text x='146' y='956' font-size='20' fill='#D8E7FF'>Durable row is source of truth; process timers are only hedge timers.</text><circle cx='128' cy='995' r='5' fill='#8AF2D1'/><text x='146' y='1001' font-size='20' fill='#D8E7FF'>Absence of a call means the agent elected to stop.</text><g filter='url(#shadow)'><rect x='940' y='770' width='780' height='310' rx='30' fill='url(#panel2)' stroke='#36598C' stroke-width='1.5'/></g><text x='980' y='824' font-size='27' fill='#FFFFFF' class='h'>Guardrails</text><rect x='990' y='840' width='310' height='46' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1010' y='868' font-size='19' fill='#FFFFFF' font-weight='750'>opt-in</text><text x='1114' y='868' font-size='17' fill='#9FB8E8' class='mono'>continuation.enabled</text><rect x='1340' y='840' width='310' height='46' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1360' y='868' font-size='19' fill='#FFFFFF' font-weight='750'>depth</text><text x='1464' y='868' font-size='17' fill='#9FB8E8' class='mono'>maxChainLength</text><rect x='990' y='905' width='310' height='46' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1010' y='933' font-size='19' fill='#FFFFFF' font-weight='750'>budget</text><text x='1114' y='933' font-size='17' fill='#9FB8E8' class='mono'>costCapTokens</text><rect x='1340' y='905' width='310' height='46' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1360' y='933' font-size='19' fill='#FFFFFF' font-weight='750'>time</text><text x='1464' y='933' font-size='17' fill='#9FB8E8' class='mono'>min/max delay</text><rect x='990' y='970' width='310' height='46' rx='15' fill='#0A1428' stroke='#78A6FF' stroke-opacity='0.55'/><text x='1010' y='998' font-size='19' fill='#FFFFFF' font-weight='750'>control</text><text x='1114' y='998' font-size='17' fill='#9FB8E8' class='mono'>human interrupt / reset</text><text x='80' y='1158' font-size='15' fill='#8198C8'>continue_work schedules another same-session turn after turn completion; every accepted call remains bounded by chain, cost, delay, and opt-in policy.</text></g></svg>