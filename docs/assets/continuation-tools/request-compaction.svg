<?xml version='1.0' encoding='UTF-8'?><svg xmlns='http://www.w3.org/2000/svg' width='1800' height='1200' viewBox='0 0 1800 1200' role='img' aria-labelledby='title desc'><title id='title'>request_compaction infographic</title><desc id='desc'>Volitional compaction: the agent notices context pressure, prepares state, stages recovery, then asks the platform to compact after the current turn.</desc><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#07101F'/><stop offset='50%' stop-color='#0B1932'/><stop offset='100%' stop-color='#161327'/></linearGradient><radialGradient id='aura' cx='50%' cy='45%' r='65%'><stop offset='0%' stop-color='#42FFD2' stop-opacity='0.25'/><stop offset='44%' stop-color='#3F7DFF' stop-opacity='0.16'/><stop offset='100%' stop-color='#000000' stop-opacity='0'/></radialGradient><linearGradient id='panel' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#142447' stop-opacity='0.98'/><stop offset='100%' stop-color='#0B142A' stop-opacity='0.98'/></linearGradient><linearGradient id='panel2' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#1B2B4F' stop-opacity='0.97'/><stop offset='100%' stop-color='#10162E' stop-opacity='0.97'/></linearGradient><linearGradient id='green' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#8AF2D1'/><stop offset='100%' stop-color='#41C7FF'/></linearGradient><filter id='shadow' x='-25%' y='-25%' width='150%' height='150%'><feDropShadow dx='0' dy='14' stdDeviation='18' flood-color='#000000' flood-opacity='0.34'/></filter><filter id='glow' x='-60%' y='-60%' width='220%' height='220%'><feGaussianBlur stdDeviation='4' result='blur'/><feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge></filter><marker id='arrow' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#8AF2D1'/></marker><marker id='arrowBlue' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#7DA7FF'/></marker><style>    .font { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; }    .h { font-weight: 800; letter-spacing: -0.02em; }    .muted { fill: #A9BEE8; }    .tiny { fill: #86A1D0; }    .wire { fill: none; stroke: #8AF2D1; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }    .wire2 { fill: none; stroke: #7DA7FF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }    .dash { stroke-dasharray: 10 13; }  </style></defs><g class='font'><rect width='1800' height='1200' fill='url(#bg)'/><circle cx='900' cy='600' r='520' fill='url(#aura)'/><circle cx='1545' cy='980' r='320' fill='#7D3BFF' opacity='0.08'/><circle cx='220' cy='260' r='300' fill='#00FFD1' opacity='0.055'/><path d='M 60 1050 C 310 960, 520 1110, 790 995 S 1300 930, 1740 1045' fill='none' stroke='#2C548B' stroke-width='2' opacity='0.32' stroke-dasharray='7 13'/><path d='M 70 160 C 330 88, 550 190, 760 130 S 1240 118, 1720 170' fill='none' stroke='#2C548B' stroke-width='2' opacity='0.27' stroke-dasharray='7 13'/><text x='80' y='82' font-size='52' fill='#F7FBFF' class='h'>request_compaction()</text><text x='82' y='121' font-size='22' fill='#B9CCF5'><tspan x='82' dy='0'>Volitional compaction: “let me choose the seam before the context window cuts me.”</tspan></text><rect x='82' y='166' width='172' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='168.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>context pressure</text><rect x='268' y='166' width='142' height='38' rx='19' fill='#14213E' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='339.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>prepare first</text><rect x='424' y='166' width='172' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='510.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>same session only</text><rect x='610' y='166' width='112' height='38' rx='19' fill='#14213E' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='666.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>tool-only</text><rect x='736' y='166' width='216' height='38' rx='19' fill='#1B2B4A' stroke='#78A6FF' stroke-opacity='0.58'/><text x='844.0' y='191' font-size='17' fill='#DDEAFF' text-anchor='middle' font-weight='650'>successor rehydration</text><g filter='url(#shadow)'><rect x='80' y='250' width='1640' height='600' rx='34' fill='url(#panel)' stroke='#36598C' stroke-width='1.5'/></g><text x='120' y='305' font-size='30' fill='#FFFFFF' class='h'>Compaction becomes a lifecycle the agent can shape</text><text x='120' y='342' font-size='20' fill='#BFD4FF'><tspan x='120' dy='0'>The request is async and same-session scoped. The current turn finishes; compaction runs between turns on</tspan><tspan x='120' dy='26'>the platform compaction path.</tspan></text><g filter='url(#shadow)'><circle cx='260' cy='530' r='130' fill='#081225' stroke='#36598C' stroke-width='3'/></g><path d='M 160 585 A 115 115 0 0 1 360 585' fill='none' stroke='#203756' stroke-width='22' stroke-linecap='round'/><path d='M 160 585 A 115 115 0 0 1 345 500' fill='none' stroke='url(#green)' stroke-width='22' stroke-linecap='round' filter='url(#glow)'/><line x1='260' y1='585' x2='330' y2='505' stroke='#EAF2FF' stroke-width='7' stroke-linecap='round'/><circle cx='260' cy='585' r='11' fill='#EAF2FF'/><text x='260' y='655' font-size='20' fill='#A9BEE8' text-anchor='middle'>rising pressure</text><text x='260' y='700' font-size='18' fill='#9CF7D9' text-anchor='middle' class='mono'>context advisory</text><rect x='480' y='430' width='285' height='190' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='502' y='463' font-size='20' fill='#FFFFFF' font-weight='750'>Prepare payload</text><text x='502' y='488' font-size='16' fill='#A9BEE8'><tspan x='502' dy='0'>Write durable notes,</tspan><tspan x='502' dy='21'>preserve working shape,</tspan><tspan x='502' dy='21'>stage recovery delegates.</tspan></text><rect x='870' y='430' width='285' height='190' rx='18' fill='#101B33' stroke='#78A6FF' stroke-opacity='0.55'/><text x='892' y='463' font-size='20' fill='#FFFFFF' font-weight='750'>Tool call</text><text x='892' y='488' font-size='16' fill='#A9BEE8'><tspan x='892' dy='0'>request_compaction()</tspan><tspan x='892' dy='21'>No response-token</tspan><tspan x='892' dy='21'>fallback; current session</tspan><tspan x='892' dy='21'>only.</tspan></text><rect x='1260' y='430' width='285' height='190' rx='18' fill='#101B33' stroke='#8AF2D1' stroke-opacity='0.55'/><text x='1282' y='463' font-size='20' fill='#FFFFFF' font-weight='750'>Platform compacts</text><text x='1282' y='488' font-size='16' fill='#A9BEE8'><tspan x='1282' dy='0'>After turn completion,</tspan><tspan x='1282' dy='21'>same compaction path</tspan><tspan x='1282' dy='21'>compresses the window.</tspan></text><path class='wire' d='M 390 540 C 420 540, 442 540, 475 540'/><path class='wire' d='M 765 540 C 800 540, 832 540, 865 540'/><path class='wire' d='M 1155 540 C 1190 540, 1222 540, 1255 540'/><rect x='300' y='715' width='1200' height='72' rx='24' fill='#0A1428' stroke='#8AF2D1' stroke-opacity='0.58'/><text x='900' y='745' font-size='23' fill='#FFFFFF' text-anchor='middle' class='h'>successor wakes into chosen context</text><text x='900' y='773' font-size='18' fill='#9CF7D9' text-anchor='middle' class='mono'>boot files + staged delegates + post-compaction lifecycle events + working-state notes</text><path class='wire2 dash' d='M 1402 622 C 1370 680, 1260 715, 1220 715'/><rect x='118' y='748' width='130' height='52' rx='17' fill='#14213E' stroke='#78A6FF' stroke-opacity='0.7'/><text x='183' y='781' font-size='18' fill='#DDEAFF' font-weight='750' text-anchor='middle'>savegame</text><path d='M 248 774 C 270 774, 278 760, 298 752' class='wire2 dash'/><g filter='url(#shadow)'><rect x='80' y='895' width='780' height='205' rx='30' fill='url(#panel2)' stroke='#36598C' stroke-width='1.5'/></g><text x='120' y='945' font-size='26' fill='#FFFFFF' class='h'>What it gives the agent</text><circle cx='128' cy='982' r='5' fill='#8AF2D1'/><text x='146' y='988' font-size='19' fill='#D8E7FF'>An elective seam before overflow.</text><circle cx='128' cy='1025' r='5' fill='#8AF2D1'/><text x='146' y='1031' font-size='19' fill='#D8E7FF'>A chance to evacuate state before the cut.</text><circle cx='128' cy='1068' r='5' fill='#8AF2D1'/><text x='146' y='1074' font-size='19' fill='#D8E7FF'>A post-compaction successor that inherits agent-chosen context.</text><g filter='url(#shadow)'><rect x='940' y='895' width='780' height='205' rx='30' fill='url(#panel2)' stroke='#36598C' stroke-width='1.5'/></g><text x='980' y='945' font-size='26' fill='#FFFFFF' class='h'>What it refuses to be</text><circle cx='988' cy='982' r='5' fill='#78A6FF'/><text x='1006' y='988' font-size='19' fill='#D8E7FF'>Not immediate compaction inside the active turn.</text><circle cx='988' cy='1025' r='5' fill='#78A6FF'/><text x='1006' y='1031' font-size='19' fill='#D8E7FF'>Not a child compacting its parent.</text><circle cx='988' cy='1068' r='5' fill='#78A6FF'/><text x='1006' y='1074' font-size='19' fill='#D8E7FF'>Not a regex fallback token.</text><text x='80' y='1158' font-size='15' fill='#8198C8'>request_compaction asks the platform to compact the current session after preparatory work; staged recovery context can return after the lifecycle event.</text></g></svg>