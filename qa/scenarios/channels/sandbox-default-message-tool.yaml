title: Sandboxed default policy visible reply via message tool

scenario:
  id: sandbox-default-message-tool
  surface: channel
  coverage:
    primary:
      - channels.group-visible-replies
    secondary:
      - channels.qa-channel
      - runtime.tool-policy
      - tools.message
  risk: medium
  objective: Verify a sandboxed QA channel turn can use the default sandbox allowlist to send a visible group reply through message(action=send).
  gatewayConfigPatch:
    agents:
      defaults:
        sandbox:
          mode: all
          scope: agent
          workspaceAccess: none
    messages:
      groupChat:
        visibleReplies: message_tool
  successCriteria:
    - Agent runs with the default agent-scoped sandbox policy.
    - Mock provider sees the message tool and plans message(action=send).
    - The visible reply lands once in the same QA channel group transcript.
  docsRefs:
    - docs/channels/groups.md
    - docs/channels/qa-channel.md
    - docs/gateway/sandbox-vs-tool-policy-vs-elevated.md
  codeRefs:
    - src/agents/sandbox/constants.ts
    - src/agents/sandbox/tool-policy.ts
    - src/auto-reply/reply/dispatch-from-config.ts
    - extensions/qa-channel/src/inbound.ts
  execution:
    kind: flow
    summary: Send a mentioned group message through a sandboxed QA agent and verify the visible reply uses message(action=send).
    config:
      conversationId: qa-sandbox-message-tool-room
      promptSnippet: qa group visible reply tool check
      prompt: "@openclaw qa group visible reply tool check under the default sandbox policy. Use the visible room reply path. exact marker: `QA-SANDBOX-MESSAGE-OK`"
      expectedMarker: QA-SANDBOX-MESSAGE-OK

flow:
  steps:
    - name: posts visible room output through message in the default sandbox policy
      actions:
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 60000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 60000
        - call: reset
        - set: requestCountBefore
          value:
            expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests`)).length : 0"
        - call: state.addInboundMessage
          args:
            - conversation:
                id:
                  expr: config.conversationId
                kind: group
                title: QA Sandboxed Message Tool Room
              senderId: alice
              senderName: Alice
              text:
                expr: config.prompt
        - call: waitForCondition
          args:
            - lambda:
                async: true
                params: []
                expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests`)).slice(requestCountBefore).find((request) => String(request.allInputText ?? '').includes(config.promptSnippet)) : true"
            - expr: liveTurnTimeoutMs(env, 180000)
        - set: scenarioRequests
          value:
            expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests`)).slice(requestCountBefore).filter((request) => String(request.allInputText ?? '').includes(config.promptSnippet)) : []"
        - assert:
            expr: "!env.mock || scenarioRequests.some((request) => request.plannedToolName === 'message' && request.plannedToolArgs?.action === 'send' && request.plannedToolArgs?.message === config.expectedMarker)"
            message:
              expr: "`expected sandboxed message(action=send) with marker, saw ${JSON.stringify(scenarioRequests.map((request) => ({ plannedToolName: request.plannedToolName ?? null, plannedToolArgs: request.plannedToolArgs ?? null, toolOutput: request.toolOutput ?? '', tools: Array.isArray(request.body?.tools) ? request.body.tools.map((tool) => tool?.name ?? tool?.function?.name ?? tool?.type ?? null).filter(Boolean).slice(0, 25) : [] })))} `"
        - call: waitForOutboundMessage
          saveAs: outbound
          args:
            - ref: state
            - lambda:
                params: [candidate]
                expr: "candidate.conversation.id === config.conversationId && candidate.conversation.kind === 'group' && !candidate.threadId && candidate.text.includes(config.expectedMarker)"
            - expr: liveTurnTimeoutMs(env, 180000)
        - set: matchingOutbound
          value:
            expr: "state.getSnapshot().messages.filter((message) => message.direction === 'outbound' && message.conversation.id === config.conversationId && message.conversation.kind === 'group' && String(message.text ?? '').includes(config.expectedMarker))"
        - assert:
            expr: matchingOutbound.length === 1
            message:
              expr: "`expected exactly one visible sandboxed group reply, saw ${matchingOutbound.length}`"
      detailsExpr: "`${outbound.conversation.kind}:${outbound.conversation.id}:${outbound.text}`"
