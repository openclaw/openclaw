title: WhatsApp DM canary
scenario:
  id: whatsapp-canary
  surface: channels
  coverage:
    primary:
      - whatsapp.outbound-text-sends
  execution:
    profiles: { "whatsapp:default": 0, "whatsapp:mock-default": 0 }
    kind: flow
    channel: whatsapp
    timeoutMs: 60000
    retryCount: 1
    suiteIsolation: isolated
    config: { whatsappScenarioId: whatsapp-canary }
flow:
  module: ./live-transports/whatsapp/scenario-runtime.js
  call: runWhatsAppCanaryScenario
  args: [{ expr: whatsappScenarioContext }]
