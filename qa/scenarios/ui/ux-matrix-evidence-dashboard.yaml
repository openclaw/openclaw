title: UX Matrix evidence dashboard producer

scenario:
  id: ux-matrix-evidence-dashboard
  surface: control-ui
  coverage:
    primary:
      - ui.control
    secondary:
      - cli-entrypoint
      - status-snapshots
  objective: Run the UX Matrix local evidence producer through QA Lab so its screenshots, GIFs, logs, and machine-validation artifacts are emitted as QA evidence.
  successCriteria:
    - The script runs through the QA Lab native scenario runner.
    - The resulting qa-evidence.json contains Control UI screenshot or motion artifacts when Playwright is available.
    - CLI entrypoint and gateway status probes are represented as structured QA evidence without claiming deeper service-health or --deep coverage.
  docsRefs:
    - docs/concepts/qa-e2e-automation.md
    - qa/scenarios/index.yaml
  codeRefs:
    - scripts/ux-matrix/dashboard.ts
    - extensions/qa-lab/src/test-file-scenario-runner.ts
  execution:
    kind: script
    path: scripts/ux-matrix/dashboard.ts
    args:
      - --once
      - --artifact-base
      - ${outputDir}
    summary: Run the UX Matrix producer as a QA Lab script scenario and import its qa-evidence.json entries into the suite evidence.
