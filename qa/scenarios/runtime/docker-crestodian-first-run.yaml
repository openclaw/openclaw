title: Docker inference-first Crestodian onboarding

scenario:
  id: docker-crestodian-first-run
  surface: docker-podman-hosting
  category: docker-podman-hosting.container-setup
  coverage:
    primary:
      - docker.first-run-onboarding
    secondary:
      - raspberry-pi.first-run-verification
  objective: Verify a fresh package-installed Docker state fails closed before inference, live-activates a fake inference backend, and only then runs Crestodian setup without leaking secrets.
  successCriteria:
    - A bare invocation routes to onboarding, and the packaged Crestodian CLI exits with onboarding guidance while inference is unavailable.
    - A fake Claude inference backend answers the real activation probe before its model is persisted, while workspace and Gateway setup remain untouched for Crestodian.
    - Packaged Crestodian CLI commands run only after activation, write the default workspace/model, and create the configured agent.
    - Discord setup is written through a SecretRef without persisting the raw token.
    - Config validation and expected Crestodian audit entries succeed.
  docsRefs:
    - docs/install/docker.md
    - docs/cli/crestodian.md
    - docs/help/testing.md
  codeRefs:
    - scripts/e2e/crestodian-first-run-docker.sh
    - test/e2e/qa-lab/runtime/crestodian-first-run-docker-client.ts
    - scripts/e2e/crestodian-first-run-spec.json
  execution:
    kind: script
    path: test/e2e/qa-lab/runtime/docker-e2e-lane.ts
    summary: Runs the packaged-CLI Docker lane that proves fail-closed pre-inference behavior, live fake-provider activation, and post-activation Crestodian setup; the Raspberry Pi link is secondary because this is generic Linux/container first-run proof, not Pi hardware proof.
    args:
      - --lane
      - crestodian-first-run
