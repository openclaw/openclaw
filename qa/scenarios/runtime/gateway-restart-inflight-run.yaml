title: Gateway restart Code Mode wait recovery

scenario:
  id: gateway-restart-inflight-run
  surface: runtime
  coverage:
    primary:
      - session-memory.recovery-restart-recovery
    secondary:
      - gateway.restart-and-stop-gateway-restart
  gatewayConfigPatch:
    tools:
      alsoAllow:
        - qa_restart_wait
        - qa_restart_unsafe_probe
      codeMode:
        enabled: true
        timeoutMs: 60000
  objective: Verify replay-safe Code Mode work interrupted on its wait control reconstructs its transcript automatically after a gateway restart.
  successCriteria:
    - Scenario persists a Code Mode wait call before applying a restart-required config change.
    - Gateway and qa-channel return healthy after the restart.
    - The interrupted work reconstructs automatically under a host-owned restart-safe policy, rejects a non-replay-safe probe before execution, and records its marker exactly once without a manual follow-up.
  docsRefs:
    - docs/gateway/configuration.md
    - docs/automation/tasks.md
    - docs/channels/qa-channel.md
  codeRefs:
    - extensions/qa-lab/src/suite-runtime-agent-process.ts
    - extensions/qa-lab/src/suite-runtime-gateway.ts
    - src/gateway/server-restart-sentinel.ts
  execution:
    kind: flow
    summary: Restart while replay-safe Code Mode wait is executing, then verify automatic transcript reconstruction.
    config:
      requiredProviderMode: mock-openai
      prompt: "Code Mode restart wait QA check. Reply exactly: RESTART-CODE-MODE-WAIT-OK"
      interruptedMarker: RESTART-CODE-MODE-WAIT-OK
      restartNoticeNeedle: "couldn't safely resume"

flow:
  steps:
    - name: completes one in-flight run across restart
      actions:
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 180000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 180000
        - call: reset
        - set: gatewayLogCursor
          value:
            expr: markGatewayLogCursor()
        - set: conversationId
          value:
            expr: "`restart-inflight-${randomUUID().slice(0, 8)}`"
        - set: sessionKey
          value:
            expr: "buildAgentSessionKey({ agentId: 'qa', channel: 'qa-channel', accountId: transport.accountId, peer: { kind: 'direct', id: conversationId }, dmScope: 'per-channel-peer', identityLinks: env.cfg.session?.identityLinks })"
        - set: restartPatch
          value:
            expr: "({ gateway: { controlUi: { allowedOrigins: [`http://127.0.0.1:${64000 + Math.floor(Math.random() * 999)}`] } }, tools: { codeMode: { enabled: false } } })"
        - set: requestCursorBefore
          value:
            expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/request-cursor`)).cursor : 0"
        - call: startAgentRun
          saveAs: started
          args:
            - ref: env
            - sessionKey:
                ref: sessionKey
              message:
                expr: config.prompt
              to:
                expr: "`dm:${conversationId}`"
              taskTracking: false
              timeoutMs:
                expr: liveTurnTimeoutMs(env, 180000)
        - call: waitForCondition
          saveAs: plannedWait
          args:
            - lambda:
                async: true
                expr: "fetchJson(`${env.mock.baseUrl}/debug/requests?after=${requestCursorBefore}`).then((requests) => requests.find((request) => request.plannedToolName === 'wait' && String(request.allInputText ?? '').includes(config.interruptedMarker)))"
            - expr: liveTurnTimeoutMs(env, 120000)
            - 25
        - call: waitForCondition
          saveAs: interruptedTranscript
          args:
            - lambda:
                async: true
                expr: "readSessionTranscriptSummary(env, sessionKey).then((summary) => summary.lastMessageRole === 'assistant' && summary.lastAssistantToolNames?.includes('wait') ? summary : undefined)"
            - expr: liveTurnTimeoutMs(env, 120000)
            - 25
        - call: restartGatewayWithConfigPatch
          args:
            - env:
                ref: env
              patch:
                ref: restartPatch
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 180000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 180000
        - call: waitForCondition
          args:
            - lambda:
                async: true
                expr: "readSessionTranscriptSummary(env, sessionKey).then((summary) => summary.finalText.includes(config.interruptedMarker) ? summary : undefined)"
            - expr: liveTurnTimeoutMs(env, 180000)
            - 50
        - call: sleep
          args:
            - 6500
        - call: readSessionTranscriptSummary
          saveAs: postRestartTranscript
          args:
            - ref: env
            - ref: sessionKey
        - assert:
            expr: "postRestartTranscript.lastAssistantStopReason !== 'error' && postRestartTranscript.lastAssistantStopReason !== 'aborted'"
            message:
              expr: "`restart recovery left an abort artifact: ${JSON.stringify(postRestartTranscript)}`"
        - set: finalMarkerCount
          value:
            expr: "postRestartTranscript.finalText.split(config.interruptedMarker).length - 1"
        - assert:
            expr: "finalMarkerCount === 1"
            message:
              expr: "`expected exactly one recovered transcript marker, got ${finalMarkerCount}; finalText=${postRestartTranscript.finalText}`"
        - assert:
            expr: "!postRestartTranscript.finalText.includes(config.restartNoticeNeedle)"
            message:
              expr: "`restart recovery recorded a resend notice: ${postRestartTranscript.finalText}`"
        - set: recoveryRequests
          value:
            expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests?after=${requestCursorBefore}`)) : []"
        - set: recoveryRequestCount
          value:
            expr: "recoveryRequests.filter((request) => String(request.allInputText ?? '').includes('Your previous turn was interrupted by a gateway restart')).length"
        - assert:
            expr: "recoveryRequestCount === 1"
            message:
              expr: "`expected exactly one restart recovery provider request, got ${recoveryRequestCount}`"
        - assert:
            expr: "recoveryRequests.every((request) => !String(request.allInputText ?? '').includes('[OpenClaw heartbeat poll]'))"
            message: heartbeat poll raced the restart recovery proof
        - set: recoveryLogs
          value:
            expr: readGatewayLogs().slice(gatewayLogCursor)
        - set: recoveryDispatchCount
          value:
            expr: "recoveryLogs.split('dispatching restart-safe recovery').length - 1"
        - set: recoveryPolicyCount
          value:
            expr: "recoveryLogs.split('restart-safe recovery tool policy retained').length - 1"
        - assert:
            expr: "recoveryDispatchCount === 1 && recoveryPolicyCount === 1"
            message:
              expr: "`expected one restart-safe dispatch/policy, got dispatches=${recoveryDispatchCount} policies=${recoveryPolicyCount}; logs=${recoveryLogs}`"
      detailsExpr: "`runId=${started.runId} session=${sessionKey} plannedTool=${plannedWait.plannedToolName} persistedTail=${interruptedTranscript.lastMessageRole}/${interruptedTranscript.lastAssistantStopReason}/${interruptedTranscript.lastAssistantToolNames?.join(',')} recoveredTail=${postRestartTranscript.lastMessageRole}/${postRestartTranscript.lastAssistantStopReason}/${postRestartTranscript.lastAssistantContentTypes?.join(',')} recoveredMarkers=${finalMarkerCount} recoveryRequests=${recoveryRequestCount} recoveryDispatches=${recoveryDispatchCount} restartSafePolicy=true heartbeatPoll=false\\n${postRestartTranscript.finalText}`"
