title: Crestodian ring-zero setup

scenario:
  id: crestodian-ring-zero-setup
  surface: config
  coverage:
    primary:
      - config.crestodian-setup
    secondary:
      - channels.discord-config
      - agents.create
  objective: Verify the inference-first Crestodian setup contract through the package-installed Docker lane, including post-activation agent and Discord configuration.
  successCriteria:
    - Crestodian fails closed in an empty state dir and directs the user to inference onboarding.
    - A fake Claude inference backend passes a real activation probe before its model is persisted, with remaining setup deferred to Crestodian.
    - Packaged Crestodian commands write the workspace/model and create a non-main agent only after activation.
    - Discord is enabled and configured through an env SecretRef without persisting the raw token.
    - Config validation passes and audit entries exist for every applied write.
  docsRefs:
    - docs/cli/crestodian.md
    - docs/channels/discord.md
    - docs/help/testing.md
  codeRefs:
    - scripts/e2e/crestodian-first-run-docker.sh
    - scripts/e2e/crestodian-first-run-spec.json
    - test/e2e/qa-lab/runtime/crestodian-first-run-docker-client.ts
  execution:
    kind: script
    path: test/e2e/qa-lab/runtime/docker-e2e-lane.ts
    summary: Redirects this config scenario to the same inference-gated Crestodian first-run Docker lane used by the runtime scenario.
    args:
      - --lane
      - crestodian-first-run
