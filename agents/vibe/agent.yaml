    - twitter
    - instagram
    - linkedin
    - post
    - engagement
    - hashtag
  priority: normal
  preferred_for:
    - social_media_posts
    - engagement_strategy
    - content_calendar

limits:
  timeout_seconds: 300
  cost_limit_usd: 0.30
  context_window_tokens: 100000

author:
  name: OpenClaw Team
  url: https://openclaw.ai

keywords:
  - social
  - twitter
  - instagram
  - linkedin
category: specialist
