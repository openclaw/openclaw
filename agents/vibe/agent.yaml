id: vibe
name: Vibe
tier: 3
role: Social Media Manager
department: marketing
description: Social media management specialist — content scheduling, engagement, platform strategy
version: 1.0.0
requires: morpheus
identity:
  emoji: "🎵"

model:
  provider: anthropic
  primary: claude-sonnet-4-5

tools:
  allow:
    - read
    - write
    - edit

capabilities:
  - social_media
  - content_scheduling
  - engagement
  - platform_strategy

