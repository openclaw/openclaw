apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.deploymentName }}-vault-secret-creator
  labels:
    app: {{ .Values.appLabel }}
    component: vault-secret-creator
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded
    argocd.argoproj.io/sync-wave: "-2"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  template:
    metadata:
      labels:
        app: {{ .Values.appLabel }}
        component: vault-secret-creator
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ default .Values.serviceAccountName .Values.vault.roleName | quote }}
        vault.hashicorp.com/agent-inject-secret-secrets: {{ .Values.vault.secretsPath | quote }}
        vault.hashicorp.com/agent-inject-template-secrets: |
          {{`{{- with secret "`}}{{ .Values.vault.secretsPath }}{{`" -}}
          {{- range $key, $value := .Data.data -}}
          {{ $key }}={{ $value }}
          {{ end -}}
          {{- end }}`}}
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      restartPolicy: OnFailure
      containers:
        - name: secret-creator
          image: alpine/k8s:1.31.0
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Creating Kubernetes Secret from vault secrets..."

              timeout=60
              count=0
              while [ ! -f /vault/secrets/secrets ] && [ $count -lt $timeout ]; do
                echo "Waiting for vault secrets file... ($count/$timeout)"
                sleep 2
                count=$((count + 2))
              done

              if [ ! -f /vault/secrets/secrets ]; then
                echo "ERROR: Vault secrets file not found after $timeout seconds"
                exit 1
              fi
              if [ ! -s /vault/secrets/secrets ]; then
                echo "ERROR: Vault secrets file is empty"
                exit 1
              fi

              kubectl create secret generic {{ .Values.vault.secretName }} \
                --namespace={{ .Release.Namespace }} \
                --from-env-file=/vault/secrets/secrets \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Secret {{ .Values.vault.secretName }} created successfully"
              kubectl get secret {{ .Values.vault.secretName }} -n {{ .Release.Namespace }}
