{{- $imageUri := required "values.image.uri is required" .Values.image.uri -}}
{{- if .Values.costCron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.deploymentName }}-cost-cron
  labels:
    app: {{ .Values.appLabel }}
    component: cost-cron
spec:
  schedule: {{ .Values.costCron.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.costCron.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.costCron.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.costCron.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            app: {{ .Values.appLabel }}
            component: cost-cron
        spec:
          serviceAccountName: {{ .Values.serviceAccountName }}
          restartPolicy: Never
          containers:
            - name: cost-cron
              image: {{ $imageUri | quote }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -lc
              args:
                - |
                  set -eu
                  INCIDENT_STATE_DIR="${INCIDENT_STATE_DIR:-/home/node/.openclaw/state/sentinel}"
                  mkdir -p "${INCIDENT_STATE_DIR}/spool"

                  if [ -x /home/node/.openclaw/skills/morpho-sre/scripts/aws-cost-report.sh ]; then
                    report="$(/home/node/.openclaw/skills/morpho-sre/scripts/aws-cost-report.sh 2>/dev/null || true)"
                  else
                    report=""
                  fi

                  if [ -z "$report" ]; then
                    report="## Daily Cost Report - $(date -u +%Y-%m-%d)\n**MTD Spend:** n/a (prev month: n/a, delta: n/a)\n**Top services:** n/a\n**Anomalies:** unavailable"
                  fi

                  ts="$(date -u +%Y%m%dT%H%M%S)"
                  report_file="${INCIDENT_STATE_DIR}/spool/cost-${ts}.md"
                  printf '%b\n' "$report" > "$report_file"
                  printf '%b\n' "$report"

                  if command -v openclaw >/dev/null 2>&1 && [ -n "${COST_REPORT_TARGET:-}" ]; then
                    if [ -n "${COST_REPORT_ACCOUNT_ID:-}" ]; then
                      openclaw message send --account "${COST_REPORT_ACCOUNT_ID}" "${COST_REPORT_TARGET}" "$report" >/dev/null 2>&1 || true
                    else
                      openclaw message send "${COST_REPORT_TARGET}" "$report" >/dev/null 2>&1 || true
                    fi
                  fi
              envFrom:
                - secretRef:
                    name: {{ .Values.vault.secretName }}
              env:
                - name: HOME
                  value: /home/node
                - name: OPENCLAW_STATE_DIR
                  value: /home/node/.openclaw
                - name: AWS_REGION
                  value: {{ .Values.aws.region | quote }}
                - name: AWS_DEFAULT_REGION
                  value: {{ .Values.aws.region | quote }}
                - name: INCIDENT_STATE_DIR
                  value: {{ .Values.incidentState.dir | quote }}
                - name: COST_REPORT_TARGET
                  value: {{ .Values.costCron.target | quote }}
                - name: COST_REPORT_ACCOUNT_ID
                  value: {{ .Values.costCron.accountId | quote }}
              volumeMounts:
                - name: state
                  mountPath: /home/node/.openclaw
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.claimName }}
{{- end }}
