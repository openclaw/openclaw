apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-sre-state
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-sre
  namespace: monitoring
  labels:
    app: openclaw-sre
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-sre
  template:
    metadata:
      labels:
        app: openclaw-sre
    spec:
      serviceAccountName: incident-readonly-agent
      initContainers:
        - name: seed-openclaw-home
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /state/skills/morpho-sre/references
              cp /seed-config/openclaw.json /state/openclaw.json
              cp /seed-skills/SKILL.md /state/skills/morpho-sre/SKILL.md
              cp /seed-skills/repo-map.md /state/skills/morpho-sre/references/repo-map.md
              cp /seed-skills/safety.md /state/skills/morpho-sre/references/safety.md
              chown -R 1000:1000 /state
          volumeMounts:
            - name: state
              mountPath: /state
            - name: seed-config
              mountPath: /seed-config
              readOnly: true
            - name: seed-skills
              mountPath: /seed-skills
              readOnly: true
      containers:
        - name: gateway
          image: ${IMAGE_URI}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              mkdir -p /home/node/.kube
              cat >/home/node/.kube/config <<EOF
              apiVersion: v1
              kind: Config
              clusters:
              - cluster:
                  certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  server: https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}
                name: in-cluster
              contexts:
              - context:
                  cluster: in-cluster
                  namespace: monitoring
                  user: incident-readonly-agent
                name: in-cluster
              current-context: in-cluster
              users:
              - name: incident-readonly-agent
                user:
                  tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              EOF
              if [ -z "${VAULT_TOKEN:-}" ] && [ -n "${VAULT_ADDR:-}" ] && command -v curl >/dev/null 2>&1; then
                ROLE="${VAULT_KUBERNETES_ROLE:-incident-readonly-agent}"
                AUTH_PATH="${VAULT_KUBERNETES_AUTH_PATH:-kubernetes}"
                JWT="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                LOGIN_BODY="$(printf '{"role":"%s","jwt":"%s"}' "$ROLE" "$JWT")"
                VAULT_TOKEN="$(curl -sS -X POST "${VAULT_ADDR}/v1/auth/${AUTH_PATH}/login" -H "Content-Type: application/json" --data "$LOGIN_BODY" | jq -r '.auth.client_token // empty')"
                export VAULT_TOKEN
              fi
              exec openclaw gateway --bind lan --port 18789 --allow-unconfigured
          envFrom:
            - secretRef:
                name: openclaw-sre-env
          env:
            - name: HOME
              value: /home/node
            - name: TERM
              value: xterm-256color
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: AWS_REGION
              value: eu-west-3
            - name: AWS_DEFAULT_REGION
              value: eu-west-3
            - name: VAULT_KUBERNETES_AUTH_PATH
              value: kubernetes
            - name: VAULT_KUBERNETES_ROLE
              value: incident-readonly-agent
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: carapulse-secrets
                  key: vault-addr
                  optional: true
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: carapulse-secrets
                  key: vault-token
                  optional: true
            - name: BOUNDARY_ADDR
              valueFrom:
                secretKeyRef:
                  name: carapulse-secrets
                  key: boundary-addr
                  optional: true
            - name: BOUNDARY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: carapulse-secrets
                  key: boundary-token
                  optional: true
            - name: ARGOCD_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: carapulse-secrets
                  key: argocd-base-url
                  optional: true
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: carapulse-secrets
                  key: argocd-token
                  optional: true
          ports:
            - name: http
              containerPort: 18789
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-sre-state
        - name: seed-config
          secret:
            secretName: openclaw-sre-config
        - name: seed-skills
          configMap:
            name: openclaw-sre-skill
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-sre
  namespace: monitoring
  labels:
    app: openclaw-sre
spec:
  selector:
    app: openclaw-sre
  ports:
    - name: http
      port: 18789
      targetPort: http
