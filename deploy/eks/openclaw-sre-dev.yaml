apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-readonly-agent
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::537124939463:role/dev-incident-readonly-agent-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-sre-vault-secret
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-sre-vault-secret
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw-sre-vault-secret
subjects:
  - kind: ServiceAccount
    name: incident-readonly-agent
    namespace: monitoring
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openclaw-sre-vault-secret-creator
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "incident-readonly-agent"
        vault.hashicorp.com/agent-inject-secret-secrets: "secret/data/openclaw-sre/all-secrets"
        vault.hashicorp.com/agent-inject-template-secrets: |
          {{- with secret "secret/data/openclaw-sre/all-secrets" -}}
          {{- range $key, $value := .Data.data -}}
          {{ $key }}={{ $value }}
          {{ end -}}
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: incident-readonly-agent
      restartPolicy: OnFailure
      containers:
        - name: secret-creator
          image: alpine/k8s:1.31.0
          command:
            - sh
            - -c
            - |
              set -eu
              timeout=60
              count=0
              while [ ! -f /vault/secrets/secrets ] && [ $count -lt $timeout ]; do
                sleep 2
                count=$((count + 2))
              done
              test -s /vault/secrets/secrets
              kubectl create secret generic openclaw-sre-vault-secrets \
                --namespace=monitoring \
                --from-env-file=/vault/secrets/secrets \
                --dry-run=client -o yaml | kubectl apply -f -
              kubectl get secret openclaw-sre-vault-secrets -n monitoring
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-sre-state
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-sre
  namespace: monitoring
  labels:
    app: openclaw-sre
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-sre
  template:
    metadata:
      labels:
        app: openclaw-sre
    spec:
      serviceAccountName: incident-readonly-agent
      initContainers:
        - name: seed-openclaw-home
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /state/workspace
              mkdir -p /state/skills/morpho-sre/references
              mkdir -p /state/skills/morpho-sre/scripts
              cp /seed-config/openclaw.json /state/openclaw.json
              cp /seed-skills/SKILL.md /state/skills/morpho-sre/SKILL.md
              cp /seed-skills/HEARTBEAT.md /state/workspace/HEARTBEAT.md
              cp /seed-skills/repo-map.md /state/skills/morpho-sre/references/repo-map.md
              cp /seed-skills/image-repo-map.sh /state/skills/morpho-sre/scripts/image-repo-map.sh
              cp /seed-skills/grafana-api.sh /state/skills/morpho-sre/scripts/grafana-api.sh
              cp /seed-skills/repo-clone.sh /state/skills/morpho-sre/scripts/repo-clone.sh
              cp /seed-skills/github-ci-status.sh /state/skills/morpho-sre/scripts/github-ci-status.sh
              cp /seed-skills/sentinel-triage.sh /state/skills/morpho-sre/scripts/sentinel-triage.sh
              cp /seed-skills/prometheus-trends.sh /state/skills/morpho-sre/scripts/prometheus-trends.sh
              cp /seed-skills/argocd-sync-status.sh /state/skills/morpho-sre/scripts/argocd-sync-status.sh
              cp /seed-skills/cert-secret-health.sh /state/skills/morpho-sre/scripts/cert-secret-health.sh
              cp /seed-skills/aws-resource-signals.sh /state/skills/morpho-sre/scripts/aws-resource-signals.sh
              cp /seed-skills/aws-cost-report.sh /state/skills/morpho-sre/scripts/aws-cost-report.sh
              cp /seed-skills/self-improve-pr.sh /state/skills/morpho-sre/scripts/self-improve-pr.sh
              cp /seed-skills/sentinel-snapshot.sh /state/skills/morpho-sre/scripts/sentinel-snapshot.sh
              cp /seed-skills/lib-incident-id.sh /state/skills/morpho-sre/scripts/lib-incident-id.sh
              cp /seed-skills/lib-state-file.sh /state/skills/morpho-sre/scripts/lib-state-file.sh
              cp /seed-skills/lib-continuity-matcher.sh /state/skills/morpho-sre/scripts/lib-continuity-matcher.sh
              cp /seed-skills/lib-outbox.sh /state/skills/morpho-sre/scripts/lib-outbox.sh
              cp /seed-skills/lib-linear-preflight.sh /state/skills/morpho-sre/scripts/lib-linear-preflight.sh
              cp /seed-skills/lib-linear-ticket.sh /state/skills/morpho-sre/scripts/lib-linear-ticket.sh
              cp /seed-skills/linear-ticket-api.sh /state/skills/morpho-sre/scripts/linear-ticket-api.sh
              cp /seed-skills/lib-rca-prompt.sh /state/skills/morpho-sre/scripts/lib-rca-prompt.sh
              cp /seed-skills/lib-rca-llm.sh /state/skills/morpho-sre/scripts/lib-rca-llm.sh
              cp /seed-skills/lib-rca-crossreview.sh /state/skills/morpho-sre/scripts/lib-rca-crossreview.sh
              cp /seed-skills/lib-rca-safety.sh /state/skills/morpho-sre/scripts/lib-rca-safety.sh
              cp /seed-skills/lib-thread-archival.sh /state/skills/morpho-sre/scripts/lib-thread-archival.sh
              cp /seed-skills/lib-meta-alerts.sh /state/skills/morpho-sre/scripts/lib-meta-alerts.sh
              cp /seed-skills/linear-memory-lookup.sh /state/skills/morpho-sre/scripts/linear-memory-lookup.sh
              cp /seed-skills/lib-service-graph.sh /state/skills/morpho-sre/scripts/lib-service-graph.sh
              if [ -f /seed-skills/relationship-knowledge-build.sh ]; then
                cp /seed-skills/relationship-knowledge-build.sh /state/skills/morpho-sre/scripts/relationship-knowledge-build.sh
              fi
              cp /seed-skills/lib-service-overlay.sh /state/skills/morpho-sre/scripts/lib-service-overlay.sh
              cp /seed-skills/lib-incident-memory.sh /state/skills/morpho-sre/scripts/lib-incident-memory.sh
              cp /seed-skills/lib-service-context.sh /state/skills/morpho-sre/scripts/lib-service-context.sh
              cp /seed-skills/lib-rca-chain.sh /state/skills/morpho-sre/scripts/lib-rca-chain.sh
              cp /seed-skills/lib-rca-sink.sh /state/skills/morpho-sre/scripts/lib-rca-sink.sh
              cp /seed-skills/lib-overlay-suggestions.sh /state/skills/morpho-sre/scripts/lib-overlay-suggestions.sh
              cp /seed-skills/rca_hypothesis_ids.v1.json /state/skills/morpho-sre/rca_hypothesis_ids.v1.json
              chmod +x /state/skills/morpho-sre/scripts/image-repo-map.sh
              chmod +x /state/skills/morpho-sre/scripts/grafana-api.sh
              chmod +x /state/skills/morpho-sre/scripts/repo-clone.sh
              chmod +x /state/skills/morpho-sre/scripts/github-ci-status.sh
              chmod +x /state/skills/morpho-sre/scripts/sentinel-triage.sh
              chmod +x /state/skills/morpho-sre/scripts/prometheus-trends.sh
              chmod +x /state/skills/morpho-sre/scripts/argocd-sync-status.sh
              chmod +x /state/skills/morpho-sre/scripts/cert-secret-health.sh
              chmod +x /state/skills/morpho-sre/scripts/aws-resource-signals.sh
              chmod +x /state/skills/morpho-sre/scripts/aws-cost-report.sh
              chmod +x /state/skills/morpho-sre/scripts/self-improve-pr.sh
              chmod +x /state/skills/morpho-sre/scripts/sentinel-snapshot.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-incident-id.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-state-file.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-continuity-matcher.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-outbox.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-linear-preflight.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-linear-ticket.sh
              chmod +x /state/skills/morpho-sre/scripts/linear-ticket-api.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-rca-prompt.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-rca-llm.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-rca-crossreview.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-rca-safety.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-thread-archival.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-meta-alerts.sh
              chmod +x /state/skills/morpho-sre/scripts/linear-memory-lookup.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-service-graph.sh
              if [ -f /state/skills/morpho-sre/scripts/relationship-knowledge-build.sh ]; then
                chmod +x /state/skills/morpho-sre/scripts/relationship-knowledge-build.sh
              fi
              chmod +x /state/skills/morpho-sre/scripts/lib-service-overlay.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-incident-memory.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-service-context.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-rca-chain.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-rca-sink.sh
              chmod +x /state/skills/morpho-sre/scripts/lib-overlay-suggestions.sh
              if [ -f /seed-skills/autofix-pr.sh ]; then
                cp /seed-skills/autofix-pr.sh /state/skills/morpho-sre/scripts/autofix-pr.sh
                chmod +x /state/skills/morpho-sre/scripts/autofix-pr.sh
              fi
              cp /seed-skills/safety.md /state/skills/morpho-sre/references/safety.md
              if [ -f /seed-skills/skills-bundle.tar.gz ]; then
                tar -xzf /seed-skills/skills-bundle.tar.gz -C /state
              fi
              db_guardrail_marker='## DB Query Guardrail (Slack Threads)'
              db_skill_path='/state/skills/morpho-sre/SKILL.md'
              if [ -f "$db_skill_path" ] && ! grep -Fq "$db_guardrail_marker" "$db_skill_path"; then
                cat <<'EOF' | sed 's/^              //' >>"$db_skill_path"
              
              ## DB Query Guardrail (Slack Threads)
              
              - Trigger: any request about DB rows/counts/listing/filtering (for example "markets", "whitelisted", "listed", "market_warnings", "query this table", "run SQL").
              - Mandatory: run at least one successful live DB query before final answer. No SQL-only conceptual replies.
              - Mandatory: verify reachable schema first (`information_schema`/`\dt`) before table-specific query.
              - Mandatory response evidence line:
                - `db=<host:port/dbname> schema_check=<ok|failed> query_check=<ok|failed> rows=<n>`
              - If live query cannot run:
                - include exact failing command + exact error text
                - include next unblock step
                - never claim "no DB access" without attempting connectivity + credential lookup.
              
              Preferred runbook:
              
              ```bash
              # 1) Find likely DB credential source
              kubectl --context "$K8S_CONTEXT" -n morpho-dev get secret | rg -i 'blue|indexer|pg|postgres'
              
              # 2) Decode candidate secret metadata/fields (do not paste sensitive values in final answer)
              kubectl --context "$K8S_CONTEXT" -n morpho-dev get secret <secret> -o json \
                | jq -r '.data | to_entries[] | "\(.key)=<redacted>"'
              
              # 3) Run schema + target query with psql or node pg client
              # psql path (preferred when available)
              PGPASSWORD="$PGPASSWORD" psql -h "$PGHOST" -p "${PGPORT:-5432}" -U "$PGUSER" -d "$PGDATABASE" \
                -c 'select table_schema, table_name from information_schema.tables order by 1,2 limit 50;'
              
              # node pg fallback (bootstrap path prepared in container)
              node <<'NODE'
              const { Client } = require('/tmp/pgclient/node_modules/pg');
              const c = new Client({
                host: process.env.PGHOST,
                port: Number(process.env.PGPORT || 5432),
                user: process.env.PGUSER,
                password: process.env.PGPASSWORD,
                database: process.env.PGDATABASE,
                ssl: false,
              });
              await c.connect();
              const r = await c.query("select now()");
              console.log(JSON.stringify({ rows: r.rowCount, sample: r.rows[0] }, null, 2));
              await c.end();
              NODE
              ```
              EOF
              fi
              chown -R 1000:1000 /state
          volumeMounts:
            - name: state
              mountPath: /state
            - name: seed-config
              mountPath: /seed-config
              readOnly: true
            - name: seed-skills
              mountPath: /seed-skills
              readOnly: true
      containers:
        - name: gateway
          image: ${IMAGE_URI}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              mkdir -p /home/node/.kube
              cat >/home/node/.kube/config <<EOF
              apiVersion: v1
              kind: Config
              clusters:
              - cluster:
                  certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  server: https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}
                name: in-cluster
              contexts:
              - context:
                  cluster: in-cluster
                  namespace: monitoring
                  user: incident-readonly-agent
                name: in-cluster
              current-context: in-cluster
              users:
              - name: incident-readonly-agent
                user:
                  tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              EOF
              if [ -z "${VAULT_TOKEN:-}" ] && [ -n "${VAULT_ADDR:-}" ] && command -v curl >/dev/null 2>&1; then
                ROLE="${VAULT_KUBERNETES_ROLE:-incident-readonly-agent}"
                AUTH_PATH="${VAULT_KUBERNETES_AUTH_PATH:-kubernetes}"
                JWT="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                LOGIN_BODY="$(printf '{"role":"%s","jwt":"%s"}' "$ROLE" "$JWT")"
                VAULT_TOKEN="$(curl -sS -X POST "${VAULT_ADDR}/v1/auth/${AUTH_PATH}/login" -H "Content-Type: application/json" --data "$LOGIN_BODY" | jq -r '.auth.client_token // empty')"
                export VAULT_TOKEN
              fi
              bootstrap_exec_approvals() {
                approvals_dir="/home/node/.openclaw"
                approvals_file="${approvals_dir}/exec-approvals.json"
                default_allowlist="/home/node/.openclaw/skills/morpho-sre/scripts/*.sh,/usr/bin/bash,/usr/bin/sh,/usr/bin/aws,/usr/bin/curl,/usr/bin/git,/usr/bin/gh,/usr/bin/jq,/usr/bin/sed,/usr/bin/awk,/usr/bin/grep,/usr/bin/sort,/usr/bin/cat,/usr/bin/head,/usr/bin/tail,/usr/bin/cut,/usr/bin/uniq,/usr/bin/tr,/usr/bin/wc,/usr/bin/xargs,/usr/bin/timeout,/usr/bin/tar,/usr/bin/unzip,/usr/bin/gzip,/usr/local/bin/kubectl,/usr/local/bin/helm,/usr/local/bin/argocd,/usr/local/bin/vault"
                raw_allowlist="${EXEC_ALLOWLIST:-$default_allowlist}"

                mkdir -p "$approvals_dir"
                allowlist_json="$(printf '%s' "$raw_allowlist" \
                  | tr ',' '\n' \
                  | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' \
                  | awk 'NF > 0 { print }' \
                  | jq -Rsc 'split("\n") | map(select(length > 0))')" || allowlist_json='[]'

                if [ ! -f "$approvals_file" ] || ! jq -e . "$approvals_file" >/dev/null 2>&1; then
                  socket_token="$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 48 || true)"
                  if [ -z "$socket_token" ]; then
                    socket_token="$(date +%s)"
                  fi
                  cat >"$approvals_file" <<EOF
              {
                "version": 1,
                "socket": {
                  "path": "/home/node/.openclaw/exec-approvals.sock",
                  "token": "${socket_token}"
                },
                "defaults": {},
                "agents": {}
              }
              EOF
                fi

                tmp_file="$(mktemp)"
                jq --argjson patterns "$allowlist_json" '
                  def ensure_obj: if type == "object" then . else {} end;
                  def normalize_patterns($arr):
                    ($arr // [])
                    | map(if type == "string" then . else empty end)
                    | map(gsub("^\\s+|\\s+$"; ""))
                    | map(select(length > 0))
                    | unique;
                  .version = 1
                  | .socket = (.socket | ensure_obj)
                  | .agents = (.agents | ensure_obj)
                  | .agents.main = (.agents.main | ensure_obj)
                  | .agents.main.allowlist = (
                      ((.agents.main.allowlist // [])
                      | map(select((type == "object") and (.pattern | type == "string") and (.pattern | length > 0))))
                      + (normalize_patterns($patterns) | map({ pattern: . }))
                    )
                  | .agents.main.allowlist = (.agents.main.allowlist | unique_by((.pattern | ascii_downcase)))
                ' "$approvals_file" >"$tmp_file"
                mv "$tmp_file" "$approvals_file"
                chmod 600 "$approvals_file"
                echo "exec-approvals-bootstrap:ok"
              }
              bootstrap_exec_approvals
              bootstrap_auth_profiles() {
                auth_dir="/home/node/.openclaw/agents/main/agent"
                auth_file="${auth_dir}/auth-profiles.json"
                mkdir -p "$auth_dir"

                if [ -n "${CODEX_AUTH_JSON:-}" ]; then
                  if printf '%s' "$CODEX_AUTH_JSON" | jq -e . >/dev/null 2>&1; then
                    printf '%s\n' "$CODEX_AUTH_JSON" >"$auth_file"
                    chmod 600 "$auth_file"
                    echo "auth-bootstrap:codex-auth-json"
                  else
                    echo "auth-bootstrap:invalid-codex-auth-json" >&2
                  fi
                fi
              }
              bootstrap_auth_profiles
              github_preflight_log() {
                echo "github-preflight:$1"
              }
              github_preflight_fail() {
                stage="$1"
                message="$2"
                echo "github-preflight:fail:${stage}: ${message}" >&2
                rm -f /tmp/github-preflight.ok
                if [ "${GITHUB_AUTH_STRICT:-1}" = "1" ]; then
                  exit 1
                fi
                return 0
              }
              github_api_probe() {
                endpoint="$1"
                tmp_json="$(mktemp)"
                code="$(curl -sS -o "$tmp_json" -w '%{http_code}' \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/${endpoint}" || true)"
                if [ "$code" != "200" ]; then
                  msg="$(jq -r '.message // "http error"' "$tmp_json" 2>/dev/null || echo "http error")"
                  rm -f "$tmp_json"
                  github_preflight_fail "probe" "${endpoint} http_${code}: ${msg}"
                  return 1
                fi
                rm -f "$tmp_json"
                return 0
              }
              github_preflight() {
                required_repo="${GITHUB_REQUIRED_REPO:-morpho-org/morpho-infra}"
                required_actions_repo="${GITHUB_REQUIRED_ACTIONS_REPO:-$required_repo}"

                missing_tools=""
                for tool in node curl jq git base64; do
                  if ! command -v "$tool" >/dev/null 2>&1; then
                    missing_tools="${missing_tools}${missing_tools:+,}${tool}"
                  fi
                done
                if [ -n "$missing_tools" ]; then
                  github_preflight_fail "tools" "missing commands: ${missing_tools}"
                  return 0
                fi

                if [ -z "${GITHUB_APP_ID:-}" ] || [ -z "${GITHUB_APP_PRIVATE_KEY:-}" ]; then
                  github_preflight_fail "env" "missing GITHUB_APP_ID or GITHUB_APP_PRIVATE_KEY"
                  return 0
                fi

                APP_JWT="$(GITHUB_APP_ID="$GITHUB_APP_ID" GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" node - <<'NODE'
              const crypto = require('crypto');
              const appId = process.env.GITHUB_APP_ID;
              const keyRaw = process.env.GITHUB_APP_PRIVATE_KEY || '';
              const key = keyRaw.replace(/\\n/g, '\n');
              const now = Math.floor(Date.now() / 1000);
              const header = { alg: 'RS256', typ: 'JWT' };
              const payload = { iat: now - 60, exp: now + 540, iss: appId };
              const b64 = (obj) => Buffer.from(JSON.stringify(obj)).toString('base64url');
              const input = `${b64(header)}.${b64(payload)}`;
              const signature = crypto.createSign('RSA-SHA256').update(input).sign(key, 'base64url');
              process.stdout.write(`${input}.${signature}`);
              NODE
                )" || {
                  github_preflight_fail "jwt" "failed to mint app jwt"
                  return 0
                }

                INSTALLATION_ID="${GITHUB_APP_INSTALLATION_ID:-}"
                if [ -z "$INSTALLATION_ID" ]; then
                  install_json="$(mktemp)"
                  install_code="$(curl -sS -o "$install_json" -w '%{http_code}' \
                    -H "Authorization: Bearer ${APP_JWT}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/app/installations" || true)"
                  if [ "$install_code" != "200" ]; then
                    install_msg="$(jq -r '.message // "http error"' "$install_json" 2>/dev/null || echo "http error")"
                    rm -f "$install_json"
                    github_preflight_fail "installations" "api http_${install_code}: ${install_msg}"
                    return 0
                  fi
                  INSTALLATION_ID="$(jq -r '.[] | select(.account.login=="morpho-org") | .id' "$install_json" | head -n1)"
                  rm -f "$install_json"
                fi
                if [ -z "$INSTALLATION_ID" ]; then
                  github_preflight_fail "installations" "no installation id for morpho-org"
                  return 0
                fi

                token_json="$(mktemp)"
                token_code="$(curl -sS -o "$token_json" -w '%{http_code}' \
                  -X POST \
                  -H "Authorization: Bearer ${APP_JWT}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" || true)"
                if [ "$token_code" != "201" ] && [ "$token_code" != "200" ]; then
                  token_msg="$(jq -r '.message // "http error"' "$token_json" 2>/dev/null || echo "http error")"
                  rm -f "$token_json"
                  github_preflight_fail "token" "api http_${token_code}: ${token_msg}"
                  return 0
                fi
                GITHUB_APP_TOKEN="$(jq -r '.token // empty' "$token_json")"
                rm -f "$token_json"
                if [ -z "$GITHUB_APP_TOKEN" ]; then
                  github_preflight_fail "token" "empty installation token"
                  return 0
                fi
                export GITHUB_TOKEN="$GITHUB_APP_TOKEN"
                export GH_TOKEN="$GITHUB_APP_TOKEN"

                github_api_probe "repos/${required_repo}" || return 0
                github_api_probe "repos/${required_actions_repo}/actions/runs?per_page=1" || return 0

                git_auth_basic="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
                if ! git -c credential.helper= -c core.askPass= \
                  -c "http.extraHeader=Authorization: Basic ${git_auth_basic}" \
                  ls-remote "https://github.com/${required_repo}.git" HEAD >/tmp/github-preflight-lsremote.txt 2>/tmp/github-preflight-lsremote.err; then
                  github_preflight_fail "git-ls-remote" "git transport probe failed for ${required_repo}"
                  return 0
                fi
                if ! grep -q 'HEAD' /tmp/github-preflight-lsremote.txt; then
                  github_preflight_fail "git-ls-remote" "empty ls-remote response for ${required_repo}"
                  return 0
                fi
                rm -f /tmp/github-preflight-lsremote.txt /tmp/github-preflight-lsremote.err
                touch /tmp/github-preflight.ok
                github_preflight_log "ok repo=${required_repo} actions_repo=${required_actions_repo}"
              }

              rm -f /tmp/github-preflight.ok
              github_preflight_log "start"
              github_preflight
              bootstrap_github_cli_wrappers() {
                wrapper_dir="/home/node/.openclaw/bin"
                mkdir -p "$wrapper_dir"

                cat >"${wrapper_dir}/github-app-token.sh" <<'EOF'
              #!/bin/sh
              set -eu

              cache_file="${GITHUB_APP_TOKEN_CACHE:-/tmp/openclaw-github-app-token.json}"
              now_epoch="$(date +%s)"

              if [ -f "$cache_file" ]; then
                cached_token="$(jq -r '.token // empty' "$cache_file" 2>/dev/null || true)"
                cached_expiry="$(jq -r '.expires_at // 0' "$cache_file" 2>/dev/null || echo 0)"
                case "$cached_expiry" in
                  ''|*[!0-9]*) cached_expiry=0 ;;
                esac
                if [ -n "$cached_token" ] && [ "$cached_expiry" -gt $((now_epoch + 120)) ]; then
                  printf '%s\n' "$cached_token"
                  exit 0
                fi
              fi

              if [ -z "${GITHUB_APP_ID:-}" ] || [ -z "${GITHUB_APP_PRIVATE_KEY:-}" ]; then
                exit 1
              fi

              app_jwt="$(
                GITHUB_APP_ID="$GITHUB_APP_ID" GITHUB_APP_PRIVATE_KEY="$GITHUB_APP_PRIVATE_KEY" node - <<'NODE'
              const crypto = require('crypto');
              const appId = process.env.GITHUB_APP_ID;
              const keyRaw = process.env.GITHUB_APP_PRIVATE_KEY || '';
              const key = keyRaw.replace(/\\n/g, '\n');
              const now = Math.floor(Date.now() / 1000);
              const header = { alg: 'RS256', typ: 'JWT' };
              const payload = { iat: now - 60, exp: now + 540, iss: appId };
              const b64 = (obj) => Buffer.from(JSON.stringify(obj)).toString('base64url');
              const input = `${b64(header)}.${b64(payload)}`;
              const signature = crypto.createSign('RSA-SHA256').update(input).sign(key, 'base64url');
              process.stdout.write(`${input}.${signature}`);
              NODE
              )" || exit 1

              installation_id="${GITHUB_APP_INSTALLATION_ID:-}"
              if [ -z "$installation_id" ]; then
                install_json="$(mktemp)"
                install_code="$(curl -sS -o "$install_json" -w '%{http_code}' \
                  -H "Authorization: Bearer ${app_jwt}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/app/installations" || true)"
                if [ "$install_code" != "200" ]; then
                  rm -f "$install_json"
                  exit 1
                fi
                installation_id="$(jq -r '.[] | select(.account.login=="morpho-org") | .id' "$install_json" | head -n1)"
                rm -f "$install_json"
              fi
              if [ -z "$installation_id" ]; then
                exit 1
              fi

              token_json="$(mktemp)"
              token_code="$(curl -sS -o "$token_json" -w '%{http_code}' \
                -X POST \
                -H "Authorization: Bearer ${app_jwt}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/app/installations/${installation_id}/access_tokens" || true)"
              if [ "$token_code" != "201" ] && [ "$token_code" != "200" ]; then
                rm -f "$token_json"
                exit 1
              fi

              token="$(jq -r '.token // empty' "$token_json")"
              expires_at_iso="$(jq -r '.expires_at // empty' "$token_json")"
              rm -f "$token_json"
              if [ -z "$token" ] || [ -z "$expires_at_iso" ]; then
                exit 1
              fi

              expires_epoch="$(
                node -e 'const iso = process.argv[1]; const t = Date.parse(iso); if (!Number.isFinite(t)) process.exit(1); process.stdout.write(String(Math.floor(t / 1000)));' "$expires_at_iso"
              )" || exit 1

              jq -n --arg token "$token" --argjson expires_at "$expires_epoch" \
                '{token:$token,expires_at:$expires_at}' >"$cache_file"
              chmod 600 "$cache_file"

              printf '%s\n' "$token"
              EOF
                chmod +x "${wrapper_dir}/github-app-token.sh"

                cat >"${wrapper_dir}/gh" <<'EOF'
              #!/bin/sh
              set -eu
              if token="$(/home/node/.openclaw/bin/github-app-token.sh 2>/dev/null)"; then
                export GH_TOKEN="$token"
                export GITHUB_TOKEN="$token"
              fi
              exec /usr/bin/gh "$@"
              EOF
                chmod +x "${wrapper_dir}/gh"

                cat >"${wrapper_dir}/git" <<'EOF'
              #!/bin/sh
              set -eu
              if token="$(/home/node/.openclaw/bin/github-app-token.sh 2>/dev/null)"; then
                git_auth_basic="$(printf 'x-access-token:%s' "$token" | base64 | tr -d '\n')"
                exec /usr/bin/git \
                  -c credential.helper= \
                  -c core.askPass= \
                  -c "http.https://github.com/.extraHeader=Authorization: Basic ${git_auth_basic}" \
                  "$@"
              fi
              exec /usr/bin/git "$@"
              EOF
                chmod +x "${wrapper_dir}/git"

                export PATH="${wrapper_dir}:${PATH}"
                echo "github-cli-wrappers:ok"
              }
              bootstrap_github_cli_wrappers
              exec openclaw gateway --bind lan --port 18789 --allow-unconfigured
          envFrom:
            - secretRef:
                name: openclaw-sre-vault-secrets
          env:
            - name: HOME
              value: /home/node
            - name: TERM
              value: xterm-256color
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: CLAWDBOT_SHOW_SECRETS
              value: "0"
            - name: AWS_REGION
              value: eu-west-3
            - name: AWS_DEFAULT_REGION
              value: eu-west-3
            - name: SCOPE_NAMESPACES
              value: morpho-dev,monitoring
            - name: LINEAR_LOOKUP_CMD
              value: /home/node/.openclaw/skills/morpho-sre/scripts/linear-ticket-api.sh
            - name: PROMETHEUS_URL
              value: http://prometheus-stack-kube-prom-prometheus.monitoring:9090
            - name: INCIDENT_STATE_DIR
              value: /home/node/.openclaw/state/sentinel
            - name: RCA_MODE
              value: single
            - name: SERVICE_CONTEXT_ENABLED
              value: "1"
            - name: RCA_CHAIN_ENABLED
              value: "1"
            - name: RCA_CHAIN_TOTAL_TIMEOUT_MS
              value: "60000"
            - name: RCA_STAGE_TIMEOUT_MS
              value: "10000"
            - name: RCA_EVIDENCE_TOTAL_TIMEOUT_MS
              value: "80000"
            - name: RCA_MIN_RERUN_INTERVAL_S
              value: "3600"
            - name: RCA_CHAIN_COST_ALERT_THRESHOLD
              value: "750"
            - name: RCA_CHAIN_STAGE_E_ENABLED
              value: "1"
            - name: INCIDENT_LEARNING_ENABLED
              value: "1"
            - name: VAULT_KUBERNETES_AUTH_PATH
              value: kubernetes
            - name: VAULT_KUBERNETES_ROLE
              value: incident-readonly-agent
          ports:
            - name: http
              containerPort: 18789
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-sre-state
        - name: seed-config
          secret:
            secretName: openclaw-sre-config
        - name: seed-skills
          configMap:
            name: openclaw-sre-skill
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-sre
  namespace: monitoring
  labels:
    app: openclaw-sre
spec:
  selector:
    app: openclaw-sre
  ports:
    - name: http
      port: 18789
      targetPort: http
