apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mythos.fullname" . }}-secrets
  labels:
    {{- include "mythos.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
data:
  {{- if .Values.gateway.secrets.gatewayToken }}
  gateway-token: {{ .Values.gateway.secrets.gatewayToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.gateway.secrets.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.openaiApiKey }}
  openai-api-key: {{ .Values.gateway.secrets.openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.geminiApiKey }}
  gemini-api-key: {{ .Values.gateway.secrets.geminiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.telegramBotToken }}
  telegram-bot-token: {{ .Values.gateway.secrets.telegramBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.discordBotToken }}
  discord-bot-token: {{ .Values.gateway.secrets.discordBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.slackBotToken }}
  slack-bot-token: {{ .Values.gateway.secrets.slackBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.secrets.githubToken }}
  github-token: {{ .Values.gateway.secrets.githubToken | b64enc | quote }}
  {{- end }}
