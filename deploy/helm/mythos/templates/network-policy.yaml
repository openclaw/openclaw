{{- if .Values.gateway.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mythos.fullname" . }}-gateway
  labels:
    {{- include "mythos.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      {{- include "mythos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- toYaml .Values.gateway.networkPolicy.ingress | nindent 4 }}
  egress:
    {{- toYaml .Values.gateway.networkPolicy.egress | nindent 4 }}
{{- end }}
