# Sophia Discord + WhatsApp — Render Blueprint
#
# This extends the base render.yaml with Discord voice, ElevenLabs TTS,
# Deepgram STT, and ffmpeg for audio processing.
#
# Secrets to set manually in Render dashboard:
#   DISCORD_BOT_TOKEN, ELEVENLABS_API_KEY, DEEPGRAM_API_KEY,
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, BRAVE_API_KEY
#
# Before first deploy:
#   1. Seed /data/.openclaw/openclaw.json via Render Shell (see openclaw.render.json5)
#   2. Set all secrets in Render dashboard
#   3. Create Discord bot with Message Content + Server Members intents
#   4. Invite bot to private server with Connect, Speak, View Channels,
#      Send Messages, Read Message History permissions

services:
  - type: web
    name: openclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    # The gateway starts with --allow-unconfigured so it survives
    # first boot before the config file is seeded via Render Shell.
    # --control-ui-allowed-origins * is required for non-loopback bind.
    dockerCommand: node openclaw.mjs gateway --bind lan --port 8080 --allow-unconfigured --control-ui-allowed-origins *
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/.openclaw/sophia
      - key: OPENCLAW_CONFIG_PATH
        value: /data/.openclaw/openclaw.json
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      # These env vars are also declared as Dockerfile ARGs, so they
      # are available at build time to bake extensions and apt packages
      # into the image. Render should forward them as --build-arg, but
      # as a safety net the Dockerfile also sets matching defaults.
      - key: OPENCLAW_EXTENSIONS
        value: "discord whatsapp elevenlabs deepgram anthropic media-understanding-core memory-core speech-core"
      - key: OPENCLAW_DOCKER_APT_PACKAGES
        value: "ffmpeg"
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
