    message: Review Kotlin @JavascriptInterface methods that normalize a string payload and forward it into a callback/handler; ensure the current WebView page/origin is trusted first.
    severity: ERROR
    languages:
      - kotlin
    patterns:
      - pattern-either:
          - pattern: |
              @JavascriptInterface
              fun $METHOD($PAYLOAD: String?) {
                ...
                val $MSG = $PAYLOAD?.trim().orEmpty()
                ...
                if ($MSG.isEmpty()) return
                ...
                $SINK($MSG)
                ...
              }
          - pattern: |
              @JavascriptInterface
              fun $METHOD($PAYLOAD: String?) {
                ...
                val $MSG = $PAYLOAD?.trim().orEmpty()
                ...
                if ($MSG.isEmpty()) return
                ...
                this.$SINK($MSG)
                ...
              }
      - metavariable-regex:
          metavariable: $SINK
          regex: (?i).*(dispatch|deliver|forward|handle|message|callback|command|action).*
      - pattern-not: |
          @JavascriptInterface
          fun $METHOD($PAYLOAD: String?) {
            ...
            if (!isTrustedPage()) return
            ...
            $SINK($MSG)
            ...
          }
      - pattern-not: |
          @JavascriptInterface
          fun $METHOD($PAYLOAD: String?) {
            ...
            if (!allowCurrentPage()) return
            ...
            $SINK($MSG)
            ...
          }
      - pattern-not: |
          @JavascriptInterface
          fun $METHOD($PAYLOAD: String?) {
            ...
            if (!isAllowedOrigin()) return
            ...
            $SINK($MSG)
            ...
          }
