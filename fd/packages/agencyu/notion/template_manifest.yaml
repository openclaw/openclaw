# COMMAND CENTER — Widget coverage requirements
# ════════════════════════════════════════════

command_center:
  required_blocks:
    - block_key: "cc.brand_switcher.heading"
      type: "heading_2"
      text: "Choose a Brand"
    - block_key: "cc.brand_switcher.row"
      type: "column_list"
      children:
        - block_key: "cc.brand_switcher.fulldigital"
          type: "callout"
          emoji: "\U0001f3e2"
          title: "Full Digital"
          one_liner: "Run the agency engine."
          funnels: "Primary funnels: High-ticket agency"
          kpi: "Primary KPI: booked calls"
          badge_markers: true
          link_target: "fd_hq"
        - block_key: "cc.brand_switcher.cutmv"
          type: "callout"
          emoji: "\U0001f9e9"
          title: "CUTMV"
          one_liner: "Run the product engine."
          funnels: "Primary funnels: Self-serve SaaS"
          kpi: "Primary KPI: trials \u2192 paid"
          badge_markers: true
          link_target: "cutmv_hq"

  required_widgets:
    - widget_key: "cc.executive_strip"
      title: "Executive Strip"
      purpose: "KPI row + status pills — at-a-glance business health"
      required_view_keys:
        - "cc.active_combos"
        - "cc.pipeline_quality"
        - "cc.finance_snapshot"
    - widget_key: "cc.active_combos_table"
      title: "Active Combos"
      purpose: "Active client outcomes dashboard"
      required_view_keys:
        - "cc.active_combos"
    - widget_key: "cc.pipeline_quality_panel"
      title: "Pipeline Quality"
      purpose: "Calls booked/showed/close-rate metrics"
      required_view_keys:
        - "cc.pipeline_quality"
        - "meetings.showed_7d"
    - widget_key: "cc.fulfillment_watchlist"
      title: "Fulfillment Watchlist"
      purpose: "Tasks due today + overdue items"
      required_view_keys:
        - "cc.fulfillment_watchlist"
        - "tasks.today"
    - widget_key: "cc.finance_snapshot"
      title: "Finance Snapshot"
      purpose: "Money in, money out, open invoices"
      required_view_keys:
        - "cc.finance_snapshot"
    - widget_key: "cc.systems_reliability"
      title: "Systems Reliability"
      purpose: "Drift count, last heal, audit errors, backup status"
      required_view_keys:
        - "audit.recent"
    - widget_key: "cc.fix_list"
      title: "Fix List"
      purpose: "Compliance-driven repair checklist — shows what needs fixing"
      required_view_keys: []
    - widget_key: "cc.skills_recommendations"
      title: "Skills to Fork"
      purpose: "Advisory widget showing scout-discovered skill candidates"
      required_view_keys: []
    - widget_key: "cc.db_registry"
      title: "Database Registry"
      purpose: "Shows OpenClaw DB existence and compliance status"
      required_view_keys: []
    - widget_key: "cc.kpis"
