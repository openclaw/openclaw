    - widget_key: "cc.quick_actions"
      title: "Quick Actions"
      purpose: "One-click admin tool links and shortcuts"
      required_view_keys: []
    - widget_key: "cc.schedule_today"
      title: "Today's Schedule"
      purpose: "Unified schedule — meetings, deadlines, focus blocks from GCal + Trello + GHL"
      required_view_keys:
        - "schedule.today"
    - widget_key: "cc.schedule_week"
      title: "This Week"
