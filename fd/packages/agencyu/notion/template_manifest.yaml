    - { view_key: "cc.global.delivery", db_key: "tasks", required: true }
    - { view_key: "cc.global.webops", db_key: "system_audit_log", required: true }
    # Full Digital brand views
    - { view_key: "cc.fd.kpis", db_key: "outcomes", required: true }
    - { view_key: "cc.fd.pipeline", db_key: "crm_pipeline", required: true }
    - { view_key: "cc.fd.cash", db_key: "invoices", required: true }
    - { view_key: "cc.fd.delivery", db_key: "tasks", required: true }
    - { view_key: "cc.fd.webops", db_key: "system_audit_log", required: true }
    # CUTMV brand views
    - { view_key: "cc.cutmv.kpis", db_key: "outcomes", required: true }
    - { view_key: "cc.cutmv.pipeline", db_key: "crm_pipeline", required: true }
    - { view_key: "cc.cutmv.cash", db_key: "invoices", required: true }
    - { view_key: "cc.cutmv.delivery", db_key: "tasks", required: true }
    - { view_key: "cc.cutmv.webops", db_key: "system_audit_log", required: true }
    # Schedule views (unified from GCal + Trello + GHL)
    - { view_key: "schedule.today", db_key: "schedule", required: true }
    - { view_key: "schedule.this_week", db_key: "schedule", required: true }
