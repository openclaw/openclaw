version: "2.1"
template_version: "1.0.0"
os_version: "agencyos+fulldigital.1"
owner: "openclaw"

governance:
  schema_lock:
    enabled: true
    discipline: "openclaw_only"
    human_changes_not_allowed: true
    human_edit_policy:
      allow_db_row_edits: true
      allow_property_edits: false
      allow_view_edits: false
    enforcement:
      write_lock_property: "write_lock"
      write_lock_default: true
  write_lock_default: true
  require_version_match: true

  # Integration philosophy
  integrations_mode: "clawdcursor_preferred"
  integrations_policy:
    primary: "clawdcursor skill (browser/Operator-style + human-in-the-loop)"
    secondary: "API connectors where stable + low-risk (Trello, Stripe, Notion)"
    principle: "Minimize OAuth; maximize deterministic ops + verifiable state in Notion"

root_page:
  required: true

required_root_pages:
  - page_key: "command_center"
    title: "Command Center"
    purpose: "Primary operational dashboard. Widgets live here. Global + per-brand sections."
  - page_key: "fd_hq"
    title: "Full Digital HQ"
    purpose: "Brand dashboard for Full Digital — filtered pipeline, delivery, cash, incidents."
    parent: "root"
  - page_key: "cutmv_hq"
    title: "CUTMV HQ"
    purpose: "Brand dashboard for CUTMV — filtered pipeline, delivery, cash, incidents."
    parent: "fd_hq"
  - page_key: "ops_console"
    title: "Ops Console"
    purpose: "Admin-only tools, compliance, runbooks, audits."
  - page_key: "system_settings"
    title: "System Settings"
    purpose: "Template versions, write_lock, last_verified_at, integration toggles."
  - page_key: "client_portal_root"
    title: "Client Portals"
    purpose: "Parent page for all client portal pages."

# UX rules (5-year-old standard)
ux_rules:
  layout:
    max_heading_levels: 2  # H1 and H2 only
    panels: "callout"      # Callouts as panels
    separators: "divider"  # Dividers between panels
    widget_structure:
      - "simple_title"
      - "one_sentence_instruction"
      - "data"
    command_center_shows_only:
      - "What to do now"
      - "What is broken"
      - "Who needs attention"
  text:
    no_jargon: true
    examples:
      - { bad: "attended events", good: "Calls Showed" }
      - { bad: "gross receipts", good: "Money In (7 days)" }
    every_widget_includes: "What should I do?"
  color_structure:
    callout_role: "panels"
    divider_role: "between panels"
    icons: "on callouts for quick scanning, body text plain"
  safety:
    write_lock_banner: "If write_lock is on, UI shows a big Locked banner"
    missing_views_fallback: "Widget becomes Repair instructions block, not blank"

brands:
  - brand_key: "fulldigital"
    name: "Full Digital"
    role: "parent"
  - brand_key: "cutmv"
    name: "CUTMV"
    role: "child"
    parent_brand: "fulldigital"

