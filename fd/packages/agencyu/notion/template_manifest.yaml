        target: brands
        required: false
      hq_page:
        type: url
        required: false
      is_parent_org:
        type: checkbox
        required: true
      primary_domain:
        type: url
        required: false
      default_currency:
        type: select
        options:
          - USD
          - CAD
        required: false
      default_timezone:
        type: select
        options:
          - America/New_York
          - America/Chicago
          - America/Los_Angeles
        required: false
      notes:
        type: rich_text
        required: false
      system_managed:
        type: checkbox
        required: true
    required_views:
      - All Brands

  system_settings:
    title: "System Settings"
