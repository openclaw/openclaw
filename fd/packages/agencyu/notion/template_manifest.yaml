      purpose: "At-a-glance KPI strip — leads, calls, sales, revenue, ad spend"
      required_view_keys:
        - "cc.active_combos"
        - "cc.pipeline_quality"
        - "cc.finance_snapshot"
    - widget_key: "cc.pipeline"
      title: "Pipeline"
      purpose: "CRM pipeline stage counts and conversion metrics"
      required_view_keys:
        - "cc.pipeline_quality"
        - "meetings.showed_7d"
    - widget_key: "cc.cash"
      title: "Cash & Profit"
      purpose: "Revenue, spend, profit, outstanding invoices, CAC"
      required_view_keys:
        - "cc.finance_snapshot"
    - widget_key: "cc.calendar"
      title: "Meetings"
      purpose: "Today's call schedule — booked, showed, no-shows"
      required_view_keys:
        - "meetings.showed_7d"
    - widget_key: "cc.alerts"
      title: "Alerts"
      purpose: "System and business alerts needing attention"
      required_view_keys: []
    - widget_key: "cc.projects"
