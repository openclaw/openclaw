# shadow_targets.yaml — 影子情報目標清單
# 奈良第一輪圓桌定案 2026-03-22
# 觀測頻率: daily / 4h / hourly / on_scan (patrol 順帶)
# 自動化: auto (RSS/API) / semi (Threads scan) / manual (人工)

targets:
