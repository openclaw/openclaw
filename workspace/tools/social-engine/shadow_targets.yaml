    handle: bill.tai1
    general: buddha
    category: ally
    reason: "留言質量極高（無人機+台積電產能），真正在思考的人"
    frequency: on_scan
    automation: semi
    watch_for: ["長文留言", "數據論點", "反駁我們的觀點"]

  twreporter_rss:
