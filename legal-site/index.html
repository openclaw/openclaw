<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AskTenant Legal</title>
    <style>
      :root {
        --bg: #f7f7f5;
        --ink: #1a1a1a;
        --muted: #555;
        --link: #0b5fff;
        --card: #ffffff;
        --border: #e5e7eb;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
      }
      ul {
        margin: 0;
        padding-left: 20px;
      }
      li {
        margin: 8px 0;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>AskTenant / UnitIQ Legal Pages</h1>
        <p>Public legal documents for messaging and service use.</p>
        <ul>
          <li><a href="/privacy-policy">Privacy Policy</a></li>
          <li><a href="/terms-and-conditions">Terms and Conditions</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
