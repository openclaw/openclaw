# Cloud Build pipeline for the openclaw fork.
# Pulls the published upstream slim image (pinned inside Dockerfile.fork) and
# layers a fork overlay on top to add common CLIs (gh, lark-cli, gcloud;
# git is already present in the upstream runtime), boots the gateway in the
# just-built image as a smoke check, and only then publishes to Artifact
# Registry repos in us-central1 and asia-east2 (Hong Kong). A failed smoke
# check fails the build before push, so broken images never reach the
# registry's moving tags.
#
# Triggered by pushes to the `dev` (openclaw-dev) and `main` (openclaw-prod)
# branches, or manually with `_OPENCLAW_RELEASE_VERSION` set to an official
# OpenClaw release such as `2026.5.4` or `v2026.5.4`. The image is tagged with
# that pinned upstream release version, the short commit SHA, and the selected
# branch/tag/sha ref so consumers can pin to whichever level of stability they
# want.

steps:
  - id: read-version
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        VERSION="${_OPENCLAW_RELEASE_VERSION}"
        VERSION="$${VERSION#v}"
        if [ -z "$$VERSION" ]; then
          echo "Failed to read pinned upstream release version" >&2
          exit 1
        fi
        case "$$VERSION" in
          [0-9]*.[0-9]*.[0-9]* | [0-9]*.[0-9]*.[0-9]*-*)
            ;;
          *)
            echo "Invalid OpenClaw release version: $$VERSION" >&2
            exit 1
            ;;
        esac
        REF_TAG="${BRANCH_NAME}${TAG_NAME}"
        if [ -z "$$REF_TAG" ]; then
          REF_TAG="${SHORT_SHA}"
        fi
        REF_TAG="$$(printf '%s' "$$REF_TAG" | tr -c 'A-Za-z0-9_.-' '-')"
        echo "VERSION=$$VERSION" > /workspace/env.sh
        echo "REF_TAG=$$REF_TAG" >> /workspace/env.sh
        echo "Building openclaw fork from official v$$VERSION (sha=${SHORT_SHA}, ref=$$REF_TAG)"

  - id: build-fork
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env:
      - DOCKER_BUILDKIT=1
    args:
      - -ceu
      - |
        source /workspace/env.sh
        # BASE_IMAGE is pinned to the latest official release tag. Dockerfile.fork
        # has a matching default for local `docker build` without this flag.
        docker build \
          --platform=linux/amd64 \
          --build-arg BASE_IMAGE=ghcr.io/openclaw/openclaw:$$VERSION-slim \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:v$$VERSION \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${SHORT_SHA} \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:$$REF_TAG \
          -t asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:v$$VERSION \
          -t asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${SHORT_SHA} \
          -t asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:$$REF_TAG \
          -f Dockerfile.fork \
          .

  - id: smoke
    name: us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${SHORT_SHA}
    entrypoint: bash
    env:
      - HOME=/home/node
    args:
      - -ceu
      - |
        echo "=== CLIs ==="
        # Wrap each CLI in `timeout` so a hung binary (e.g. waiting on stdin
        # or a slow registry lookup) fails the smoke step quickly instead of
        # burning the build's whole timeout window.
        timeout 10 git --version
        timeout 10 gh --version | head -1
        timeout 30 lark-cli --version
        timeout 30 gcloud --version | head -1
        timeout 10 ffmpeg -version | head -1
        echo
        echo "=== Boot gateway ==="
        # Run gateway directly (no pipeline) so $! is the node PID, not tee's.
        # SIGKILL is required: the gateway intercepts SIGTERM as a soft-reload
        # signal and won't exit, which would hang the build forever.
        node /app/openclaw.mjs gateway --allow-unconfigured > /tmp/gw.log 2>&1 &
        gw_pid=$$!
        ok=0
        for i in $$(seq 1 180); do
          if curl -fsS http://127.0.0.1:18789/healthz 2>/dev/null; then
            echo
            echo "GATEWAY HEALTHY after $${i}s"
            ok=1
            break
          fi
          sleep 1
        done
        kill -9 $$gw_pid 2>/dev/null || true
        if [ "$$ok" -ne 1 ]; then
          echo "=== Gateway log (last 80 lines) ==="
          tail -80 /tmp/gw.log
          exit 1
        fi

  - id: push-us-central1
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw

  - id: push-asia-east2
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY

timeout: 7200s

substitutions:
  _OPENCLAW_RELEASE_VERSION: "2026.5.4"
