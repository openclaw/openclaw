# Cloud Build pipeline for the openclaw fork.
# Builds the upstream Docker image, layers a fork overlay (Dockerfile.fork)
# on top to add common CLIs (gh, lark-cli; git is already present in the
# upstream runtime), boots the gateway in the just-built image as a smoke
# check, and only then publishes to Artifact Registry repos in us-central1
# and asia-east2 (Hong Kong). A failed smoke check fails the build before
# push, so broken images never reach the registry's moving tags.
#
# Triggered by pushes to the `dev` (openclaw-dev) and `main` (openclaw-prod)
# branches. The image is tagged with the upstream version from package.json,
# the short commit SHA, and the branch name so consumers can pin to whichever
# level of stability they want.

steps:
  - id: read-version
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        VERSION=$(grep -m1 '"version"' package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
        if [ -z "$$VERSION" ]; then
          echo "Failed to read version from package.json" >&2
          exit 1
        fi
        echo "VERSION=$$VERSION" > /workspace/env.sh
        echo "Building openclaw v$$VERSION (sha=${SHORT_SHA}, branch=${BRANCH_NAME})"

  - id: build-base
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env:
      - DOCKER_BUILDKIT=1
    args:
      - -ceu
      - |
        docker build \
          --platform=linux/amd64 \
          --build-arg OPENCLAW_VARIANT=slim \
          -t openclaw-base:${SHORT_SHA} \
          -f Dockerfile \
          .

  - id: build-fork
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env:
      - DOCKER_BUILDKIT=1
    args:
      - -ceu
      - |
        source /workspace/env.sh
        docker build \
          --platform=linux/amd64 \
          --build-arg BASE_IMAGE=openclaw-base:${SHORT_SHA} \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:v$$VERSION \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${SHORT_SHA} \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${BRANCH_NAME} \
          -t asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:v$$VERSION \
          -t asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${SHORT_SHA} \
          -t asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${BRANCH_NAME} \
          -f Dockerfile.fork \
          .

  - id: smoke
    name: us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw:${SHORT_SHA}
    entrypoint: bash
    env:
      - HOME=/home/node
    args:
      - -ceu
      - |
        echo "=== CLIs ==="
        git --version
        gh --version | head -1
        lark-cli --version
        gcloud --version | head -1
        echo
        echo "=== Boot gateway ==="
        # Run gateway directly (no pipeline) so $! is the node PID, not tee's.
        # SIGKILL is required: the gateway intercepts SIGTERM as a soft-reload
        # signal and won't exit, which would hang the build forever.
        node /app/openclaw.mjs gateway --allow-unconfigured > /tmp/gw.log 2>&1 &
        gw_pid=$$!
        ok=0
        for i in $$(seq 1 90); do
          if curl -fsS http://127.0.0.1:18789/healthz 2>/dev/null; then
            echo
            echo "GATEWAY HEALTHY after $${i}s"
            ok=1
            break
          fi
          sleep 1
        done
        kill -9 $$gw_pid 2>/dev/null || true
        if [ "$$ok" -ne 1 ]; then
          echo "=== Gateway log (last 80 lines) ==="
          tail -80 /tmp/gw.log
          exit 1
        fi

  - id: push-us-central1
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw

  - id: push-asia-east2
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-east2-docker.pkg.dev/$PROJECT_ID/openclaw/openclaw

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY

timeout: 7200s
