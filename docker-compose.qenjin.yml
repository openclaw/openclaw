# OpenBodhi — Qenjin Agent (CX43 Hetzner)
# NemoClaw pattern: OpenClaw + NVIDIA API (Nemotron) — no local GPU required
#
# Deploy via Dokploy:
#   1. Create new Compose app named "qenjin-openclaw"
#   2. Paste this file
#   3. Set all env vars in Dokploy → Environment
#   4. Deploy
#
# Required env vars (set in Dokploy → Environment):
#   TELEGRAM_BOT_TOKEN        — Qenjin's dedicated bot token (NOT @openbodhibot, NOT bodhi1 token)
#   QENJIN_TELEGRAM_USER_ID   — your Telegram numeric user ID
#   NVIDIA_API_KEY            — api.nvidia.com key (NemoClaw auth)
#   ANTHROPIC_API_KEY         — fallback for complex synthesis tasks
#   TWENTY_API_KEY            — crm.huda20.fun Bearer token
#   OPENROUTER_API_KEY        — free-tier fallback models

services:
  qenjin:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: qenjin-openclaw
    restart: unless-stopped

    environment:
      # ── Bot identity ───────────────────────────────────────────────────────
      TELEGRAM_BOT_TOKEN:       "${TELEGRAM_BOT_TOKEN}"
      BODHI_TELEGRAM_USER_ID:   "${QENJIN_TELEGRAM_USER_ID}"

      # ── Model routing (NemoClaw pattern) ──────────────────────────────────
      # Primary: NVIDIA Nemotron via api.nvidia.com
      NVIDIA_API_KEY:           "${NVIDIA_API_KEY}"
      # Fallback: Anthropic (synthesis, complex reasoning)
      ANTHROPIC_API_KEY:        "${ANTHROPIC_API_KEY}"
      OPENROUTER_API_KEY:       "${OPENROUTER_API_KEY}"

      # ── Qenjin tools ──────────────────────────────────────────────────────
      TWENTY_API_KEY:           "${TWENTY_API_KEY}"

      # ── Config path ───────────────────────────────────────────────────────
      OPENCLAW_CONFIG:          "/app/config/openclaw.qenjin.json"

      # ── NemoClaw policy flags ──────────────────────────────────────────────
      # Route PII through local path (future: Ollama sidecar if GPU added)
      NEMOCLAW_PRIVACY_ROUTER:  "enabled"
      NEMOCLAW_AUDIT_LOG:       "/app/data/audit.jsonl"

    volumes:
      # Config (read-only)
      - type: bind
        source: ./docs/qenjin/openclaw.qenjin.json
        target: /app/config/openclaw.qenjin.json
        read_only: true

      # Skills (read-only)
      - type: bind
        source: ./skills
        target: /app/skills
        read_only: true

      # Souls (read-only)
      - type: bind
        source: ./souls
        target: /app/souls
        read_only: true

      # Persistent data — EXTERNAL volume, Dokploy-managed
      # Name matches Dokploy project prefix to prevent silent data loss
      - qenjin-openclaw-data:/app/data

    networks:
      - qenjin-net
      # Share with existing n8n/CRM stack for internal service calls
      - hetzner-proxy

    labels:
      # Traefik routing (dashboard only — bot runs via Telegram polling)
      - "traefik.enable=true"
      - "traefik.http.routers.qenjin-health.rule=Host(`qenjin-agent.huda20.fun`)"
      - "traefik.http.routers.qenjin-health.entrypoints=websecure"
      - "traefik.http.routers.qenjin-health.tls.certresolver=letsencrypt"
      - "traefik.http.services.qenjin-health.loadbalancer.server.port=3000"

    # Resource limits — CX43 is shared, protect other services
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

volumes:
  qenjin-openclaw-data:
    external: true
    name: qenjin-openclaw_qenjin-openclaw-data

networks:
  qenjin-net:
    driver: bridge
  hetzner-proxy:
    external: true
    name: hetzner-proxy
