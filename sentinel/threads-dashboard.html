<body>
<h1>末日賽局 Threads War Room</h1>
<div id="timestamp" class="timestamp"></div>

<div class="grid" id="dashboard">
  <div class="card">
    <div class="card-title">Coverage Rate</div>
    <div class="big-number green" id="coverage-rate">--</div>
    <div id="coverage-detail" class="dim"></div>
    <div class="bar"><div class="bar-fill green" id="coverage-bar" style="width:0%;background:#00ff88"></div></div>
  </div>
  <div class="card">
    <div class="card-title">Subscribers (5+ interactions)</div>
    <div class="big-number cyan" id="sub-count">--</div>
    <div id="sub-breakdown" class="dim"></div>
  </div>
  <div class="card">
    <div class="card-title">24h Activity</div>
    <div class="big-number yellow" id="recent-count">--</div>
    <div class="dim">new comments</div>
  </div>
  <div class="card">
    <div class="card-title">Recruitment Signals</div>
    <div class="big-number" id="recruit-count" style="color:#ffd700">--</div>
    <div id="recruit-list" class="dim"></div>
  </div>
</div>

<h2>Conversion Funnel</h2>
<div class="card">
  <div class="funnel" id="funnel"></div>
</div>

<h2>Topic Distribution</h2>
<div class="card" id="topics-card"></div>

<h2>Top Subscribers</h2>
<div class="card">
  <table>
    <thead><tr><th>User</th><th>Tier</th><th>Stance</th><th>Depth</th><th>Topics</th><th>Signal</th></tr></thead>
    <tbody id="sub-table"></tbody>
  </table>
</div>

<h2>Posts</h2>
<div class="card">
  <table>
    <thead><tr><th>Post</th><th>Comments</th><th>Date</th></tr></thead>
    <tbody id="posts-table"></tbody>
  </table>
</div>

<script>
const DATA_URL = '/threads-data';

async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('fetch failed');
    return await resp.json();
  } catch {
    // Fallback: try loading from embedded data
    if (window.__THREADS_DATA) return window.__THREADS_DATA;
    // Try relative path
    try {
      const resp2 = await fetch('../workspace/tools/threads-reply/dashboard-data.json');
      return await resp2.json();
    } catch { return null; }
  }
}

function tagHTML(topic) {
  return `<span class="tag tag-${topic}">${topic}</span>`;
}

function render(data) {
  if (!data) { document.body.innerHTML = '<h1 style="color:red">No data</h1>'; return; }

  document.getElementById('timestamp').textContent = `Last update: ${data.generated_at}`;

  // Coverage
  const c = data.coverage;
  document.getElementById('coverage-rate').textContent = c.rate + '%';
  document.getElementById('coverage-detail').textContent = `${c.sent} / ${c.total} sent | ${c.failed} failed`;
  document.getElementById('coverage-bar').style.width = c.rate + '%';

  // Subscribers
  const subs = data.subscribers;
  document.getElementById('sub-count').textContent = subs.count;
  const tiers = data.tiers || {};
  document.getElementById('sub-breakdown').textContent =
    `A:${tiers.A||0} B:${tiers.B||0} C:${tiers.C||0} S:${tiers.S||0}`;

  // 24h
  document.getElementById('recent-count').textContent = data.recent_24h;

  // Recruitment
  const recruits = subs.list.filter(s => s.recruit);
  document.getElementById('recruit-count').textContent = recruits.length;
  document.getElementById('recruit-list').innerHTML = recruits.map(r =>
    `<div>@${r.username}: ${r.recruit}</div>`
  ).join('');

  // Funnel
  const stanceData = data.stance || {};
  const funnelSteps = [
    { label: 'Total', value: Object.values(stanceData).reduce((a,b)=>a+b, 0) || data.coverage.total, color: '#444' },
    { label: 'Neutral', value: stanceData.neutral || 0, color: '#4488ff' },
    { label: 'Pro', value: stanceData.pro || 0, color: '#00ff88' },
    { label: 'Analytical', value: stanceData.analytical || 0, color: '#00ccff' },
    { label: 'Recruited', value: recruits.length, color: '#ffd700' },
  ];
  const maxVal = Math.max(...funnelSteps.map(s => s.value), 1);
  document.getElementById('funnel').innerHTML = funnelSteps.map(s => {
    const h = Math.max(20, (s.value / maxVal) * 120);
    return `<div class="funnel-step">
      <div class="funnel-value" style="color:${s.color}">${s.value}</div>
      <div class="funnel-bar" style="height:${h}px;background:${s.color}"></div>
      <div class="funnel-label">${s.label}</div>
    </div>`;
  }).join('');

  // Topics
  const topics = data.topics || {};
  const maxTopic = Math.max(...Object.values(topics), 1);
  document.getElementById('topics-card').innerHTML = Object.entries(topics).map(([t, c]) => {
    const w = (c / maxTopic) * 100;
    return `<div style="display:flex;align-items:center;margin:4px 0">
      <span style="width:100px">${tagHTML(t)}</span>
      <div style="flex:1;height:14px;background:#1a1a1a;border-radius:3px;overflow:hidden">
        <div style="width:${w}%;height:100%;border-radius:3px" class="tag-${t}"></div>
      </div>
      <span style="width:30px;text-align:right;color:#888">${c}</span>
    </div>`;
  }).join('');

  // Subscribers table
  document.getElementById('sub-table').innerHTML = subs.list.slice(0, 20).map(s => {
    const tierClass = `tier-${s.tier}`;
    return `<tr>
      <td>@${s.username}</td>
      <td class="${tierClass}">${s.tier}</td>
      <td>${s.stance}</td>
      <td>${s.depth}</td>
      <td>${s.topics.map(tagHTML).join('')}</td>
      <td>${s.recruit ? `<span class="recruit">${s.recruit}</span>` : ''}</td>
    </tr>`;
  }).join('');

  // Posts table
  document.getElementById('posts-table').innerHTML = (data.posts || []).map(p =>
    `<tr><td>${p.text}</td><td>${p.comments}</td><td class="timestamp">${(p.posted_at||'').slice(0,16)}</td></tr>`
  ).join('');
}

loadData().then(render);
// Auto-refresh every 5 minutes
setInterval(() => loadData().then(render), 300000);
</script>
</body>
