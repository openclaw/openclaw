timezone: Asia/Taipei
tasks:
  nightly_ops: { schedule: "02:00", enabled: true }
  morning_brief: { schedule: "07:00", enabled: true, ai_model: "claude-haiku-4-5-20251001" }
  anomaly_scan: { schedule: "every 4h", enabled: true, ai_threshold: 3 }
  weekly_review: { schedule: "sunday 10:00", enabled: true, ai_model: "claude-sonnet-4-5-20250514" }
  conversation_watcher: { schedule: "every 1m", enabled: true }
  conversation_sync: { schedule: "every 30m", enabled: true }
  conversation_pulse: { schedule: "every 15m", enabled: true }
  agent_health: { schedule: "every 1h", enabled: true }
  gateway_watchdog: { schedule: "every 5m", enabled: true }
  db_sync: { schedule: "03:00", enabled: true }
  db_archive: { schedule: "sunday 04:00", enabled: true }
  vivi_learning: { schedule: "every 1h", enabled: true }
  hr_payroll: { schedule: "09:00", enabled: true }
  river_digest: { schedule: "every 4h", enabled: true }
  matomo_health: { schedule: "every 1h", enabled: true }
  # data_puzzles: 已遷移到 OpenClaw cron (jobs.json)，不再由 Sentinel 排程
  memory_consolidation: { schedule: "02:30", enabled: true }
  memory_tower_nightly: { schedule: "00:00", enabled: true }
  session_digest: { schedule: "23:30", enabled: true }
  threads_sync: { schedule: "every 6h", enabled: true }
  thinker_news: { schedule: "06:50", enabled: true }
  threads_patrol: { schedule: "07:00", enabled: true }
  hormone_eval: { schedule: "every 15m", enabled: true }
  content_brain_pulse: { schedule: "07:10", enabled: true }
  product_watchdog: { schedule: "every 1h", enabled: true }
notifications:
  telegram_bridge: "http://localhost:18796"
  cruz_chat_id: "448345880"
  quiet_hours: ["00:00", "06:00"]
claude:
  api_key_env: "ANTHROPIC_API_KEY"
  max_daily_calls: 20

# ── Flap auto-repair: Layer 2 (AI diagnosis) ──
flap_repair:
  ai_enabled: true
  model: "haiku"
  max_budget_usd: 0.05
  timeout_sec: 120
  cooldown_sec: 3600
  allowed_tools: "Bash Read Edit Glob Grep"
paths:
  workspace: "/Users/sulaxd/clawd/workspace"
prune:
  memory_days: 30
  cross_digest_days: 14
  logs_days: 7

# ── Sentinel v2: desired state declaration ──
desired_state:
  services:
    openclaw-gateway:
      label: ai.openclaw.gateway
      port: 18789
      health: { type: http, url: "http://localhost:18789/health", timeout: 5 }
      repair: { risk: low, method: kickstart, backoff: 15, cap: 300, max_retries: 10 }

    bridge-dufu:
      label: com.clawd.telegram-bridge
      port: 18796
      health: { type: http, url: "http://localhost:18796/health", timeout: 5 }
      repair: { risk: low, method: kickstart, backoff: 15, cap: 300, max_retries: 10 }

    bridge-andrew:
      label: com.clawd.telegram-bridge-andrew
      port: 18795
      health: { type: http, url: "http://localhost:18795/health", timeout: 5 }
      repair: { risk: low, method: kickstart, backoff: 15, cap: 300, max_retries: 10 }

    cloudflare-tunnel:
      label: com.cloudflare.clawd-line
      health: { type: process }
      repair: { risk: low, method: kickstart, backoff: 30, cap: 300, max_retries: 5 }

    line-bot-b:
      label: ai.openclaw.line-b
      health: { type: process }
      repair: { risk: med, method: kickstart }

  configs:
    openclaw-main:
      path: "~/.openclaw/openclaw.json"
      validators: [json_parse, { key_exists: gateway }, { key_exists: agents }]
      on_invalid: { risk: med, action: rollback }

    openclaw-line-b:
      path: "~/.openclaw-line-b/openclaw.json"
      validators: [json_parse, { key_exists: gateway }]
      on_invalid: { risk: med, action: rollback }

    telegram-bridge:
      path: "~/clawd/skills/telegram-userbot/config.json"
      validators: [json_parse, { key_exists: telegram }]
      on_invalid: { risk: med, action: rollback }

    cloudflared:
      path: "~/.cloudflared/config.yml"
      validators: [yaml_parse, { key_exists: tunnel }]
      on_invalid: { risk: high, action: notify }

  system:
    disk_warn_pct: 80
    disk_crit_pct: 90
    swap_crit_mb: 2000
    cpu_hog_pct: 95
