# fly.toml app configuration file generated for openclaw-thor on 2026-03-25T02:48:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'openclaw-thor'
primary_region = 'iad'

[build]

[processes]
  # Override the default CMD so the gateway listens on 0.0.0.0:3000.
  # --bind lan   → listen on 0.0.0.0 (required for Fly.io proxy to reach the app)
  # --port 3000  → match internal_port below
  # --auth trusted-proxy → Fly.io's proxy layer is the auth boundary; skips the
  #                        "non-loopback bind requires auth" guard
  app = "node openclaw.mjs gateway --allow-unconfigured --bind lan --port 3000 --auth trusted-proxy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
