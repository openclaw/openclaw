name: Mullusi
options:
  bundleIdPrefix: ai.mullusi
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  MullusiKit:
    path: ../shared/MullusiKit
  Swabble:
    path: ../../Swabble

schemes:
  Mullusi:
    shared: true
    build:
      targets:
        Mullusi: all
    test:
      targets:
        - MullusiTests
        - MullusiLogicTests
  MullusiLogicTests:
    shared: true
    build:
      targets:
        MullusiLogicTests: all
    test:
      targets:
        - MullusiLogicTests

targets:
  Mullusi:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: MullusiShareExtension
        embed: true
      - target: MullusiActivityWidget
        embed: true
      - target: MullusiWatchApp
      - package: MullusiKit
      - package: MullusiKit
        product: MullusiChatUI
      - package: MullusiKit
        product: MullusiProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Mullusi.entitlements
        CODE_SIGN_STYLE: "$(MULLUSI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MULLUSI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MULLUSI_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MULLUSI_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          MULLUSI_PUSH_TRANSPORT: direct
          MULLUSI_PUSH_DISTRIBUTION: local
          MULLUSI_PUSH_RELAY_BASE_URL: ""
          MULLUSI_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          MULLUSI_PUSH_TRANSPORT: direct
          MULLUSI_PUSH_DISTRIBUTION: local
          MULLUSI_PUSH_RELAY_BASE_URL: ""
          MULLUSI_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Mullusi
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.mullusi.ios
            CFBundleURLSchemes:
              - mullusi
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.mullusi.ios.bgrefresh
        NSLocalNetworkUsageDescription: Mullusi discovers and connects to your Mullusi gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _mullusi-gw._tcp
        NSCameraUsageDescription: Mullusi can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Mullusi uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Mullusi can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Mullusi needs microphone access for voice wake.
        NSMotionUsageDescription: Mullusi may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Mullusi needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Mullusi uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        MullusiPushTransport: "$(MULLUSI_PUSH_TRANSPORT)"
        MullusiPushDistribution: "$(MULLUSI_PUSH_DISTRIBUTION)"
        MullusiPushRelayBaseURL: "$(MULLUSI_PUSH_RELAY_BASE_URL)"
        MullusiPushAPNsEnvironment: "$(MULLUSI_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  MullusiShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: MullusiKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MULLUSI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MULLUSI_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(MULLUSI_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MULLUSI_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Mullusi Share
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  MullusiActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/MullusiActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MULLUSI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MULLUSI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MULLUSI_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Mullusi Activity
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  MullusiWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: MullusiWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(MULLUSI_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Mullusi
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(MULLUSI_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  MullusiWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(MULLUSI_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Mullusi
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(MULLUSI_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  MullusiTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Mullusi
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MULLUSI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MULLUSI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.mullusi.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mullusi.app/Mullusi"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: MullusiTests
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"

  MullusiLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: MullusiKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MULLUSI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MULLUSI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.mullusi.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: MullusiLogicTests
        CFBundleShortVersionString: "$(MULLUSI_MARKETING_VERSION)"
        CFBundleVersion: "$(MULLUSI_BUILD_VERSION)"
