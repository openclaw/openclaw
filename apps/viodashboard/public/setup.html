<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VioDashboard Setup</title>
  <link rel="stylesheet" href="/styles.css?v=9" />
  <style>
    /* Setup-specific layout */
    .setup-page {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 48px;
      font-family: var(--font-mono, monospace);
    }

    .setup-header {
      margin-bottom: 28px;
    }

    .setup-back {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--color-text-dim, #888);
      text-decoration: none;
    }
    .setup-back:hover { color: var(--color-text, #ccc); }

    .setup-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text, #eee);
      margin: 0 0 6px;
    }

    .setup-subtitle {
      font-size: 12px;
      color: var(--color-text-dim, #888);
      margin: 0;
    }

    /* Summary bar */
    .setup-summary {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: var(--color-card-bg, #1a1a1a);
      border: 1px solid var(--color-border, #333);
      border-radius: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .setup-summary-status {
      font-size: 13px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-ready    { background: #1a3a1a; color: #5dcc5d; border: 1px solid #2a5a2a; }
    .status-incomplete { background: #2a2a14; color: #cccc44; border: 1px solid #4a4a22; }
    .status-blocked  { background: #3a1414; color: #cc4444; border: 1px solid #5a2222; }
    .status-error    { background: #3a0a0a; color: #ff4444; border: 1px solid #6a1a1a; }

    .setup-summary-counts {
      font-size: 12px;
      color: var(--color-text-dim, #888);
    }

    .setup-summary-counts strong { color: var(--color-text, #eee); }

    .setup-summary-blocking {
      font-size: 12px;
      color: #cc6644;
    }

    .setup-refresh-btn {
      margin-left: auto;
      font-size: 11px;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--color-border, #333);
      color: var(--color-text-dim, #888);
      border-radius: 4px;
      cursor: pointer;
    }
    .setup-refresh-btn:hover { color: var(--color-text, #eee); border-color: #555; }

    /* Next action spotlight */
    .setup-next {
      padding: 12px 16px;
      background: #141e2a;
      border: 1px solid #1e3a5a;
      border-radius: 6px;
      margin-bottom: 24px;
      font-size: 12px;
    }

    .setup-next-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5588bb;
      margin-bottom: 4px;
    }

    .setup-next-title {
      font-size: 13px;
      font-weight: 600;
      color: #88ccee;
    }

    /* Step list */
    .setup-steps { display: flex; flex-direction: column; gap: 14px; }

    .setup-step {
      padding: 16px 18px;
      background: var(--color-card-bg, #1a1a1a);
      border: 1px solid var(--color-border, #333);
      border-radius: 6px;
    }

    .setup-step.is-complete { border-color: #2a4a2a; }
    .setup-step.is-missing,
    .setup-step.is-blocked  { border-color: #4a2a2a; }
    .setup-step.is-warning  { border-color: #3a3a1a; }
    .setup-step.is-error    { border-color: #5a1a1a; }

    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .step-index {
      font-size: 10px;
      color: var(--color-text-dim, #888);
      min-width: 18px;
    }

    .step-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .badge-complete  { background: #1a3a1a; color: #5dcc5d; }
    .badge-missing   { background: #3a1a1a; color: #cc4444; }
    .badge-warning   { background: #2a2a10; color: #bbbb44; }
    .badge-blocked   { background: #3a1a2a; color: #cc4488; }
    .badge-error     { background: #3a0a0a; color: #ff4444; }
    .badge-ready     { background: #1a2a3a; color: #44aacc; }

    .step-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text, #eee);
    }

    .step-message {
      font-size: 12px;
      color: var(--color-text-dim, #aaa);
      margin-bottom: 10px;
      padding-left: 28px;
    }

    /* Evidence block */
    .step-evidence {
      margin: 8px 0 10px 28px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px 12px;
    }

    .step-evidence summary {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      cursor: pointer;
      user-select: none;
    }
    .step-evidence summary:hover { color: #999; }

    .evidence-table {
      margin-top: 8px;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 3px 12px;
      font-size: 11px;
    }

    .evidence-key { color: #888; }
    .evidence-val { color: #ccc; word-break: break-all; }
    .evidence-val.is-true  { color: #5dcc5d; }
    .evidence-val.is-false { color: #cc4444; }

    /* Recommended actions */
    .step-actions {
      margin-left: 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .step-actions-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin-bottom: 2px;
    }

    .action-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
    }

    .action-kind {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 3px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .kind-command { background: #1a2a1a; color: #5daa5d; border: 1px solid #2a4a2a; }
    .kind-note    { background: #1a1a2a; color: #5588bb; border: 1px solid #2a2a4a; }
    .kind-link    { background: #2a1a2a; color: #aa55bb; border: 1px solid #4a2a4a; }

    .action-command {
      font-family: var(--font-mono, monospace);
      color: #ccc;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 3px 8px;
      font-size: 11px;
      flex: 1;
      user-select: all;
    }

    .action-label {
      font-size: 11px;
      color: var(--color-text-dim, #888);
      flex-shrink: 0;
    }

    /* Quick action bar */
    .setup-action-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--color-card-bg, #1a1a1a);
      border: 1px solid var(--color-border, #333);
      border-radius: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .setup-action-bar-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      flex-shrink: 0;
    }

    .action-run-btn {
      font-size: 11px;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid #334;
      color: #88aacc;
      border-radius: 4px;
      cursor: pointer;
    }
    .action-run-btn:hover { border-color: #557; color: #aaccee; }
    .action-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Action result box */
    .action-result-box {
      padding: 10px 14px;
      background: #0e1218;
      border: 1px solid #1e3a5a;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 11px;
      font-family: var(--font-mono, monospace);
    }

    .action-result-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5588bb;
      margin-bottom: 6px;
    }

    .action-result-output {
      color: #aaccaa;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .action-result-error { color: #cc4444; }
    .action-result-note  { color: #888; font-style: italic; }

    /* Loading / error states */
    .setup-loading, .setup-error-msg {
      padding: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--color-text-dim, #888);
    }

    .setup-error-msg { color: #cc4444; }

    .setup-last-updated {
      font-size: 11px;
      color: #555;
      margin-top: 20px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <header class="topbar card cyan">
      <div class="topbar-main">
        <div class="brand">
          <div class="brand-mark">V</div>
          <div class="brand-text">
            <h1>Vio Dashboard</h1>
            <p>Setup readiness</p>
          </div>
        </div>
        <div class="topbar-right">
          <a class="chip state-idle" href="/" style="text-decoration:none">← Dashboard</a>
        </div>
      </div>
    </header>

    <div class="setup-page">
      <div class="setup-header">
        <p class="setup-title">Setup State</p>
        <p class="setup-subtitle">
          Deployment readiness check &mdash; evaluations are local. Low-risk actions available below.
        </p>
      </div>

      <div class="setup-action-bar">
        <span class="setup-action-bar-label">Actions</span>
        <button class="action-run-btn" id="btnBootstrapPreview">Preview bootstrap</button>
        <button class="action-run-btn" id="btnWrapperReload">Restart dashboard service</button>
      </div>

      <div id="actionResult" style="display:none"></div>

      <div id="setupContent">
        <div class="setup-loading">Loading setup state&hellip;</div>
      </div>

      <div class="setup-last-updated" id="setupLastUpdated"></div>
    </div>
  </div>

  <script>
    const content = document.getElementById('setupContent');
    const lastUpdated = document.getElementById('setupLastUpdated');

    function statusClass(status) {
      return 'is-' + (status || 'unknown');
    }

    function badgeClass(status) {
      return 'badge-' + (status || 'unknown');
    }

    function summaryStatusClass(status) {
      return 'status-' + (status || 'incomplete');
    }

    function escHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderEvidence(evidence) {
      if (!evidence || typeof evidence !== 'object') { return ''; }
      const rows = Object.entries(evidence).map(([k, v]) => {
        let valClass = 'evidence-val';
        if (v === true) { valClass += ' is-true'; }
        else if (v === false) { valClass += ' is-false'; }
        return `<div class="evidence-key">${escHtml(k)}</div><div class="${valClass}">${escHtml(String(v ?? 'null'))}</div>`;
      }).join('');
      return `
        <details class="step-evidence">
          <summary>Evidence</summary>
          <div class="evidence-table">${rows}</div>
        </details>`;
    }

    function renderActions(actions) {
      if (!Array.isArray(actions) || actions.length === 0) { return ''; }
      const rows = actions.map(a => `
        <div class="action-row">
          <span class="action-kind kind-${escHtml(a.kind || 'note')}">${escHtml(a.kind || 'note')}</span>
          <span class="action-label">${escHtml(a.label || '')}</span>
          <code class="action-command">${escHtml(a.command || '')}</code>
        </div>`).join('');
      return `
        <div class="step-actions">
          <div class="step-actions-label">Recommended actions</div>
          ${rows}
        </div>`;
    }

    function renderStep(step, index) {
      const hasActions = Array.isArray(step.recommendedActions) && step.recommendedActions.length > 0;
      return `
        <div class="setup-step ${statusClass(step.status)}">
          <div class="step-header">
            <span class="step-index">${index + 1}.</span>
            <span class="step-badge ${badgeClass(step.status)}">${escHtml(step.status)}</span>
            <span class="step-title">${escHtml(step.title)}</span>
          </div>
          <div class="step-message">${escHtml(step.message || '')}</div>
          ${renderEvidence(step.evidence)}
          ${hasActions ? renderActions(step.recommendedActions) : ''}
        </div>`;
    }

    function renderNextStep(steps) {
      const next = steps.find(s => s.status !== 'complete' && s.blocking);
      if (!next) { return ''; }
      return `
        <div class="setup-next">
          <div class="setup-next-label">Next blocking step</div>
          <div class="setup-next-title">${escHtml(next.title)}</div>
        </div>`;
    }

    function render(data) {
      const s = data.summary;
      const blockingNote = s.blocking > 0
        ? `<span class="setup-summary-blocking">&nbsp;&middot;&nbsp;${s.blocking} blocking</span>`
        : '';

      const html = `
        <div class="setup-summary">
          <span class="setup-summary-status ${summaryStatusClass(s.status)}">${escHtml(s.status)}</span>
          <span class="setup-summary-counts">
            <strong>${s.completed}</strong> / ${s.total} steps complete
            ${blockingNote}
          </span>
          <button class="setup-refresh-btn" id="refreshBtn">Refresh</button>
        </div>
        ${renderNextStep(data.steps)}
        <div class="setup-steps">
          ${data.steps.map((step, i) => renderStep(step, i)).join('')}
        </div>`;

      content.innerHTML = html;
      document.getElementById('refreshBtn')?.addEventListener('click', load);
    }

    async function load() {
      try {
        const resp = await fetch('/api/setup/state');
        if (!resp.ok) { throw new Error(`HTTP ${resp.status}`); }
        const data = await resp.json();
        if (!data.ok) { throw new Error(data.error || 'API error'); }
        render(data);
        lastUpdated.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      } catch (err) {
        content.innerHTML = `<div class="setup-error-msg">Failed to load setup state: ${escHtml(String(err))}</div>`;
      }
    }

    function setActionBtnsDisabled(disabled) {
      document.querySelectorAll('.action-run-btn').forEach(b => { b.disabled = disabled; });
    }

    function showActionResult(actionId, data) {
      const resultBox = document.getElementById('actionResult');
      resultBox.style.display = 'block';
      let body;
      if (!data.ok) {
        body = `<div class="action-result-error">${escHtml(data.error || 'Unknown error')}</div>`;
      } else if (data.output && data.output.length > 0) {
        body = `<div class="action-result-output">${escHtml(data.output.join('\n'))}</div>`;
      } else if (data.message) {
        body = `<div class="action-result-note">${escHtml(data.message)}</div>`;
      } else {
        body = `<div class="action-result-note">Done.</div>`;
      }
      resultBox.innerHTML = `<div class="action-result-box"><div class="action-result-header">Action: ${escHtml(actionId)}</div>${body}</div>`;
    }

    async function runAction(actionId) {
      const resultBox = document.getElementById('actionResult');
      resultBox.style.display = 'block';
      resultBox.innerHTML = `<div class="action-result-box"><div class="action-result-header">Action: ${escHtml(actionId)}</div><div class="action-result-note">Running\u2026</div></div>`;
      setActionBtnsDisabled(true);
      try {
        const resp = await fetch('/api/setup/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: actionId }),
        });
        const data = await resp.json();
        showActionResult(actionId, data);
        // Refresh state after non-reload actions.
        if (actionId !== 'dashboard-service-restart') { await load(); }
      } catch (err) {
        resultBox.innerHTML = `<div class="action-result-box"><div class="action-result-header">Action: ${escHtml(actionId)}</div><div class="action-result-error">Request failed: ${escHtml(String(err))}</div></div>`;
      } finally {
        setActionBtnsDisabled(false);
      }
    }

    document.getElementById('btnBootstrapPreview')?.addEventListener('click', () => runAction('bootstrap-preview'));
    document.getElementById('btnWrapperReload')?.addEventListener('click', () => runAction('dashboard-service-restart'));

    load();
  </script>
</body>
</html>
