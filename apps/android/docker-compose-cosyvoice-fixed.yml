# CosyVoice TTS - Fixed Docker Compose
# Run on ub22: docker compose -f docker-compose-cosyvoice-fixed.yml up -d

name: cosyvoice

services:
  cosyvoice:
    image: pytorch/pytorch:2.5.0-cuda12.4-cudnn9-runtime
    restart: unless-stopped
    ports:
      - "10803:50000"
    volumes:
      - /home/an/CosyVoice:/opt/CosyVoice
      - cosyvoice-models:/opt/models
    environment:
      - PYTHONPATH=/opt/CosyVoice:/opt/CosyVoice/third_party/Matcha-TTS
      - PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
    working_dir: /opt/CosyVoice
    command: >
      bash -c '
      echo "=== Installing CosyVoice dependencies ==="

      # Step 1: Install fastapi and uvicorn first
      pip install fastapi==0.115.6 uvicorn==0.30.0

      # Step 2: Install core speech dependencies (skip webrtcsockets)
      pip install conformer==0.3.2 \
                  omegaconf==2.3.0 \
                  hydra-core==1.3.2 \
                  rich==13.7.1 \
                  soundfile==0.12.1 \
                  librosa==0.10.2 \
                  inflect==7.3.1 \
                  gdown==5.1.0 \
                  wget==3.2 \
                  --no-cache-dir

      # Step 3: Install ML dependencies
      pip install diffusers==0.29.0 \
                  transformers \
                  HyperPyYAML==1.2.3 \
                  matplotlib==3.7.5 \
                  networkx==3.1 \
                  numpy==1.26.4 \
                  protobuf==4.25 \
                  pyarrow==18.1.0 \
                  pydantic==2.7.0 \
                  pyworld==0.3.4 \
                  tensorboard==2.14.0 \
                  x-transformers==2.11.24 \
                  wetext==0.0.4 \
                  --no-cache-dir

      # Step 4: Install onnxruntime (try CUDA version first)
      pip install onnx==1.16.0 || true
      pip install onnxruntime-gpu==1.18.0 \
                  --extra-index-url https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/onnxruntime-cuda-12/pypi/simple/ \
                  || pip install onnxruntime==1.18.0 \
                  --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple/ \
                  || echo "onnxruntime install failed, continuing..."

      echo "=== Starting CosyVoice server ==="
      cd /opt/CosyVoice
      python runtime/python/fastapi/server.py --port 50000 --model_dir /opt/models
      '
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  cosyvoice-models:
