<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>ClaWorks Studio</title>
    <style>
      :root {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #0f172a;
        background: #f1f5f9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 1rem 1.5rem 3rem;
        max-width: 1280px;
        margin-inline: auto;
      }
      h1 {
        font-size: 1.3rem;
        margin: 0 0 0.15rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .sub {
        color: #64748b;
        font-size: 0.85rem;
        margin: 0 0 1rem;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .topbar-left {
        flex: 1;
      }
      .topbar-right {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      nav {
        display: flex;
        gap: 0.3rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      nav button {
        padding: 0.4rem 0.75rem;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
        transition: all 0.1s;
      }
      nav button:hover {
        background: #f8fafc;
      }
      nav button.active {
        background: #0284c7;
        color: #fff;
        border-color: #0369a1;
        font-weight: 600;
      }
      .panel {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .panel-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      input,
      select,
      textarea {
        padding: 0.35rem 0.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 13px;
      }
      select {
        cursor: pointer;
      }
      textarea {
        width: 100%;
        min-height: 80px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
      button.btn {
        padding: 0.4rem 0.9rem;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
      }
      button.btn-primary {
        background: #0284c7;
        color: #fff;
        border-color: #0369a1;
      }
      button.btn-primary:hover {
        background: #0369a1;
      }
      button.btn-sm {
        padding: 0.25rem 0.55rem;
        font-size: 12px;
      }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: 8px;
        overflow: auto;
        font-size: 11.5px;
        max-height: 500px;
        margin: 0;
        font-family: ui-monospace, monospace;
        line-height: 1.5;
      }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.45rem;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }
      .ok {
        background: #dcfce7;
        color: #166534;
      }
      .warn {
        background: #fef9c3;
        color: #854d0e;
      }
      .err {
        background: #fee2e2;
        color: #991b1b;
      }
      .info {
        background: #dbeafe;
        color: #1e40af;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        text-align: left;
        padding: 0.4rem 0.5rem;
        border-bottom: 2px solid #e2e8f0;
        font-weight: 600;
        color: #475569;
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      td {
        padding: 0.4rem 0.5rem;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: top;
      }
      tr:hover td {
        background: #f8fafc;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .stat-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem 1rem;
      }
      .stat-label {
        font-size: 11px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .stat-val {
        font-size: 1.5rem;
        font-weight: 700;
        color: #0f172a;
        margin-top: 0.15rem;
      }
      .rule-chip {
        display: inline-block;
        background: #f0f9ff;
        color: #0369a1;
        border: 1px solid #bae6fd;
        border-radius: 4px;
        padding: 0.1rem 0.45rem;
        font-size: 11px;
        margin: 0.1rem;
      }
      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 720px) {
        .split {
          grid-template-columns: 1fr;
        }
      }
      #output {
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-left">
        <h1>ClaWorks Studio</h1>
        <p class="sub">运维与调试面板 · <code id="base"></code></p>
      </div>
      <div class="topbar-right">
        <input id="apiKey" type="password" placeholder="API Key (可选)" style="width: 180px" />
        <button class="btn btn-primary" id="refreshBtn">刷新</button>
      </div>
    </div>

    <nav id="nav"></nav>
    <div id="actionBar" class="panel" style="display: none"></div>
    <div id="output"><pre>Loading…</pre></div>

    <script>
      const base = location.origin;
      document.getElementById("base").textContent = base;

      const VIEWS = [
        { id: "dashboard", label: "🏠 总览" },
        { id: "identity", label: "🤖 机器人身份" },
        { id: "playbooks", label: "📋 Playbooks" },
        { id: "runs", label: "▶️ 运行记录" },
        { id: "memory", label: "🧠 记忆" },
        { id: "objects", label: "🗂️ 数据对象" },
        { id: "events", label: "⚡ 事件流" },
        { id: "decisionlog", label: "📝 决策日志" },
        { id: "im_bridge", label: "💬 IM 桥接" },
        { id: "packs", label: "📦 Packs" },
        { id: "connectors", label: "🔌 Connectors" },
        { id: "rbac", label: "🔒 权限策略" },
        { id: "kb", label: "📚 知识库" },
        { id: "metrics", label: "📈 Metrics" },
        { id: "doctor", label: "🩺 诊断" },
      ];

      let view = "dashboard";
      const nav = document.getElementById("nav");
      const out = document.getElementById("output");
      const actionBar = document.getElementById("actionBar");

      VIEWS.forEach((v) => {
        const b = document.createElement("button");
        b.textContent = v.label;
        b.dataset.view = v.id;
        if (v.id === view) b.classList.add("active");
        b.onclick = () => {
          view = v.id;
          nav.querySelectorAll("button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          render();
        };
        nav.appendChild(b);
      });

      async function api(path, init) {
        const headers = { Accept: "application/json" };
        const key = document.getElementById("apiKey").value.trim();
        if (key) headers.Authorization = "Bearer " + key;
        if (init?.body) headers["Content-Type"] = "application/json";
        try {
          const res = await fetch(base + path, { ...init, headers });
          const text = await res.text();
          try {
            return { ok: res.ok, status: res.status, data: JSON.parse(text) };
          } catch {
            return { ok: res.ok, status: res.status, data: { raw: text } };
          }
        } catch (e) {
          return { ok: false, status: 0, data: { error: String(e) } };
        }
      }

      function badge(status) {
        const s = String(status ?? "").toLowerCase();
        const c =
          s === "ok" || s === "completed" || s === "running" || s === "allow"
            ? "ok"
            : s === "waiting_hitl" || s === "warn" || s === "deny"
              ? "warn"
              : s === "failed" || s === "error"
                ? "err"
                : "info";
        return `<span class="badge ${c}">${status ?? "—"}</span>`;
      }

      function html(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function json(v) {
        return `<pre>${html(JSON.stringify(v, null, 2))}</pre>`;
      }

      // ─── Dashboard ────────────────────────────────────────────────────
      async function renderDashboard() {
        actionBar.style.display = "none";
        const [h, obs] = await Promise.all([
          api("/v1/health"),
          api("/v1/observation-events?limit=5"),
        ]);
        const d = h.data;
        const stats = [
          { label: "状态", val: badge(d.status) },
          { label: "机器人", val: html(d.robot) },
          { label: "运行时长", val: `${d.uptime_s ?? 0}s` },
          { label: "Playbooks", val: d.playbook_count ?? "—" },
          { label: "Packs", val: d.loaded_packs ?? "—" },
          { label: "事件总数", val: d.event_count ?? "—" },
        ];
        let statHtml =
          `<div class="stat-grid">` +
          stats
            .map(
              (s) => `
          <div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`,
            )
            .join("") +
          `</div>`;

        let recHtml = "";
        const evs = obs.data?.events ?? [];
        if (evs.length) {
          recHtml =
            `<div class="panel-title">最近观测事件</div><table>
            <tr><th>时间</th><th>来源</th><th>类型</th></tr>` +
            evs
              .map(
                (e) =>
                  `<tr><td>${e.at?.slice(11, 19) ?? ""}</td><td>${html(e.source)}</td><td>${html(e.type)}</td></tr>`,
              )
              .join("") +
            `</table>`;
        }
        out.innerHTML = `<div class="panel">${statHtml}${recHtml}</div>`;
      }

      // ─── Identity ─────────────────────────────────────────────────────
      async function renderIdentity() {
        actionBar.style.display = "none";
        const r = await api("/v1/identity");
        if (!r.ok) {
          out.innerHTML = json(r.data);
          return;
        }
        const d = r.data;
        const rules = (d.rules ?? [])
          .map((r) => `<span class="rule-chip">${html(r)}</span>`)
          .join("");
        const packs = (d.robot?.loaded_packs ?? [])
          .map((p) => badge(`${p.id}@${p.version}`))
          .join(" ");
        out.innerHTML = `<div class="panel">
          <div class="split">
            <div>
              <div class="panel-title">机器人信息</div>
              <table>
                <tr><th>字段</th><th>值</th></tr>
                <tr><td>名称</td><td><strong>${html(d.name)}</strong></td></tr>
                <tr><td>角色</td><td>${html(d.role)}</td></tr>
                <tr><td>业务域</td><td>${html(d.domain ?? "—")}</td></tr>
                <tr><td>说明</td><td>${html(d.description ?? "—")}</td></tr>
                <tr><td>端点</td><td><code>${html(d.robot?.endpoint)}</code></td></tr>
                <tr><td>版本</td><td>${html(d.robot?.version ?? "—")}</td></tr>
              </table>
            </div>
            <div>
              <div class="panel-title">核心规则（${(d.rules ?? []).length} 条）</div>
              <div>${rules || "<em>无规则</em>"}</div>
              <div class="panel-title" style="margin-top:1rem">已加载 Packs</div>
              <div>${packs || "<em>无</em>"}</div>
            </div>
          </div>
        </div>`;
      }

      // ─── Playbooks ────────────────────────────────────────────────────
      async function renderPlaybooks() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="panel-title">手动触发 Playbook</div>
          <div class="row">
            <input id="pbId" placeholder="playbook id" style="width:220px" value="reload_packs_and_notify" />
            <button class="btn btn-primary btn-sm" id="triggerPb">触发</button>
          </div>
          <textarea id="pbInput">{"tenant_id":"studio"}</textarea>`;
        document.getElementById("triggerPb").onclick = async () => {
          const id = document.getElementById("pbId").value.trim();
          let input = {};
          try {
            input = JSON.parse(document.getElementById("pbInput").value || "{}");
          } catch {}
          const r = await api(`/v1/playbooks/${id}/runs`, {
            method: "POST",
            body: JSON.stringify({ input }),
          });
          out.innerHTML = json(r.data);
        };
        const p = await api("/v1/playbooks");
        const pbs = p.data?.playbooks ?? [];
        let html_str = `<table><tr><th>ID</th><th>名称</th><th>Pack</th><th>触发</th><th>优先级</th></tr>`;
        pbs.forEach((pb) => {
          const t = pb.trigger ?? {};
          const trigStr =
            t.kind === "schedule"
              ? `⏰ ${t.cron}`
              : t.kind === "event"
                ? `⚡ ${t.pattern}`
                : "手动";
          html_str += `<tr><td><code>${html(pb.id)}</code></td><td>${html(pb.name)}</td><td>${badge(pb.pack)}</td><td>${html(trigStr)}</td><td>${pb.priority ?? 0}</td></tr>`;
        });
        html_str += "</table>";
        out.innerHTML = `<div class="panel">${html_str}</div>`;
      }

      // ─── Runs ─────────────────────────────────────────────────────────
      async function renderRuns() {
        actionBar.style.display = "none";
        const p = await api("/v1/playbooks");
        const ids = (p.data?.playbooks ?? []).map((x) => x.id);
        let html_str = `<table><tr><th>Playbook</th><th>Run ID</th><th>状态</th><th>时间</th><th>操作</th></tr>`;
        for (const id of ids.slice(0, 12)) {
          const r = await api(`/v1/playbooks/${id}/runs?limit=3`);
          for (const run of r.data?.runs ?? r.data ?? []) {
            const hitlBtn =
              run.status === "waiting_hitl"
                ? `<button class="btn btn-sm" data-run="${run.id}" data-pb="${id}">批准</button>`
                : "";
            const ts = run.startedAt ? new Date(run.startedAt).toLocaleTimeString("zh-CN") : "";
            html_str += `<tr><td><code>${html(id)}</code></td><td><code>${html((run.id ?? "").slice(0, 10))}…</code></td><td>${badge(run.status)}</td><td>${html(ts)}</td><td>${hitlBtn}</td></tr>`;
          }
        }
        html_str += "</table>";
        out.innerHTML = `<div class="panel">${html_str}</div>`;
        out.querySelectorAll("button[data-run]").forEach((btn) => {
          btn.onclick = async () => {
            const body = { step_id: "hitl", decision: "approve", comment: "studio" };
            const r = await api(`/v1/playbooks/${btn.dataset.pb}/runs/${btn.dataset.run}/hitl`, {
              method: "POST",
              body: JSON.stringify(body),
            });
            alert(JSON.stringify(r.data));
            render();
          };
        });
      }

      // ─── Memory ───────────────────────────────────────────────────────
      async function renderMemory() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="panel-title">查询 RobotMemory</div>
          <div class="row">
            <input id="memSubject" placeholder="主体 (pump-001 / global / *)" style="width:200px" value="global" />
            <button class="btn btn-primary btn-sm" id="queryMem">查询</button>
          </div>
          <div class="row" style="margin-top:0.5rem">
            <span class="panel-title" style="margin:0">写入记忆：</span>
            <input id="memWSubject" placeholder="主体" style="width:130px" />
            <input id="memWKey" placeholder="键" style="width:130px" />
            <input id="memWValue" placeholder="值" style="width:130px" />
            <button class="btn btn-sm" id="writeMem">写入</button>
          </div>`;

        const doQuery = async () => {
          const subj = document.getElementById("memSubject").value.trim();
          const filter =
            subj && subj !== "*" ? encodeURIComponent(JSON.stringify({ subject: subj })) : "";
          const r = await api(
            `/v1/objects/RobotMemory?limit=100${filter ? "&filter=" + filter : ""}`,
          );
          const items = r.data?.items ?? [];
          if (!items.length) {
            out.innerHTML = `<div class="panel"><em>暂无记忆（主体: ${html(subj)}）</em></div>`;
            return;
          }
          let h = `<table><tr><th>主体</th><th>键</th><th>值</th><th>置信度</th><th>类别</th><th>来源</th><th>更新时间</th></tr>`;
          items.forEach((m) => {
            h += `<tr><td>${html(m.subject)}</td><td><strong>${html(m.key)}</strong></td><td><code>${html(m.value)}</code></td><td>${html(m.confidence ?? "—")}</td><td>${badge(m.category)}</td><td>${html(m.source ?? "—")}</td><td>${html((m.updatedAt ?? "").slice(0, 19))}</td></tr>`;
          });
          h += "</table>";
          out.innerHTML = `<div class="panel">${h}</div>`;
        };
        document.getElementById("queryMem").onclick = doQuery;
        document.getElementById("writeMem").onclick = async () => {
          const subj = document.getElementById("memWSubject").value.trim();
          const key = document.getElementById("memWKey").value.trim();
          const val = document.getElementById("memWValue").value.trim();
          if (!subj || !key) {
            alert("主体和键不能为空");
            return;
          }
          const memId = `mem:${subj}:${key}`;
          const r = await api("/v1/objects/RobotMemory", {
            method: "POST",
            body: JSON.stringify({
              id: memId,
              subject: subj,
              key,
              value: val,
              category: "preference",
              confidence: 1.0,
              source: "studio",
            }),
          });
          alert(r.ok ? "写入成功" : JSON.stringify(r.data));
          doQuery();
        };
        doQuery();
      }

      // ─── Objects ──────────────────────────────────────────────────────
      async function renderObjects() {
        actionBar.style.display = "block";
        const TYPES = [
          "WorkOrder",
          "Alarm",
          "Equipment",
          "Station",
          "SparePart",
          "RobotMemory",
          "RbacPolicy",
          "IngressPolicy",
        ];
        let selType = TYPES[0];
        actionBar.innerHTML = `<div class="row">
          <select id="objType">${TYPES.map((t) => `<option value="${t}">${t}</option>`).join("")}</select>
          <input id="objFilter" placeholder='过滤 JSON {"status":"open"}' style="width:240px" />
          <button class="btn btn-primary btn-sm" id="queryObj">查询</button>
        </div>`;
        const doQuery = async () => {
          const t = document.getElementById("objType").value;
          const fv = document.getElementById("objFilter").value.trim();
          const filter = fv ? encodeURIComponent(fv) : "";
          const r = await api(`/v1/objects/${t}?limit=50${filter ? "&filter=" + filter : ""}`);
          const items = r.data?.items ?? [];
          if (!items.length) {
            out.innerHTML = `<div class="panel"><em>暂无 ${t} 对象</em></div>`;
            return;
          }
          const keys = [...new Set(items.flatMap((i) => Object.keys(i)))]
            .filter((k) => !k.startsWith("_"))
            .slice(0, 8);
          let h = `<table><tr>${keys.map((k) => `<th>${html(k)}</th>`).join("")}</tr>`;
          items.forEach((item) => {
            h += `<tr>${keys.map((k) => `<td>${html(typeof item[k] === "object" ? JSON.stringify(item[k]) : item[k])}</td>`).join("")}</tr>`;
          });
          h += "</table>";
          out.innerHTML = `<div class="panel"><em>${items.length} 条记录</em>${h}</div>`;
        };
        document.getElementById("queryObj").onclick = doQuery;
        document.getElementById("objType").onchange = doQuery;
        doQuery();
      }

      // ─── Events ───────────────────────────────────────────────────────
      async function renderEvents() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="row">
          <input id="evType" placeholder="事件类型过滤" style="width:200px" />
          <button class="btn btn-primary btn-sm" id="publishEv">发布事件</button>
          <input id="evPayload" placeholder='payload JSON {"equipment_id":"pump-001"}' style="width:280px" />
        </div>`;
        document.getElementById("publishEv").onclick = async () => {
          const type = document.getElementById("evType").value.trim();
          if (!type) {
            alert("请输入事件类型");
            return;
          }
          let payload = {};
          try {
            payload = JSON.parse(document.getElementById("evPayload").value || "{}");
          } catch {}
          const r = await api("/v1/events", {
            method: "POST",
            body: JSON.stringify({ type, source: "studio", payload }),
          });
          const msg = r.data?.matched_playbooks?.length
            ? `已发布 → 触发 Playbooks: ${r.data.matched_playbooks.join(", ")}`
            : `已发布（无匹配 Playbook）`;
          alert(msg);
          render();
        };
        const e = await api("/v1/observation-events?limit=50");
        const evs = e.data?.events ?? [];
        let h = `<table><tr><th>时间</th><th>来源</th><th>类型</th><th>payload 预览</th></tr>`;
        evs.forEach((ev) => {
          const preview = Object.entries(ev.payload ?? {})
            .slice(0, 3)
            .map(([k, v]) => `${k}=${JSON.stringify(v)}`)
            .join(" ");
          h += `<tr><td>${html(ev.at?.slice(11, 19))}</td><td>${html(ev.source)}</td><td><code>${html(ev.type)}</code></td><td style="font-size:11px;color:#64748b">${html(preview)}</td></tr>`;
        });
        h += "</table>";
        out.innerHTML = `<div class="panel"><em>${evs.length} 条观测事件</em>${h}</div>`;
      }

      // ─── Decision Log ─────────────────────────────────────────────────
      async function renderDecisionLog() {
        actionBar.style.display = "none";
        const r = await api("/v1/decision-log?limit=100");
        const entries = r.data?.entries ?? [];
        let h = `<table><tr><th>时间</th><th>类型</th><th>Playbook</th><th>摘要</th></tr>`;
        entries.forEach((e) => {
          h += `<tr><td>${html(e.at?.slice(11, 19))}</td><td>${badge(e.kind)}</td><td>${html(e.playbookId ?? "—")}</td><td>${html(e.summary)}</td></tr>`;
        });
        h += "</table>";
        out.innerHTML = `<div class="panel"><em>${entries.length} 条决策日志</em>${h}</div>`;
      }

      // ─── IM Bridge ───────────────────────────────────────────────────
      async function renderImBridge() {
        actionBar.style.display = "none";
        out.innerHTML = `<div class="panel">
          <div class="panel-title">IM 消息意图路由测试</div>
          <div class="row">
            <select id="imChannel">
              <option value="feishu">飞书</option>
              <option value="weixin-work">企业微信</option>
              <option value="dingtalk">钉钉</option>
              <option value="telegram">Telegram</option>
            </select>
            <input id="imUserId" placeholder="用户 ID" value="test-user-001" style="width:160px" />
            <input id="imGroupId" placeholder="群组 ID（可选）" value="g-ops" style="width:160px" />
          </div>
          <textarea id="imText" style="min-height:100px">泵 pump-001 今天振动值偏高，有一些异常噪声，麻烦帮忙看一下是否需要维修？</textarea>
          <div class="row" style="margin-top:0.5rem">
            <button class="btn btn-primary" id="sendImMsg">发送到 IM Bridge</button>
            <button class="btn" id="sendImAlarm">模拟告警报告</button>
            <button class="btn" id="sendImQuery">模拟状态查询</button>
          </div>
          <div id="imResult" style="margin-top:1rem"></div>
        </div>`;

        const sendMsg = async (text) => {
          const body = {
            channel: document.getElementById("imChannel").value,
            message_id: `studio-${Date.now()}`,
            user_id: document.getElementById("imUserId").value,
            text: text ?? document.getElementById("imText").value,
            group_id: document.getElementById("imGroupId").value || undefined,
          };
          const r = await api("/v1/bridge/im", { method: "POST", body: JSON.stringify(body) });
          const color =
            r.data?.action === "published" ? "ok" : r.data?.action === "denied" ? "err" : "info";
          document.getElementById("imResult").innerHTML = `
            <div class="panel-title">响应 ${badge(r.data?.action)}</div>
            ${r.data?.action === "published" ? `<p>事件类型: <code>${r.data.eventType}</code></p><p>触发 Playbooks: ${(r.data.matchedPlaybooks ?? []).map((p) => badge(p)).join(" ") || "（无）"}</p>` : ""}
            ${r.data?.reason ? `<p>原因: ${html(r.data.reason)}</p>` : ""}
            ${json(r.data)}`;
        };
        document.getElementById("sendImMsg").onclick = () => sendMsg();
        document.getElementById("sendImAlarm").onclick = () => {
          document.getElementById("imText").value =
            "紧急！压缩机 comp-002 压力超高，仪表显示 12.5 MPa，已超过安全上限！";
          sendMsg();
        };
        document.getElementById("sendImQuery").onclick = () => {
          document.getElementById("imText").value =
            "帮我查一下泵站 pump-001 现在的运行状态和最近的检修工单";
          sendMsg();
        };
      }

      // ─── Packs ────────────────────────────────────────────────────────
      async function renderPacks() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="row">
          <input id="packSrc" placeholder="nexus://pack-id 或 file:///path" style="width:280px" />
          <button class="btn btn-primary btn-sm" id="installPack">安装 Pack</button>
          <button class="btn btn-sm" id="reloadPacks">重新加载所有</button>
        </div>`;
        document.getElementById("installPack").onclick = async () => {
          const src = document.getElementById("packSrc").value.trim();
          if (!src) return;
          const r = await api("/v1/packs/install", {
            method: "POST",
            body: JSON.stringify({ source: src }),
          });
          alert(r.ok ? `已安装: ${r.data?.pack?.id ?? r.data?.installed}` : JSON.stringify(r.data));
          render();
        };
        document.getElementById("reloadPacks").onclick = async () => {
          const r = await api("/v1/packs/reload", { method: "POST" });
          alert(
            r.ok ? `已加载 ${(r.data?.reloaded ?? []).length} 个 Pack` : JSON.stringify(r.data),
          );
          render();
        };
        const p = await api("/v1/packs");
        const packs = p.data?.packs ?? [];
        let h = `<table><tr><th>ID</th><th>名称</th><th>版本</th><th>Playbooks</th><th>ObjectTypes</th></tr>`;
        packs.forEach((pk) => {
          h += `<tr><td><code>${html(pk.id)}</code></td><td>${html(pk.name)}</td><td>${badge(pk.version)}</td><td>${pk.playbooks ?? 0}</td><td>${pk.objectTypes ?? 0}</td></tr>`;
        });
        h += "</table>";
        out.innerHTML = `<div class="panel">${h}</div>`;
      }

      // ─── Connectors ───────────────────────────────────────────────────
      async function renderConnectors() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="row">
          <input id="connId" placeholder="connector id" style="width:150px" />
          <input id="connMethod" placeholder="method" value="status" style="width:120px" />
          <input id="connParams" placeholder='params JSON {}' style="width:180px" />
          <button class="btn btn-sm btn-primary" id="invokeConn">调用</button>
        </div>`;
        document.getElementById("invokeConn").onclick = async () => {
          const id = document.getElementById("connId").value.trim();
          if (!id) return;
          let params = {};
          try {
            params = JSON.parse(document.getElementById("connParams").value || "{}");
          } catch {}
          const r = await api(`/v1/connectors/${id}/invoke`, {
            method: "POST",
            body: JSON.stringify({ method: document.getElementById("connMethod").value, params }),
          });
          out.innerHTML = json(r.data);
        };
        const c = await api("/v1/connectors");
        const conns = c.data?.connectors ?? [];
        if (!conns.length) {
          out.innerHTML = `<div class="panel"><em>无 Connector</em></div>`;
          return;
        }
        let h = `<table><tr><th>ID</th><th>运行</th><th>就绪</th><th>PID</th></tr>`;
        conns.forEach((c) => {
          const runLabel = c.running ? "running" : "stopped";
          const readyLabel = c.ready ? "ready" : "pending";
          h += `<tr><td><code>${html(c.id)}</code></td><td>${badge(runLabel)}</td><td>${badge(readyLabel)}</td><td>${html(c.pid ?? "—")}</td></tr>`;
        });
        h += "</table>";
        out.innerHTML = `<div class="panel">${h}</div>`;
      }

      // ─── Knowledge Base ───────────────────────────────────────────────
      async function renderKb() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="row" style="flex-wrap:wrap;gap:0.5rem">
          <input id="kbNamespace" placeholder="namespace（可选）" style="width:140px" />
          <input id="kbQuery" placeholder="搜索关键词" style="width:200px" />
          <button class="btn btn-primary btn-sm" id="kbSearch">搜索</button>
          <button class="btn btn-sm" id="kbRefreshStatus">刷新状态</button>
          <button class="btn btn-sm" id="kbFlush">同步索引</button>
        </div>
        <div class="row" style="margin-top:0.5rem;flex-wrap:wrap;gap:0.5rem">
          <textarea id="kbIngestText" placeholder="录入知识文本…" style="min-height:60px;flex:1;min-width:240px"></textarea>
          <button class="btn btn-sm" id="kbIngest">单条录入</button>
        </div>
        <div class="row" style="margin-top:0.5rem;flex-wrap:wrap;gap:0.5rem">
          <input id="kbFolderPath" placeholder="本地文件夹路径（批量入库）" style="flex:1;min-width:240px" />
          <button class="btn btn-sm" id="kbIngestFolder">文件夹入库</button>
        </div>`;
        const showStatus = async () => {
          const r = await api("/v1/kb/status");
          const s = r.data ?? {};
          const vec = s.vector ? badge("vector") : badge("substring");
          out.innerHTML = `<div class="panel"><div class="panel-title">知识库状态</div>
            <table><tr><th>项</th><th>值</th></tr>
            <tr><td>provider</td><td>${html(s.provider ?? "—")} ${vec}</td></tr>
            <tr><td>embed</td><td>${html(s.kb_embed_model ?? "—")}</td></tr>
            <tr><td>memory slot</td><td>${html(s.memory_slot ?? "—")}</td></tr>
            <tr><td>kb-drop</td><td><code>${html(s.kb_drop_dir ?? "—")}</code></td></tr>
            <tr><td>documents</td><td>${html(String(s.document_count ?? "—"))}</td></tr>
            <tr><td>note</td><td>${html(s.note ?? "")}</td></tr>
            </table></div><div id="kbResults" class="panel" style="margin-top:0.75rem"></div>`;
        };
        document.getElementById("kbRefreshStatus").onclick = showStatus;
        document.getElementById("kbFlush").onclick = async () => {
          const r = await api("/v1/kb/flush", { method: "POST", body: "{}" });
          alert(
            r.ok
              ? r.data?.flushed
                ? "索引已同步"
                : (r.data?.note ?? JSON.stringify(r.data))
              : JSON.stringify(r.data),
          );
          await showStatus();
        };
        document.getElementById("kbSearch").onclick = async () => {
          const q = document.getElementById("kbQuery").value.trim();
          const ns = document.getElementById("kbNamespace").value.trim();
          let url = `/v1/kb/search?q=${encodeURIComponent(q)}&limit=10`;
          if (ns) url += `&namespace=${encodeURIComponent(ns)}`;
          const r = await api(url);
          const box = document.getElementById("kbResults") ?? out;
          box.innerHTML = `<div class="panel-title">检索结果</div>${json(r.data)}`;
        };
        document.getElementById("kbIngest").onclick = async () => {
          const text = document.getElementById("kbIngestText").value.trim();
          if (!text) return;
          const ns = document.getElementById("kbNamespace").value.trim();
          const r = await api("/v1/kb/ingest", {
            method: "POST",
            body: JSON.stringify({ text, source: "studio", namespace: ns || undefined }),
          });
          alert(r.ok ? "已录入" : JSON.stringify(r.data));
          await showStatus();
        };
        document.getElementById("kbIngestFolder").onclick = async () => {
          const folder_path = document.getElementById("kbFolderPath").value.trim();
          if (!folder_path) return alert("请填写文件夹路径");
          const ns = document.getElementById("kbNamespace").value.trim();
          const r = await api("/v1/kb/ingest/folder", {
            method: "POST",
            body: JSON.stringify({ folder_path, namespace: ns || undefined, recursive: true }),
          });
          const box = document.getElementById("kbResults") ?? out;
          box.innerHTML = `<div class="panel-title">批量入库</div>${json(r.data)}`;
          await showStatus();
        };
        await showStatus();
      }

      // ─── Metrics ──────────────────────────────────────────────────────
      async function renderMetrics() {
        actionBar.style.display = "none";
        const r = await fetch(base + "/v1/metrics", { headers: apiHeaders() });
        const text = await r.text();
        out.innerHTML = `<div class="panel"><div class="panel-title">Prometheus Metrics</div><pre>${html(text)}</pre></div>`;
      }

      function apiHeaders() {
        const key = document.getElementById("apiKey").value.trim();
        return key ? { Authorization: "Bearer " + key } : {};
      }

      // ─── Doctor ─────────────────────────────────────────────────────
      async function renderDoctor() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<button class="btn btn-primary btn-sm" id="runDoctor">运行诊断</button>`;
        document.getElementById("runDoctor").onclick = async () => {
          const r = await api("/v1/doctor", { method: "POST" });
          const checks = r.data?.checks ?? [];
          let h = `<table><tr><th>检查项</th><th>状态</th><th>说明</th></tr>`;
          checks.forEach((c) => {
            const st = (c.status ?? c.ok === true) ? "ok" : c.ok === false ? "fail" : "info";
            h += `<tr><td>${html(c.name ?? c.id ?? "—")}</td><td>${badge(st)}</td><td>${html(c.message ?? c.detail ?? "")}</td></tr>`;
          });
          h += "</table>";
          out.innerHTML = `<div class="panel">${h || json(r.data)}</div>`;
        };
        document.getElementById("runDoctor").click();
      }

      // ─── RBAC ─────────────────────────────────────────────────────────
      async function renderRbac() {
        actionBar.style.display = "block";
        actionBar.innerHTML = `<div class="row">
          <button class="btn btn-sm btn-primary" id="reloadRbac">重新加载策略</button>
          <span style="font-size:12px;color:#64748b">从 ObjectStore 同步 RbacPolicy / IngressPolicy</span>
        </div>`;
        document.getElementById("reloadRbac").onclick = async () => {
          const r = await api("/v1/rbac/reload", { method: "POST" });
          alert(r.ok ? `策略已同步 (${r.data?.reloaded_at})` : JSON.stringify(r.data));
          render();
        };
        const r = await api("/v1/objects/RbacPolicy?limit=100");
        const policies = r.data?.items ?? [];
        let h = policies.length
          ? `<table><tr><th>ID</th><th>主体类型</th><th>主体</th><th>动作</th><th>资源</th><th>效果</th></tr>` +
            policies
              .map(
                (p) =>
                  `<tr><td><code>${html(p.id)}</code></td><td>${html(p.subjectType)}</td><td>${html(p.subjectId)}</td><td>${html(p.action)}</td><td>${html(p.resource)}</td><td>${badge(p.effect)}</td></tr>`,
              )
              .join("") +
            "</table>"
          : `<em>暂无自定义 RbacPolicy（使用默认策略）</em>`;
        out.innerHTML = `<div class="panel"><div class="panel-title">RBAC 策略</div>${h}</div>`;
      }

      // ─── Router ───────────────────────────────────────────────────────
      async function render() {
        actionBar.style.display = "none";
        out.innerHTML = `<pre>Loading…</pre>`;
        try {
          if (view === "dashboard") await renderDashboard();
          else if (view === "identity") await renderIdentity();
          else if (view === "playbooks") await renderPlaybooks();
          else if (view === "runs") await renderRuns();
          else if (view === "memory") await renderMemory();
          else if (view === "objects") await renderObjects();
          else if (view === "events") await renderEvents();
          else if (view === "decisionlog") await renderDecisionLog();
          else if (view === "im_bridge") await renderImBridge();
          else if (view === "packs") await renderPacks();
          else if (view === "connectors") await renderConnectors();
          else if (view === "rbac") await renderRbac();
          else if (view === "kb") await renderKb();
          else if (view === "metrics") await renderMetrics();
          else if (view === "doctor") await renderDoctor();
        } catch (err) {
          out.innerHTML = `<pre>${html(String(err))}</pre>`;
        }
      }

      document.getElementById("refreshBtn").onclick = render;
      // 自动刷新（Dashboard 30s）
      setInterval(() => {
        if (view === "dashboard") render();
      }, 30000);
      render();
    </script>
  </body>
</html>
