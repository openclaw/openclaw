<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Pilot Project | OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body class="pilot-page">
    <main class="pilot-shell pilot-project-layout">
      <section class="pilot-panel">
        <a class="pilot-back-link" href="/pilot/">Pilot Home</a>
        <div class="pilot-chip">Screen 03 · Project Setup</div>
        <h1>New pilot project setup</h1>
        <p>Capture parcel context, anchor scope, and prepare a source discovery workspace.</p>

        <form id="pilot-project-form" class="pilot-form">
          <label class="pilot-field">
            <span>Parcel ID</span>
            <input
              data-testid="pilot-project-parcel-input"
              name="parcelId"
              placeholder="APN 123-456-789"
              autocomplete="off"
              required
            />
          </label>

          <label class="pilot-field">
            <span>Site address</span>
            <input
              data-testid="pilot-project-address-input"
              name="address"
              placeholder="100 Main St, Austin, TX"
              autocomplete="street-address"
              required
            />
          </label>

          <label class="pilot-field">
            <span>Project scope</span>
            <textarea
              data-testid="pilot-project-scope-input"
              name="projectScope"
              rows="3"
              placeholder="Civil entitlement due diligence"
              required
            ></textarea>
          </label>

          <label class="pilot-field">
            <span>Project type</span>
            <select name="projectType">
              <option value="entitlement">Entitlement due diligence</option>
              <option value="acquisition">Acquisition assessment</option>
              <option value="redevelopment">Redevelopment feasibility</option>
            </select>
          </label>

          <fieldset class="pilot-field pilot-fieldset">
            <legend>Objective checklist</legend>
            <label><input type="checkbox" name="objective" value="jurisdiction" checked /> Jurisdiction bootstrap</label>
            <label><input type="checkbox" name="objective" value="zoning" checked /> Zoning and entitlement scan</label>
            <label><input type="checkbox" name="objective" value="utilities" checked /> Utility and infrastructure constraints</label>
          </fieldset>

          <button type="submit" class="pilot-cta" data-testid="pilot-project-create">
            Create project and discover sources
          </button>
        </form>
      </section>

      <aside id="pilot-project-summary" class="pilot-panel pilot-summary-panel" hidden>
        <h2 data-testid="pilot-project-summary-title">Pilot project created</h2>
        <p id="pilot-project-summary-copy"></p>
        <button type="button" class="pilot-cta pilot-cta-secondary" data-testid="pilot-project-launch-chat">
          Launch project workspace
        </button>
      </aside>
    </main>
    <script type="module" src="/src/pilot/project.ts"></script>
  </body>
</html>
