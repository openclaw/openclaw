syntax = "proto3";

package envd.v1;

option go_package = "github.com/openclaw/vm-runner/gen/go/envd/v1;envdv1";

// FileService provides filesystem operations inside the MicroVM.
service FileService {
  // Stat returns metadata for a file or directory.
  rpc Stat(StatRequest) returns (StatResponse);

  // ReadFile reads a file and streams its content in chunks.
  rpc ReadFile(ReadFileRequest) returns (stream ReadFileResponse);

  // WriteFile accepts a stream of chunks and writes them to a file.
  rpc WriteFile(stream WriteFileRequest) returns (WriteFileResponse);

  // ListDir returns directory entries with metadata.
  rpc ListDir(ListDirRequest) returns (ListDirResponse);

  // MakeDir creates directories recursively.
  rpc MakeDir(MakeDirRequest) returns (MakeDirResponse);

  // Remove deletes files or directories.
  rpc Remove(RemoveRequest) returns (RemoveResponse);
}

// FileInfo describes a file or directory entry.
message FileInfo {
  string name = 1;
  int64 size = 2;
  uint32 mode = 3;
  bool is_dir = 4;
  int64 mod_time_unix = 5;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  string path = 1;
  int64 size = 2;
  uint32 mode = 3;
  bool is_dir = 4;
  int64 mod_time_unix = 5;
}

message ReadFileRequest {
  string path = 1;
}

message ReadFileResponse {
  bytes data = 1;
  bool eof = 2;
}

message WriteFileRequest {
  // Path to write to (must be set in the first chunk).
  string path = 1;

  // File permission mode (optional, default 0644, only used from first chunk).
  uint32 mode = 2;

  // File data chunk.
  bytes data = 3;
}

message WriteFileResponse {
  int64 bytes_written = 1;
}

message ListDirRequest {
  string path = 1;
}

message ListDirResponse {
  repeated FileInfo entries = 1;
}

message MakeDirRequest {
  string path = 1;

  // Permission mode (default 0755).
  uint32 mode = 2;
}

message MakeDirResponse {}

message RemoveRequest {
  string path = 1;

  // If true, removes directory contents recursively.
  bool recursive = 2;
}

message RemoveResponse {}
