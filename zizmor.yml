# zizmor configuration
# https://docs.zizmor.sh/configuration/

rules:
  # unpinned-uses: catch third-party (non GitHub-owned) actions using floating
  # tags. GitHub-owned actions (actions/*, github/*) are lower risk.
  # TODO: progressively pin all actions to SHA digests.
  unpinned-uses:
    ignore:
      - "actions/*"
      - "github/*"
      - "gradle/*"
      - "android-actions/*"

  # excessive-permissions: warn on workflows that request write permissions
  # without explicit need. Read-only workflows should declare permissions: {}
  # or permissions: read-all.
  excessive-permissions:
    disable: false

  # artipacked: re-enable but at high confidence only — low-confidence
  # persist-credentials findings are too noisy on this repo.
  artipacked:
    disable: false
