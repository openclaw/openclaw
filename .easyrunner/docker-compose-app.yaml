name: easyrunner
services:
  openclaw-gateway:
    image: localhost/openclaw:latest
    # Uses `command:` (maps to quadlet Exec=) instead of `entrypoint:` (maps to quadlet Entrypoint=,
    # which is only supported in Podman 5.0+). This allows the upstream Dockerfile to be used unmodified.
    # NOTE: Use a plain string (not a YAML list) — easyrunner's quadlet converter JSON-encodes YAML lists
    # and places the raw `["/bin/sh", "-c", ...]` string in Exec=, which systemd/podman treats literally.
    # --allow-unconfigured: allows startup without gateway.mode=local config (handles fresh volumes).
    # The gateway creates a default config on first run when --allow-unconfigured is set.
    command: "node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789"
    environment:
      - NODE_ENV=production
      - HOME=/home/node
      - TERM=xterm-256color
      # Gateway token for auth - required for remote CLI access
      # Use only hex characters (a-f, 0-9) to avoid encoding issues
      - OPENCLAW_GATEWAY_TOKEN=79da707a00cce6f610d7dea17e2903346294a4fc8acd2a89021f6c06400b7d31
      # State directory - must match the volume mount path
      - OPENCLAW_STATE_DIR=/home/node/.openclaw
    restart: unless-stopped
    networks:
      - easyrunner_proxy_network
    labels:
      xyz.easyrunner.appFramework: standardbackend
      xyz.easyrunner.appIsPublic: true
      xyz.easyrunner.appContainerInternalPort: 18789
    volumes:
      # Persistent state directory - stores config, sessions, credentials
      # The :U flag tells Podman to recursively chown the volume to the container user (node, uid 1000)
      - openclaw_state:/home/node/.openclaw:U

volumes:
  openclaw_state:
    driver: local

networks:
  easyrunner_proxy_network:
    name: easyrunner_proxy_network
    external: true
    driver: bridge
