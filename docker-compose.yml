services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_SKIP_BROWSER_CONTROL_SERVER: ${OPENCLAW_SKIP_BROWSER_CONTROL_SERVER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VENICE_API_KEY: ${VENICE_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      PYTHIA_BASE_PRIVATE_KEY: ${PYTHIA_BASE_PRIVATE_KEY}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      AGENTGLOB_RUNTIME_URL: ${AGENTGLOB_RUNTIME_URL:-}
      AGENTGLOB_RUNTIME_TOKEN: ${AGENTGLOB_RUNTIME_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_SKIP_BROWSER_CONTROL_SERVER: ${OPENCLAW_SKIP_BROWSER_CONTROL_SERVER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VENICE_API_KEY: ${VENICE_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      PYTHIA_BASE_PRIVATE_KEY: ${PYTHIA_BASE_PRIVATE_KEY}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      AGENTGLOB_RUNTIME_URL: ${AGENTGLOB_RUNTIME_URL:-}
      AGENTGLOB_RUNTIME_TOKEN: ${AGENTGLOB_RUNTIME_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
