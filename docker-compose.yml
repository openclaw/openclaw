services:
  # ── Signal channel ──────────────────────────────────────────────────────────
  # Uses native signal-cli daemon mode (not the bbernhard REST API wrapper).
  # JAVA_TOOL_OPTIONS is mandatory — prevents SIGBUS on ARM64 when SQLite
  # mmaps the WAL files on an exFAT/external SSD overlay filesystem.
  # To re-link after data loss: bash scripts/signal-relink.sh
  # To check health:            bash scripts/signal-check.sh
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: openclaw-signal
    environment:
      # SQLite lib export path — MUST NOT be removed. Prevents SIGBUS on ARM64/external SSD.
      JAVA_TOOL_OPTIONS: "-Dorg.sqlite.lib.exportPath=/tmp"
    volumes:
      - ${SIGNAL_CLI_DATA_DIR}:/home/.local/share/signal-cli
    ports:
      - "${SIGNAL_CLI_PORT:-127.0.0.1:18080}:8080"
    entrypoint: ["signal-cli"]
    command:
      - "--config"
      - "/home/.local/share/signal-cli"
      - "-a"
      - "${SIGNAL_CLI_ACCOUNT}"
      - "daemon"
      - "--http"
      - "0.0.0.0:8080"
      - "--no-receive-stdout"
      - "--receive-mode"
      - "on-start"
    # Healthy = account database exists (device is linked).
    # If unhealthy: run bash scripts/signal-relink.sh, then restart this service.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "find /home/.local/share/signal-cli/data -name 'account.db' -maxdepth 2 | grep -q .",
        ]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    init: true
    restart: unless-stopped

  voicebox:
    image: ${VOICEBOX_IMAGE:-openclaw-voicebox:local}
    build:
      context: .
      dockerfile: docker/voicebox/Dockerfile
    environment:
      VOICEBOX_MODELS_DIR: /app/models
      HF_HOME: /app/cache/huggingface
      HUGGINGFACE_HUB_CACHE: /app/cache/huggingface/hub
      TRANSFORMERS_CACHE: /app/cache/huggingface/transformers
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCLAW_VOICEBOX_FORCE_OPENAI: ${OPENCLAW_VOICEBOX_FORCE_OPENAI:-0}
      OPENCLAW_VOICEBOX_OPENAI_MODEL: ${OPENCLAW_VOICEBOX_OPENAI_MODEL:-gpt-4o-mini-tts}
      OPENCLAW_VOICEBOX_OPENAI_VOICE: ${OPENCLAW_VOICEBOX_OPENAI_VOICE:-nova}
    volumes:
      - ${VOICEBOX_DATA_DIR:-./.voicebox/data}:/app/data
      - ${VOICEBOX_MODELS_DIR:-./.voicebox/models}:/app/models
      - ${VOICEBOX_CACHE_DIR:-./.voicebox/cache}:/app/cache
      - ${VOICEBOX_CACHE_DIR:-./.voicebox/cache}/huggingface:/root/.cache/huggingface
    ports:
      - "${VOICEBOX_PORT:-127.0.0.1:17493}:8000"
    init: true
    restart: unless-stopped

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      SIGNAL_APPROVAL_PASSPHRASE_HASH: ${SIGNAL_APPROVAL_PASSPHRASE_HASH}
      SIGNAL_APPROVAL_PASSPHRASE: ${SIGNAL_APPROVAL_PASSPHRASE}
      OPENCLAW_SECURITY_SENTINEL_ENABLED: ${OPENCLAW_SECURITY_SENTINEL_ENABLED:-1}
      OPENCLAW_SECURITY_SENTINEL_REQUIRE_APPROVAL_TOOLS: ${OPENCLAW_SECURITY_SENTINEL_REQUIRE_APPROVAL_TOOLS:-web_search,web_fetch,message,exec,browser,gateway,nodes,cron,sessions_send,sessions_spawn,subagents}
      OPENCLAW_SECURITY_SENTINEL_AUDIT_PATH: ${OPENCLAW_SECURITY_SENTINEL_AUDIT_PATH:-/home/node/.openclaw/logs/security-sentinel.jsonl}
      OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_USES: ${OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_USES:-1}
      OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_TTL_MS: ${OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_TTL_MS:-60000}
      OPENCLAW_SECURITY_SENTINEL_STRICT_APPROVAL_CHANNELS: ${OPENCLAW_SECURITY_SENTINEL_STRICT_APPROVAL_CHANNELS:-signal}
      OPENCLAW_SECURITY_SENTINEL_SIGNAL_REQUIRE_PASSPHRASE: ${OPENCLAW_SECURITY_SENTINEL_SIGNAL_REQUIRE_PASSPHRASE:-1}
      OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE: ${OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE:-}
      OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE_HASH: ${OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE_HASH:-}
      OPENCLAW_SIGNAL_UI_MIRROR_ENABLED: ${OPENCLAW_SIGNAL_UI_MIRROR_ENABLED:-0}
      OPENCLAW_SIGNAL_UI_MIRROR_TARGET: ${OPENCLAW_SIGNAL_UI_MIRROR_TARGET:-}
      OPENCLAW_SIGNAL_UI_MIRROR_HTTP_URL: ${OPENCLAW_SIGNAL_UI_MIRROR_HTTP_URL:-}
      OPENCLAW_SIGNAL_UI_MIRROR_ACCOUNT: ${OPENCLAW_SIGNAL_UI_MIRROR_ACCOUNT:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${MB_REPO_DIR:-/Users/Dave/Documents/reaction_engine_with_decoder_layer_fix4/_references/openclaw}:/home/node/mb-repo
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      signal-cli:
        condition: service_started

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      SIGNAL_APPROVAL_PASSPHRASE_HASH: ${SIGNAL_APPROVAL_PASSPHRASE_HASH}
      SIGNAL_APPROVAL_PASSPHRASE: ${SIGNAL_APPROVAL_PASSPHRASE}
      OPENCLAW_SECURITY_SENTINEL_ENABLED: ${OPENCLAW_SECURITY_SENTINEL_ENABLED:-1}
      OPENCLAW_SECURITY_SENTINEL_REQUIRE_APPROVAL_TOOLS: ${OPENCLAW_SECURITY_SENTINEL_REQUIRE_APPROVAL_TOOLS:-web_search,web_fetch,message,exec,browser,gateway,nodes,cron,sessions_send,sessions_spawn,subagents}
      OPENCLAW_SECURITY_SENTINEL_AUDIT_PATH: ${OPENCLAW_SECURITY_SENTINEL_AUDIT_PATH:-/home/node/.openclaw/logs/security-sentinel.jsonl}
      OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_USES: ${OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_USES:-1}
      OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_TTL_MS: ${OPENCLAW_SECURITY_SENTINEL_APPROVAL_GRANT_TTL_MS:-60000}
      OPENCLAW_SECURITY_SENTINEL_STRICT_APPROVAL_CHANNELS: ${OPENCLAW_SECURITY_SENTINEL_STRICT_APPROVAL_CHANNELS:-signal}
      OPENCLAW_SECURITY_SENTINEL_SIGNAL_REQUIRE_PASSPHRASE: ${OPENCLAW_SECURITY_SENTINEL_SIGNAL_REQUIRE_PASSPHRASE:-1}
      OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE: ${OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE:-}
      OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE_HASH: ${OPENCLAW_SECURITY_SENTINEL_SIGNAL_PASSPHRASE_HASH:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
