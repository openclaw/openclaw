services:
  dna-gateway:
    image: ${DNA_IMAGE:-dna:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DNA_GATEWAY_TOKEN: ${DNA_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${DNA_CONFIG_DIR}:/home/node/.dna
      - ${DNA_WORKSPACE_DIR}:/home/node/clawd
    ports:
      - "${DNA_GATEWAY_PORT:-18789}:18789"
      - "${DNA_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${DNA_GATEWAY_BIND:-lan}",
        "--port",
        "${DNA_GATEWAY_PORT:-18789}"
      ]

  dna-cli:
    image: ${DNA_IMAGE:-dna:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${DNA_CONFIG_DIR}:/home/node/.dna
      - ${DNA_WORKSPACE_DIR}:/home/node/clawd
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
