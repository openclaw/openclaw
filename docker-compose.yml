services:
  activi-gateway:
    image: ${ACTIVI_IMAGE:-activi:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ACTIVI_GATEWAY_TOKEN: ${ACTIVI_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ACTIVI_CONFIG_DIR}:/home/node/.activi
      - ${ACTIVI_WORKSPACE_DIR}:/home/node/.activi/workspace
    ports:
      - "${ACTIVI_GATEWAY_PORT:-18789}:18789"
      - "${ACTIVI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ACTIVI_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  activi-cli:
    image: ${ACTIVI_IMAGE:-activi:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ACTIVI_GATEWAY_TOKEN: ${ACTIVI_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ACTIVI_CONFIG_DIR}:/home/node/.activi
      - ${ACTIVI_WORKSPACE_DIR}:/home/node/.activi/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
