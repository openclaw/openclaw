services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    extra_hosts:
      # Host-local model backends like Ollama should be addressed by a stable
      # hostname instead of a platform-specific Docker bridge IP.
      - "host.docker.internal:host-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_LOCAL_PATH_MAP: /home/node/.openclaw/config/runtime-path-map.json
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-../../..}:/home/node/.openclaw
      - ${OPENCLAW_SHARED_WORKSPACE_HOST:-../..}:/shared-workspace
      - ${OPENCLAW_AGENT_HOME_TONY_HOST:-../../../workspace-tony}:/agent-homes/tony
      - ${OPENCLAW_AGENT_HOME_BOBBY_DIGITAL_HOST:-../../../workspace-bobby-digital}:/agent-homes/bobby-digital
      - ${OPENCLAW_AGENT_HOME_ANGELA_HOST:-../../../workspace-angela}:/agent-homes/angela
      - ${OPENCLAW_AGENT_HOME_MACHINE_HOST:-../../../workspace-machine}:/agent-homes/machine
      - ${OPENCLAW_AGENT_HOME_DEB_HOST:-../../../workspace-deb}:/agent-homes/deb
      - ${OPENCLAW_AGENT_HOME_REVEREND_RUN_HOST:-../../../workspace-reverend-run}:/agent-homes/reverend-run
      - ${OPENCLAW_AGENT_HOME_MARTINA_HOST:-../../../workspace-martina}:/agent-homes/martina
      - ${OPENCLAW_AGENT_HOME_SCOUT_HOST:-../../../workspace-scout}:/agent-homes/scout
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      # Tailnet-only posture: bind published ports to localhost, then use Tailscale Serve on the HOST
      # (prevents LAN exposure even though the container listens on 0.0.0.0)
      - "${OPENCLAW_GATEWAY_HOST_IP:-127.0.0.1}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_GATEWAY_HOST_IP:-127.0.0.1}:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_LOCAL_PATH_MAP: /home/node/.openclaw/config/runtime-path-map.json
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-../../..}:/home/node/.openclaw
      - ${OPENCLAW_SHARED_WORKSPACE_HOST:-../..}:/shared-workspace
      - ${OPENCLAW_AGENT_HOME_TONY_HOST:-../../../workspace-tony}:/agent-homes/tony
      - ${OPENCLAW_AGENT_HOME_BOBBY_DIGITAL_HOST:-../../../workspace-bobby-digital}:/agent-homes/bobby-digital
      - ${OPENCLAW_AGENT_HOME_ANGELA_HOST:-../../../workspace-angela}:/agent-homes/angela
      - ${OPENCLAW_AGENT_HOME_MACHINE_HOST:-../../../workspace-machine}:/agent-homes/machine
      - ${OPENCLAW_AGENT_HOME_DEB_HOST:-../../../workspace-deb}:/agent-homes/deb
      - ${OPENCLAW_AGENT_HOME_REVEREND_RUN_HOST:-../../../workspace-reverend-run}:/agent-homes/reverend-run
      - ${OPENCLAW_AGENT_HOME_MARTINA_HOST:-../../../workspace-martina}:/agent-homes/martina
      - ${OPENCLAW_AGENT_HOME_SCOUT_HOST:-../../../workspace-scout}:/agent-homes/scout
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]
    depends_on:
      - openclaw-gateway
