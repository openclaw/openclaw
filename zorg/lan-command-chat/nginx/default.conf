server {
  listen 80;
  server_name _;
  client_max_body_size 20M;

  allow 127.0.0.1;
  allow ::1;
  allow 172.16.0.0/12;
  allow 10.2.69.0/24;
  allow 10.6.69.0/24;
  allow 10.7.69.0/24;
  allow 10.8.69.0/24;
  deny all;

  location / {
    proxy_pass http://host.docker.internal:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  server_name _;
  client_max_body_size 20M;

  ssl_certificate /etc/nginx/certs/local-ip.sh.pem;
  ssl_certificate_key /etc/nginx/certs/local-ip.sh.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Permissions-Policy "microphone=(self), autoplay=(self)" always;

  allow 127.0.0.1;
  allow ::1;
  allow 172.16.0.0/12;
  allow 10.2.69.0/24;
  allow 10.6.69.0/24;
  allow 10.7.69.0/24;
  allow 10.8.69.0/24;
  deny all;

  location / {
    proxy_pass http://host.docker.internal:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
