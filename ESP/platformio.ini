; PlatformIO Project Configuration
; OpenClaw ESP32-S3 Node v3.0.0

[platformio]
src_dir = .

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 串口配置
monitor_speed = 74880
upload_speed = 921600

; Windows: 修改为你的COM端口
upload_port = COM3
monitor_port = COM3

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DBOARD_HAS_PSRAM=1
    -DPSRAM_SIZE_8MB=1

; Flash 配置
board_build.flash_mode = dio
board_build.flash_size = 8MB

; Partition table (支持OTA)
board_build.partitions = min_spiffs.csv

; 库依赖
lib_deps =
    ; Ed25519 签名库
    https://github.com/orlp/ed25519.git

    ; DHT传感器
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

    ; QMI8658A 6轴姿态传感器
    https://github.com/lahavg/QMI8658-Arduino-Library.git

    ; 摄像头驱动 (内置在ESP32框架中)
    ; esp32-camera

; 调试配置 (可选)
; debug_tool = esp-prog
; debug_init_break = tbreak setup
