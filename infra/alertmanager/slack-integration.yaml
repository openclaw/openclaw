  webhook-test-script.sh: |
    #!/bin/bash
    # Test Slack webhook integration
    # Usage: ./webhook-test-script.sh <webhook-url> [message-type]
    
    set -e
    
    WEBHOOK_URL="${1:-}"
    MESSAGE_TYPE="${2:-critical}"
    
    if [ -z "$WEBHOOK_URL" ]; then
        echo "Usage: $0 <webhook-url> [critical|warning|info]"
        echo ""
        echo "Example:"
        echo "  $0 'https://hooks.slack.com/services/T.../B.../XXX' critical"
        exit 1
    fi
    
    if [[ ! "$WEBHOOK_URL" =~ ^https://hooks\.slack\.com ]]; then
        echo "Error: Invalid Slack webhook URL"
        exit 1
    fi
    
    case "$MESSAGE_TYPE" in
        critical)
            PAYLOAD='{
              "text": "🚨 Test Alert - Critical",
              "attachments": [{
                "color": "danger",
                "title": "Router Unavailable",
                "text": "Test critical alert from AlertManager",
                "fields": [
                  {"title": "Cluster", "value": "clarity-router-prod", "short": true},
                  {"title": "Severity", "value": "critical", "short": true},
                  {"title": "Status", "value": "firing", "short": true},
                  {"title": "Count", "value": "3 pods", "short": true}
                ],
                "actions": [
                  {"type": "button", "text": "View in Grafana", "url": "https://grafana.internal"}
                ]
              }]
            }'
            ;;
        warning)
            PAYLOAD='{
              "text": "⚠️ Test Alert - Warning",
              "attachments": [{
                "color": "warning",
                "title": "High CPU Usage",
                "text": "Test warning alert from AlertManager",
                "fields": [
                  {"title": "Cluster", "value": "clarity-router-prod", "short": true},
                  {"title": "Severity", "value": "warning", "short": true},
                  {"title": "Pods", "value": "router-0, router-1", "short": false}
                ]
              }]
            }'
            ;;
        info)
            PAYLOAD='{
              "text": "ℹ️ Test Alert - Info",
              "attachments": [{
                "color": "#0099ff",
                "title": "System Information",
                "text": "Test info message from AlertManager"
              }]
            }'
            ;;
        *)
            echo "Error: Unknown message type. Use: critical, warning, or info"
            exit 1
            ;;
    esac
    
    echo "Sending $MESSAGE_TYPE test message to Slack..."
    RESPONSE=$(curl -s -X POST "$WEBHOOK_URL" \
      -H 'Content-Type: application/json' \
      -d "$PAYLOAD")
    
    if [ "$RESPONSE" = "ok" ]; then
        echo "✅ Message sent successfully!"
        echo "Check your Slack channel for the test message."
    else
        echo "❌ Error sending message:"
        echo "$RESPONSE"
        exit 1
    fi
