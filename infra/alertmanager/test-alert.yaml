# AlertManager Test Alerts
# These examples show how to send test alerts to AlertManager for validation

---
# Test Alert 1: Critical Severity Alert
# This will trigger PagerDuty incident in production
apiVersion: batch/v1
kind: Job
metadata:
  name: alertmanager-test-critical
  namespace: monitoring
  labels:
    app: alertmanager-test
    severity: critical
spec:
  template:
    metadata:
      labels:
        app: alertmanager-test
        test: critical
    spec:
      serviceAccountName: alertmanager
      containers:
      - name: test-alert
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Sending test critical alert to AlertManager..."
          
          curl -X POST http://alertmanager:9093/api/v1/alerts \
            -H 'Content-Type: application/json' \
            -d '[{
              "labels": {
                "alertname": "TestCriticalAlert",
                "severity": "critical",
                "cluster": "clarity-router-prod",
                "job": "alertmanager-test"
              },
              "annotations": {
                "summary": "Test critical alert from AlertManager",
                "description": "This is a test alert to verify Slack and PagerDuty integration",
                "runbook_url": "https://docs.example.com/runbooks/test-alert"
              },
              "generatorURL": "https://prometheus.internal/graph?g0.expr=ALERTS"
            }]'
          
          echo ""
          echo "✅ Test critical alert sent!"
          echo "Expected: Slack notification and PagerDuty incident"
          exit 0
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      restartPolicy: Never
  backoffLimit: 1

