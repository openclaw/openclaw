---
# Notes and Documentation
# This service definition provides:
#
# 1. ClusterIP Service (alertmanager)
#    - HTTP API and UI access
#    - Used by Prometheus, Grafana, and operators
#    - Internal DNS: alertmanager.monitoring.svc.cluster.local:9093
#
# 2. Headless Service (alertmanager-headless)
#    - Pod-to-pod communication
#    - Used by AlertManager StatefulSet for clustering
#    - Enables DNS resolution to individual pods
#
# 3. ServiceMonitor (alertmanager)
#    - Enables Prometheus to scrape AlertManager metrics
#    - Metrics like alertmanager_alerts, alertmanager_notifications_total
#
# 4. RBAC (ServiceAccount, ClusterRole, ClusterRoleBinding)
#    - Permissions for AlertManager to read configuration
#    - Minimal permissions (least privilege)
#
# 5. NetworkPolicy (ingress and egress)
#    - Controls traffic to/from AlertManager pods
#    - Allows Prometheus scraping, cluster communication, external webhooks
#    - Restrictive by default (deny-all by default in namespace with NetworkPolicy)
#
# 6. PodDisruptionBudget
#    - Prevents involuntary disruption during node maintenance
#    - Keeps at least 1 replica running
#
# Access Methods:
# - Internal: kubectl port-forward -n monitoring svc/alertmanager 9093:9093
# - Then access: http://localhost:9093
# - UI: http://localhost:9093 (shows firing alerts, routes, silences)
# - API: http://localhost:9093/api/v1/alerts (JSON API)
# - Health check: curl http://localhost:9093/-/healthy
