# Prometheus Helm Chart - Staging Environment Overrides
# Applied on top of values-common.yaml for staging cluster (us-west-2)
# Usage: helm install prometheus-stack prometheus-community/kube-prometheus-stack \
#        --namespace monitoring \
#        --values values-common.yaml \
#        --values values-staging.yaml

# === STAGING-SPECIFIC OVERRIDES ===

prometheus:
  prometheusSpec:
    # External labels applied to all metrics scraped in staging
    # Helps identify data origin and enables cross-cluster queries
    externalLabels:
      cluster: "clarity-router-staging"      # Cluster identifier
      environment: "staging"                 # Environment designation
      region: "us-west-2"                   # AWS region
      monitoring_stack: "kube-prometheus-stack"  # Stack identifier
    
    # Staging: Standard resource allocation (slightly less than production)
    resources:
      requests:
        cpu: 1000m              # 1 CPU core per pod
        memory: 2Gi             # 2GB RAM per pod
      limits:
        cpu: 1500m              # 1.5 CPU cores max
        memory: 3Gi             # 3GB RAM max
    
    # Staging: Full 15-day retention (same as production for consistency)
    retention: 15d              # Keep all metrics for 15 days
    retentionSize: "90GB"       # Compress when reaching 90GB
    
    # Storage configuration for staging
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: efs-sc
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 100Gi    # 100GB for staging 15-day retention
    
    # Staging: 2 replicas for high availability (same as production)
    replicas: 2
    
    # Staging: Reduced logging verbosity compared to production
    logLevel: info
  
  # Prometheus ingress configuration (optional)
  ingress:
    enabled: false              # Use port-forward for security
    # To enable, add:
    # ingressClassName: nginx
    # hosts:
    #   - prometheus-staging.example.com
    # tls:
    #   - secretName: prometheus-staging-tls
    #     hosts:
    #       - prometheus-staging.example.com

# === ALERTMANAGER STAGING CONFIGURATION ===
# Staging AlertManager routes to Slack for visibility, lighter escalation than production
alertmanager:
  enabled: true
  
  alertmanagerSpec:
    # Staging: Standard storage for notification history
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: efs-sc
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 10Gi    # 10GB for 7-day notification history
    
    # Staging: 2 replicas for high availability
    replicas: 2
    
    # Resources for staging
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  
  # AlertManager configuration for staging (lighter escalation than production)
  config: |
    global:
      # Staging: 5-minute resolve timeout
      resolve_timeout: 5m
    
    route:
      receiver: "default"
      # Group alerts to avoid notification spam
      group_by: ["alertname", "cluster", "environment", "job", "instance"]
      group_wait: 30s        # Wait 30 seconds before sending grouped alerts
      group_interval: 5m     # Re-group alerts every 5 minutes
      repeat_interval: 6h    # Re-send unresolved alerts every 6 hours
      
      # Staging: All alerts route to Slack (no PagerDuty escalation)
      routes:
        - match:
            severity: critical
          receiver: "slack-critical"
          continue: false
          group_wait: 30s     # Standard grouping for critical alerts in staging
          repeat_interval: 6h # Re-notify every 6 hours
        
        - match:
            severity: warning
          receiver: "slack-warnings"
          group_wait: 1m      # Batch warnings slightly
          repeat_interval: 12h # Re-notify warnings every 12 hours (less aggressive)
    
    receivers:
      # Critical alerts: Slack (staging only, no PagerDuty)
      - name: "slack-critical"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"  # Set via Kubernetes Secret
            channel: "#monitoring-staging-critical"
            icon_emoji: ":rotating_light:"
            title: "{{ .GroupLabels.alertname }} - CRITICAL"
            text: |
              *Severity:* {{ .GroupLabels.severity }}
              *Cluster:* {{ .GroupLabels.cluster }}
              *Environment:* {{ .GroupLabels.environment }}
              *Count:* {{ .Alerts | len }}
              {{ range .Alerts }}
              • {{ .Labels.instance }} - {{ .Annotations.description }}
              {{ end }}
            send_resolved: true
      
      # Warnings: Slack integration
      - name: "slack-warnings"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"  # Set via Kubernetes Secret
            channel: "#monitoring-staging-alerts"
            icon_emoji: ":warning:"
            title: "{{ .GroupLabels.alertname }}"
            text: |
              *Severity:* {{ .GroupLabels.severity }}
              *Cluster:* {{ .GroupLabels.cluster }}
              *Environment:* {{ .GroupLabels.environment }}
              *Count:* {{ .Alerts | len }}
              {{ range .Alerts }}
              • {{ .Labels.instance }} - {{ .Annotations.description }}
              {{ end }}
            send_resolved: true
      
      # Default receiver for unmatched alerts
      - name: "default"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#monitoring-staging-default"
            title: "{{ .GroupLabels.alertname }}"
            text: "{{ .CommonAnnotations.description }}"

# === PROMETHEUS OPERATOR ===
# Staging configuration for Prometheus Operator
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# === KUBE-STATE-METRICS ===
# Staging: Enable full Kubernetes object monitoring
kubeStateMetrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

# === NODE-EXPORTER ===
nodeExporter:
  enabled: true

# === KUBE-APISERVER SCRAPING ===
kubeApiServer:
  enabled: true

# === KUBELET SCRAPING ===
kubelet:
  enabled: true
  namespace: kube-system

# === DEFAULT RULES ===
# Enable staging Kubernetes monitoring rules (same as production)
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubernetesApps: true
    kubernetesNodeNotReady: true
    kubernetesNotready: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    node: true
    prometheus: true

# === SERVICE ACCOUNT ===
serviceAccount:
  create: true
  name: prometheus
  annotations:
    # Optional: AWS IAM role for IRSA (IAM Roles for Service Accounts)
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID_STAGING:role/prometheus-role"
