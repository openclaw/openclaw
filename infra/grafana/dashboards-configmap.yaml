---
# Grafana Dashboards ConfigMap for ClarityRouter Observability
# Auto-discovered and provisioned into Grafana via dashboard provider
# Label: grafana_dashboard: "1" enables auto-import
# Applied to: both production and staging clusters

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
    grafana_dashboard: "1"  # Label for Grafana dashboard auto-discovery
    component: dashboards
data:
  # Dashboard 1: Router Health Overview
  # Purpose: At-a-glance operational status for on-call engineers
  # Panels: 12 panels with availability, latency, error rates, pod status, SLO tracking
  dashboard-router-health.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus-prod-uid"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus-prod-uid"
            },
            "enable": true,
            "expr": "ALERTS{cluster=~\"$cluster\"}",
            "iconColor": "red",
            "name": "AlertManager Alerts",
            "tagKeys": "severity,alertname",
            "textFormat": "{{ alertname }}: {{ cluster }}"
          }
        ]
      },
      "description": "Real-time operational status dashboard for ClarityRouter. Tracks availability, latency, error rates, and SLO compliance for on-call engineers.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "dashboard",
          "includeVars": true,
          "keepTime": true,
          "tags": ["router"],
          "targetBlank": false,
          "title": "Performance Details",
          "tooltip": "View detailed performance analysis",
          "type": "dashboards",
          "url": ""
        },
        {
          "asDropdown": false,
          "icon": "dashboard",
          "includeVars": true,
          "keepTime": true,
          "tags": ["infrastructure"],
          "targetBlank": false,
          "title": "Infrastructure Health",
          "tooltip": "View cluster resource utilization",
          "type": "dashboards",
          "url": ""
        }
      ],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.99
                  },
                  {
                    "color": "yellow",
                    "value": 0.995
                  },
                  {
                    "color": "green",
                    "value": 0.9995
                  }
                ]
              },
              "unit": "percentunit"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "text": {}
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "clarityrouter_router_availability{cluster=\"$cluster\"}",
              "interval": "",
              "legendFormat": "Availability",
              "refId": "A"
            }
          ],
          "title": "Availability Gauge",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 200
                  },
                  {
                    "color": "red",
                    "value": 250
                  }
                ]
              },
              "unit": "ms"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "text": {},
            "textMode": "auto"
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "clarityrouter_request_latency_ms{cluster=\"$cluster\", quantile=\"0.99\"}",
              "interval": "",
              "legendFormat": "P99 Latency",
              "refId": "A"
            }
          ],
          "title": "P99 Latency",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.5
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "text": {},
            "textMode": "auto"
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "((clarityrouter_errors_total{cluster=\"$cluster\"} / clarityrouter_requests_total{cluster=\"$cluster\"}) * 100)",
              "interval": "",
              "legendFormat": "Error Rate %",
              "refId": "A"
            }
          ],
          "title": "Error Rate %",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisLabel": "Requests/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                },
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "rps"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "rate(clarityrouter_requests_total{cluster=\"$cluster\"}[5m])",
              "interval": "",
              "legendFormat": "Throughput",
              "refId": "A"
            }
          ],
          "title": "Requests/Second",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "text": {},
            "textMode": "auto"
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\", pod=~\"router.*\", cluster=\"$cluster\"})",
              "interval": "",
              "legendFormat": "Running Pods",
              "refId": "A"
            }
          ],
          "title": "Running Pods",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "custom": {
                "align": "auto",
                "displayMode": "auto",
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 4,
            "y": 4
          },
          "id": 6,
          "options": {
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": ["sum"],
              "show": false
            },
            "showHeader": true,
            "sortBy": []
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "kube_pod_info{pod=~\"router.*\", cluster=\"$cluster\"} | on() group_left(phase,restarts) kube_pod_status_phase{cluster=\"$cluster\"} | on() group_left(restarts) increase(kube_pod_container_status_restarts_total{cluster=\"$cluster\"}[1h])",
              "format": "table",
              "instant": true,
              "interval": "",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Pod Status Table",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {},
                "indexByName": {},
                "renameByName": {
                  "pod": "Pod Name",
                  "namespace": "Namespace",
                  "phase": "Status",
                  "restarts": "Restarts"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisLabel": "Error Rate %",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                },
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.5
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "id": 7,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "((clarityrouter_errors_total{cluster=\"$cluster\"} / clarityrouter_requests_total{cluster=\"$cluster\"}) * 100)",
              "interval": "",
              "legendFormat": "Error Rate %",
              "refId": "A"
            }
          ],
          "title": "Error Rate Timeseries",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 0
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "id": 9,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "text": {},
            "textMode": "auto"
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "count(increase(kube_pod_container_status_restarts_total{cluster=\"$cluster\"}[1h]) > 0)",
              "interval": "",
              "legendFormat": "Pods with Restarts",
              "refId": "A"
            }
          ],
          "title": "Pod Restart Alert",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 1,
                      "text": "BREACHED"
                    },
                    "1": {
                      "color": "green",
                      "index": 0,
                      "text": "HEALTHY"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          },
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 10,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "text": {},
            "textMode": "auto"
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "((clarityrouter_request_latency_ms{cluster=\"$cluster\", quantile=\"0.99\"} < 200) and (clarityrouter_router_availability{cluster=\"$cluster\"} > 0.9995) and (((clarityrouter_errors_total{cluster=\"$cluster\"} / clarityrouter_requests_total{cluster=\"$cluster\"}) * 100) < 1))",
              "interval": "",
              "legendFormat": "SLO Status",
              "refId": "A"
            }
          ],
          "title": "SLO Compliance Status",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 11,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "text": {},
            "textMode": "auto"
          },
          "pluginVersion": "9.0.0",
          "targets": [
            {
              "expr": "time() - max(ALERTS_FOR_STATE{cluster=\"$cluster\"} != 0)",
              "interval": "",
              "legendFormat": "Seconds ago",
              "refId": "A"
            }
          ],
          "title": "Last Alert Fired",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["router", "production", "health", "slo"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "definition": "label_values(clarityrouter_requests_total, cluster)",
            "hide": 0,
            "includeAll": false,
            "label": "Cluster",
            "multi": false,
            "name": "cluster",
            "options": [],
            "query": {
              "query": "label_values(clarityrouter_requests_total, cluster)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "tagValuesQuery": "",
            "tags": [],
            "tagsQuery": "",
            "type": "query",
            "useTags": false
          },
          {
            "current": {
              "selected": false,
              "text": "prometheus-prod",
              "value": "prometheus-prod"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "queryValue": "",
            "refresh": 1,
            "regex": "(?:prometheus|loki)",
            "skipUrlSync": false,
            "sort": 0,
            "type": "datasource"
          },
          {
            "allValue": null,
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "definition": "label_values(kube_pod_info{pod=~\"router.*\"}, namespace)",
            "hide": 2,
            "includeAll": true,
            "label": "Namespace",
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(kube_pod_info{pod=~\"router.*\"}, namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "sort": 0,
            "tagValuesQuery": "",
            "tags": [],
            "tagsQuery": "",
            "type": "query",
            "useTags": false
          }
        ]
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"]
      },
      "timezone": "browser",
      "title": "Router Health Overview",
      "uid": "router-health-overview",
      "version": 1,
      "weekStart": ""
    }
