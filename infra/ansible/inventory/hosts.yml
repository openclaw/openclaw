---
all:
  children:
    gateway:
      hosts:
        gateway-vps:
          ansible_host: gateway.juxtagiraffe.appboxes.co
          ansible_user: appbox
          ansible_port: 10748
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_appbox"
          openclaw_mode: gateway
          openclaw_upstream_root: /home/appbox/apps/openclaw-upstream
          openclaw_gateway_bind: tailnet
          openclaw_telegram_enabled: true
          openclaw_ollama_host: ""

    nodes:
      hosts:
        kubuntu:
          ansible_host: 100.93.214.109
          ansible_user: jeff
          openclaw_mode: node
          openclaw_upstream_root: /home/jeff/apps/openclaw-upstream
          openclaw_gateway_bind: ""
          openclaw_telegram_enabled: false
          openclaw_ollama_host: "http://host.docker.internal:11434"

        popos:
          ansible_host: 100.119.126.67
          ansible_user: jeff
          openclaw_mode: node
          openclaw_upstream_root: /home/jeff/apps/openclaw-upstream
          openclaw_gateway_bind: ""
          openclaw_telegram_enabled: false
          openclaw_ollama_host: ""

    dev:
      hosts:
        mac:
          ansible_host: 127.0.0.1
          ansible_connection: local
          openclaw_mode: gateway
          openclaw_upstream_root: "{{ lookup('env', 'HOME') }}/Dev_Projects/openclaw_upstream"
          openclaw_gateway_bind: loopback
          openclaw_telegram_enabled: false
          openclaw_ollama_host: ""
