# Staging deployment for smoke-testing new builds before production.
# Usage: fly deploy --config fly-staging.toml --app openclaw-jhs-staging
#
# Uses a persistent volume (openclaw_staging_data) mounted at /data.
# Machine auto-stops after inactivity to save cost.

app = "openclaw-jhs-staging"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
OPENCLAW_HOME = "/data"
NODE_OPTIONS = "--max-old-space-size=4096"

[[mounts]]
source = "openclaw_staging_data"
destination = "/data"

[processes]
# Use the same entrypoint as production so workspace versioning (git clone/pull of
# jhs129/openclaw-agents) runs on staging too. Bootstrap a minimal openclaw.json
# with staging-safe flags if none exists (will be overwritten by staging-up.sh config sync).
app = "sh -c 'CONFIG=/data/openclaw.json; [ -f \"$CONFIG\" ] || echo \"{\\\"gateway\\\":{\\\"controlUi\\\":{\\\"dangerouslyAllowHostHeaderOriginFallback\\\":true,\\\"dangerouslyDisableDeviceAuth\\\":true}}}\" > \"$CONFIG\"; exec /app/scripts/fly-entrypoint.sh node dist/index.js gateway --allow-unconfigured --port 3000 --bind lan'"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[http_service.checks]]
grace_period = "120s"
interval = "5s"
method = "GET"
path = "/"
timeout = "5s"

[[vm]]
size = "shared-cpu-4x"
memory = "8192mb"
