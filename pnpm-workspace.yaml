packages:
  - .
  - ui
  - packages/*
  - extensions/*

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - "acpx"
  - "tokenjuice"
  - "@agentclientprotocol/sdk"
  - "axios"
  - "basic-ftp"
  - "hono"
  - "openclaw"
  - "protobufjs"
  - "vite"
  - "@cloudflare/workers-types"
  - "@hono/node-server"
  - "@mariozechner/*"
  - "@openai/codex"
  - "@openai/codex-*"
  - "@typescript/native-preview*"
  - "@types/node"
  - "@rolldown/*"
  - "@oxlint/*"
  - "@oxfmt/*"
  - "axios@1.15.0"
  - "discord-api-types"
  - "rolldown"
  - "sqlite-vec"
  - "sqlite-vec-*"

overrides:
  "@anthropic-ai/sdk": "0.93.0"
  "hono": "4.12.14"
  "@hono/node-server": "1.19.14"
  "@aws-sdk/client-bedrock-runtime": "3.1024.0"
  "axios": "1.16.0"
  "follow-redirects": "1.16.0"
  "defu": "6.1.5"
  "fast-xml-parser": "5.7.0"
  "request": "npm:@cypress/request@3.0.10"
  "request-promise": "npm:@cypress/request-promise@5.0.0"
  "basic-ftp": "5.3.0"
  "file-type": "22.0.1"
  "form-data": "2.5.4"
  "minimatch": "10.2.5"
  "path-to-regexp": "8.4.0"
  "qs": "6.14.2"
  "node-domexception": "npm:@nolyfill/domexception@1.0.28"
  "typebox": "1.1.37"
  "tar": "7.5.13"
  "tough-cookie": "4.1.3"
  "yauzl": "3.2.1"
  "protobufjs": "7.5.5"
  "uuid": "14.0.0"

patchedDependencies:
  "@agentclientprotocol/claude-agent-acp@0.32.0": "patches/@agentclientprotocol__claude-agent-acp@0.32.0.patch"
  "@whiskeysockets/baileys@7.0.0-rc.9": "patches/@whiskeysockets__baileys@7.0.0-rc.9.patch"

onlyBuiltDependencies:
  - "@openclaw/fs-safe"
  - "@discordjs/opus"
  - "@google/genai"
  - "@lydell/node-pty"
  - "@matrix-org/matrix-sdk-crypto-nodejs"
  - "@napi-rs/canvas"
  - "@tloncorp/api"
  - "@tloncorp/tlon-skill"
  - "@whiskeysockets/baileys"
  - "@whiskeysockets/libsignal-node"
  - authenticate-pam
  - better-sqlite3
  - esbuild
  - node-llama-cpp
  - protobufjs
  - sharp

ignoredBuiltDependencies:
  - koffi
  - tree-sitter-bash

packageExtensions:
  "@mariozechner/pi-coding-agent":
    dependencies:
      strip-ansi: "^7.2.0"

peerDependencyRules:
  allowedVersions:
    "prism-media>opusscript": "^0.0.8 || ^0.1.1"
