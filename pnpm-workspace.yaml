packages:
  - .
  - ui
  - packages/*
  - extensions/*

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - "openclaw"
  - "@mariozechner/*"
  - "@typescript/native-preview*"
  - "@oxlint/*"
  - "@oxfmt/*"
  - "sqlite-vec"
  - "sqlite-vec-*"

onlyBuiltDependencies:
  - "@lydell/node-pty"
  - "@matrix-org/matrix-sdk-crypto-nodejs"
  - "@napi-rs/canvas"
  - "@tloncorp/api"
  - "@whiskeysockets/baileys"
  - authenticate-pam
  - esbuild
  - node-llama-cpp
  - protobufjs
  - sharp

ignoredBuiltDependencies:
  - "@discordjs/opus"
  - koffi

nodeLinker: hoisted
resolutionMode: highest
blockExoticSubdeps: false
allowBuilds:
  allowBuilds:
  "@google/genai": true
  "@matrix-org/matrix-sdk-crypto-nodejs": true
  "@tloncorp/tlon-skill": true
  "@whiskeysockets/baileys": true
  esbuild: true
  koffi: true
  node-llama-cpp: true
  protobufjs: true
  sharp: true
