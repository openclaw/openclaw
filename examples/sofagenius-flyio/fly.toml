# OpenClaw + SofaGenius Fly.io deployment
# Runs both services on a single VM via supervisor.
#
# Setup:
#   fly apps create my-openclaw-ml
#   fly volumes create openclaw_data --size 2 --region iad
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#   fly secrets set HF_TOKEN=hf_...
#   fly secrets set WANDB_API_KEY=...
#   fly secrets set MODAL_TOKEN_ID=...
#   fly secrets set MODAL_TOKEN_SECRET=...
#   fly secrets set OPENCLAW_GATEWAY_TOKEN=$(openssl rand -hex 32)
#   fly deploy -c examples/sofagenius-flyio/fly.toml

app = "my-openclaw-ml"
primary_region = "iad"

[build]
  dockerfile = "examples/sofagenius-flyio/Dockerfile"

[env]
  NODE_ENV = "production"
  OPENCLAW_PREFER_PNPM = "1"
  OPENCLAW_STATE_DIR = "/data"
  NODE_OPTIONS = "--max-old-space-size=1536"

# Supervisor manages both openclaw-gateway (port 3000) and sofagenius (port 8000).
# Fly.io routes external HTTPS traffic to port 3000 (OpenClaw gateway).
# SofaGenius backend is internal-only (localhost:8000), accessed by OpenClaw skills.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# 4GB RAM recommended: OpenClaw gateway + SofaGenius backend + Python ML packages.
# Downgrade to 2048mb if cost-sensitive (may OOM under heavy use).
[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"

[mounts]
  source = "openclaw_data"
  destination = "/data"
