category: data_issue
critical:
  - critical_alerts
  - log_signals
  - db_schema_check
  - db_data_check
  - pg_internal_check
optional:
  - incident_memory
  - changes_in_window
  - config_lineage
  - file_truncation_signature
  - replica_lag
  - pg_activity
  - pg_statements
  - pg_conflicts
  - db_topology
rewards_provider_critical:
  # Always required for rewards/provider incidents.
  - db_row_provenance
  - provider_api_check
  - artifact_check
  - code_path_check
rewards_provider_same_token_critical:
  # Only required when one reward token appears on both supply and borrow.
  - provider_side_mismatch
  - code_path_reconciled
rewards_provider_optional: # intentionally empty
rewards_provider_reversal_critical:
  # Only required when fresh evidence disproves an earlier theory or PR.
  # This can stack with same-token requirements on the same incident.
  - disproved_theory_recorded
