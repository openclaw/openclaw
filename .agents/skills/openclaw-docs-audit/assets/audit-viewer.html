<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090d15;
        --panel: #10151f;
        --border: #242d3d;
        --border-strong: #364257;
        --text: #e7ecf5;
        --muted: #9aa6b8;
        --faint: #647085;
        --accent: #e6b82f;
        --accent-soft: rgba(230, 184, 47, 0.12);
        --green: #67d391;
        --blue: #74b7ff;
        --red: #f08383;
        --code-bg: #080b11;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at 30% -10%, rgba(88, 117, 169, 0.17), transparent 30%), var(--bg);
        color: var(--text);
        overflow: hidden;
      }
      button,
      input,
      select {
        font: inherit;
      }
      .app {
        display: grid;
        grid-template-columns: minmax(320px, 28vw) 1fr;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }
      .sidebar {
        min-width: 0;
        min-height: 0;
        height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
        border-right: 1px solid var(--border);
        background: rgba(13, 18, 28, 0.92);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .brand {
        padding: 22px 22px 16px;
        border-bottom: 1px solid var(--border);
      }
      .eyebrow {
        color: var(--accent);
        font-size: 11px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      .title-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        margin: 9px 0 8px;
      }
      .page-select {
        max-width: 210px;
        min-width: 160px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        background: #0b1019;
        color: var(--text);
        padding: 7px 28px 7px 10px;
        font-size: 12px;
        line-height: 1.2;
        outline: none;
      }
      .page-select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .mode-toggle {
        display: inline-flex;
        width: fit-content;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        background: #0b1019;
        overflow: hidden;
      }
      .mode-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 4px;
      }
      .mode-button {
        border: 0;
        border-right: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        padding: 7px 11px;
        font-size: 12px;
        line-height: 1.2;
        cursor: pointer;
      }
      .mode-button:last-child {
        border-right: 0;
      }
      .mode-button.active {
        background: rgba(116, 183, 255, 0.24);
        color: #d9ebff;
      }
      .wrap-button {
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        background: #0b1019;
        color: var(--muted);
        padding: 7px 11px;
        font-size: 12px;
        line-height: 1.2;
        cursor: pointer;
      }
      .wrap-button.active {
        border-color: rgba(116, 183, 255, 0.55);
        background: rgba(116, 183, 255, 0.24);
        color: #d9ebff;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .filters {
        display: grid;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      .search {
        width: 100%;
        border: 1px solid var(--border-strong);
        background: #0b1019;
        color: var(--text);
        border-radius: 8px;
        padding: 10px 12px;
        outline: none;
      }
      .search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
        font-size: 11px;
        line-height: 1.2;
        white-space: nowrap;
      }
      .chip.covered {
        color: var(--green);
        border-color: rgba(103, 211, 145, 0.35);
      }
      .chip.partial,
      .chip.needs {
        color: var(--accent);
        border-color: rgba(230, 184, 47, 0.45);
      }
      .chip.missing,
      .chip.removed {
        color: var(--red);
        border-color: rgba(240, 131, 131, 0.4);
      }
      .list {
        min-height: 0;
        height: 100%;
        overflow-x: auto;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding: 14px 12px 24px;
      }
      .list:focus {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }
      .page-group {
        min-width: 100%;
        margin-bottom: 18px;
      }
      .page-title {
        position: sticky;
        top: -14px;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 8px;
        color: var(--faint);
        background: rgba(13, 18, 28, 0.96);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 800;
      }
      .row {
        min-width: 100%;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        margin: 7px 0;
        padding: 11px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        color: inherit;
        text-align: left;
        cursor: pointer;
        user-select: text;
      }
      .row * {
        user-select: text;
      }
      .row:hover {
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.045);
      }
      .row.active {
        border-color: var(--accent);
        background: rgba(230, 184, 47, 0.1);
      }
      .id-pill {
        display: grid;
        place-items: center;
        width: 44px;
        height: 26px;
        border-radius: 999px;
        background: #171e2c;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
      }
      .row.active .id-pill {
        background: var(--accent);
        color: #18140a;
      }
      .row-main {
        min-width: max-content;
      }
      .row-label {
        overflow: visible;
        color: var(--text);
        font-size: 13px;
        line-height: 1.25;
        font-weight: 760;
        white-space: nowrap;
      }
      .row-summary {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        overflow: visible;
        white-space: nowrap;
      }
      .row-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 8px;
      }
      .doc-view {
        min-width: max-content;
        margin: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.025);
        overflow: hidden;
      }
      .doc-file-title {
        position: sticky;
        top: -14px;
        z-index: 2;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--faint);
        background: rgba(13, 18, 28, 0.96);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .doc-line {
        min-width: 100%;
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr);
        gap: 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: inherit;
        padding: 0 12px 0 0;
        text-align: left;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.7;
      }
      .doc-line[role="button"] {
        cursor: pointer;
      }
      .doc-line[role="button"]:hover {
        background: rgba(116, 183, 255, 0.1);
      }
      .doc-line.active {
        background: rgba(116, 183, 255, 0.2);
      }
      .doc-line-number {
        color: #586274;
        text-align: right;
        user-select: none;
      }
      .doc-line-text {
        overflow: visible;
        color: #c9d4e4;
        white-space: pre;
      }
      .doc-line.mapped .doc-line-text {
        color: #dce8f6;
      }
      .doc-line.heading .doc-line-text {
        color: #74b7ff;
        font-weight: 800;
      }
      .doc-line.code .doc-line-text {
        color: #67d391;
      }
      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: start;
        min-width: 0;
        padding: 20px 24px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(9, 13, 21, 0.72);
      }
      .selected-id {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }
      h2 {
        margin: 6px 0 7px;
        font-size: 23px;
        line-height: 1.18;
        letter-spacing: 0;
      }
      .summary {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        max-width: 980px;
      }
      .toolbar-tags {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 7px;
        min-width: 260px;
      }
      .preview {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(280px, 0.85fr) minmax(420px, 1.15fr);
        gap: 14px;
        padding: 14px;
      }
      .pane {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(16, 21, 31, 0.82);
        overflow: hidden;
      }
      .pane-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 15px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.025);
      }
      .pane-title {
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.2;
      }
      .ref {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.3;
        text-align: right;
      }
      .pane-body {
        min-height: 0;
        overflow: auto;
        padding: 0;
      }
      .snippet {
        border-bottom: 1px solid var(--border);
      }
      .snippet:last-child {
        border-bottom: 0;
      }
      .snippet-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 11px 14px;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.16);
        font-size: 12px;
      }
      pre {
        min-width: max-content;
        margin: 0;
        padding: 13px 0 15px;
        background: var(--code-bg);
        color: #d7deeb;
        overflow: visible;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
        tab-size: 2;
      }
      .code-line {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        min-width: max-content;
        padding: 0 14px 0 0;
      }
      .line-no {
        color: #586274;
        padding-right: 12px;
        text-align: right;
        user-select: none;
      }
      .line-text {
        overflow: visible;
        white-space: pre;
      }
      .diff-section {
        border-bottom: 1px solid var(--border);
      }
      .diff-section:last-child {
        border-bottom: 0;
      }
      .diff-hunk {
        min-width: max-content;
        border-top: 1px solid var(--border);
        background: var(--code-bg);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
      }
      .diff-hunk-head {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 8px 14px;
        color: var(--muted);
        background: rgba(116, 183, 255, 0.08);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      .diff-code {
        min-width: max-content;
        padding: 0;
      }
      .diff-line {
        display: grid;
        grid-template-columns: minmax(54px, auto) minmax(54px, auto) 24px minmax(0, 1fr);
        min-width: max-content;
        padding: 0 14px 0 0;
      }
      .diff-line.diff-add {
        background: rgba(39, 142, 77, 0.28);
        color: #adf0bf;
      }
      .diff-line.diff-remove {
        background: rgba(161, 54, 63, 0.28);
        color: #ffc0c0;
      }
      .diff-line.diff-context {
        color: #d7deeb;
      }
      .diff-no {
        color: #7b879a;
        padding-right: 10px;
        text-align: right;
        user-select: none;
      }
      .diff-sign {
        color: inherit;
        text-align: center;
        user-select: none;
      }
      .diff-text {
        overflow: visible;
        white-space: pre;
      }
      .diff-empty {
        padding: 13px 14px 15px;
        color: var(--muted);
        background: var(--code-bg);
      }
      body.wrap-text .row-main {
        min-width: 0;
      }
      body.wrap-text .row-label,
      body.wrap-text .row-summary {
        overflow-wrap: anywhere;
        white-space: normal;
      }
      body.wrap-text .doc-view,
      body.wrap-text pre,
      body.wrap-text .diff-hunk,
      body.wrap-text .diff-code {
        min-width: 0;
      }
      body.wrap-text .doc-line,
      body.wrap-text .code-line,
      body.wrap-text .diff-line {
        min-width: 0;
      }
      body.wrap-text .doc-line-text,
      body.wrap-text .line-text,
      body.wrap-text .diff-text {
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }
      .empty {
        height: 100%;
        display: grid;
        align-content: center;
        gap: 9px;
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }
      .empty strong {
        color: var(--text);
      }
      details.generator {
        border-top: 1px solid var(--border);
        background: rgba(116, 183, 255, 0.05);
      }
      details.generator summary {
        cursor: pointer;
        padding: 10px 14px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 700;
      }
      @media (max-width: 1100px) {
        body {
          overflow: auto;
        }
        .app {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }
        .sidebar {
          height: 48vh;
          max-height: 48vh;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }
        .main {
          min-height: 720px;
        }
      }
      @media (max-width: 820px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
        .toolbar-tags {
          justify-content: flex-start;
          min-width: 0;
        }
        .preview {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <header class="brand">
          <div class="eyebrow">OpenClaw Docs Audit</div>
          <div class="title-row">
            <h1 id="viewerTitle">Migration Map</h1>
            <select class="page-select" id="pageSelect" aria-label="Audit page"></select>
          </div>
          <div class="mode-toolbar">
            <div class="mode-toggle" role="group" aria-label="Source view mode">
              <button class="mode-button active" id="blockModeButton" type="button">
                Block mode
              </button>
              <button class="mode-button" id="docModeButton" type="button">Doc mode</button>
            </div>
            <button class="wrap-button" id="wrapTextButton" type="button">Wrap off</button>
          </div>
          <div class="meta" id="datasetMeta"></div>
        </header>
        <section class="filters" aria-label="Filters">
          <input
            id="search"
            class="search"
            type="search"
            placeholder="Search units, notes, destinations"
          />
          <div class="legend" id="legend"></div>
        </section>
        <nav class="list" id="unitList" aria-label="Audit units" tabindex="0"></nav>
      </aside>
      <main class="main">
        <header class="toolbar">
          <div>
            <div class="selected-id" id="selectedId"></div>
            <h2 id="selectedTitle"></h2>
            <div class="summary" id="selectedSummary"></div>
          </div>
          <div class="toolbar-tags" id="selectedTags"></div>
        </header>
        <section class="preview" aria-label="Source and destination preview">
          <article class="pane">
            <div class="pane-head">
              <div class="pane-title">Mapped source ranges</div>
              <div class="ref" id="sourceRef"></div>
            </div>
            <div class="pane-body" id="sourcePane"></div>
          </article>
          <article class="pane">
            <div class="pane-head">
              <div class="pane-title">Diff view</div>
              <div class="ref" id="destinationCount"></div>
            </div>
            <div class="pane-body" id="destinationPane"></div>
          </article>
        </section>
      </main>
    </div>
    <script type="application/json" id="audit-data">
      __AUDIT_DATA__
    </script>
    <script>
      (function () {
        const data = JSON.parse(document.getElementById("audit-data").textContent);
        const units = data.pages.flatMap(function (page) {
          return page.units;
        });
        const pageViews =
          data.pageViews && data.pageViews.length
            ? data.pageViews
            : data.pages.map(function (page) {
                return {
                  count: page.units.length,
                  id: "source:" + page.page,
                  kind: "source",
                  label: page.page,
                  page: page.page,
                };
              });
        const state = {
          mode: "block",
          query: "",
          selectedId: units[0] ? units[0].id : null,
          selectedViewId: pageViews[0] ? pageViews[0].id : "",
          wrapText: false,
        };
        const els = {
          blockModeButton: document.getElementById("blockModeButton"),
          datasetMeta: document.getElementById("datasetMeta"),
          destinationCount: document.getElementById("destinationCount"),
          destinationPane: document.getElementById("destinationPane"),
          docModeButton: document.getElementById("docModeButton"),
          legend: document.getElementById("legend"),
          pageSelect: document.getElementById("pageSelect"),
          search: document.getElementById("search"),
          selectedId: document.getElementById("selectedId"),
          selectedSummary: document.getElementById("selectedSummary"),
          selectedTags: document.getElementById("selectedTags"),
          selectedTitle: document.getElementById("selectedTitle"),
          sourcePane: document.getElementById("sourcePane"),
          sourceRef: document.getElementById("sourceRef"),
          unitList: document.getElementById("unitList"),
          viewerTitle: document.getElementById("viewerTitle"),
          wrapTextButton: document.getElementById("wrapTextButton"),
        };

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function refLabel(ref) {
          if (!ref) return "";
          return ref.path + ":" + ref.start + (ref.end !== ref.start ? "-" + ref.end : "");
        }

        function statusClass(status) {
          if (status === "covered") return "covered";
          if (status === "partially-covered") return "partial";
          if (status === "missing") return "missing";
          if (status === "intentionally-removed") return "removed";
          if (status === "needs-source-check") return "needs";
          return "";
        }

        function chip(label, className) {
          return (
            '<span class="chip ' +
            escapeHtml(className || "") +
            '">' +
            escapeHtml(label) +
            "</span>"
          );
        }

        function currentView() {
          return (
            pageViews.find(function (view) {
              return view.id === state.selectedViewId;
            }) || pageViews[0]
          );
        }

        function unitsForView(view) {
          if (!view) return units;
          if (view.kind === "destination") {
            return units.filter(function (unit) {
              return unit.destinations.some(function (destination) {
                return destination.ref && destination.ref.path === view.page;
              });
            });
          }
          const sourcePage = data.pages.find(function (page) {
            return page.page === view.page;
          });
          return sourcePage ? sourcePage.units : [];
        }

        function destinationsForView(unit) {
          const view = currentView();
          if (!view || view.kind !== "destination") return unit.destinations;
          return unit.destinations.filter(function (destination) {
            return destination.ref && destination.ref.path === view.page;
          });
        }

        function ensureSelectedUnit() {
          const viewUnits = unitsForView(currentView());
          if (
            !viewUnits.some(function (unit) {
              return unit.id === state.selectedId;
            })
          ) {
            state.selectedId = viewUnits[0]?.id || null;
          }
        }

        function sourcePagesForView() {
          const byPage = new Map();
          unitsForView(currentView()).forEach(function (unit) {
            if (!byPage.has(unit.page)) {
              const sourcePage = data.pages.find(function (page) {
                return page.page === unit.page;
              });
              if (sourcePage?.sourceDocument?.lines?.length) byPage.set(unit.page, sourcePage);
            }
          });
          return Array.from(byPage.values());
        }

        function unitForLine(pagePath, lineNumber) {
          return unitsForView(currentView()).find(function (unit) {
            const ref = unit.source && unit.source.ref;
            return ref && ref.path === pagePath && ref.start <= lineNumber && ref.end >= lineNumber;
          });
        }

        function lineKind(text) {
          if (/^\s*#+\s/.test(text)) return " heading";
          if (/^\s*```/.test(text)) return " code";
          return "";
        }

        function searchable(unit) {
          return [
            unit.id,
            unit.label,
            unit.page,
            unit.summary,
            unit.action,
            unit.reason,
            unit.status,
            unit.notes,
            unit.destinations
              .map(function (dest) {
                return [refLabel(dest.ref), refLabel(dest.generator), dest.note].join(" ");
              })
              .join(" "),
          ]
            .join(" ")
            .toLowerCase();
        }

        function renderCode(lines) {
          if (!lines || lines.length === 0) {
            return '<div class="empty"><strong>No repo lines available</strong><span>This unit has no preserved line range in the viewer data.</span></div>';
          }
          return (
            "<pre>" +
            lines
              .map(function (line) {
                return (
                  '<span class="code-line"><span class="line-no">' +
                  line.number +
                  '</span><span class="line-text">' +
                  escapeHtml(line.text) +
                  "</span></span>"
                );
              })
              .join("") +
            "</pre>"
          );
        }

        function refsOverlap(left, right) {
          return (
            left &&
            right &&
            left.path === right.path &&
            left.start <= right.end &&
            right.start <= left.end
          );
        }

        function refsEqual(left, right) {
          return Boolean(left && right && refKey(left) === refKey(right));
        }

        function refKey(ref) {
          return ref ? ref.path + ":" + ref.start + "-" + ref.end : "";
        }

        function refLength(ref) {
          return ref ? Math.max(0, ref.end - ref.start + 1) : 0;
        }

        function compareRefs(left, right) {
          const leftPath = left?.path || "";
          const rightPath = right?.path || "";
          if (leftPath !== rightPath) return leftPath.localeCompare(rightPath);
          return (left?.start || 0) - (right?.start || 0);
        }

        function sortUnitsBySource(sourceUnits) {
          return sourceUnits.slice().sort(function (left, right) {
            return (
              compareRefs(left.source?.ref, right.source?.ref) || left.id.localeCompare(right.id)
            );
          });
        }

        function sourceLinesForUnit(unit) {
          const path = unit.source?.ref?.path || unit.page;
          return (unit.source?.lines || []).map(function (line) {
            return {
              number: line.number,
              path,
              text: line.text,
              unitId: unit.id,
            };
          });
        }

        function destinationLinesFor(destination) {
          const path = destination?.ref?.path || "";
          return (destination?.lines || []).map(function (line) {
            return {
              number: line.number,
              path,
              text: line.text,
            };
          });
        }

        function comparisonUnitsFor(unit, selectedDestinations) {
          const refs = selectedDestinations
            .map(function (destination) {
              return destination.ref;
            })
            .filter(Boolean);
          if (!refs.length) return [unit];
          const related = new Map([[unit.id, unit]]);
          units.forEach(function (candidate) {
            if (
              candidate.destinations.some(function (destination) {
                return refs.some(function (ref) {
                  return refsEqual(destination.ref, ref);
                });
              })
            ) {
              related.set(candidate.id, candidate);
            }
          });
          return sortUnitsBySource(Array.from(related.values()));
        }

        function destinationGroupsFor(comparisonUnits, selectedDestinations) {
          if (!selectedDestinations.length) {
            return [
              {
                destination: null,
                units: comparisonUnits,
              },
            ];
          }
          const selectedRefs = selectedDestinations
            .map(function (destination) {
              return destination.ref;
            })
            .filter(Boolean);
          const groups = new Map();
          comparisonUnits.forEach(function (sourceUnit) {
            destinationsForView(sourceUnit).forEach(function (destination) {
              const matches =
                !selectedRefs.length ||
                selectedRefs.some(function (ref) {
                  return refsEqual(destination.ref, ref);
                });
              if (!matches) return;
              const key = destination.ref
                ? refKey(destination.ref)
                : "external:" + (destination.note || destination.raw || sourceUnit.id);
              if (!groups.has(key)) {
                groups.set(key, {
                  destination,
                  units: [],
                });
              }
              const group = groups.get(key);
              if (
                !group.units.some(function (existing) {
                  return existing.id === sourceUnit.id;
                })
              ) {
                group.units.push(sourceUnit);
              }
            });
          });
          return Array.from(groups.values()).sort(function (left, right) {
            return compareRefs(left.destination?.ref, right.destination?.ref);
          });
        }

        function sourceSummary(sourceUnits) {
          const pages = new Set(
            sourceUnits
              .map(function (unit) {
                return unit.source?.ref?.path;
              })
              .filter(Boolean),
          );
          return (
            sourceUnits.length +
            " mapped range" +
            (sourceUnits.length === 1 ? "" : "s") +
            " from " +
            pages.size +
            " source page" +
            (pages.size === 1 ? "" : "s")
          );
        }

        function renderMappedSources(sourceUnits) {
          if (!sourceUnits.length) {
            return '<div class="empty"><strong>No source ranges</strong><span>The selected unit has no mapped source lines.</span></div>';
          }
          return sourceUnits
            .map(function (sourceUnit) {
              return (
                '<section class="snippet"><div class="snippet-meta"><span>' +
                escapeHtml(sourceUnit.id + " " + sourceUnit.label) +
                "</span><span>" +
                escapeHtml(refLabel(sourceUnit.source?.ref)) +
                "</span></div>" +
                renderCode(sourceUnit.source?.lines || []) +
                "</section>"
              );
            })
            .join("");
        }

        function diffLineOps(sourceLines, destinationLines) {
          const oldCount = sourceLines.length;
          const newCount = destinationLines.length;
          const dp = Array.from({ length: oldCount + 1 }, function () {
            return Array(newCount + 1).fill(0);
          });
          for (let oldIndex = oldCount - 1; oldIndex >= 0; oldIndex -= 1) {
            for (let newIndex = newCount - 1; newIndex >= 0; newIndex -= 1) {
              dp[oldIndex][newIndex] =
                sourceLines[oldIndex].text === destinationLines[newIndex].text
                  ? dp[oldIndex + 1][newIndex + 1] + 1
                  : Math.max(dp[oldIndex + 1][newIndex], dp[oldIndex][newIndex + 1]);
            }
          }
          const operations = [];
          let oldIndex = 0;
          let newIndex = 0;
          while (oldIndex < oldCount || newIndex < newCount) {
            if (
              oldIndex < oldCount &&
              newIndex < newCount &&
              sourceLines[oldIndex].text === destinationLines[newIndex].text
            ) {
              operations.push({
                destinationLine: destinationLines[newIndex],
                sourceLine: sourceLines[oldIndex],
                type: "context",
              });
              oldIndex += 1;
              newIndex += 1;
              continue;
            }
            if (
              oldIndex < oldCount &&
              (newIndex >= newCount || dp[oldIndex + 1][newIndex] >= dp[oldIndex][newIndex + 1])
            ) {
              operations.push({
                sourceLine: sourceLines[oldIndex],
                type: "remove",
              });
              oldIndex += 1;
              continue;
            }
            operations.push({
              destinationLine: destinationLines[newIndex],
              type: "add",
            });
            newIndex += 1;
          }
          return operations;
        }

        function lineNumberLabel(line, usePath) {
          if (!line) return "";
          return usePath && line.path ? line.path + ":" + line.number : String(line.number);
        }

        function renderDiffCode(sourceLines, destinationLines) {
          if (!sourceLines.length && !destinationLines.length) {
            return '<div class="diff-empty">No diffable source or destination lines.</div>';
          }
          const sourcePages = new Set(
            sourceLines
              .map(function (line) {
                return line.path;
              })
              .filter(Boolean),
          );
          const destinationPages = new Set(
            destinationLines
              .map(function (line) {
                return line.path;
              })
              .filter(Boolean),
          );
          const useSourcePath = sourcePages.size > 1;
          const useDestinationPath = destinationPages.size > 1;
          return (
            '<div class="diff-code">' +
            diffLineOps(sourceLines, destinationLines)
              .map(function (operation) {
                const className =
                  operation.type === "add"
                    ? "diff-add"
                    : operation.type === "remove"
                      ? "diff-remove"
                      : "diff-context";
                const sign =
                  operation.type === "add" ? "+" : operation.type === "remove" ? "-" : " ";
                const text =
                  operation.type === "add"
                    ? operation.destinationLine.text
                    : operation.sourceLine.text;
                return (
                  '<div class="diff-line ' +
                  className +
                  '"><span class="diff-no">' +
                  escapeHtml(lineNumberLabel(operation.sourceLine, useSourcePath)) +
                  '</span><span class="diff-no">' +
                  escapeHtml(lineNumberLabel(operation.destinationLine, useDestinationPath)) +
                  '</span><span class="diff-sign">' +
                  sign +
                  '</span><span class="diff-text">' +
                  escapeHtml(text) +
                  "</span></div>"
                );
              })
              .join("") +
            "</div>"
          );
        }

        function hunkLabel(sourceUnits, destination) {
          const sourceRefs = sourceUnits
            .map(function (unit) {
              return unit.source?.ref;
            })
            .filter(Boolean);
          const oldPart =
            sourceRefs.length === 1
              ? sourceRefs[0].start + "," + refLength(sourceRefs[0])
              : sourceRefs.length + " ranges";
          const newPart = destination?.ref
            ? destination.ref.start + "," + refLength(destination.ref)
            : "0,0";
          return "@@ -" + oldPart + " +" + newPart + " @@";
        }

        function renderDiffView(groups) {
          return groups
            .map(function (group, index) {
              const destination = group.destination;
              const sourceLines = group.units.flatMap(sourceLinesForUnit);
              const destinationLines = destinationLinesFor(destination);
              const destinationTitle = destination?.ref
                ? refLabel(destination.ref)
                : destination?.note || "No destination range";
              const generator =
                destination?.generator && destination?.generatorLines
                  ? '<details class="generator"><summary>Generator source: ' +
                    escapeHtml(refLabel(destination.generator)) +
                    "</summary>" +
                    renderCode(destination.generatorLines) +
                    "</details>"
                  : "";
              return (
                '<section class="diff-section"><div class="snippet-meta"><span>Destination ' +
                (index + 1) +
                "</span><span>" +
                escapeHtml(destinationTitle) +
                '</span></div><div class="diff-hunk"><div class="diff-hunk-head"><span>' +
                escapeHtml(hunkLabel(group.units, destination)) +
                "</span><span>from " +
                escapeHtml(
                  group.units
                    .map(function (sourceUnit) {
                      return sourceUnit.id;
                    })
                    .join(", "),
                ) +
                "</span></div>" +
                renderDiffCode(sourceLines, destinationLines) +
                "</div>" +
                generator +
                "</section>"
              );
            })
            .join("");
        }

        function renderPageSelect() {
          els.pageSelect.innerHTML = pageViews
            .map(function (view) {
              return (
                '<option value="' +
                escapeHtml(view.id) +
                '">' +
                escapeHtml(view.label) +
                " (" +
                view.count +
                ")</option>"
              );
            })
            .join("");
          els.pageSelect.value = state.selectedViewId;
        }

        function renderModeToggle() {
          els.blockModeButton.classList.toggle("active", state.mode === "block");
          els.docModeButton.classList.toggle("active", state.mode === "doc");
          document.body.classList.toggle("wrap-text", state.wrapText);
          els.wrapTextButton.classList.toggle("active", state.wrapText);
          els.wrapTextButton.textContent = state.wrapText ? "Wrap on" : "Wrap off";
          els.search.placeholder =
            state.mode === "doc"
              ? "Search headings or lines in this doc"
              : "Search units, notes, destinations";
        }

        function renderDocList() {
          const query = state.query.trim().toLowerCase();
          const html = sourcePagesForView()
            .map(function (page) {
              const lines = page.sourceDocument.lines
                .map(function (line) {
                  const unit = unitForLine(page.page, line.number);
                  const matchesQuery =
                    !query ||
                    line.text.toLowerCase().includes(query) ||
                    (unit && searchable(unit).includes(query));
                  if (!matchesQuery) return "";
                  const active = unit && unit.id === state.selectedId ? " active" : "";
                  const mapped = unit ? " mapped" : "";
                  const attrs = unit
                    ? ' role="button" tabindex="0" data-id="' + escapeHtml(unit.id) + '"'
                    : "";
                  return (
                    '<div class="doc-line' +
                    active +
                    mapped +
                    lineKind(line.text) +
                    '"' +
                    attrs +
                    ">" +
                    '<span class="doc-line-number">' +
                    line.number +
                    "</span>" +
                    '<span class="doc-line-text">' +
                    escapeHtml(line.text) +
                    "</span></div>"
                  );
                })
                .join("");
              return (
                '<section class="doc-view"><div class="doc-file-title">' +
                escapeHtml(page.page) +
                "</div>" +
                lines +
                "</section>"
              );
            })
            .join("");
          els.unitList.innerHTML =
            html ||
            '<div class="empty"><strong>No matching source lines</strong><span>Try a different filter.</span></div>';
          els.unitList.querySelectorAll(".doc-line[role='button']").forEach(function (line) {
            line.addEventListener("click", function () {
              state.selectedId = line.getAttribute("data-id");
              render();
            });
            line.addEventListener("keydown", function (event) {
              if (event.key !== "Enter" && event.key !== " ") return;
              event.preventDefault();
              state.selectedId = line.getAttribute("data-id");
              render();
            });
          });
        }

        function renderList() {
          if (state.mode === "doc") {
            renderDocList();
            return;
          }
          const query = state.query.trim().toLowerCase();
          const view = currentView();
          const pageUnits = unitsForView(view).filter(function (unit) {
            return !query || searchable(unit).includes(query);
          });
          const html =
            pageUnits.length === 0
              ? ""
              : '<section class="page-group"><div class="page-title"><span>' +
                escapeHtml(view.page) +
                "</span><span>" +
                pageUnits.length +
                "</span></div>" +
                pageUnits
                  .map(function (unit) {
                    const active = unit.id === state.selectedId ? " active" : "";
                    return (
                      '<div class="row' +
                      active +
                      '" role="button" tabindex="0" data-id="' +
                      escapeHtml(unit.id) +
                      '">' +
                      '<span class="id-pill">' +
                      escapeHtml(unit.id.replace("P", "")) +
                      "</span>" +
                      '<span class="row-main"><span class="row-label">' +
                      escapeHtml(unit.label) +
                      "</span>" +
                      '<span class="row-summary">' +
                      escapeHtml(unit.summary) +
                      "</span>" +
                      '<span class="row-tags">' +
                      chip(unit.status, statusClass(unit.status)) +
                      chip(unit.action, "") +
                      "</span></span>" +
                      "</div>"
                    );
                  })
                  .join("") +
                "</section>";
          els.unitList.innerHTML =
            html ||
            '<div class="empty"><strong>No matching units</strong><span>Try a different filter.</span></div>';
          els.unitList.querySelectorAll(".row").forEach(function (row) {
            row.addEventListener("click", function () {
              state.selectedId = row.getAttribute("data-id");
              render();
            });
            row.addEventListener("keydown", function (event) {
              if (event.key !== "Enter" && event.key !== " ") return;
              event.preventDefault();
              state.selectedId = row.getAttribute("data-id");
              render();
            });
          });
        }

        function renderDetails() {
          const viewUnits = unitsForView(currentView());
          const unit =
            viewUnits.find(function (candidate) {
              return candidate.id === state.selectedId;
            }) ||
            viewUnits[0] ||
            units[0];
          if (!unit) return;
          state.selectedId = unit.id;
          const destinations = destinationsForView(unit);
          const comparisonUnits = comparisonUnitsFor(unit, destinations);
          const destinationGroups = destinationGroupsFor(comparisonUnits, destinations);
          els.selectedId.textContent = unit.id + " / " + unit.page;
          els.selectedTitle.textContent = unit.label;
          els.selectedSummary.textContent = unit.summary;
          els.selectedTags.innerHTML =
            chip(unit.status, statusClass(unit.status)) +
            chip(unit.action, "") +
            chip(unit.reason, "") +
            (destinations.length
              ? chip(
                  destinations.length + " destination" + (destinations.length === 1 ? "" : "s"),
                  "",
                )
              : chip("no destination", "removed"));
          els.sourceRef.textContent = sourceSummary(comparisonUnits);
          els.sourcePane.innerHTML = renderMappedSources(comparisonUnits);
          els.destinationCount.textContent = destinations.length
            ? "unified diff · " +
              destinationGroups.length +
              " section" +
              (destinationGroups.length === 1 ? "" : "s")
            : "removed";
          els.destinationPane.innerHTML = destinations.length
            ? renderDiffView(destinationGroups)
            : '<div class="empty"><strong>No destination range</strong><span>' +
              escapeHtml(unit.notes || "The audit marks this content as intentionally removed.") +
              "</span></div>" +
              renderDiffView(destinationGroups);
        }

        function renderLegend() {
          const counts = unitsForView(currentView()).reduce(function (acc, unit) {
            acc[unit.status] = (acc[unit.status] || 0) + 1;
            return acc;
          }, {});
          els.legend.innerHTML = Object.keys(counts)
            .sort()
            .map(function (status) {
              return chip(status + ": " + counts[status], statusClass(status));
            })
            .join("");
        }

        function renderMeta() {
          const unitCount = units.length;
          const pageCount = data.pages.length;
          const view = currentView();
          const viewCount = unitsForView(view).length;
          els.viewerTitle.textContent = data.viewerTitle || data.title || "Migration Map";
          els.datasetMeta.textContent =
            viewCount +
            " units for " +
            view.page +
            ". " +
            unitCount +
            " total units across " +
            pageCount +
            " source page" +
            (pageCount === 1 ? "" : "s") +
            ". Source archive: " +
            data.sourceArchive.gitRef +
            ".";
        }

        function render() {
          ensureSelectedUnit();
          renderPageSelect();
          renderModeToggle();
          renderMeta();
          renderLegend();
          renderList();
          renderDetails();
        }

        function scrollUnitList(deltaY) {
          const maxScroll = els.unitList.scrollHeight - els.unitList.clientHeight;
          const nextScroll = Math.max(0, Math.min(maxScroll, els.unitList.scrollTop + deltaY));
          if (nextScroll === els.unitList.scrollTop) return false;
          els.unitList.scrollTop = nextScroll;
          return true;
        }

        document.querySelector(".sidebar").addEventListener(
          "wheel",
          function (event) {
            if (scrollUnitList(event.deltaY)) event.preventDefault();
          },
          { passive: false },
        );

        els.unitList.addEventListener("keydown", function (event) {
          const keyScroll = {
            ArrowDown: 48,
            ArrowUp: -48,
            PageDown: Math.max(160, els.unitList.clientHeight - 80),
            PageUp: -Math.max(160, els.unitList.clientHeight - 80),
          }[event.key];
          if (keyScroll && scrollUnitList(keyScroll)) event.preventDefault();
        });

        els.search.addEventListener("input", function () {
          state.query = els.search.value;
          renderList();
        });

        els.blockModeButton.addEventListener("click", function () {
          state.mode = "block";
          state.query = "";
          els.search.value = "";
          els.unitList.scrollTop = 0;
          render();
        });

        els.docModeButton.addEventListener("click", function () {
          state.mode = "doc";
          state.query = "";
          els.search.value = "";
          els.unitList.scrollTop = 0;
          render();
        });

        els.wrapTextButton.addEventListener("click", function () {
          state.wrapText = !state.wrapText;
          render();
        });

        els.pageSelect.addEventListener("change", function () {
          state.selectedViewId = els.pageSelect.value;
          state.query = "";
          els.search.value = "";
          state.selectedId = unitsForView(currentView())[0]?.id || null;
          els.unitList.scrollTop = 0;
          render();
        });

        render();
      })();
    </script>
  </body>
</html>
