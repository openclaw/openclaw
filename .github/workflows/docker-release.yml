name: Docker Release Disabled In ZekeBot

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: This inherited upstream release workflow is disabled in ZekeBot.
        required: false
        type: string

permissions:
  contents: read

jobs:
  disabled:
    name: Disabled in ZekeBot
    runs-on: ubuntu-24.04
    steps:
      - name: Explain disabled workflow
        run: |
          cat <<'EOF'
          The upstream Docker Release workflow is disabled in openzeke/zekebot.

          OCL-FORK-001 uses .github/workflows/build-images.yml for immutable
          zb-YYYY.M.DD-<sha> image builds. That workflow intentionally does not
          move latest, main, slim, version, or release tags. S3 owns promotion.
          EOF
