name: hide-build-verify

# Hide individual operator CI — self-hosted runner on Mac Studio
# Triggers on pushes to Hide's working branches only (not upstream-tracking branches).
# Public-repo + self-hosted runner safety:
#   - No pull_request trigger (prevents fork-PR exploitation)
#   - Explicit branch allowlist
on:
  push:
    branches:
      - 'main'
      - 'fix/**'
      - 'feat/**'
      - 'ci/**'
      - 'codex/**'
      - 'chore/**'
  workflow_dispatch:

concurrency:
  group: hide-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PATH
        run: |
          {
            echo "/opt/homebrew/bin"
            echo "/usr/local/bin"
            echo "$HOME/Library/pnpm"
            echo "$HOME/.local/bin"
          } >> "$GITHUB_PATH"

      - name: Show versions
        run: |
          node --version || true
          pnpm --version || true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm build

      - name: Log result
        if: always()
        run: |
          mkdir -p "$HOME/.openclaw/Audit"
          printf '%s\tCI %s\tref=%s\tsha=%s\trun=%s\n' \
            "$(date -u +%FT%TZ)" "${{ job.status }}" \
            "${{ github.ref }}" "${{ github.sha }}" \
            "${{ github.run_id }}" \
            >> "$HOME/.openclaw/Audit/ci-builds.log"

      - name: Notify Discord on failure
        if: failure()
        env:
          HIDE_NOTIFY_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN: ${{ github.run_id }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$HIDE_NOTIFY_URL" ]; then
            echo "notify endpoint not configured; skipping notification"
            exit 0
          fi
          SHORT_SHA="${GH_SHA:0:7}"
          RUN_URL="https://github.com/${GH_REPO}/actions/runs/${GH_RUN}"
          PAYLOAD=$(jq -nc \
            --arg repo "$GH_REPO" \
            --arg branch "$GH_REF" \
            --arg sha "$SHORT_SHA" \
            --arg run "$GH_RUN" \
            --arg url "$RUN_URL" \
            '{
              username: "GitHub CI",
              embeds: [{
                title: ("Build failed: " + $repo),
                color: 15158332,
                fields: [
                  { name: "branch", value: $branch, inline: true },
                  { name: "commit", value: $sha,    inline: true },
                  { name: "log",    value: ("[run #" + $run + "](" + $url + ")") }
                ]
              }]
            }')
          curl -fsS -H "Content-Type: application/json" -d "$PAYLOAD" "$HIDE_NOTIFY_URL" >/dev/null
