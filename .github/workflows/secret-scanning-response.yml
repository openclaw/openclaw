name: Secret Scanning Response

on:
  secret_scanning_alert:
    types: [created, reopened]
  workflow_dispatch:
    inputs:
      alert_number:
        description: Secret scanning alert number to process
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions: {}

jobs:
  secret-scanning-response:
    if: github.event_name == 'workflow_dispatch' || github.event.alert.resolution == null
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: read
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        continue-on-error: true
        with:
          app-id: "2729701"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/create-github-app-token@v2
        id: app-token-fallback
        if: steps.app-token.outcome == 'failure'
        with:
          app-id: "2971289"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY_FALLBACK }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Respond to secret scanning alert
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || steps.app-token-fallback.outputs.token }}
          SECRET_SCANNING_ALERT_NUMBER: ${{ github.event.alert.number || inputs.alert_number }}
          SECRET_SCANNING_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/secret-scanning-response.mjs
