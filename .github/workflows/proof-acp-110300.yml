name: Proof 110300 real ACP cancellation

on:
  push:
    branches:
      - codex/proof-110300-real-acp

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PR_HEAD_SHA: 56b7bb3497759e4834e2f68ac5704d9efe76944b

jobs:
  proof:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CODEX_API_KEY: ""
      CODEX_CONFIG: '{"model":"qwen2.5-coder:1.5b","model_provider":"ollama","approval_policy":"never","sandbox_mode":"read-only"}'
      CODEX_OSS_BASE_URL: http://127.0.0.1:11434/v1
      INITIAL_AGENT_MODE: read-only
      MODEL_PROVIDER: ollama
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_CONTEXT_LENGTH: "32768"
      OLLAMA_NUM_PARALLEL: "1"
      OPENAI_API_KEY: ""
      OPENCLAW_LIVE_ACP_BIND: "1"
      OPENCLAW_LIVE_ACP_BIND_AGENT: codex
      OPENCLAW_LIVE_ACP_BIND_CANCEL_TRANSCRIPT_PROBE: "1"
      OPENCLAW_LIVE_ACP_BIND_CODEX_MODEL: qwen2.5-coder:1.5b
      OPENCLAW_LIVE_ACP_BIND_IMAGE_PROBE: "0"
      OPENCLAW_LIVE_ACP_BIND_PARENT_MODEL: openai/gpt-5.4
      OPENCLAW_LIVE_ACP_BIND_REQUEST_TIMEOUT_MS: "240000"
      OPENCLAW_LIVE_TEST_QUIET: "0"
      OPENCLAW_VITEST_NO_OUTPUT_TIMEOUT_MS: "600000"
    steps:
      - name: Check out exact proof branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Verify product tree is the PR head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "$PR_HEAD_SHA"
          git diff --exit-code "$PR_HEAD_SHA" HEAD -- . \
            ':(exclude)src/gateway/gateway-acp-bind.live.test.ts' \
            ':(exclude).github/workflows/proof-acp-110300.yml'
          echo "verified_pr_head=${PR_HEAD_SHA:0:12} proof_only_commit=true"

      - name: Install pinned Ollama
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/ollama-linux-amd64.tgz"
          install_root="$RUNNER_TEMP/ollama"
          curl --fail --location --retry 3 \
            https://github.com/ollama/ollama/releases/download/v0.13.3/ollama-linux-amd64.tgz \
            --output "$archive"
          echo "70a3d0f4cccd003641c5531d564a3494ed9a422e397c437d40f802ec1003c6eb  $archive" \
            | sha256sum --check
          mkdir -p "$install_root"
          tar --extract --gzip --file "$archive" --directory "$install_root" \
            --wildcards --no-wildcards-match-slash \
            'bin/ollama' 'lib/ollama/*.so*'
          rm "$archive"
          echo "$install_root/bin" >> "$GITHUB_PATH"
          "$install_root/bin/ollama" --version

      - name: Set up Node and dependencies
        uses: ./.github/actions/setup-node-env
        with:
          node-version: 24.x
          install-bun: "false"
          use-actions-cache: "true"

      - name: Start Ollama and pull the proof model
        shell: bash
        run: |
          set -euo pipefail
          export OLLAMA_MODELS="$RUNNER_TEMP/ollama-models"
          echo "OLLAMA_MODELS=$OLLAMA_MODELS" >> "$GITHUB_ENV"
          mkdir -p .artifacts/proof-110300 "$OLLAMA_MODELS"
          ollama serve > .artifacts/proof-110300/ollama.log 2>&1 &
          echo "$!" > .artifacts/proof-110300/ollama.pid
          for attempt in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:11434/api/version; then
              break
            fi
            if [ "$attempt" -eq 120 ]; then
              cat .artifacts/proof-110300/ollama.log
              exit 1
            fi
            sleep 1
          done
          test "$(curl --fail --silent http://127.0.0.1:11434/api/version | jq --raw-output .version)" \
            = "0.13.3"
          ollama pull qwen2.5-coder:1.5b
          curl --fail --silent http://127.0.0.1:11434/api/tags \
            | jq --exit-status \
              'any(.models[]; .name == "qwen2.5-coder:1.5b" and .digest == "d7372fd828518a4d38b1eb196c673c31a85f2ed302b3d1e406c4c2d1b64a0668")'

      - name: Run real Gateway, ACPX, Codex, and Ollama proof
        shell: bash
        run: |
          set -euo pipefail
          raw_log=.artifacts/proof-110300/raw-runtime.log
          redacted_log=.artifacts/proof-110300/runtime.log
          kill -0 "$(cat .artifacts/proof-110300/ollama.pid)"
          echo "running secretless ACP cancellation proof; detailed output is redacted"
          set +e
          node scripts/test-live.mjs --no-quiet -- \
            src/gateway/gateway-acp-bind.live.test.ts > "$raw_log" 2>&1
          test_status=$?
          set -e
          grep -E '\[acp-abort-proof\]|\[live-acp-bind\]|Test Files|Tests|Duration| FAIL |Error:' \
            "$raw_log" \
            | sed -E \
              -e 's/test-[0-9a-f]{8}-[0-9a-f-]{27}/test-<redacted>/g' \
              -e 's/agent:codex:acp:[^[:space:]" ]+/agent:codex:acp:<redacted>/g' \
              -e 's/U[A-F0-9]{10}/U<redacted>/g' \
            > "$redacted_log" || true
          rm "$raw_log"
          cat "$redacted_log"
          test "$test_status" -eq 0
          grep -F "partial_delivered=true" "$redacted_log"
          grep -F "abort_rpc=true run_matched=true" "$redacted_log"
          grep -F "terminal=error stop_reason=rpc" "$redacted_log"
          grep -F "followup_ok=true same_bound_session=true" "$redacted_log"
          grep -F "outbound_partial_copies=1 outbound_followup_copies=1" "$redacted_log"
          grep -F "assistant_partial_copies=1 stable_after_settle=true" "$redacted_log"

      - name: Stop Ollama
        if: always()
        shell: bash
        run: |
          if [ -f .artifacts/proof-110300/ollama.pid ]; then
            kill "$(cat .artifacts/proof-110300/ollama.pid)" 2>/dev/null || true
          fi

      - name: Upload redacted runtime log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: proof-110300-real-acp-${{ github.run_id }}
          path: .artifacts/proof-110300/runtime.log
          if-no-files-found: warn
          retention-days: 14
