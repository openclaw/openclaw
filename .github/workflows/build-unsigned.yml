name: Build Signed iOS App (OpenClaw)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 设置 Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 选择 Xcode 26.3.0
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install linting tools
        run: brew install swiftlint swiftformat

      # 导入证书和描述文件
      - name: Setup certificate and provisioning profile
        run: |
          # 创建专用钥匙串
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain

          # 导入证书
          echo -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign

          # 允许 codesign 访问钥匙串
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" build.keychain

          # 安装描述文件
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          echo -n "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Prepare iOS project
        run: |
          chmod +x ./scripts/ios-configure-signing.sh
          pnpm install
          ./scripts/ios-configure-signing.sh
          cd apps/ios
          xcodegen generate

      # 动态生成最简单的 ExportOptions.plist（只指定 method）
      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
          </dict>
          </plist>
          EOF

      # 编译归档（允许自动更新签名）
      - name: Build archive
        run: |
          cd apps/ios
          xcodebuild archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates

      # 导出已签名的 IPA
      - name: Export IPA
        run: |
          cd apps/ios
          xcodebuild -exportArchive \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -exportPath $PWD/build/ipa \
            -exportOptionsPlist $PWD/../ExportOptions.plist \
            -allowProvisioningUpdates

      # 上传 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-signed.ipa
          path: apps/ios/build/ipa/*.ipa
