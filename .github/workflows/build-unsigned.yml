name: Build Signed iOS App (OpenClaw)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install linting tools
        run: brew install swiftlint swiftformat

      # 导入证书和描述文件
      - name: Setup certificate and provisioning profile
        run: |
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          echo -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          echo -n "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # 关键步骤：创建 LocalSigning.xcconfig 以固定 bundle ID
      - name: Set fixed bundle ID
        run: |
          # 进入 apps/ios 目录（如果该文件通常放在那里）
          cd apps/ios
          # 创建 LocalSigning.xcconfig，写入你描述文件对应的 bundle ID
          # 请将下面的 YOUR_BUNDLE_ID 替换为你的实际 bundle ID
          echo "PRODUCT_BUNDLE_IDENTIFIER = YOUR_BUNDLE_ID" > LocalSigning.xcconfig
          # 如果项目期望从 LocalSigning.xcconfig.example 复制，可能需要额外处理
          # 但直接创建应该也能被 xcodegen 读取

      # 准备 iOS 项目（注意：ios-configure-signing.sh 可能会覆盖我们刚设置的文件，所以我们需要在它之后执行？）
      - name: Prepare iOS project
        run: |
          chmod +x ./scripts/ios-configure-signing.sh
          pnpm install
          # 运行配置脚本，它可能生成 LocalSigning.xcconfig，所以我们先备份或之后再覆盖
          ./scripts/ios-configure-signing.sh
          # 再次覆盖 bundle ID（确保脚本没有覆盖我们的设置）
          cd apps/ios
          echo "PRODUCT_BUNDLE_IDENTIFIER = com.lijinrui.app" > LocalSigning.xcconfig
          xcodegen generate

      # 创建 ExportOptions.plist（只指定 method）
      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
          </dict>
          </plist>
          EOF

      - name: Build archive
        run: |
          cd apps/ios
          xcodebuild archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          cd apps/ios
          xcodebuild -exportArchive \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -exportPath $PWD/build/ipa \
            -exportOptionsPlist $PWD/../ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-signed.ipa
          path: apps/ios/build/ipa/*.ipa
