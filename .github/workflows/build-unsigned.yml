name: Build Unsigned iOS App (OpenClaw)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装 pnpm（自动读取 packageManager）
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version，自动使用 package.json 中的 pnpm 版本

      # 设置 Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 选择 Xcode 26.3.0（满足 Swift 6.2 要求）
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install xcodegen
        run: brew install xcodegen

      # 安装 lint 工具（swiftlint, swiftformat）
      - name: Install linting tools
        run: brew install swiftlint swiftformat

      - name: Prepare iOS project
        run: |
          chmod +x ./scripts/ios-configure-signing.sh
          pnpm install
          ./scripts/ios-configure-signing.sh
          cd apps/ios
          xcodegen generate

      - name: List schemes
        run: |
          cd apps/ios
          xcodebuild -list -project OpenClaw.xcodeproj

      - name: Build archive
        run: |
          cd apps/ios
          xcodebuild archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd apps/ios
          mkdir -p build/ipa Payload
          cp -r build/OpenClaw.xcarchive/Products/Applications/OpenClaw.app Payload/
          cd Payload && zip -r ../build/ipa/OpenClaw.ipa * && cd ..
          ls -la build/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned.ipa
          path: apps/ios/build/ipa/OpenClaw.ipa
