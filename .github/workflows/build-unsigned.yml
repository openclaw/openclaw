name: Build Unsigned iOS App (OpenClaw)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Node.js 22，并启用 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'           # 关键修改：从 18 改为 22
          cache: 'pnpm'

      # 安装 pnpm（setup-node 后 npm 已可用）
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Prepare iOS project
        run: |
          pnpm --version                # 验证 pnpm 安装
          chmod +x ./scripts/ios-configure-signing.sh
          pnpm install
          ./scripts/ios-configure-signing.sh
          cd apps/ios
          xcodegen generate

      - name: List schemes
        run: |
          cd apps/ios
          xcodebuild -list -project OpenClaw.xcodeproj

      - name: Build archive
        run: |
          cd apps/ios
          xcodebuild archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd apps/ios
          mkdir -p build/ipa Payload
          cp -r build/OpenClaw.xcarchive/Products/Applications/OpenClaw.app Payload/
          cd Payload && zip -r ../build/ipa/OpenClaw.ipa * && cd ..
          ls -la build/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned.ipa
          path: apps/ios/build/ipa/OpenClaw.ipa
