name: Exclusive channel labeling

on:
  pull_request:
    types: [labeled]

jobs:
  exclusive-channel-label:
    runs-on: ubuntu-latest
    if: ${{ github.event.label.name == 'channel: ALL' }}
    steps:
      - name: Remove individual channel labels when channel:ALL is applied
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const channelLabels = labels
              .map(l => l.name)
              .filter(n => n.startsWith('channel: ') && n !== 'channel: ALL');

            for (const label of channelLabels) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: label,
              });
            }
