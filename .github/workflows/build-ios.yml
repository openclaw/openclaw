name: Build Unsigned OpenClaw iOS

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击按钮触发编译

jobs:
  build-project:
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. 自动寻找并切换到最新的 Xcode 16 版本
      - name: Setup Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      # 2. 强制安装 Node.js v22（此时系统变量中 node 已经是 v22）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. 通过 Homebrew 安装苹果项目生成工具 xcodegen
      - name: Install xcodegen
        run: brew install xcodegen

      # 4. 核心修正：用 npx 强行驱动 pnpm v11.2.2，彻底绕过系统 Node 20 污染
      - name: Install Monorepo Dependencies
        run: npx pnpm@11.2.2 install

      # 5. 进入 iOS 目录并动态生成 Xcode 工程文件
      - name: Generate Xcode Project
        run: |
          cd apps/ios
          xcodegen generate

      # 6. 编译代码（强制关闭代码签名）
      - name: Compile Code (Disable Code Signing)
        run: |
          xcodebuild clean build \
            -project apps/ios/OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 7. 将编译出的 .app 文件夹打包为标准的 .ipa 安装包
      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/OpenClaw.app Payload/
          zip -r OpenClaw_Unsigned.ipa Payload

      # 8. 将打包好的成品上传到 GitHub Actions 产物中供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS-Unsigned-IPA
          path: OpenClaw_Unsigned.ipa
