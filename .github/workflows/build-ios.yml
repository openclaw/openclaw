name: Build Unsigned OpenClaw iOS

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击按钮触发编译

jobs:
  build-project:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. 自动寻找并切换到最新的稳定版 Xcode
      - name: Setup Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # 2. 强制安装 Node.js v22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. 通过 Homebrew 安装苹果项目生成工具 xcodegen
      - name: Install xcodegen
        run: brew install xcodegen

      # 4. 创造虚假的 SwiftLint 和 SwiftFormat（跳过 CI 中的代码格式检查，防止报错并加速）
      - name: Bypass Linters (SwiftLint/SwiftFormat)
        run: |
          mkdir -p $HOME/mock_bin
          
          # 伪装 swiftlint
          echo '#!/bin/bash' > $HOME/mock_bin/swiftlint
          echo 'exit 0' >> $HOME/mock_bin/swiftlint
          chmod +x $HOME/mock_bin/swiftlint
          
          # 伪装 swiftformat
          echo '#!/bin/bash' > $HOME/mock_bin/swiftformat
          echo 'exit 0' >> $HOME/mock_bin/swiftformat
          chmod +x $HOME/mock_bin/swiftformat
          
          # 将伪装目录临时注入系统环境变量
          echo "$HOME/mock_bin" >> $GITHUB_PATH

      # 5. 用 npx 强行驱动 pnpm v11.2.2 安装 Monorepo 依赖
      - name: Install Monorepo Dependencies
        run: npx pnpm@11.2.2 install

      # 6. 进入 iOS 目录并动态生成 Xcode 工程文件
      - name: Generate Xcode Project
        run: |
          cd apps/ios
          xcodegen generate

      # 7. 使用 archive 代替 build（核心修复 ✨）
      # Archive 会强制执行 iOS 生产环境的“扁平化”流程，彻底消除依赖库中的 macOS 风格软链接，完美兼容 Windows
      - name: Archive App (Flatten Frameworks)
        run: |
          xcodebuild archive \
            -project apps/ios/OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -archivePath build_output/OpenClaw.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 8. 从归档产物（.xcarchive）中安全提取扁平化后的 .app 并打包
      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -R build_output/OpenClaw.xcarchive/Products/Applications/OpenClaw.app Payload/
          zip -yr OpenClaw_Unsigned.ipa Payload

      # 9. 将打包好的成品上传到 GitHub Actions 产物中供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS-Unsigned-IPA
          path: OpenClaw_Unsigned.ipa
