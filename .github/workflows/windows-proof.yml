name: Windows Proof (PR #98952)

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/process/windows-command.ts'
      - 'src/process/windows-command.test.ts'
      - 'src/process/supervisor/adapters/child.ts'
      - 'src/process/supervisor/adapters/child.test.ts'

jobs:
  windows-proof:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Install @google/gemini-cli (creates gemini.cmd shim on Windows)
        run: npm install -g @google/gemini-cli

      - name: Reproduce the bug — raw spawn("gemini") fails on Windows (no .cmd resolve)
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "BUG REPRODUCTION: Node spawn without .cmd"
          Write-Host "============================================"
          $output = node -e @"
            const { spawn } = require('child_process');
            const c = spawn('gemini', ['--version'], { stdio: ['ignore', 'pipe', 'pipe'] });
            c.stdout.on('data', d => process.stdout.write(d));
            c.on('error', e => { console.error('ENOENT: ' + e.message); process.exit(1); });
            c.on('close', code => { if (code !== 0) process.exit(code); });
"@ 2>&1
          Write-Host $output
          if ($LASTEXITCODE -ne 0) {
            Write-Host "✅ Bug confirmed: raw spawn('gemini') failed with exit code $LASTEXITCODE"
            Write-Host "  Node does not resolve .cmd shims on Windows"
          } else {
            Write-Host "❌ Unexpected: spawn succeeded"
          }

      - name: Workaround — spawn gemini.cmd explicitly works
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "WORKAROUND: spawn with .cmd explicit"
          Write-Host "============================================"
          $output = node -e @"
            const { spawn } = require('child_process');
            const c = spawn('gemini.cmd', ['--version'], { stdio: ['ignore', 'pipe', 'pipe'] });
            c.stdout.on('data', d => process.stdout.write(d));
            c.on('error', e => { console.error('Error: ' + e.message); process.exit(1); });
            c.on('close', code => process.exit(code));
"@ 2>&1
          Write-Host $output
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ Workaround confirmed: spawn('gemini.cmd') works on Windows"
          } else {
            Write-Host "❌ spawn gemini.cmd failed with exit code $LASTEXITCODE"
          }

      - name: Build openclaw (with fix)
        run: pnpm build

      - name: Run tests (proves fix doesn't break existing behavior)
        run: |
          pnpm test src/process/windows-command.test.ts
          pnpm test src/process/supervisor/adapters/child.test.ts
