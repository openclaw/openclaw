name: ClawHub Package Publish

on:
  workflow_dispatch:
    inputs:
      plugin_id:
        description: Plugin directory name under extensions/
        required: true
        default: open-prose
        type: string
      dry_run:
        description: Preview only without publishing
        required: true
        default: true
        type: boolean
      version:
        description: Optional package version override
        required: false
        type: string
      tags:
        description: Optional comma-separated tags
        required: false
        default: latest
        type: string
      source_repo:
        description: Optional source repo override shown in ClawHub verification
        required: false
        type: string
      source_commit:
        description: Optional source commit override shown in ClawHub verification
        required: false
        type: string
      source_ref:
        description: Optional source ref override shown in ClawHub verification
        required: false
        type: string

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      source: ./extensions/${{ inputs.plugin_id }}
      dry_run: ${{ inputs.dry_run }}
      version: ${{ inputs.version }}
      tags: ${{ inputs.tags }}
      source_repo: ${{ inputs.source_repo || github.repository }}
      source_commit: ${{ inputs.source_commit || github.sha }}
      source_ref: ${{ inputs.source_ref || github.ref }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
