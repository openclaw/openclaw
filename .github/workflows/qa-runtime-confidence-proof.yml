name: QA Runtime Confidence Proof

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or full SHA to validate
        required: true
        type: string
      expected_sha:
        description: Optional full SHA that target_ref must resolve to
        required: false
        default: ""
        type: string
      run_soak:
        description: Run the optional mock soak-100 lane
        required: false
        default: false
        type: boolean
      run_live:
        description: Run live-frontier OAuth/API-key lanes when secrets are available
        required: false
        default: false
        type: boolean
      strict_global:
        description: Require live, soak, static, mock, and final global confidence to pass
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: qa-runtime-confidence-proof-${{ inputs.expected_sha || inputs.target_ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"
  PNPM_VERSION: "11.0.8"
  OPENCLAW_BUILD_PRIVATE_QA: "1"
  OPENCLAW_ENABLE_PRIVATE_QA_CLI: "1"
  OPENCLAW_CI_OPENAI_MODEL: ${{ vars.OPENCLAW_CI_OPENAI_MODEL || 'openai/gpt-5.5' }}

jobs:
  authorize_actor:
    name: Authorize workflow actor
    runs-on: ubuntu-24.04
    steps:
      - name: Require maintainer-level repository access
        uses: actions/github-script@v8
        with:
          script: |
            const allowed = new Set(["admin", "maintain", "write"]);
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: context.actor,
            });
            const permission = data.permission;
            core.info(`Actor ${context.actor} permission: ${permission}`);
            if (!allowed.has(permission)) {
              core.setFailed(
                `Workflow requires write/maintain/admin access. Actor "${context.actor}" has "${permission}".`,
              );
            }

  validate_selected_ref:
    name: Validate selected ref
    needs: authorize_actor
    runs-on: ubuntu-24.04
    outputs:
      selected_revision: ${{ steps.validate.outputs.selected_revision }}
      trusted_reason: ${{ steps.validate.outputs.trusted_reason }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Validate selected ref
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_REF: ${{ inputs.target_ref }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        shell: bash
        run: |
          set -euo pipefail
          selected_revision="$(git rev-parse HEAD)"
          trusted_reason=""

          if [[ -n "${EXPECTED_SHA// }" && "${selected_revision,,}" != "${EXPECTED_SHA,,}" ]]; then
            echo "target_ref resolved to ${selected_revision}; expected ${EXPECTED_SHA}" >&2
            exit 1
          fi

          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

          if git merge-base --is-ancestor "$selected_revision" refs/remotes/origin/main; then
            trusted_reason="main-ancestor"
          elif git tag --points-at "$selected_revision" | grep -Eq '^v'; then
            trusted_reason="release-tag"
          elif [[ "$INPUT_REF" =~ ^release/[0-9]{4}\.[0-9]+\.[0-9]+$ ]]; then
            git fetch --no-tags origin "+refs/heads/${INPUT_REF}:refs/remotes/origin/${INPUT_REF}"
            release_branch_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}")"
            if [[ "$selected_revision" == "$release_branch_sha" ]]; then
              trusted_reason="release-branch-head"
            fi
          elif [[ "$INPUT_REF" =~ ^[A-Za-z0-9._/-]+$ ]] &&
            git fetch --no-tags origin "+refs/heads/${INPUT_REF}:refs/remotes/origin/${INPUT_REF}" 2>/dev/null; then
            branch_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}")"
            if [[ "$selected_revision" == "$branch_sha" ]]; then
              trusted_reason="same-repository-branch-head"
            fi
          else
            pr_head_count="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "repos/${GITHUB_REPOSITORY}/commits/${selected_revision}/pulls" \
                --jq '[.[] | select(.state == "open" and .head.repo.full_name == "'"${GITHUB_REPOSITORY}"'" and .head.sha == "'"${selected_revision}"'")] | length'
            )"
            if [[ "$pr_head_count" != "0" ]]; then
              trusted_reason="open-pr-head"
            fi
          fi

          if [[ -z "$trusted_reason" ]]; then
            echo "Ref '${INPUT_REF}' resolved to $selected_revision, which is not trusted for this secret-bearing QA run." >&2
            echo "Allowed refs must be on main, point to a release tag, match a release branch head, match a branch head in ${GITHUB_REPOSITORY}, or match an open PR head in ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

          echo "selected_revision=$selected_revision" >> "$GITHUB_OUTPUT"
          echo "trusted_reason=$trusted_reason" >> "$GITHUB_OUTPUT"
          {
            echo "Validated ref: \`${INPUT_REF}\`"
            echo "Resolved SHA: \`$selected_revision\`"
            echo "Trust reason: \`$trusted_reason\`"
          } >> "$GITHUB_STEP_SUMMARY"

  static_unit:
    name: Static and targeted QA unit proof
    needs: [validate_selected_ref]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.validate_selected_ref.outputs.selected_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"

      - name: Typecheck test surfaces
        run: pnpm check:test-types

      - name: Lint
        run: pnpm lint --threads=8

      - name: Targeted QA-lab tests
        env:
          OPENCLAW_VITEST_MAX_WORKERS: "1"
        run: |
          pnpm test \
            extensions/qa-lab/src/providers/mock-openai/server.test.ts \
            extensions/qa-lab/src/gateway-log-sentinel.test.ts \
            extensions/qa-lab/src/runtime-transcript.test.ts \
            extensions/qa-lab/src/runtime-tool-fixture.test.ts \
            extensions/qa-lab/src/runtime-parity.test.ts \
            extensions/qa-lab/src/runtime-suite.test.ts \
            extensions/qa-lab/src/scenario-runtime-api.test.ts \
            extensions/qa-lab/src/suite-runtime-flow.test.ts \
            extensions/qa-lab/src/suite.test.ts \
            extensions/qa-lab/src/cli.runtime.test.ts \
            extensions/qa-lab/src/tool-coverage-report.test.ts \
            extensions/qa-lab/src/token-efficiency-report.test.ts \
            extensions/qa-lab/src/harness-parity.test.ts \
            extensions/qa-lab/src/jsonl-replay.test.ts \
            extensions/qa-lab/src/codex-plugin-lifecycle.test.ts \
            extensions/qa-lab/src/scenario-catalog.test.ts \
            extensions/qa-lab/src/confidence-report.test.ts \
            extensions/codex/src/app-server/dynamic-tools.test.ts \
            test/scripts/qa-runtime-confidence-proof-workflow.test.ts

  mock_confidence:
    name: Mock confidence proof bundle
    needs: [validate_selected_ref]
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CI: "true"
      OPENCLAW_QA_SUITE_PROGRESS: "1"
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.validate_selected_ref.outputs.selected_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"

      - name: Run tool-defaults direct lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-suite tool-defaults \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/tool-defaults-direct"

      - name: Run OpenClaw dynamic tools direct lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-suite openclaw-dynamic-tools \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/openclaw-dynamic-tools-direct"

      - name: Run tool-defaults searchable lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-suite tool-defaults \
            --codex-tool-loading searchable \
            --allow-failures \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/tool-defaults-searchable"

      - name: Run first-hour-20 direct lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-suite first-hour-20 \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/first-hour-20-direct"

      - name: Build first-hour-20 token report
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa parity-report \
            --repo-root . \
            --runtime-axis \
            --token-efficiency \
            --allow-failures \
            --summary "${root}/first-hour-20-direct/qa-suite-summary.json" \
            --output-dir "${root}/first-hour-20-direct-report"

      - name: Run fault-injection mock lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-suite fault-injection-mock \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/fault-injection-mock"

      - name: Run expanded JSONL replay lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa jsonl-replay \
            --provider-mode mock-openai \
            --runtime-pair pi,codex \
            --output-dir "${root}/jsonl-expanded"

      - name: Run confidence negative controls
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa confidence-self-test \
            --output-dir "${root}/confidence-self-test"

      - name: Build strict confidence report
        shell: bash
        run: |
          set -euo pipefail
          pnpm openclaw qa confidence-report \
            --manifest extensions/qa-lab/confidence-profiles/codex-100.json \
            --artifact-root .artifacts/qa-e2e \
            --output-dir .artifacts/qa-e2e/confidence-report \
            --strict-zero-unknowns

      - name: Upload confidence artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-runtime-confidence-mock-${{ inputs.expected_sha || github.run_id }}
          path: .artifacts/qa-e2e/**
          if-no-files-found: warn

  live_confidence:
    name: Live confidence proof lanes
    if: inputs.run_live
    needs: [validate_selected_ref]
    runs-on: ubuntu-24.04
    environment: qa-live-shared
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      CI: "true"
      OPENCLAW_QA_SUITE_PROGRESS: "1"
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.validate_selected_ref.outputs.selected_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"

      - name: Require live credentials
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_LIVE_OPENAI_KEY: ${{ secrets.OPENCLAW_LIVE_OPENAI_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${OPENAI_API_KEY// }" && -z "${OPENCLAW_LIVE_OPENAI_KEY// }" ]]; then
            echo "OPENAI_API_KEY or OPENCLAW_LIVE_OPENAI_KEY secret is required for live confidence lanes." >&2
            exit 1
          fi

      - name: Run live proof lanes
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_LIVE_OPENAI_KEY: ${{ secrets.OPENCLAW_LIVE_OPENAI_KEY }}
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode live-frontier \
            --runtime-suite codex-native-live \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/codex-native-live"
          pnpm openclaw qa suite \
            --provider-mode live-frontier \
            --runtime-suite first-hour-live \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/first-hour-live"
          pnpm openclaw qa suite \
            --provider-mode live-frontier \
            --runtime-suite openclaw-dynamic-tools \
            --codex-tool-loading searchable \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/openclaw-dynamic-tools-searchable-live"
          pnpm openclaw qa parity-report \
            --repo-root . \
            --runtime-axis \
            --token-efficiency \
            --allow-failures \
            --summary "${root}/first-hour-live/qa-suite-summary.json" \
            --output-dir "${root}/live-token-efficiency"

      - name: Upload live confidence artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-runtime-confidence-live-${{ inputs.expected_sha || github.run_id }}
          path: .artifacts/qa-e2e/**
          if-no-files-found: warn

  soak_confidence:
    name: Required soak-100 proof lane
    if: inputs.run_soak
    needs: [validate_selected_ref]
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      CI: "true"
      OPENCLAW_QA_SUITE_PROGRESS: "1"
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.validate_selected_ref.outputs.selected_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"

      - name: Run soak-100 lane
        shell: bash
        run: |
          set -euo pipefail
          root=".artifacts/qa-e2e"
          pnpm openclaw qa suite \
            --provider-mode mock-openai \
            --runtime-suite soak-100 \
            --codex-tool-loading direct \
            --concurrency 1 \
            --model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --alt-model "${OPENCLAW_CI_OPENAI_MODEL}" \
            --runtime-pair pi,codex \
            --output-dir "${root}/soak-100"

      - name: Upload soak confidence artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-runtime-confidence-soak-${{ inputs.expected_sha || github.run_id }}
          path: .artifacts/qa-e2e/**
          if-no-files-found: warn

  final_confidence:
    name: Final global confidence aggregation
    if: always()
    needs:
      - validate_selected_ref
      - static_unit
      - mock_confidence
      - live_confidence
      - soak_confidence
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.validate_selected_ref.outputs.selected_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"

      - name: Download confidence artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: qa-runtime-confidence-*
          merge-multiple: true
          path: .artifacts/qa-e2e

      - name: Build final confidence report
        shell: bash
        run: |
          set -euo pipefail
          args=(
            pnpm openclaw qa confidence-report
            --manifest extensions/qa-lab/confidence-profiles/codex-100.json
            --artifact-root .artifacts/qa-e2e
            --output-dir .artifacts/qa-e2e/global-confidence-report
            --strict-zero-unknowns
          )
          if [[ "${{ inputs.strict_global }}" == "true" ]]; then
            args+=(--strict-global-pass)
          fi
          "${args[@]}"

      - name: Validate strict global inputs
        if: always() && inputs.strict_global
        shell: bash
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          RUN_LIVE: ${{ inputs.run_live }}
          RUN_SOAK: ${{ inputs.run_soak }}
          STATIC_RESULT: ${{ needs.static_unit.result }}
          MOCK_RESULT: ${{ needs.mock_confidence.result }}
          LIVE_RESULT: ${{ needs.live_confidence.result }}
          SOAK_RESULT: ${{ needs.soak_confidence.result }}
        run: |
          set -euo pipefail
          if [[ -z "${EXPECTED_SHA// }" ]]; then
            echo "strict_global requires expected_sha so the proof is pinned to an exact beta.5 commit." >&2
            exit 1
          fi
          if [[ "${RUN_LIVE}" != "true" || "${RUN_SOAK}" != "true" ]]; then
            echo "strict_global requires run_live=true and run_soak=true." >&2
            exit 1
          fi
          for pair in \
            "static_unit:${STATIC_RESULT}" \
            "mock_confidence:${MOCK_RESULT}" \
            "live_confidence:${LIVE_RESULT}" \
            "soak_confidence:${SOAK_RESULT}"
          do
            job="${pair%%:*}"
            result="${pair#*:}"
            if [[ "${result}" != "success" ]]; then
              echo "strict_global requires ${job} to succeed; result=${result}" >&2
              exit 1
            fi
          done

      - name: Upload final confidence artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-runtime-confidence-global-${{ inputs.expected_sha || github.run_id }}
          path: .artifacts/qa-e2e/**
          if-no-files-found: warn
