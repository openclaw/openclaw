name: Docs Sync & Translate

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨執行一次
  workflow_dispatch: # 支援手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保 Action 有權限 push 變更

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 取得完整歷史以便進行 Git 比對

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream

      - name: Run Translation Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm run docs:translate

      - name: Commit Changes
        id: commit
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "docs(i18n): sync translated docs"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push Changes
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin main
          git push origin HEAD:main
