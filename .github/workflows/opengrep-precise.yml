name: OpenGrep — PR Diff

# Runs the high-precision OpenGrep rule super-config against only first-party
# source paths changed by a pull request. Keeping PR scans diff-scoped makes
# findings attributable to the proposed change instead of surfacing unrelated
# repository-wide backlog.
#
# For a repository-wide scan, use the manual OpenGrep — Full workflow.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/actions/ensure-base-commit/**"
      - ".github/workflows/opengrep-precise.yml"
      - ".github/workflows/opengrep-precise-full.yml"
      - ".semgrepignore"
      - "apps/**"
      - "extensions/**"
      - "packages/**"
      - "scripts/**"
      - "security/opengrep/**"
      - "src/**"

concurrency:
  group: opengrep-pr-diff-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan changed paths (precise)
    if: ${{ !github.event.pull_request.draft }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false
          submodules: false

      - name: Ensure PR base commit
        uses: ./.github/actions/ensure-base-commit
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          fetch-ref: ${{ github.event.pull_request.base.ref }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.9.2

      - name: Install opengrep
        env:
          # Pin the binary version and fetch release assets directly. Avoid the
          # upstream install script's GitHub API release-list lookup so CI does
          # not fail when api.github.com is transiently unavailable/rate-limited.
          OPENGREP_VERSION: v1.19.0
        run: |
          install_dir="$HOME/.opengrep/cli/${OPENGREP_VERSION}"
          latest_dir="$HOME/.opengrep/cli/latest"
          mkdir -p "$install_dir"
          curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86" \
            -o "$install_dir/opengrep"
          chmod a+x "$install_dir/opengrep"
          if command -v cosign >/dev/null 2>&1; then
            curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86.cert" \
              -o "$install_dir/opengrep.cert"
            curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86.sig" \
              -o "$install_dir/opengrep.sig"
            cosign verify-blob \
              --cert "$install_dir/opengrep.cert" \
              --signature "$install_dir/opengrep.sig" \
              --certificate-identity-regexp "https://github.com/opengrep/opengrep.+" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$install_dir/opengrep"
          else
            echo "::error::cosign is required to verify the downloaded opengrep binary."
            exit 1
          fi
          rm -f "$latest_dir"
          ln -s "$install_dir" "$latest_dir"
          echo "$latest_dir" >> "$GITHUB_PATH"

      - name: Verify opengrep
        run: opengrep --version

      - name: Run opengrep on PR diff
        env:
          OPENCLAW_OPENGREP_BASE_REF: ${{ github.event.pull_request.base.sha }}...HEAD
        # Findings from precise rules block this workflow. Pull requests scan
        # changed first-party source paths only so findings stay attributable to
        # the PR diff. Test/fixture/QA path exclusions live in `.semgrepignore`
        # at the repo root and are picked up automatically.
        run: |
          mkdir -p .opengrep-out
          scripts/run-opengrep.sh --changed --sarif --error

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        # Only upload if the scan actually produced a SARIF file.
        if: always() && hashFiles('.opengrep-out/precise.sarif') != ''
        with:
          sarif_file: .opengrep-out/precise.sarif
          category: opengrep-pr-diff

      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: opengrep-pr-diff-sarif
          path: .opengrep-out/precise.sarif
          if-no-files-found: warn
          retention-days: 30
