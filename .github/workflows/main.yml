name: 自动同步上游 OpenClaw (main分支)

on:
  schedule:
    - cron: "0 12 */1 * *"
  workflow_dispatch:        # 允许在网页端手动触发

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    # 注意：使用 PAT 后，这里的 permissions 设置其实可以不写，但保留也不会报错
    permissions:
      contents: write       

    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 同步 Fork 与原仓库 main 分支
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_sync_branch: main               
          upstream_sync_repo: openclaw/openclaw  
          upstream_sync_branch: main             
          # 【核心修改】：把 secrets.GITHUB_TOKEN 换成你刚才创建的 secrets.PAT
          target_repo_token: ${{ secrets.PAT }} 
          test_mode: false
