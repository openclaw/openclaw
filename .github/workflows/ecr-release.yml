name: ECR Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
      - "skills/**"
  workflow_dispatch:
    inputs:
      update_infra:
        description: "Trigger morpho-infra-helm image update"
        required: false
        type: boolean
        default: true
      environment:
        description: "Infra environment(s) to update"
        required: false
        type: choice
        options:
          - dev
          - prd
          - both
        default: both

concurrency:
  group: ecr-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
  ECR_REPOSITORY: openclaw-sre
  BUILD_CACHE_SCOPE: openclaw-sre-ecr-release

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTION_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image URI
        id: image
        run: |
          set -euo pipefail
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.image.outputs.uri }}
          cache-from: type=gha,scope=${{ env.BUILD_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.BUILD_CACHE_SCOPE }}

      - name: Resolve infra update environments
        id: infra
        run: |
          set -euo pipefail
          envs="dev,prd"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.environment }}" in
              dev) envs="dev" ;;
              prd) envs="prd" ;;
              both) envs="dev,prd" ;;
              *) echo "::error::Invalid environment selection: ${{ inputs.environment }}"; exit 1 ;;
            esac
          fi
          echo "environments=$envs" >> "$GITHUB_OUTPUT"

      - name: Update morpho-infra-helm image tag
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.update_infra == true }}
        uses: morpho-org/update-infra-image-tag@v4
        with:
          app_id: ${{ secrets.INFRA_DEPLOYER_APP_ID }}
          app_private_key: ${{ secrets.INFRA_DEPLOYER_SECRET_KEY }}
          environments: ${{ steps.infra.outputs.environments }}
