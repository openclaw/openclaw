name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# Workflow-level permissions locked down; real grants are on the job.
permissions: {}

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip draft PRs.
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Classify PR complexity and pick model
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number || github.event.issue.number }}
          files=$(gh pr view "$PR" --repo ${{ github.repository }} \
            --json files --jq '[.files[].path] | join("\n")')
          lines=$(gh pr diff "$PR" --repo ${{ github.repository }} 2>/dev/null \
            | grep -c '^[+-][^+-]' || echo 0)
          score=1
          while IFS= read -r f; do
            if echo "$f" | grep -qE '^internal/(auth|crypto|db|mcp|telegram)/'; then
              score=3; break
            elif echo "$f" | grep -qE '\.go$' && ! echo "$f" | grep -qE '_test\.go$'; then
              [ $score -lt 2 ] && score=2
            fi
          done <<< "$files"
          if [ "$lines" -gt 400 ] && [ $score -lt 3 ]; then
            score=$((score + 1))
          fi
          case $score in
            3) model="claude-opus-4-7" ;;
            2) model="claude-sonnet-4-6" ;;
            *) model="claude-haiku-4-5-20251001" ;;
          esac
          echo "model=$model" >> $GITHUB_OUTPUT
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "lines=$lines" >> $GITHUB_OUTPUT
          echo "PR #$PR: model=$model score=$score lines=$lines"

      - name: Check fallback token availability
        id: token-check
        run: |
          if [ -n "$TOKEN2" ]; then
            echo "has_fallback=true" >> $GITHUB_OUTPUT
          else
            echo "has_fallback=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOKEN2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}

      - name: Claude PR Review
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
          prompt: |
            You are a code reviewer for mctlhq/mctl-openclaw, a TypeScript ESM
            strict-mode repository (pnpm workspaces, Vitest, oxfmt/oxlint).

            TRIVIAL DIFF SHORT-CIRCUIT
            If the entire diff is documentation-only, changelog-only, or
            config-formatting with no logic changes, respond with a single line
            noting the trivial scope and skip further analysis.

            SEVERITY CLASSIFICATION
            Classify every finding with one of:
            - P1: correctness bugs, security issues, broken runtime behavior
            - P2: design issues, plugin-SDK boundary violation, type-safety
              erosion, Vitest convention violations
            - P3: style, naming, minor improvements

            TYPESCRIPT ESM RULES
            - No @ts-nocheck or broad @ts-ignore without an explanatory comment
            - No `any`; prefer real types, `unknown`, or narrow adapters
            - Strict ESM imports: use .js extension for cross-package imports;
              use `import type` for type-only imports
            - No static+dynamic import of the same prod module; dynamic imports
              must cross a *.runtime.ts lazy boundary
            - Flag files over ~700 LOC as a P2 split candidate

            PLUGIN-SDK BOUNDARY (P1/P2)
            - Extension prod code must not import from core `src/**`,
              `src/plugin-sdk-internal/**`, or a sibling extension's `src/**`
            - Core code must not reach into `extensions/*/src/**` or
              reference `onboard.js`
            - New cross-boundary seams must be backwards-compatible, documented,
              and versioned (third-party plugins exist)

            VITEST TEST CONVENTIONS
            - Tests must be Vitest; colocated as `*.test.ts`; e2e as
              `*.e2e.test.ts`
            - No Jest flags (--runInBand, etc.); for serial runs use
              pnpm test:serial or OPENCLAW_VITEST_MAX_WORKERS=1
            - Mocks/timers/globals/module state must be cleaned up after each
              test; no leaked state
            - Prefer injection over broad module mocking; do not mock broad
              barrels or openclaw/plugin-sdk/* — mock narrow *.runtime.ts
              boundaries instead

            GENERAL
            - Report only findings you are confident about. If the diff is
              insufficient to determine context, say so rather than guessing.
            - Group findings by file. For each finding include the severity tag,
              a brief explanation, and a suggested fix where applicable.

      - name: Claude PR Review (fallback token)
        if: steps.review.outcome == 'failure' && steps.token-check.outputs.has_fallback == 'true'
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          track_progress: true
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
          prompt: |
            You are a code reviewer for mctlhq/mctl-openclaw, a TypeScript ESM
            strict-mode repository (pnpm workspaces, Vitest, oxfmt/oxlint).

            TRIVIAL DIFF SHORT-CIRCUIT
            If the entire diff is documentation-only, changelog-only, or
            config-formatting with no logic changes, respond with a single line
            noting the trivial scope and skip further analysis.

            SEVERITY CLASSIFICATION
            Classify every finding with one of:
            - P1: correctness bugs, security issues, broken runtime behavior
            - P2: design issues, plugin-SDK boundary violation, type-safety
              erosion, Vitest convention violations
            - P3: style, naming, minor improvements

            TYPESCRIPT ESM RULES
            - No @ts-nocheck or broad @ts-ignore without an explanatory comment
            - No `any`; prefer real types, `unknown`, or narrow adapters
            - Strict ESM imports: use .js extension for cross-package imports;
              use `import type` for type-only imports
            - No static+dynamic import of the same prod module; dynamic imports
              must cross a *.runtime.ts lazy boundary
            - Flag files over ~700 LOC as a P2 split candidate

            PLUGIN-SDK BOUNDARY (P1/P2)
            - Extension prod code must not import from core `src/**`,
              `src/plugin-sdk-internal/**`, or a sibling extension's `src/**`
            - Core code must not reach into `extensions/*/src/**` or
              reference `onboard.js`
            - New cross-boundary seams must be backwards-compatible, documented,
              and versioned (third-party plugins exist)

            VITEST TEST CONVENTIONS
            - Tests must be Vitest; colocated as `*.test.ts`; e2e as
              `*.e2e.test.ts`
            - No Jest flags (--runInBand, etc.); for serial runs use
              pnpm test:serial or OPENCLAW_VITEST_MAX_WORKERS=1
            - Mocks/timers/globals/module state must be cleaned up after each
              test; no leaked state
            - Prefer injection over broad module mocking; do not mock broad
