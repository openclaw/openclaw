name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

# Workflow-level permissions locked down; real grants are on the job.
permissions: {}

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # pull_request: skip drafts and fork PRs (CLAUDE_CODE_OAUTH_TOKEN unavailable to forks)
    # issue_comment: only fire on PR comments containing '@claude review'
    # from a maintainer (association pre-filter here; hard write-permission +
    # same-repo check in the first step below) — on a public repo an ungated
    # comment trigger lets any passerby burn review quota or prompt-inject
    # the reviewer.
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      # author_association alone is too coarse (MEMBER = any org member,
      # COLLABORATOR includes read-only). Require actual write access, and
      # refuse comment-triggered runs on fork PRs — the job would check out
      # refs/pull/N/head, making fork-controlled files the workspace while
      # the OAuth secret is available.
      - name: Gate comment-triggered runs (write permission + same-repo)
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" --jq .permission)
          case "$PERM" in
            admin|maintain|write) ;;
            *) echo "::error::@claude review requires write access (commenter has: $PERM)"; exit 1 ;;
          esac
          CROSS=$(gh pr view "${{ env.PR_NUMBER }}" --repo "${{ github.repository }}" --json isCrossRepository --jq .isCrossRepository)
          if [ "$CROSS" != "false" ]; then
            echo "::error::comment-triggered review is not supported on fork PRs"
            exit 1
          fi

      - name: Resolve PR branch for issue_comment trigger
        if: github.event_name == 'issue_comment'
        id: pr-ref
        run: |
          ref=$(gh pr view ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --json headRefName -q .headRefName)
          echo "ref=$ref" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ steps.pr-ref.outputs.ref }}

      - name: Classify PR complexity and pick model
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ env.PR_NUMBER }}
          files=$(gh pr view "$PR" --repo ${{ github.repository }} \
            --json files --jq '[.files[].path] | join("\n")')
          lines=$(gh pr diff "$PR" --repo ${{ github.repository }} 2>/dev/null \
            | grep -c '^[+-][^+-]' || echo 0)
          score=1
          while IFS= read -r f; do
            if echo "$f" | grep -qE '^internal/(auth|crypto|db|mcp|telegram)/'; then
              score=3; break
            elif echo "$f" | grep -qE '\.go$' && ! echo "$f" | grep -qE '_test\.go$'; then
              [ $score -lt 2 ] && score=2
            fi
          done <<< "$files"
          if [ "$lines" -gt 400 ] && [ $score -lt 3 ]; then
            score=$((score + 1))
          fi
          case $score in
            3) model="claude-opus-4-7" ;;
            2) model="claude-sonnet-4-6" ;;
            *) model="claude-haiku-4-5-20251001" ;;
          esac
          echo "model=$model" >> $GITHUB_OUTPUT
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "lines=$lines" >> $GITHUB_OUTPUT
          echo "PR #$PR: model=$model score=$score lines=$lines"

      - name: Check fallback token availability
        id: token-check
        run: |
          if [ -n "$TOKEN2" ]; then
            echo "has_fallback=true" >> $GITHUB_OUTPUT
          else
            echo "has_fallback=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOKEN2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}

      - name: Claude PR Review
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            You are a code reviewer for mctlhq/mctl-openclaw, a TypeScript ESM
            strict-mode repository (pnpm workspaces, Vitest, oxfmt/oxlint).

            SEVERITY CLASSIFICATION
            Classify every finding with one of:
            - P1: correctness bugs, security issues, broken runtime behavior
            - P2: design issues, plugin-SDK boundary violation, type-safety
              erosion, Vitest convention violations
            - P3: style, naming, minor improvements

            TYPESCRIPT ESM RULES
            - No @ts-nocheck or broad @ts-ignore without an explanatory comment
            - No `any`; prefer real types, `unknown`, or narrow adapters
            - Strict ESM imports: use .js extension for cross-package imports;
              use `import type` for type-only imports
            - No static+dynamic import of the same prod module; dynamic imports
              must cross a *.runtime.ts lazy boundary
            - Flag files over ~700 LOC as a P2 split candidate

            PLUGIN-SDK BOUNDARY (P1/P2)
            - Extension prod code must not import from core `src/**`,
              `src/plugin-sdk-internal/**`, or a sibling extension's `src/**`
            - Core code must not reach into `extensions/*/src/**` or
              reference `onboard.js`
            - New cross-boundary seams must be backwards-compatible, documented,
              and versioned (third-party plugins exist)

            VITEST TEST CONVENTIONS
            - Tests must be Vitest; colocated as `*.test.ts`; e2e as
              `*.e2e.test.ts`
            - No Jest flags (--runInBand, etc.); for serial runs use
              pnpm test:serial or OPENCLAW_VITEST_MAX_WORKERS=1
            - Mocks/timers/globals/module state must be cleaned up after each
              test; no leaked state
            - Prefer injection over broad module mocking; do not mock broad
              barrels or openclaw/plugin-sdk/* — mock narrow *.runtime.ts
              boundaries instead

            GENERAL
            - Report only findings you are confident about. If the diff is
              insufficient to determine context, say so rather than guessing.
            - Group findings by file. For each finding include the severity tag,
              a brief explanation, and a suggested fix where applicable.

            If the diff is trivial — documentation-only, changelog-only,
            config-formatting with no logic changes, a dependency bump with no
            logic change, or a one-line typo — approve the PR with a one-line
            reason and nothing else:
            `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with its severity tag.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review). Include the P1/P2/P3
            counts in the body; be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`

      - name: Check primary review actually succeeded
        # The action can report GH Actions outcome=success while the
        # underlying SDK call itself errored (e.g. instant quota-exhaustion
        # failure) — outcome alone silently skips the fallback path below.
        # Read the raw execution output the action always writes to confirm
        # the run really finished cleanly.
        id: review-check
        if: always()
        run: |
          OUT="$RUNNER_TEMP/claude-execution-output.json"
          is_error="false"
          if [ -f "$OUT" ]; then
            is_error=$(jq -r '
              if type != "array" then "false"
              else ([.[] | select(.type == "result")] | if length > 0 then (.[-1].is_error // false | tostring) else "false" end)
              end' "$OUT" 2>/dev/null || echo "false")
          fi
          if [ "${{ steps.review.outcome }}" = "failure" ] || [ "$is_error" = "true" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset git state before fallback
        if: steps.review-check.outputs.failed == 'true' && steps.token-check.outputs.has_fallback == 'true'
        run: git checkout . && git clean -fd

      - name: Claude PR Review (fallback token)
        if: steps.review-check.outputs.failed == 'true' && steps.token-check.outputs.has_fallback == 'true'
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          track_progress: true
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            You are a code reviewer for mctlhq/mctl-openclaw, a TypeScript ESM
            strict-mode repository (pnpm workspaces, Vitest, oxfmt/oxlint).

            SEVERITY CLASSIFICATION
            Classify every finding with one of:
            - P1: correctness bugs, security issues, broken runtime behavior
            - P2: design issues, plugin-SDK boundary violation, type-safety
              erosion, Vitest convention violations
            - P3: style, naming, minor improvements

            TYPESCRIPT ESM RULES
            - No @ts-nocheck or broad @ts-ignore without an explanatory comment
            - No `any`; prefer real types, `unknown`, or narrow adapters
            - Strict ESM imports: use .js extension for cross-package imports;
              use `import type` for type-only imports
            - No static+dynamic import of the same prod module; dynamic imports
              must cross a *.runtime.ts lazy boundary
            - Flag files over ~700 LOC as a P2 split candidate

            PLUGIN-SDK BOUNDARY (P1/P2)
            - Extension prod code must not import from core `src/**`,
              `src/plugin-sdk-internal/**`, or a sibling extension's `src/**`
            - Core code must not reach into `extensions/*/src/**` or
              reference `onboard.js`
            - New cross-boundary seams must be backwards-compatible, documented,
              and versioned (third-party plugins exist)

            VITEST TEST CONVENTIONS
            - Tests must be Vitest; colocated as `*.test.ts`; e2e as
              `*.e2e.test.ts`
            - No Jest flags (--runInBand, etc.); for serial runs use
              pnpm test:serial or OPENCLAW_VITEST_MAX_WORKERS=1
            - Mocks/timers/globals/module state must be cleaned up after each
              test; no leaked state
            - Prefer injection over broad module mocking; do not mock broad
              barrels or openclaw/plugin-sdk/* — mock narrow *.runtime.ts
              boundaries instead

            GENERAL
            - Report only findings you are confident about. If the diff is
              insufficient to determine context, say so rather than guessing.
            - Group findings by file. For each finding include the severity tag,
              a brief explanation, and a suggested fix where applicable.

            If the diff is trivial — documentation-only, changelog-only,
            config-formatting with no logic changes, a dependency bump with no
            logic change, or a one-line typo — approve the PR with a one-line
            reason and nothing else:
            `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with its severity tag.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review). Include the P1/P2/P3
            counts in the body; be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
