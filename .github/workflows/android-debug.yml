name: Android Debug Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk

      - name: Update Rolling Prerelease
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ../..
          # Create or update the release
          gh release upload android-debug-latest apps/android/app/build/outputs/apk/debug/*.apk --clobber || \
          gh release create android-debug-latest apps/android/app/build/outputs/apk/debug/*.apk \
            --title "Android Debug APK (Latest)" \
            --prerelease
