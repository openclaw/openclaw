name: Trigger Railway Deploy

# Fire after Docker Release completes. This ensures Railway only deploys
# after CI passes and the image is published to GHCR.
on:
  workflow_run:
    workflows: [Docker Release]
    types: [completed]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    # Only run in the fork, only on Docker Release success.
    if: >
      github.repository == 'as3445/openclaw'
      && github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: railway-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate the triggering commit is on main
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "Docker Release completed for SHA: ${WORKFLOW_SHA}"
          # Verify the SHA is on main before deploying.
          # Guards against force-pushes rewriting history after the workflow started.
          git branch -a --contains "${WORKFLOW_SHA}" | grep -q "main" \
            && echo "SHA ${WORKFLOW_SHA} confirmed on main — proceeding" \
            || { echo "SHA not on main — skipping stale trigger"; exit 0; }

      - name: Push version bump to template repo
        env:
          OPENCLAW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/as3445/openclaw-railway-template.git /tmp/tpl
          cd /tmp/tpl
          git config user.email "nox@openclaw.ai"
          git config user.name "Nox (CI)"
          echo "${OPENCLAW_SHA}" > .openclaw-version
          git add .openclaw-version
          git diff --cached --quiet && echo "No change — skipping" && exit 0
          git commit -m "deploy: openclaw ${OPENCLAW_SHA:0:8}"
          git push

      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway redeploy --service OpenClaw --yes --wait
