name: Fork CI

# Simplified CI for the ralf003/openclaw fork.
# Runs on push to any branch and on pull requests.
# Only essential jobs: lint, build, test.

on:
  push:
    branches: ['**']  # all branches
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - 'CHANGELOG.md'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: 'true'

      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: 'true'

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: 'true'

      - name: Test
        run: pnpm test
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          OPENCLAW_VITEST_MAX_WORKERS: '2'
