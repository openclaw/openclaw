name: Preflight (fork)

# Runs on any branch push to teconomix/openclaw (except main).
# This is our pre-upstream-PR verification gate.
# Push branch here first → wait for green → then push to upstream PR branch.

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run preflight on"
        required: false

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: "check (types + lint)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.23.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types and lint and oxfmt
        run: pnpm check

  build-smoke:
    name: "build smoke"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.23.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dist
        run: pnpm build

      - name: Smoke test CLI launcher
        run: node openclaw.mjs --help

  test:
    name: "tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.23.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle A2UI canvas
        run: pnpm canvas:a2ui:bundle

      - name: Run tests
        run: pnpm test
