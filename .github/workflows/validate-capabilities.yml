name: Validate Capabilities

# Comprehensive end-to-end capability validation for openclaw (GODSclaw fork).
# Runs on every PR and every push to main, covering:
#   - Multi-platform agent routing
#   - Security compliance (external-content guard, ReDoS protection, skill scanner)
#   - SDK integration surface (account-id normalization)
#   - Runtime environment guards and error-handling

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-capabilities-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate core capabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run capability validation tests
        run: >
          pnpm exec vitest run
          --config vitest.config.ts
          test/validate-capabilities.test.ts
