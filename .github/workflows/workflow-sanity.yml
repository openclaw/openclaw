name: Workflow Sanity

on:
  pull_request:
    paths-ignore:
      - "CHANGELOG.md"
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      control-director-proof:
        description: "Run the scoped Control Director reliability proof instead of generated docs baselines"
        required: false
        default: "false"
      chat-codex-stack-proof:
        description: Run Chat Codex Stack V1 proof
        required: false
        default: "false"
      chat-multi-agent-work-tree-proof:
        description: Run Chat Multi-agent Work Tree V1 proof
        required: false
        default: "false"
      chat-truth-diagnostics-proof:
        description: Run Chat Truth Diagnostics V1 proof
        required: false
        default: "false"
      chat-polish-a11y-proof:
        description: Run Chat Polish Accessibility V1 proof
        required: false
        default: "false"
      chat-network-remote-approval-cards-proof:
        description: Run Chat Network Remote Approval Cards V1 proof
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  no-tabs:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        env:
          CHECKOUT_REPO: ${{ github.repository }}
          CHECKOUT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" config gc.auto 0
          git -C "$GITHUB_WORKSPACE" remote add origin "https://github.com/${CHECKOUT_REPO}.git"
          fetch_checkout_ref() {
            local fetch_status
            for attempt in 1 2 3; do
              timeout --signal=TERM --kill-after=10s 30s git -C "$GITHUB_WORKSPACE" \
                -c protocol.version=2 \
                fetch --no-tags --prune --no-recurse-submodules --depth=1 origin \
                "+${CHECKOUT_SHA}:refs/remotes/origin/checkout" && return 0
              fetch_status="$?"
              if [ "$fetch_status" != "124" ] && [ "$fetch_status" != "137" ]; then
                return "$fetch_status"
              fi
              if [ "$attempt" = "3" ]; then
                return "$fetch_status"
              fi
              echo "::warning::checkout fetch for '$CHECKOUT_SHA' timed out on attempt $attempt; retrying"
              sleep 5
            done
          }
          fetch_checkout_ref
          git -C "$GITHUB_WORKSPACE" checkout --detach refs/remotes/origin/checkout

      - name: Fail on tabs in workflow files
        run: |
          python - <<'PY'
          from __future__ import annotations

          import pathlib
          import sys

          root = pathlib.Path(".github/workflows")
          bad: list[str] = []
          for path in sorted(root.rglob("*.yml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          for path in sorted(root.rglob("*.yaml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          if bad:
            print("Tabs found in workflow file(s):")
            for path in bad:
              print(f"- {path}")
            sys.exit(1)
          PY

  actionlint:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        env:
          CHECKOUT_REPO: ${{ github.repository }}
          CHECKOUT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" config gc.auto 0
          git -C "$GITHUB_WORKSPACE" remote add origin "https://github.com/${CHECKOUT_REPO}.git"
          fetch_checkout_ref() {
            local fetch_status
            for attempt in 1 2 3; do
              timeout --signal=TERM --kill-after=10s 30s git -C "$GITHUB_WORKSPACE" \
                -c protocol.version=2 \
                fetch --no-tags --prune --no-recurse-submodules --depth=1 origin \
                "+${CHECKOUT_SHA}:refs/remotes/origin/checkout" && return 0
              fetch_status="$?"
              if [ "$fetch_status" != "124" ] && [ "$fetch_status" != "137" ]; then
                return "$fetch_status"
              fi
              if [ "$attempt" = "3" ]; then
                return "$fetch_status"
              fi
              echo "::warning::checkout fetch for '$CHECKOUT_SHA' timed out on attempt $attempt; retrying"
              sleep 5
            done
          }
          fetch_checkout_ref
          git -C "$GITHUB_WORKSPACE" checkout --detach refs/remotes/origin/checkout

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Prepare trusted workflow audit configs
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          trusted_config="$RUNNER_TEMP/pre-commit-base.yaml"
          trusted_zizmor_config="$RUNNER_TEMP/zizmor-base.yml"

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            timeout --signal=TERM --kill-after=10s 30s git fetch --no-tags --depth=1 origin \
              "+${BASE_SHA}:refs/remotes/origin/security-base" ||
              timeout --signal=TERM --kill-after=10s 30s git fetch --no-tags --depth=1 origin \
                "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          fi

          if git cat-file -e "${BASE_SHA}:.pre-commit-config.yaml" 2>/dev/null; then
            git show "${BASE_SHA}:.pre-commit-config.yaml" > "$trusted_config"
          elif git show "refs/remotes/origin/${BASE_REF}:.pre-commit-config.yaml" \
            > "$trusted_config" 2>/dev/null; then
            echo "Base SHA ${BASE_SHA} does not expose .pre-commit-config.yaml; using origin/${BASE_REF} instead."
          else
            echo "::error title=trusted pre-commit config unavailable::Could not read .pre-commit-config.yaml from ${BASE_SHA} or origin/${BASE_REF}."
            exit 1
          fi

          if git cat-file -e "${BASE_SHA}:.github/zizmor.yml" 2>/dev/null; then
            git show "${BASE_SHA}:.github/zizmor.yml" > "$trusted_zizmor_config"
          elif git show "refs/remotes/origin/${BASE_REF}:.github/zizmor.yml" \
            > "$trusted_zizmor_config" 2>/dev/null; then
            echo "Base SHA ${BASE_SHA} does not expose .github/zizmor.yml; using origin/${BASE_REF} instead."
          else
            echo "::error title=trusted zizmor config unavailable::Could not read .github/zizmor.yml from ${BASE_SHA} or origin/${BASE_REF}."
            exit 1
          fi

          python3 - "$trusted_config" "$trusted_zizmor_config" <<'PY'
          from pathlib import Path
          import sys

          config_path = Path(sys.argv[1])
          zizmor_config_path = sys.argv[2]
          text = config_path.read_text()
          if ".github/zizmor.yml" not in text:
            raise SystemExit("trusted pre-commit config does not reference .github/zizmor.yml")
          config_path.write_text(text.replace(".github/zizmor.yml", zizmor_config_path))
          PY

          echo "PRE_COMMIT_CONFIG_PATH=$trusted_config" >> "$GITHUB_ENV"

      - name: Install pre-commit
        run: python -m pip install --disable-pip-version-check pre-commit==4.2.0

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.11"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          # GitHub release downloads occasionally return transient 5xx responses.
          # Retry all curl errors here so workflow-sanity does not fail closed on
          # a one-off release edge outage.
          curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL -o "${archive}" "${base_url}/${archive}"
          curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL -o checksums.txt "${base_url}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep " ${archive}\$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Lint workflows
        run: actionlint

      - name: Audit all workflows with zizmor
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t workflow_files < <(
            find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort
          )
          pre-commit run --config "${PRE_COMMIT_CONFIG_PATH:-.pre-commit-config.yaml}" zizmor --files "${workflow_files[@]}"

      - name: Disallow direct inputs interpolation in composite run blocks
        run: python3 scripts/check-composite-action-input-interpolation.py

      - name: Disallow tracked merge conflict markers
        run: node scripts/check-no-conflict-markers.mjs

  generated-doc-baselines:
    if: github.event_name == 'workflow_dispatch' && inputs.control-director-proof != 'true' && inputs.chat-codex-stack-proof != 'true' && inputs.chat-multi-agent-work-tree-proof != 'true' && inputs.chat-truth-diagnostics-proof != 'true' && inputs.chat-polish-a11y-proof != 'true' && inputs.chat-network-remote-approval-cards-proof != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        env:
          CHECKOUT_REPO: ${{ github.repository }}
          CHECKOUT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" config gc.auto 0
          git -C "$GITHUB_WORKSPACE" remote add origin "https://github.com/${CHECKOUT_REPO}.git"
          fetch_checkout_ref() {
            local fetch_status
            for attempt in 1 2 3; do
              timeout --signal=TERM --kill-after=10s 30s git -C "$GITHUB_WORKSPACE" \
                -c protocol.version=2 \
                fetch --no-tags --prune --no-recurse-submodules --depth=1 origin \
                "+${CHECKOUT_SHA}:refs/remotes/origin/checkout" && return 0
              fetch_status="$?"
              if [ "$fetch_status" != "124" ] && [ "$fetch_status" != "137" ]; then
                return "$fetch_status"
              fi
              if [ "$attempt" = "3" ]; then
                return "$fetch_status"
              fi
              echo "::warning::checkout fetch for '$CHECKOUT_SHA' timed out on attempt $attempt; retrying"
              sleep 5
            done
          }
          fetch_checkout_ref
          git -C "$GITHUB_WORKSPACE" checkout --detach refs/remotes/origin/checkout

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check config docs drift statefile
        run: pnpm config:docs:check

      - name: Check plugin SDK API baseline drift
        run: pnpm plugin-sdk:api:check

      - name: Check plugin SDK surface budget
        run: pnpm plugin-sdk:surface:check

  control-director-reliability-proof:
    if: github.event_name == 'workflow_dispatch' && inputs.control-director-proof == 'true'
    name: Control Director reliability proof
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Setup Node 24 and pnpm from packageManager
        uses: ./.github/actions/setup-node-env
        with:
          node-version: "24.x"
          install-bun: "false"
          frozen-lockfile: "true"

      - name: Print proof identity and command list
        shell: bash
        run: |
          set -euo pipefail
          echo "proof_sha=$(git rev-parse HEAD)"
          echo "branch=${GITHUB_REF_NAME}"
          echo "node=$(node -v)"
          echo "pnpm=$(pnpm -v)"
          cat <<'EOF'
          commands:
          - pnpm test test/scripts/runtime-postbuild.test.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/provider-request-preflight.test.ts src/agents/embedded-agent-runner/tool-schema-runtime.test.ts src/agents/runtime-plan/tools.diagnostics.test.ts src/agents/runtime-plan/tools.test.ts src/agents/control-director-contract.test.ts src/agents/control-director-delivery-guards.test.ts src/agents/control-director-truth-evidence.test.ts src/agents/judge-gate.test.ts src/agents/agent-command.live-model-switch.test.ts src/gateway/session-utils.subagent.test.ts test/scripts/control-director-readiness.test.ts
          - pnpm test src/gateway/server.chat.gateway-server-chat-b.test.ts -- -t "chat.history synthesizes Control Director guarded status|chat.send watchdog surfaces Control Director no-response runs|chat.send watchdog remains armed when dispatch returns before visible final"
          - pnpm ui:smoke:control-director-no-response
          - pnpm check:changed scripts/run-oxlint-shards.mjs test/scripts/run-oxlint.test.ts scripts/e2e/agent-bundle-mcp-tools-docker.sh scripts/lib/docker-e2e-scenarios.mjs scripts/dev/control-ui-control-director-no-response-smoke.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/agent-command.ts src/agents/control-director-contract.ts src/agents/control-director-delivery-guards.ts src/agents/control-director-delivery-guards.test.ts src/agents/control-director-truth-evidence.ts src/agents/control-director-truth-evidence.test.ts src/agents/provider-request-preflight.ts src/agents/provider-request-preflight.test.ts src/agents/embedded-agent-runner/run/attempt.ts src/agents/embedded-agent-runner/tool-schema-runtime.ts src/agents/embedded-agent-runner/tool-schema-runtime.test.ts src/agents/runtime-plan/tools.ts src/agents/runtime-plan/tools.diagnostics.test.ts src/agents/runtime-plan/tools.test.ts src/auto-reply/reply-payload.ts src/auto-reply/reply/agent-runner.ts src/commands/doctor-session-state-providers.ts src/commands/sessions-display-model.ts src/commands/sessions.ts ui/src/ui/chat-model-select-state.ts ui/src/ui/control-director-model.ts src/cli/self-improvement-cli.ts src/gateway/server-methods/kalshi-dashboard.ts src/self-improvement/auditor.ts src/self-improvement/llm-reviewer.ts src/self-improvement/operational-health.ts src/self-improvement/auditor.test.ts src/self-improvement/llm-reviewer.test.ts src/self-improvement/operational-health.test.ts src/self-improvement/production-readiness.ts src/self-improvement/proposals.ts src/self-improvement/reviewer-evals.ts src/self-improvement/routing.ts src/self-improvement/safety.ts src/self-improvement/summary.ts ui/src/ui/views/agents-room.ts src/agents/agent-command.live-model-switch.test.ts src/agents/control-director-contract.test.ts src/agents/judge-gate.test.ts src/config/sessions/types.ts src/gateway/server-methods/chat.ts src/gateway/server.chat.gateway-server-chat-b.test.ts src/gateway/session-utils.ts src/gateway/session-utils.types.ts src/gateway/session-utils.subagent.test.ts src/gateway/session-utils.test.ts src/plugins/session-entry-slot-keys.ts scripts/control-director-readiness.mjs test/scripts/control-director-readiness.test.ts
          EOF

      - name: Run targeted Control Director tests
        run: pnpm test test/scripts/runtime-postbuild.test.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/provider-request-preflight.test.ts src/agents/embedded-agent-runner/tool-schema-runtime.test.ts src/agents/runtime-plan/tools.diagnostics.test.ts src/agents/runtime-plan/tools.test.ts src/agents/control-director-contract.test.ts src/agents/control-director-delivery-guards.test.ts src/agents/control-director-truth-evidence.test.ts src/agents/judge-gate.test.ts src/agents/agent-command.live-model-switch.test.ts src/gateway/session-utils.subagent.test.ts test/scripts/control-director-readiness.test.ts

      - name: Run targeted chat.history Control Director proof
        run: pnpm test src/gateway/server.chat.gateway-server-chat-b.test.ts -- -t "chat.history synthesizes Control Director guarded status|chat.send watchdog surfaces Control Director no-response runs|chat.send watchdog remains armed when dispatch returns before visible final"

      - name: Run Control UI no-response proof
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm ui:smoke:control-director-no-response

      - name: Run explicit changed gate
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCLAW_TEST_PROJECTS_PARALLEL: "6"
          OPENCLAW_VITEST_MAX_WORKERS: "1"
          OPENCLAW_VITEST_NO_OUTPUT_TIMEOUT_MS: "900000"
        run: pnpm check:changed scripts/run-oxlint-shards.mjs test/scripts/run-oxlint.test.ts scripts/e2e/agent-bundle-mcp-tools-docker.sh scripts/lib/docker-e2e-scenarios.mjs scripts/dev/control-ui-control-director-no-response-smoke.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/agent-command.ts src/agents/control-director-contract.ts src/agents/control-director-delivery-guards.ts src/agents/control-director-delivery-guards.test.ts src/agents/control-director-truth-evidence.ts src/agents/control-director-truth-evidence.test.ts src/agents/provider-request-preflight.ts src/agents/provider-request-preflight.test.ts src/agents/embedded-agent-runner/run/attempt.ts src/agents/embedded-agent-runner/tool-schema-runtime.ts src/agents/embedded-agent-runner/tool-schema-runtime.test.ts src/agents/runtime-plan/tools.ts src/agents/runtime-plan/tools.diagnostics.test.ts src/agents/runtime-plan/tools.test.ts src/auto-reply/reply-payload.ts src/auto-reply/reply/agent-runner.ts src/commands/doctor-session-state-providers.ts src/commands/sessions-display-model.ts src/commands/sessions.ts ui/src/ui/chat-model-select-state.ts ui/src/ui/control-director-model.ts src/cli/self-improvement-cli.ts src/gateway/server-methods/kalshi-dashboard.ts src/self-improvement/auditor.ts src/self-improvement/llm-reviewer.ts src/self-improvement/operational-health.ts src/self-improvement/auditor.test.ts src/self-improvement/llm-reviewer.test.ts src/self-improvement/operational-health.test.ts src/self-improvement/production-readiness.ts src/self-improvement/proposals.ts src/self-improvement/reviewer-evals.ts src/self-improvement/routing.ts src/self-improvement/safety.ts src/self-improvement/summary.ts ui/src/ui/views/agents-room.ts src/agents/agent-command.live-model-switch.test.ts src/agents/control-director-contract.test.ts src/agents/judge-gate.test.ts src/config/sessions/types.ts src/gateway/server-methods/chat.ts src/gateway/server.chat.gateway-server-chat-b.test.ts src/gateway/session-utils.ts src/gateway/session-utils.types.ts src/gateway/session-utils.subagent.test.ts src/gateway/session-utils.test.ts src/plugins/session-entry-slot-keys.ts scripts/control-director-readiness.mjs test/scripts/control-director-readiness.test.ts

  chat-codex-stack-proof:
    if: github.event_name == 'workflow_dispatch' && inputs.chat-codex-stack-proof == 'true'
    name: Chat Codex Stack V1 proof
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node 24 and pnpm 11.2.2
        uses: ./.github/actions/setup-node-env
        with:
          node-version: "24.x"
          install-bun: "false"
          frozen-lockfile: "true"

      - name: Print proof identity and command list
        shell: bash
        run: |
          set -euo pipefail
          echo "proof_sha=$(git rev-parse HEAD)"
          echo "branch=${GITHUB_REF_NAME}"
          echo "node=$(node -v)"
          echo "pnpm=$(pnpm -v)"
          cat <<'EOF'
          commands:
          - pnpm test ui/src/ui/chat/work-snapshot.test.ts ui/src/ui/views/chat.test.ts ui/src/ui/controllers/chat.test.ts ui/src/ui/app-chat.test.ts ui/src/ui/chat/chat-responsive.browser.test.ts ui/src/ui/chat/proposed-plan.test.ts ui/src/ui/chat/grouped-render.test.ts src/gateway/server-methods/tasks.test.ts src/gateway/server.chat.gateway-server-chat.test.ts ui/src/ui/app-gateway.node.test.ts ui/src/ui/chat/tool-cards.test.ts
          - pnpm tsgo:test:ui
          - node --import tsx scripts/dev/control-ui-chat-work-surface-smoke.ts
          - node --import tsx scripts/dev/control-ui-chat-projects-smoke.ts
          - node --import tsx scripts/dev/control-ui-chat-plan-mode-smoke.ts
          - node --import tsx scripts/dev/control-ui-chat-pursue-goal-smoke.ts
          - node --import tsx scripts/dev/control-ui-chat-approval-cards-smoke.ts
          - node --import tsx scripts/dev/control-ui-chat-tool-proof-artifact-cards-smoke.ts
          - pnpm check:changed
          EOF

      - name: Run targeted Chat Codex Stack tests
        run: pnpm test ui/src/ui/chat/work-snapshot.test.ts ui/src/ui/views/chat.test.ts ui/src/ui/controllers/chat.test.ts ui/src/ui/app-chat.test.ts ui/src/ui/chat/chat-responsive.browser.test.ts ui/src/ui/chat/proposed-plan.test.ts ui/src/ui/chat/grouped-render.test.ts src/gateway/server-methods/tasks.test.ts src/gateway/server.chat.gateway-server-chat.test.ts ui/src/ui/app-gateway.node.test.ts ui/src/ui/chat/tool-cards.test.ts

      - name: Run UI typecheck
        run: pnpm tsgo:test:ui

      - name: Run Chat Work Surface smoke
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: node --import tsx scripts/dev/control-ui-chat-work-surface-smoke.ts

      - name: Run Chat Projects smoke
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: node --import tsx scripts/dev/control-ui-chat-projects-smoke.ts

      - name: Run Chat Plan Mode smoke
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: node --import tsx scripts/dev/control-ui-chat-plan-mode-smoke.ts

      - name: Run Chat Pursue Goal smoke
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: node --import tsx scripts/dev/control-ui-chat-pursue-goal-smoke.ts

      - name: Run Chat Approval Cards smoke
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: node --import tsx scripts/dev/control-ui-chat-approval-cards-smoke.ts

      - name: Run Chat Tool Proof Artifact Cards smoke
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: node --import tsx scripts/dev/control-ui-chat-tool-proof-artifact-cards-smoke.ts

      - name: Run changed gate
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCLAW_TEST_PROJECTS_PARALLEL: "6"
          OPENCLAW_VITEST_MAX_WORKERS: "1"
          OPENCLAW_VITEST_NO_OUTPUT_TIMEOUT_MS: "900000"
        run: pnpm check:changed

  chat-multi-agent-work-tree-proof:
    if: github.event_name == 'workflow_dispatch' && inputs.chat-multi-agent-work-tree-proof == 'true'
    name: Chat Multi-agent Work Tree V1 proof
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node 24 and pnpm 11.2.2
        uses: ./.github/actions/setup-node-env
        with:
          node-version: "24.x"
          install-bun: "false"
          frozen-lockfile: "true"

      - name: Print proof identity and command list
        shell: bash
        run: |
          set -euo pipefail
          echo "proof_sha=$(git rev-parse HEAD)"
          echo "branch=${GITHUB_REF_NAME}"
          echo "node=$(node -v)"
          echo "pnpm=$(pnpm -v)"
          cat <<'EOF'
          commands:
          - pnpm test ui/src/ui/chat/work-tree.test.ts ui/src/ui/chat/work-snapshot.test.ts ui/src/ui/views/chat.test.ts ui/src/ui/controllers/chat.test.ts ui/src/ui/app-chat.test.ts
