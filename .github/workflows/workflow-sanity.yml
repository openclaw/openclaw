name: Workflow Sanity

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      control-director-proof:
        description: "Run the scoped Control Director reliability proof instead of generated docs baselines"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  no-tabs:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fail on tabs in workflow files
        run: |
          python - <<'PY'
          from __future__ import annotations

          import pathlib
          import sys

          root = pathlib.Path(".github/workflows")
          bad: list[str] = []
          for path in sorted(root.rglob("*.yml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          for path in sorted(root.rglob("*.yaml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          if bad:
            print("Tabs found in workflow file(s):")
            for path in bad:
              print(f"- {path}")
            sys.exit(1)
          PY

  actionlint:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.11"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          # GitHub release downloads occasionally return transient 5xx responses.
          # Retry all curl errors here so workflow-sanity does not fail closed on
          # a one-off release edge outage.
          curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL -o "${archive}" "${base_url}/${archive}"
          curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL -o checksums.txt "${base_url}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep " ${archive}\$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Lint workflows
        run: actionlint

      - name: Disallow direct inputs interpolation in composite run blocks
        run: python3 scripts/check-composite-action-input-interpolation.py

      - name: Disallow tracked merge conflict markers
        run: node scripts/check-no-conflict-markers.mjs

  generated-doc-baselines:
    if: github.event_name == 'workflow_dispatch' && inputs.control-director-proof != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check config docs drift statefile
        run: pnpm config:docs:check

      - name: Check plugin SDK API baseline drift
        run: pnpm plugin-sdk:api:check

  control-director-reliability-proof:
    if: github.event_name == 'workflow_dispatch' && inputs.control-director-proof == 'true'
    name: Control Director reliability proof
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node 24 and pnpm 11.2.2
        uses: ./.github/actions/setup-node-env
        with:
          node-version: "24.x"
          pnpm-version: "11.2.2"
          install-bun: "false"
          frozen-lockfile: "true"

      - name: Print proof identity and command list
        shell: bash
        run: |
          set -euo pipefail
          echo "proof_sha=$(git rev-parse HEAD)"
          echo "branch=${GITHUB_REF_NAME}"
          echo "node=$(node -v)"
          echo "pnpm=$(pnpm -v)"
          cat <<'EOF'
          commands:
          - pnpm test test/scripts/runtime-postbuild.test.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/control-director-contract.test.ts src/agents/agent-command.live-model-switch.test.ts src/gateway/session-utils.subagent.test.ts test/scripts/control-director-readiness.test.ts
          - pnpm test src/gateway/server.chat.gateway-server-chat-b.test.ts -- -t "chat.history synthesizes Control Director guarded status|chat.send watchdog surfaces Control Director no-response runs|chat.send watchdog remains armed when dispatch returns before visible final"
          - pnpm ui:smoke:control-director-no-response
          - pnpm check:changed scripts/run-oxlint-shards.mjs test/scripts/run-oxlint.test.ts scripts/run-oxlint-shards.mjs test/scripts/run-oxlint.test.ts scripts/e2e/agent-bundle-mcp-tools-docker.sh scripts/lib/docker-e2e-scenarios.mjs scripts/dev/control-ui-control-director-no-response-smoke.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/agent-command.ts src/agents/control-director-contract.ts src/agents/control-director-delivery-guards.ts src/auto-reply/reply-payload.ts src/auto-reply/reply/agent-runner.ts src/commands/doctor-session-state-providers.ts src/commands/sessions-display-model.ts src/commands/sessions.ts ui/src/ui/chat-model-select-state.ts ui/src/ui/control-director-model.ts src/cli/self-improvement-cli.ts src/gateway/server-methods/kalshi-dashboard.ts src/self-improvement/auditor.ts src/self-improvement/llm-reviewer.ts src/self-improvement/operational-health.ts src/self-improvement/auditor.test.ts src/self-improvement/llm-reviewer.test.ts src/self-improvement/operational-health.test.ts src/self-improvement/production-readiness.ts src/self-improvement/proposals.ts src/self-improvement/reviewer-evals.ts src/self-improvement/routing.ts src/self-improvement/safety.ts src/self-improvement/summary.ts ui/src/ui/views/agents-room.ts src/agents/agent-command.live-model-switch.test.ts src/agents/control-director-contract.test.ts src/config/sessions/types.ts src/gateway/server-methods/chat.ts src/gateway/server.chat.gateway-server-chat-b.test.ts src/gateway/session-utils.ts src/gateway/session-utils.types.ts src/gateway/session-utils.subagent.test.ts src/gateway/session-utils.test.ts src/plugins/session-entry-slot-keys.ts scripts/control-director-readiness.mjs test/scripts/control-director-readiness.test.ts
          EOF

      - name: Run targeted Control Director tests
        run: pnpm test test/scripts/runtime-postbuild.test.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/control-director-contract.test.ts src/agents/agent-command.live-model-switch.test.ts src/gateway/session-utils.subagent.test.ts test/scripts/control-director-readiness.test.ts

      - name: Run targeted chat.history Control Director proof
        run: pnpm test src/gateway/server.chat.gateway-server-chat-b.test.ts -- -t "chat.history synthesizes Control Director guarded status|chat.send watchdog surfaces Control Director no-response runs|chat.send watchdog remains armed when dispatch returns before visible final"

      - name: Run Control UI no-response proof
        timeout-minutes: 20
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm ui:smoke:control-director-no-response

      - name: Run explicit changed gate
        env:
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=4096
          OPENCLAW_TEST_PROJECTS_PARALLEL: "6"
          OPENCLAW_VITEST_MAX_WORKERS: "1"
          OPENCLAW_VITEST_NO_OUTPUT_TIMEOUT_MS: "900000"
        run: pnpm check:changed scripts/run-oxlint-shards.mjs test/scripts/run-oxlint.test.ts scripts/run-oxlint-shards.mjs test/scripts/run-oxlint.test.ts scripts/e2e/agent-bundle-mcp-tools-docker.sh scripts/lib/docker-e2e-scenarios.mjs scripts/dev/control-ui-control-director-no-response-smoke.ts test/scripts/control-ui-control-director-no-response-smoke.test.ts src/agents/agent-command.ts src/agents/control-director-contract.ts src/agents/control-director-delivery-guards.ts src/auto-reply/reply-payload.ts src/auto-reply/reply/agent-runner.ts src/commands/doctor-session-state-providers.ts src/commands/sessions-display-model.ts src/commands/sessions.ts ui/src/ui/chat-model-select-state.ts ui/src/ui/control-director-model.ts src/cli/self-improvement-cli.ts src/gateway/server-methods/kalshi-dashboard.ts src/self-improvement/auditor.ts src/self-improvement/llm-reviewer.ts src/self-improvement/operational-health.ts src/self-improvement/auditor.test.ts src/self-improvement/llm-reviewer.test.ts src/self-improvement/operational-health.test.ts src/self-improvement/production-readiness.ts src/self-improvement/proposals.ts src/self-improvement/reviewer-evals.ts src/self-improvement/routing.ts src/self-improvement/safety.ts src/self-improvement/summary.ts ui/src/ui/views/agents-room.ts src/agents/agent-command.live-model-switch.test.ts src/agents/control-director-contract.test.ts src/config/sessions/types.ts src/gateway/server-methods/chat.ts src/gateway/server.chat.gateway-server-chat-b.test.ts src/gateway/session-utils.ts src/gateway/session-utils.types.ts src/gateway/session-utils.subagent.test.ts src/gateway/session-utils.test.ts src/plugins/session-entry-slot-keys.ts scripts/control-director-readiness.mjs test/scripts/control-director-readiness.test.ts
