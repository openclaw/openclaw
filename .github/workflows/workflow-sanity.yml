name: Workflow Sanity

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: workflow-sanity-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate-sync-merge:
    # Skip on the mctlhq fork — Blacksmith runners are not provisioned
    # there, so without this guard the job sits QUEUED and blocks PR merges.
    if: github.repository == 'openclaw/openclaw'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    outputs:
      skip_push_sync: ${{ steps.gate.outputs.skip_push_sync }}
    steps:
      - name: Detect upstream sync merge push
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          skip="false"
          if [[ "${EVENT_NAME}" == "push" ]]; then
            msg="${HEAD_COMMIT_MESSAGE}"
            if [[ "${msg}" == "chore(sync): merge upstream/main into main ("* ]]; then
              skip="true"
            fi
          fi
          echo "skip_push_sync=${skip}" >> "$GITHUB_OUTPUT"

  no-tabs:
    needs: [gate-sync-merge]
    if: needs.gate-sync-merge.outputs.skip_push_sync != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fail on tabs in workflow files
        run: |
          python - <<'PY'
          from __future__ import annotations

          import pathlib
          import sys

          root = pathlib.Path(".github/workflows")
          bad: list[str] = []
          for path in sorted(root.rglob("*.yml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          for path in sorted(root.rglob("*.yaml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          if bad:
            print("Tabs found in workflow file(s):")
            for path in bad:
              print(f"- {path}")
            sys.exit(1)
          PY

  actionlint:
    needs: [gate-sync-merge]
    if: needs.gate-sync-merge.outputs.skip_push_sync != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.11"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl -sSfL -o "${archive}" "${base_url}/${archive}"
          curl -sSfL -o checksums.txt "${base_url}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep " ${archive}\$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Lint workflows
        run: actionlint

      - name: Disallow direct inputs interpolation in composite run blocks
        run: python3 scripts/check-composite-action-input-interpolation.py

  config-docs-drift:
    needs: [gate-sync-merge]
    if: needs.gate-sync-merge.outputs.skip_push_sync != 'true' && github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Check config docs drift statefile
        run: pnpm config:docs:check
