name: Package Acceptance

on:
  workflow_dispatch:
    inputs:
      workflow_ref:
        description: Trusted repo ref for workflow scripts and Docker E2E harness
        required: true
        default: main
        type: string
      source:
        description: Package candidate source
        required: true
        default: npm
        type: choice
        options:
          - npm
          - ref
          - url
          - trusted-url
          - artifact
      package_ref:
        description: Trusted package source ref when source=ref
        required: true
        default: main
        type: string
      package_spec:
        description: Published package spec when source=npm
        required: false
        default: openclaw@beta
        type: string
      package_url:
        description: HTTPS .tgz URL when source=url or source=trusted-url
        required: false
        default: ""
        type: string
      package_sha256:
        description: Expected package SHA-256; required for source=url or source=trusted-url
        required: false
        default: ""
        type: string
      trusted_source_id:
        description: Named trusted source policy when source=trusted-url
        required: false
        default: ""
        type: string
      artifact_run_id:
        description: GitHub Actions run id when source=artifact
        required: false
        default: ""
        type: string
      artifact_name:
        description: Artifact name containing one .tgz when source=artifact
        required: false
        default: package-under-test
        type: string
      suite_profile:
        description: Acceptance profile
        required: true
        default: package
        type: choice
        options:
          - smoke
          - package
          - product
          - full
          - custom
          - stable-plugin
      stable_plugin_manifest_ref:
        description: Stable plugin support manifest ref or artifact identity for suite_profile=stable-plugin
        required: false
        default: ""
        type: string
      stable_plugin_targets_json:
        description: Compact JSON array of manifest-covered stable plugin targets
        required: false
        default: ""
        type: string
      stable_plugin_package_specs:
        description: Newline-delimited exact stable plugin package specs
        required: false
        default: ""
        type: string
      stable_plugin_package_tarballs_json:
        description: JSON map of covered package names to prebuilt tarball proof; required for suite_profile=stable-plugin
        required: false
        default: ""
        type: string
      stable_plugin_acceptance_artifact_prefix:
        description: Artifact prefix for stable-plugin package acceptance proof
        required: false
        default: stable-plugin-acceptance
        type: string
      docker_lanes:
        description: Comma/space separated Docker lanes when suite_profile=custom
        required: false
        default: ""
        type: string
      published_upgrade_survivor_baseline:
        description: Published OpenClaw package baseline for the published-upgrade-survivor Docker lane
        required: false
        default: openclaw@latest
        type: string
      published_upgrade_survivor_baselines:
        description: Optional baseline list for published-upgrade-survivor/update-migration; use last-stable-4, all-since-2026.4.23, release-history, or exact versions
        required: false
        default: ""
        type: string
      published_upgrade_survivor_scenarios:
        description: Optional scenario list for published-upgrade-survivor/update-migration; use reported-issues for known upgrade failure shapes
        required: false
        default: ""
        type: string
      telegram_mode:
        description: Optional Telegram QA lane for the resolved package candidate
        required: true
        default: none
        type: choice
        options:
          - none
          - mock-openai
          - live-frontier
      telegram_scenarios:
        description: Optional comma-separated Telegram scenario ids
        required: false
        default: ""
        type: string
      advisory:
        description: Treat acceptance failures as advisory for the caller
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      advisory:
        description: Treat acceptance failures as advisory for the caller
        required: false
        default: false
        type: boolean
      workflow_ref:
        description: Trusted repo ref for workflow scripts and Docker E2E harness
        required: false
        default: main
        type: string
      source:
        description: "Package candidate source: npm, ref, url, trusted-url, or artifact"
        required: true
        type: string
      package_ref:
        description: Trusted package source ref when source=ref
        required: false
        default: main
        type: string
      package_spec:
        description: Published package spec when source=npm
        required: false
        default: openclaw@beta
        type: string
      package_url:
        description: HTTPS .tgz URL when source=url or source=trusted-url
        required: false
        default: ""
        type: string
      package_sha256:
        description: Expected package SHA-256; required for source=url or source=trusted-url
        required: false
        default: ""
        type: string
      trusted_source_id:
        description: Named trusted source policy when source=trusted-url
        required: false
        default: ""
        type: string
      artifact_run_id:
        description: GitHub Actions run id when source=artifact
        required: false
        default: ""
        type: string
      artifact_name:
        description: Artifact name containing one .tgz when source=artifact
        required: false
        default: package-under-test
        type: string
      suite_profile:
        description: "Acceptance profile: smoke, package, product, full, custom, or stable-plugin"
        required: false
        default: package
        type: string
      stable_plugin_manifest_ref:
        description: Stable plugin support manifest ref or artifact identity for suite_profile=stable-plugin
        required: false
        default: ""
        type: string
      stable_plugin_targets_json:
        description: Compact JSON array of manifest-covered stable plugin targets
        required: false
        default: ""
        type: string
      stable_plugin_package_specs:
        description: Newline-delimited exact stable plugin package specs
        required: false
        default: ""
        type: string
      stable_plugin_package_tarballs_json:
        description: JSON map of covered package names to prebuilt tarball proof; required for suite_profile=stable-plugin
        required: false
        default: ""
        type: string
      stable_plugin_acceptance_artifact_prefix:
        description: Artifact prefix for stable-plugin package acceptance proof
        required: false
        default: stable-plugin-acceptance
        type: string
      docker_lanes:
        description: Comma/space separated Docker lanes when suite_profile=custom
        required: false
        default: ""
        type: string
      published_upgrade_survivor_baseline:
        description: Published OpenClaw package baseline for the published-upgrade-survivor Docker lane
        required: false
        default: openclaw@latest
        type: string
      published_upgrade_survivor_baselines:
        description: Optional baseline list for published-upgrade-survivor/update-migration; use last-stable-4, all-since-2026.4.23, release-history, or exact versions
        required: false
        default: ""
        type: string
      published_upgrade_survivor_scenarios:
        description: Optional scenario list for published-upgrade-survivor/update-migration; use reported-issues for known upgrade failure shapes
        required: false
        default: ""
        type: string
      telegram_mode:
        description: Optional Telegram QA lane for the resolved package candidate
        required: false
        default: none
        type: string
      telegram_scenarios:
        description: Optional comma-separated Telegram scenario ids
        required: false
        default: ""
        type: string
    secrets:
      OPENCLAW_TRUSTED_PACKAGE_TOKEN:
        required: false
      OPENAI_API_KEY:
        required: false
      OPENAI_BASE_URL:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      ANTHROPIC_API_KEY_OLD:
        required: false
      ANTHROPIC_API_TOKEN:
        required: false
      FACTORY_API_KEY:
        required: false
      BYTEPLUS_API_KEY:
        required: false
      CEREBRAS_API_KEY:
        required: false
      DEEPINFRA_API_KEY:
        required: false
      DASHSCOPE_API_KEY:
        required: false
      GROQ_API_KEY:
        required: false
      KIMI_API_KEY:
        required: false
      MODELSTUDIO_API_KEY:
        required: false
      MOONSHOT_API_KEY:
        required: false
      MISTRAL_API_KEY:
        required: false
      MINIMAX_API_KEY:
        required: false
      OPENCODE_API_KEY:
        required: false
      OPENCODE_ZEN_API_KEY:
        required: false
      OPENCLAW_LIVE_BROWSER_CDP_URL:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_MODEL:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_PROFILE:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE:
        required: false
      GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      QWEN_API_KEY:
        required: false
      FAL_KEY:
        required: false
      RUNWAY_API_KEY:
        required: false
      DEEPGRAM_API_KEY:
        required: false
      TOGETHER_API_KEY:
        required: false
      VYDRA_API_KEY:
        required: false
      XAI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      Z_AI_API_KEY:
        required: false
      BYTEPLUS_ACCESS_KEY_ID:
        required: false
      BYTEPLUS_SECRET_ACCESS_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      OPENCLAW_CODEX_AUTH_JSON:
        required: false
      OPENCLAW_CODEX_CONFIG_TOML:
        required: false
      OPENCLAW_CLAUDE_JSON:
        required: false
      OPENCLAW_CLAUDE_CREDENTIALS_JSON:
        required: false
      OPENCLAW_CLAUDE_SETTINGS_JSON:
        required: false
      OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON:
        required: false
      OPENCLAW_GEMINI_SETTINGS_JSON:
        required: false
      FIREWORKS_API_KEY:
        required: false
      OPENCLAW_QA_CONVEX_SITE_URL:
        required: false
      OPENCLAW_QA_CONVEX_SECRET_CI:
        required: false

permissions:
  actions: read
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: package-acceptance-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"
  PACKAGE_ARTIFACT_NAME: package-under-test

jobs:
  resolve_package:
    name: Resolve package candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      docker_lanes: ${{ steps.profile.outputs.docker_lanes }}
      include_live_suites: ${{ steps.profile.outputs.include_live_suites }}
      include_openwebui: ${{ steps.profile.outputs.include_openwebui }}
      include_release_path_suites: ${{ steps.profile.outputs.include_release_path_suites }}
      package_artifact_name: ${{ steps.profile.outputs.package_artifact_name }}
      package_source_sha: ${{ steps.resolve.outputs.package_source_sha }}
      package_sha256: ${{ steps.resolve.outputs.sha256 }}
      package_version: ${{ steps.resolve.outputs.package_version }}
      stable_plugin_inputs_artifact: ${{ steps.stable_plugin.outputs.artifact_name }}
      stable_plugin_support_sha256: ${{ steps.stable_plugin.outputs.sha256 }}
      published_upgrade_survivor_baselines: ${{ steps.upgrade_survivor_baselines.outputs.baselines }}
      published_upgrade_survivor_scenarios: ${{ inputs.published_upgrade_survivor_scenarios }}
      telegram_enabled: ${{ steps.profile.outputs.telegram_enabled }}
      telegram_mode: ${{ steps.profile.outputs.telegram_mode }}
    steps:
      - name: Checkout package workflow ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.workflow_ref }}
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: ${{ inputs.source == 'ref' && 'true' || 'false' }}
          install-deps: "false"

      - name: Download current-run package artifact input
        if: inputs.source == 'artifact' && inputs.artifact_run_id == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifacts/package-candidate-input

      - name: Download previous-run package artifact input
        if: inputs.source == 'artifact' && inputs.artifact_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ARTIFACT_NAME// }" ]]; then
            echo "artifact_name is required when source=artifact." >&2
            exit 1
          fi
          mkdir -p .artifacts/package-candidate-input
          gh run download "$ARTIFACT_RUN_ID" -n "$ARTIFACT_NAME" -D .artifacts/package-candidate-input

      - name: Resolve package candidate
        id: resolve
        env:
          SOURCE: ${{ inputs.source }}
          PACKAGE_REF: ${{ inputs.package_ref }}
          PACKAGE_SPEC: ${{ inputs.package_spec }}
          PACKAGE_URL: ${{ inputs.package_url }}
          PACKAGE_SHA256: ${{ inputs.package_sha256 }}
          TRUSTED_SOURCE_ID: ${{ inputs.trusted_source_id }}
          OPENCLAW_TRUSTED_PACKAGE_TOKEN: ${{ secrets.OPENCLAW_TRUSTED_PACKAGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir=""
          if [[ "$SOURCE" == "artifact" ]]; then
            artifact_dir=".artifacts/package-candidate-input"
          fi

          node scripts/resolve-openclaw-package-candidate.mjs \
            --source "$SOURCE" \
            --package-ref "$PACKAGE_REF" \
            --package-spec "$PACKAGE_SPEC" \
            --package-url "$PACKAGE_URL" \
            --package-sha256 "$PACKAGE_SHA256" \
            --trusted-source-id "$TRUSTED_SOURCE_ID" \
            --artifact-dir "${artifact_dir:-.}" \
            --output-dir .artifacts/docker-e2e-package \
            --output-name openclaw-current.tgz \
            --metadata .artifacts/docker-e2e-package/package-candidate.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Select acceptance profile
        id: profile
        env:
          SOURCE: ${{ inputs.source }}
          SUITE_PROFILE: ${{ inputs.suite_profile }}
          CUSTOM_DOCKER_LANES: ${{ inputs.docker_lanes }}
          TELEGRAM_MODE: ${{ inputs.telegram_mode }}
        shell: bash
        run: |
          set -euo pipefail

          include_release_path_suites=false
          include_openwebui=false
          include_live_suites=false
          docker_lanes=""

          case "$SUITE_PROFILE" in
            smoke)
              docker_lanes="npm-onboard-channel-agent gateway-network config-reload"
              ;;
            package)
              docker_lanes="npm-onboard-channel-agent doctor-switch update-channel-switch skill-install update-corrupt-plugin upgrade-survivor published-upgrade-survivor root-managed-vps-upgrade update-restart-auth plugins-offline plugin-update"
              ;;
            product)
              docker_lanes="npm-onboard-channel-agent doctor-switch update-channel-switch skill-install update-corrupt-plugin upgrade-survivor published-upgrade-survivor root-managed-vps-upgrade update-restart-auth plugins plugin-update mcp-channels cron-mcp-cleanup openai-web-search-minimal openwebui"
              include_openwebui=true
              ;;
            full)
              include_release_path_suites=true
              include_openwebui=true
              ;;
            stable-plugin)
              docker_lanes="doctor-switch update-channel-switch plugins plugin-update published-upgrade-survivor"
              ;;
            custom)
              docker_lanes="$CUSTOM_DOCKER_LANES"
              if [[ -z "${docker_lanes// }" ]]; then
                echo "docker_lanes is required when suite_profile=custom." >&2
                exit 1
              fi
              if [[ "$docker_lanes" == *"openwebui"* ]]; then
                include_openwebui=true
              fi
              ;;
            *)
              echo "Unknown suite_profile: $SUITE_PROFILE" >&2
              exit 1
              ;;
          esac

          telegram_enabled=false
          if [[ "$TELEGRAM_MODE" != "none" ]]; then
            telegram_enabled=true
          fi

          {
            echo "docker_lanes=$docker_lanes"
            echo "include_release_path_suites=$include_release_path_suites"
            echo "include_openwebui=$include_openwebui"
            echo "include_live_suites=$include_live_suites"
            echo "telegram_enabled=$telegram_enabled"
            echo "telegram_mode=$TELEGRAM_MODE"
            echo "package_artifact_name=${PACKAGE_ARTIFACT_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate stable plugin package inputs
        id: stable_plugin
        env:
          PACKAGE_SPEC: ${{ inputs.package_spec }}
          STABLE_PLUGIN_MANIFEST_REF: ${{ inputs.stable_plugin_manifest_ref }}
          STABLE_PLUGIN_TARGETS_JSON: ${{ inputs.stable_plugin_targets_json }}
          STABLE_PLUGIN_PACKAGE_SPECS: ${{ inputs.stable_plugin_package_specs }}
          STABLE_PLUGIN_PACKAGE_TARBALLS_JSON: ${{ inputs.stable_plugin_package_tarballs_json }}
          STABLE_PLUGIN_ACCEPTANCE_ARTIFACT_PREFIX: ${{ inputs.stable_plugin_acceptance_artifact_prefix }}
          SUITE_PROFILE: ${{ inputs.suite_profile }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SUITE_PROFILE}" != "stable-plugin" ]]; then
            if [[ -n "${STABLE_PLUGIN_MANIFEST_REF}${STABLE_PLUGIN_TARGETS_JSON}${STABLE_PLUGIN_PACKAGE_SPECS}${STABLE_PLUGIN_PACKAGE_TARBALLS_JSON}" ]]; then
              echo "stable_plugin_* inputs require suite_profile=stable-plugin." >&2
              exit 1
            fi
            echo "artifact_name=" >> "$GITHUB_OUTPUT"
            echo "sha256=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${STABLE_PLUGIN_MANIFEST_REF// }" ]]; then
            echo "suite_profile=stable-plugin requires stable_plugin_manifest_ref." >&2
            exit 1
          fi
          if [[ -z "${STABLE_PLUGIN_TARGETS_JSON// }" ]]; then
            echo "suite_profile=stable-plugin requires stable_plugin_targets_json." >&2
            exit 1
          fi
          if [[ -z "${STABLE_PLUGIN_PACKAGE_SPECS// }" ]]; then
            echo "suite_profile=stable-plugin requires stable_plugin_package_specs." >&2
            exit 1
          fi
          if [[ ! "${PACKAGE_SPEC}" =~ ^openclaw@[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*(-[1-9][0-9]*)?$ ]]; then
            echo "suite_profile=stable-plugin requires package_spec to be an exact stable OpenClaw package." >&2
            exit 1
          fi

          mkdir -p .artifacts/stable-plugin-acceptance
          targets_path=.artifacts/stable-plugin-acceptance/targets.json
          specs_path=.artifacts/stable-plugin-acceptance/package-specs.txt
          tarballs_path=.artifacts/stable-plugin-acceptance/package-tarballs.json
          printf '%s' "${STABLE_PLUGIN_TARGETS_JSON}" > "${targets_path}"
          printf '%s\n' "${STABLE_PLUGIN_PACKAGE_SPECS}" > "${specs_path}"
          if [[ -z "${STABLE_PLUGIN_PACKAGE_TARBALLS_JSON// }" ]]; then
            echo "suite_profile=stable-plugin requires stable_plugin_package_tarballs_json so Docker proof installs exact candidate plugin tarballs before npm publish." >&2
            exit 1
          fi
          printf '%s' "${STABLE_PLUGIN_PACKAGE_TARBALLS_JSON}" > "${tarballs_path}"

          support_sha256="$(jq -r '
            if type == "array" and length > 0 and
              all(.[]; (.packageName | type == "string") and (.pluginId | type == "string") and (.targetVersion | type == "string") and (.targetNpmSpec | type == "string") and (.stableLine | type == "string") and (.coreTarget | type == "string") and (.targetBranch | type == "string") and (.stablePluginSupportSha256 | test("^[a-f0-9]{64}$"))) and
              ([.[].stablePluginSupportSha256] | unique | length) == 1
            then .[0].stablePluginSupportSha256
            else error("invalid stable plugin targets json")
            end
          ' "${targets_path}")"
          jq -e --arg package_spec "${PACKAGE_SPEC}" 'all(.[]; .coreTarget == $package_spec)' "${targets_path}" >/dev/null
          expected_specs="$(jq -r '.[].targetNpmSpec' "${targets_path}" | LC_ALL=C sort)"
          actual_specs="$(grep -v '^[[:space:]]*$' "${specs_path}" | LC_ALL=C sort)"
          if [[ "${actual_specs}" != "${expected_specs}" ]]; then
            echo "stable_plugin_package_specs must exactly match stable_plugin_targets_json targetNpmSpec values." >&2
            diff -u <(printf '%s\n' "${expected_specs}") <(printf '%s\n' "${actual_specs}") >&2 || true
            exit 1
          fi
          jq -e --slurpfile targets "${targets_path}" '
            . as $tarballs |
            type == "object" and
            (($targets[0] | map(.packageName) | sort) == (keys | sort)) and
            all($targets[0][]; . as $target |
              ($tarballs[$target.packageName] | type == "object") and
              ($tarballs[$target.packageName].packageName == $target.packageName) and
              ($tarballs[$target.packageName].version == $target.targetVersion) and
              (($tarballs[$target.packageName].path | type == "string") and ($tarballs[$target.packageName].path | length > 0) and (($tarballs[$target.packageName].path | startswith("/")) | not) and (($tarballs[$target.packageName].path | split("/") | index("..")) == null)) and
              (($tarballs[$target.packageName].sha256 | type == "string") and ($tarballs[$target.packageName].sha256 | test("^[a-f0-9]{64}$"))) and
              (($tarballs[$target.packageName].integrity? // "" | type == "string"))
            )
          ' "${tarballs_path}" >/dev/null

          artifact_name="${STABLE_PLUGIN_ACCEPTANCE_ARTIFACT_PREFIX}-${support_sha256}"
          jq -n \
            --arg packageSpec "${PACKAGE_SPEC}" \
            --arg manifestRef "${STABLE_PLUGIN_MANIFEST_REF}" \
            --arg supportSha256 "${support_sha256}" \
            --slurpfile targets "${targets_path}" \
            --rawfile packageSpecs "${specs_path}" \
            --slurpfile packageTarballs "${tarballs_path}" \
            '{
              packageSpec: $packageSpec,
              stablePluginManifestRef: $manifestRef,
              stablePluginSupportSha256: $supportSha256,
              stablePluginTargets: $targets[0],
              stablePluginPackageSpecs: ($packageSpecs | split("\n") | map(select(length > 0))),
              stablePluginPackageTarballs: $packageTarballs[0]
            }' > .artifacts/stable-plugin-acceptance/stable-plugin-inputs.json
          {
            echo "artifact_name=${artifact_name}"
            echo "sha256=${support_sha256}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve published upgrade survivor baselines
        id: upgrade_survivor_baselines
        env:
          FALLBACK_BASELINE: ${{ inputs.published_upgrade_survivor_baseline }}
          REQUESTED_BASELINES: ${{ inputs.published_upgrade_survivor_baselines }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${REQUESTED_BASELINES// }" ]]; then
            echo "baselines=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          releases_json=""
          npm_versions_json=""
          if [[ "$REQUESTED_BASELINES" == *"release-history"* || "$REQUESTED_BASELINES" == *"all-since-"* || "$REQUESTED_BASELINES" == *"last-stable-"* ]]; then
            releases_json=".artifacts/package-candidate-input/openclaw-releases.json"
            npm_versions_json=".artifacts/package-candidate-input/openclaw-npm-versions.json"
            mkdir -p "$(dirname "$releases_json")"
            gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,publishedAt,isPrerelease > "$releases_json"
            npm view openclaw versions --json > "$npm_versions_json"
          fi
          args=(
            --requested "$REQUESTED_BASELINES"
            --fallback "$FALLBACK_BASELINE"
            --github-output "$GITHUB_OUTPUT"
          )
          if [[ -n "$releases_json" ]]; then
            args+=(
              --releases-json "$releases_json"
              --npm-versions-json "$npm_versions_json"
              --history-count 6
              --include-version 2026.4.23
              --pre-date 2026-03-15T00:00:00Z
            )
          fi
          node scripts/resolve-upgrade-survivor-baselines.mjs "${args[@]}" >/dev/null

      - name: Upload package-under-test artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_ARTIFACT_NAME }}
          path: |
            .artifacts/docker-e2e-package/openclaw-current.tgz
            .artifacts/docker-e2e-package/package-candidate.json
          retention-days: 14
          if-no-files-found: error

      - name: Upload stable plugin acceptance inputs
        if: inputs.suite_profile == 'stable-plugin'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.stable_plugin.outputs.artifact_name }}
          path: .artifacts/stable-plugin-acceptance/stable-plugin-inputs.json
          retention-days: 30
          if-no-files-found: error

      - name: Summarize package candidate
        env:
          PACKAGE_SHA256: ${{ steps.resolve.outputs.sha256 }}
          PACKAGE_VERSION: ${{ steps.resolve.outputs.package_version }}
          PACKAGE_REF: ${{ inputs.package_ref }}
          TRUSTED_SOURCE_ID: ${{ inputs.trusted_source_id }}
          SOURCE: ${{ inputs.source }}
          SUITE_PROFILE: ${{ inputs.suite_profile }}
          WORKFLOW_REF: ${{ inputs.workflow_ref }}
          PUBLISHED_UPGRADE_SURVIVOR_BASELINE: ${{ inputs.published_upgrade_survivor_baseline }}
          PUBLISHED_UPGRADE_SURVIVOR_BASELINES: ${{ steps.upgrade_survivor_baselines.outputs.baselines }}
          PUBLISHED_UPGRADE_SURVIVOR_SCENARIOS: ${{ inputs.published_upgrade_survivor_scenarios }}
          STABLE_PLUGIN_INPUTS_ARTIFACT: ${{ steps.stable_plugin.outputs.artifact_name }}
          STABLE_PLUGIN_SUPPORT_SHA256: ${{ steps.stable_plugin.outputs.sha256 }}
        shell: bash
        run: |
          {
            echo "## Package acceptance"
            echo
            echo "- Source: \`${SOURCE}\`"
            echo "- Workflow ref: \`${WORKFLOW_REF}\`"
            if [[ "${SOURCE}" == "ref" ]]; then
              echo "- Package ref: \`${PACKAGE_REF}\`"
            fi
            if [[ "${SOURCE}" == "trusted-url" ]]; then
              echo "- Trusted source: \`${TRUSTED_SOURCE_ID}\`"
            fi
            echo "- Version: \`${PACKAGE_VERSION}\`"
            echo "- SHA-256: \`${PACKAGE_SHA256}\`"
            echo "- Profile: \`${SUITE_PROFILE}\`"
            echo "- Published upgrade survivor baseline: \`${PUBLISHED_UPGRADE_SURVIVOR_BASELINE}\`"
            echo "- Published upgrade survivor baselines: \`${PUBLISHED_UPGRADE_SURVIVOR_BASELINES}\`"
            echo "- Published upgrade survivor scenarios: \`${PUBLISHED_UPGRADE_SURVIVOR_SCENARIOS}\`"
            if [[ -n "${STABLE_PLUGIN_INPUTS_ARTIFACT// }" ]]; then
              echo "- Stable plugin support manifest SHA-256: \`${STABLE_PLUGIN_SUPPORT_SHA256}\`"
              echo "- Stable plugin inputs artifact: \`${STABLE_PLUGIN_INPUTS_ARTIFACT}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  package_integrity:
    name: Package integrity
    needs: resolve_package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout package workflow ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.workflow_ref }}
          fetch-depth: 1

      - name: Download package-under-test artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.resolve_package.outputs.package_artifact_name }}
          path: .artifacts/docker-e2e-package

      - name: Enforce public package integrity
        env:
          OPENCLAW_PACKAGE_TARBALL_CHECK_TIMINGS: "0"
        shell: bash
        run: |
          set -euo pipefail
          node scripts/check-openclaw-package-tarball.mjs .artifacts/docker-e2e-package/openclaw-current.tgz

  docker_acceptance:
    name: Docker product acceptance
    needs: [resolve_package, package_integrity]
    permissions:
      actions: read
      contents: read
      packages: write
      pull-requests: read
    uses: ./.github/workflows/openclaw-live-and-e2e-checks-reusable.yml
    with:
      advisory: ${{ inputs.advisory }}
      ref: ${{ needs.resolve_package.outputs.package_source_sha || inputs.workflow_ref }}
      include_repo_e2e: false
      include_release_path_suites: ${{ needs.resolve_package.outputs.include_release_path_suites == 'true' }}
      include_openwebui: ${{ needs.resolve_package.outputs.include_openwebui == 'true' }}
      docker_lanes: ${{ needs.resolve_package.outputs.docker_lanes }}
      stable_plugin_targets_json: ${{ inputs.stable_plugin_targets_json }}
      stable_plugin_package_specs: ${{ inputs.stable_plugin_package_specs }}
      stable_plugin_package_tarballs_json: ${{ inputs.stable_plugin_package_tarballs_json }}
      stable_plugin_support_sha256: ${{ needs.resolve_package.outputs.stable_plugin_support_sha256 }}
      published_upgrade_survivor_baseline: ${{ inputs.published_upgrade_survivor_baseline }}
      published_upgrade_survivor_baselines: ${{ needs.resolve_package.outputs.published_upgrade_survivor_baselines }}
      published_upgrade_survivor_scenarios: ${{ needs.resolve_package.outputs.published_upgrade_survivor_scenarios }}
      package_artifact_name: ${{ needs.resolve_package.outputs.package_artifact_name }}
      include_live_suites: ${{ needs.resolve_package.outputs.include_live_suites == 'true' }}
      live_models_only: false
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_API_KEY_OLD: ${{ secrets.ANTHROPIC_API_KEY_OLD }}
      ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
      BYTEPLUS_API_KEY: ${{ secrets.BYTEPLUS_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
      OPENCLAW_LIVE_BROWSER_CDP_URL: ${{ secrets.OPENCLAW_LIVE_BROWSER_CDP_URL }}
      OPENCLAW_LIVE_SETUP_TOKEN: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN }}
      OPENCLAW_LIVE_SETUP_TOKEN_MODEL: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_MODEL }}
      OPENCLAW_LIVE_SETUP_TOKEN_PROFILE: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_PROFILE }}
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_VALUE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      VYDRA_API_KEY: ${{ secrets.VYDRA_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
      BYTEPLUS_ACCESS_KEY_ID: ${{ secrets.BYTEPLUS_ACCESS_KEY_ID }}
      BYTEPLUS_SECRET_ACCESS_KEY: ${{ secrets.BYTEPLUS_SECRET_ACCESS_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCLAW_CODEX_AUTH_JSON: ${{ secrets.OPENCLAW_CODEX_AUTH_JSON }}
      OPENCLAW_CODEX_CONFIG_TOML: ${{ secrets.OPENCLAW_CODEX_CONFIG_TOML }}
      OPENCLAW_CLAUDE_JSON: ${{ secrets.OPENCLAW_CLAUDE_JSON }}
      OPENCLAW_CLAUDE_CREDENTIALS_JSON: ${{ secrets.OPENCLAW_CLAUDE_CREDENTIALS_JSON }}
      OPENCLAW_CLAUDE_SETTINGS_JSON: ${{ secrets.OPENCLAW_CLAUDE_SETTINGS_JSON }}
      OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON }}
      OPENCLAW_GEMINI_SETTINGS_JSON: ${{ secrets.OPENCLAW_GEMINI_SETTINGS_JSON }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

  stable_plugin_acceptance_proof:
    name: Stable plugin acceptance proof
    needs: [resolve_package, docker_acceptance]
    if: inputs.suite_profile == 'stable-plugin'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download stable plugin acceptance inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.resolve_package.outputs.stable_plugin_inputs_artifact }}
          path: .artifacts/stable-plugin-acceptance-proof

      - name: Download stable plugin Docker proof
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: docker-e2e-*
          path: .artifacts/stable-plugin-docker-proof
          merge-multiple: true

      - name: Write stable plugin acceptance proof
        env:
          DOCKER_LANES: ${{ needs.resolve_package.outputs.docker_lanes }}
          PACKAGE_VERSION: ${{ needs.resolve_package.outputs.package_version }}
          PACKAGE_SHA256: ${{ needs.resolve_package.outputs.package_sha256 }}
          PACKAGE_SOURCE_SHA: ${{ needs.resolve_package.outputs.package_source_sha }}
          STABLE_PLUGIN_SUPPORT_SHA256: ${{ needs.resolve_package.outputs.stable_plugin_support_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          inputs_path=.artifacts/stable-plugin-acceptance-proof/stable-plugin-inputs.json
          docker_proof_path="$(find .artifacts/stable-plugin-docker-proof -name stable-plugin-docker-proof.json -type f | sort | head -n 1)"
          proof_path=.artifacts/stable-plugin-acceptance-proof/stable-plugin-acceptance.json
          if [[ ! -f "${inputs_path}" ]]; then
            echo "stable-plugin-inputs.json is missing from stable plugin acceptance artifact." >&2
            exit 1
          fi
          if [[ -z "${docker_proof_path}" ]]; then
            echo "stable-plugin Docker proof is missing from Docker E2E artifacts." >&2
            find .artifacts/stable-plugin-docker-proof -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi
          jq -e --arg support_sha "${STABLE_PLUGIN_SUPPORT_SHA256}" '
            .stablePluginSupportSha256 == $support_sha and
            (.stablePluginTargets | type == "array" and length > 0) and
            (.stablePluginPackageSpecs | type == "array" and length == (.stablePluginTargets | length))
          ' "${inputs_path}" >/dev/null
          jq -e --arg support_sha "${STABLE_PLUGIN_SUPPORT_SHA256}" '
            .result == "passed" and
            .stablePluginSupportSha256 == $support_sha and
            (.pluginProofs | type == "array" and length > 0) and
            all(.pluginProofs[]; .stablePluginSupportSha256 == $support_sha and .source == "docker-npm-install" and .installSource == "tarball" and .result == "passed")
          ' "${docker_proof_path}" >/dev/null
          jq -n \
            --arg packageVersion "${PACKAGE_VERSION}" \
            --arg packageSha256 "${PACKAGE_SHA256}" \
            --arg packageSourceSha "${PACKAGE_SOURCE_SHA}" \
            --arg supportSha256 "${STABLE_PLUGIN_SUPPORT_SHA256}" \
            --arg dockerLanes "${DOCKER_LANES}" \
            --arg completedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile inputs "${inputs_path}" \
            --slurpfile dockerProof "${docker_proof_path}" \
            '{
              schemaVersion: 1,
              result: "passed",
              packageVersion: $packageVersion,
              packageSha256: $packageSha256,
              packageSourceSha: $packageSourceSha,
              stablePluginSupportSha256: $supportSha256,
              dockerLanes: ($dockerLanes | split(" ") | map(select(length > 0))),
              completedAt: $completedAt,
              stablePluginInputs: $inputs[0],
              dockerProof: $dockerProof[0],
              pluginProofs: $dockerProof[0].pluginProofs
            }' > "${proof_path}"

      - name: Upload stable plugin acceptance proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ needs.resolve_package.outputs.stable_plugin_inputs_artifact }}-proof
          path: .artifacts/stable-plugin-acceptance-proof
          retention-days: 30
          if-no-files-found: error

  package_telegram:
    name: Telegram package acceptance
    needs: [resolve_package, package_integrity]
    if: needs.resolve_package.outputs.telegram_enabled == 'true'
    uses: ./.github/workflows/npm-telegram-beta-e2e.yml
    with:
      advisory: ${{ inputs.advisory }}
      package_spec: ${{ inputs.package_spec }}
      package_artifact_name: ${{ needs.resolve_package.outputs.package_artifact_name }}
      package_label: openclaw@${{ needs.resolve_package.outputs.package_version }}
      harness_ref: ${{ needs.resolve_package.outputs.package_source_sha || inputs.workflow_ref }}
      provider_mode: ${{ needs.resolve_package.outputs.telegram_mode }}
      scenario: ${{ inputs.telegram_scenarios }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENCLAW_QA_CONVEX_SITE_URL: ${{ secrets.OPENCLAW_QA_CONVEX_SITE_URL }}
      OPENCLAW_QA_CONVEX_SECRET_CI: ${{ secrets.OPENCLAW_QA_CONVEX_SECRET_CI }}

  summary:
    name: Verify package acceptance
    needs:
      [
        resolve_package,
        package_integrity,
        docker_acceptance,
        stable_plugin_acceptance_proof,
        package_telegram,
      ]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify package acceptance results
        env:
          DOCKER_RESULT: ${{ needs.docker_acceptance.result }}
          PACKAGE_INTEGRITY_RESULT: ${{ needs.package_integrity.result }}
          STABLE_PLUGIN_PROOF_RESULT: ${{ needs.stable_plugin_acceptance_proof.result }}
          PACKAGE_TELEGRAM_RESULT: ${{ needs.package_telegram.result }}
          RESOLVE_RESULT: ${{ needs.resolve_package.result }}
        shell: bash
        run: |
          set -euo pipefail
          advisory="${{ inputs.advisory }}"
          failed=0
          for item in \
            "resolve_package=${RESOLVE_RESULT}" \
            "package_integrity=${PACKAGE_INTEGRITY_RESULT}" \
            "docker_acceptance=${DOCKER_RESULT}" \
            "stable_plugin_acceptance_proof=${STABLE_PLUGIN_PROOF_RESULT}" \
            "package_telegram=${PACKAGE_TELEGRAM_RESULT}"
          do
            name="${item%%=*}"
            result="${item#*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              if [[ "$advisory" == "true" && "$name" != "resolve_package" ]]; then
                echo "::warning::${name} ended with ${result}; package acceptance is advisory for this caller."
                continue
              fi
              echo "::error::${name} ended with ${result}"
              failed=1
            fi
          done
          exit "$failed"
