name: Package Acceptance

on:
  workflow_dispatch:
    inputs:
      workflow_ref:
        description: Trusted repo ref for workflow scripts and Docker E2E harness
        required: true
        default: main
        type: string
      source:
        description: Package candidate source
        required: true
        default: npm
        type: choice
        options:
          - npm
          - ref
          - url
          - trusted-url
          - artifact
      package_ref:
        description: Trusted package source ref when source=ref
        required: true
        default: main
        type: string
      package_spec:
        description: Published package spec when source=npm
        required: false
        default: openclaw@beta
        type: string
      package_url:
        description: HTTPS .tgz URL when source=url or source=trusted-url
        required: false
        default: ""
        type: string
      package_sha256:
        description: Expected package SHA-256; required for source=url or source=trusted-url
        required: false
        default: ""
        type: string
      trusted_source_id:
        description: Named trusted source policy when source=trusted-url
        required: false
        default: ""
        type: string
      artifact_run_id:
        description: GitHub Actions run id when source=artifact
        required: false
        default: ""
        type: string
      artifact_name:
        description: Artifact name containing one .tgz when source=artifact
        required: false
        default: package-under-test
        type: string
      preflight_run_id:
        description: Exact successful OpenClaw NPM Release run for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      preflight_artifact_id:
        description: Immutable npm preflight artifact id; required for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      preflight_artifact_digest:
        description: Immutable npm preflight artifact digest; required for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      target_sha:
        description: Exact target commit SHA for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      openwebui_mode:
        description: OpenWebUI package-acceptance image mode
        required: true
        default: standard
        type: choice
        options:
          - standard
          - exact-target-local
      suite_profile:
        description: Acceptance profile
        required: true
        default: package
        type: choice
        options:
          - smoke
          - package
          - product
          - full
          - custom
      docker_lanes:
        description: Comma/space separated Docker lanes when suite_profile=custom
        required: false
        default: ""
        type: string
      published_upgrade_survivor_baseline:
        description: Published OpenClaw package baseline for the published-upgrade-survivor Docker lane
        required: false
        default: openclaw@latest
        type: string
      published_upgrade_survivor_baselines:
        description: Optional baseline list for published-upgrade-survivor/update-migration; use last-stable-4, all-since-2026.4.23, release-history, or exact versions
        required: false
        default: ""
        type: string
      published_upgrade_survivor_scenarios:
        description: Optional scenario list for published-upgrade-survivor/update-migration; use reported-issues for known upgrade failure shapes
        required: false
        default: ""
        type: string
      telegram_mode:
        description: Optional Telegram QA lane for the resolved package candidate
        required: true
        default: none
        type: choice
        options:
          - none
          - mock-openai
          - live-frontier
      telegram_scenarios:
        description: Optional comma-separated Telegram scenario ids
        required: false
        default: ""
        type: string
      advisory:
        description: Treat acceptance failures as advisory for the caller
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      advisory:
        description: Treat acceptance failures as advisory for the caller
        required: false
        default: false
        type: boolean
      workflow_ref:
        description: Trusted repo ref for workflow scripts and Docker E2E harness
        required: false
        default: main
        type: string
      source:
        description: "Package candidate source: npm, ref, url, trusted-url, or artifact"
        required: true
        type: string
      package_ref:
        description: Trusted package source ref when source=ref
        required: false
        default: main
        type: string
      package_spec:
        description: Published package spec when source=npm
        required: false
        default: openclaw@beta
        type: string
      package_url:
        description: HTTPS .tgz URL when source=url or source=trusted-url
        required: false
        default: ""
        type: string
      package_sha256:
        description: Expected package SHA-256; required for source=url or source=trusted-url
        required: false
        default: ""
        type: string
      trusted_source_id:
        description: Named trusted source policy when source=trusted-url
        required: false
        default: ""
        type: string
      artifact_run_id:
        description: GitHub Actions run id when source=artifact
        required: false
        default: ""
        type: string
      artifact_name:
        description: Artifact name containing one .tgz when source=artifact
        required: false
        default: package-under-test
        type: string
      preflight_run_id:
        description: Exact successful OpenClaw NPM Release run for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      preflight_artifact_id:
        description: Immutable npm preflight artifact id; required for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      preflight_artifact_digest:
        description: Immutable npm preflight artifact digest; required for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      target_sha:
        description: Exact target commit SHA for exact-target OpenWebUI
        required: false
        default: ""
        type: string
      openwebui_mode:
        description: "OpenWebUI image mode: standard or exact-target-local"
        required: false
        default: standard
        type: string
      suite_profile:
        description: "Acceptance profile: smoke, package, product, full, or custom"
        required: false
        default: package
        type: string
      docker_lanes:
        description: Comma/space separated Docker lanes when suite_profile=custom
        required: false
        default: ""
        type: string
      published_upgrade_survivor_baseline:
        description: Published OpenClaw package baseline for the published-upgrade-survivor Docker lane
        required: false
        default: openclaw@latest
        type: string
      published_upgrade_survivor_baselines:
        description: Optional baseline list for published-upgrade-survivor/update-migration; use last-stable-4, all-since-2026.4.23, release-history, or exact versions
        required: false
        default: ""
        type: string
      published_upgrade_survivor_scenarios:
        description: Optional scenario list for published-upgrade-survivor/update-migration; use reported-issues for known upgrade failure shapes
        required: false
        default: ""
        type: string
      telegram_mode:
        description: Optional Telegram QA lane for the resolved package candidate
        required: false
        default: none
        type: string
      telegram_scenarios:
        description: Optional comma-separated Telegram scenario ids
        required: false
        default: ""
        type: string
    secrets:
      OPENCLAW_TRUSTED_PACKAGE_TOKEN:
        required: false
      OPENAI_API_KEY:
        required: false
      OPENAI_BASE_URL:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      ANTHROPIC_API_KEY_OLD:
        required: false
      ANTHROPIC_API_TOKEN:
        required: false
      FACTORY_API_KEY:
        required: false
      BYTEPLUS_API_KEY:
        required: false
      CEREBRAS_API_KEY:
        required: false
      DEEPINFRA_API_KEY:
        required: false
      DASHSCOPE_API_KEY:
        required: false
      GROQ_API_KEY:
        required: false
      KIMI_API_KEY:
        required: false
      MODELSTUDIO_API_KEY:
        required: false
      MOONSHOT_API_KEY:
        required: false
      MISTRAL_API_KEY:
        required: false
      MINIMAX_API_KEY:
        required: false
      OPENCODE_API_KEY:
        required: false
      OPENCODE_ZEN_API_KEY:
        required: false
      OPENCLAW_LIVE_BROWSER_CDP_URL:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_MODEL:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_PROFILE:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE:
        required: false
      GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      QWEN_API_KEY:
        required: false
      FAL_KEY:
        required: false
      RUNWAY_API_KEY:
        required: false
      DEEPGRAM_API_KEY:
        required: false
      TOGETHER_API_KEY:
        required: false
      VYDRA_API_KEY:
        required: false
      XAI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      Z_AI_API_KEY:
        required: false
      BYTEPLUS_ACCESS_KEY_ID:
        required: false
      BYTEPLUS_SECRET_ACCESS_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      OPENCLAW_CODEX_AUTH_JSON:
        required: false
      OPENCLAW_CODEX_CONFIG_TOML:
        required: false
      OPENCLAW_CLAUDE_JSON:
        required: false
      OPENCLAW_CLAUDE_CREDENTIALS_JSON:
        required: false
      OPENCLAW_CLAUDE_SETTINGS_JSON:
        required: false
      OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON:
        required: false
      OPENCLAW_GEMINI_SETTINGS_JSON:
        required: false
      FIREWORKS_API_KEY:
        required: false
      OPENCLAW_QA_CONVEX_SITE_URL:
        required: false
      OPENCLAW_QA_CONVEX_SECRET_CI:
        required: false

permissions:
  actions: read
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: package-acceptance-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"
  PACKAGE_ARTIFACT_NAME: package-under-test

jobs:
  resolve_package:
    name: Resolve package candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    outputs:
      docker_lanes: ${{ steps.profile.outputs.docker_lanes }}
      exact_openwebui: ${{ steps.profile.outputs.exact_openwebui }}
      include_live_suites: ${{ steps.profile.outputs.include_live_suites }}
      include_openwebui: ${{ steps.profile.outputs.include_openwebui }}
      include_release_path_suites: ${{ steps.profile.outputs.include_release_path_suites }}
      package_ai_sha256: ${{ steps.stage_exact_package.outputs.ai_sha256 }}
      package_ai_version: ${{ steps.stage_exact_package.outputs.ai_version }}
      package_artifact_digest: ${{ format('sha256:{0}', steps.upload_package.outputs.artifact-digest) }}
      package_artifact_id: ${{ steps.upload_package.outputs.artifact-id }}
      package_artifact_name: ${{ steps.profile.outputs.package_artifact_name }}
      package_set_manifest_sha256: ${{ steps.stage_exact_package.outputs.manifest_sha256 }}
      package_source_sha: ${{ steps.resolve.outputs.package_source_sha }}
      package_sha256: ${{ steps.resolve.outputs.sha256 }}
      package_version: ${{ steps.resolve.outputs.package_version }}
      preflight_artifact_digest: ${{ steps.exact_preflight.outputs.artifact_digest }}
      preflight_artifact_id: ${{ steps.exact_preflight.outputs.artifact_id }}
      preflight_artifact_name: ${{ steps.exact_preflight.outputs.artifact_name }}
      preflight_manifest_sha256: ${{ steps.exact_preflight.outputs.manifest_sha256 }}
      preflight_run_id: ${{ steps.exact_preflight.outputs.run_id }}
      published_upgrade_survivor_baselines: ${{ steps.upgrade_survivor_baselines.outputs.baselines }}
      published_upgrade_survivor_scenarios: ${{ inputs.published_upgrade_survivor_scenarios }}
      telegram_enabled: ${{ steps.profile.outputs.telegram_enabled }}
      telegram_mode: ${{ steps.profile.outputs.telegram_mode }}
      trusted_workflow_sha: ${{ steps.stage_exact_package.outputs.trusted_workflow_sha }}
    steps:
      - name: Checkout package workflow ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.openwebui_mode == 'exact-target-local' && github.workflow_sha || inputs.workflow_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: ${{ inputs.source == 'ref' && 'true' || 'false' }}
          install-deps: "false"

      - name: Validate exact-target OpenWebUI inputs
        env:
          ADVISORY: ${{ inputs.advisory }}
          ARTIFACT_ID: ${{ inputs.preflight_artifact_id }}
          ARTIFACT_DIGEST: ${{ inputs.preflight_artifact_digest }}
          OPENWEBUI_MODE: ${{ inputs.openwebui_mode }}
          PREFLIGHT_RUN_ID: ${{ inputs.preflight_run_id }}
          SOURCE: ${{ inputs.source }}
          TARGET_SHA: ${{ inputs.target_sha }}
          TELEGRAM_MODE: ${{ inputs.telegram_mode }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail

          case "$OPENWEBUI_MODE" in
            standard)
              if [[ -n "${PREFLIGHT_RUN_ID// }" ||
                    -n "${ARTIFACT_ID// }" ||
                    -n "${ARTIFACT_DIGEST// }" ||
                    -n "${TARGET_SHA// }" ]]; then
                echo "Exact npm preflight inputs require openwebui_mode=exact-target-local." >&2
                exit 1
              fi
              ;;
            exact-target-local)
              [[ "$WORKFLOW_RUN_ATTEMPT" == "1" ]] || {
                echo "openwebui_mode=exact-target-local requires workflow run attempt 1." >&2
                exit 1
              }
              [[ "$ADVISORY" == "false" ]] || {
                echo "openwebui_mode=exact-target-local is blocking and cannot be advisory." >&2
                exit 1
              }
              [[ "$SOURCE" == "artifact" ]] || {
                echo "openwebui_mode=exact-target-local requires source=artifact." >&2
                exit 1
              }
              [[ "$PREFLIGHT_RUN_ID" =~ ^[1-9][0-9]*$ ]] || {
                echo "preflight_run_id must be a positive decimal Actions run ID." >&2
                exit 1
              }
              [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]] || {
                echo "target_sha must be a full lowercase commit SHA." >&2
                exit 1
              }
              [[ "$ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]] || {
                echo "preflight_artifact_id must be a positive decimal Actions artifact ID." >&2
                exit 1
              }
              [[ "$ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || {
                echo "preflight_artifact_digest must be an explicit lowercase sha256 digest." >&2
                exit 1
              }
              [[ "$TELEGRAM_MODE" == "none" ]] || {
                echo "Exact-target OpenWebUI is a focused package lane; run Telegram package acceptance separately." >&2
                exit 1
              }
              ;;
            *)
              echo "openwebui_mode must be standard or exact-target-local; got: $OPENWEBUI_MODE" >&2
              exit 1
              ;;
          esac

      - name: Download exact npm preflight artifact
        id: exact_preflight
        if: inputs.openwebui_mode == 'exact-target-local'
        env:
          GH_TOKEN: ${{ github.token }}
          PREFLIGHT_ARTIFACT_DIGEST: ${{ inputs.preflight_artifact_digest }}
          PREFLIGHT_ARTIFACT_ID: ${{ inputs.preflight_artifact_id }}
          PREFLIGHT_RUN_ID: ${{ inputs.preflight_run_id }}
          TARGET_SHA: ${{ inputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail

          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PREFLIGHT_RUN_ID}")"
          jq -e \
            --argjson run_id "$PREFLIGHT_RUN_ID" \
            --arg target_sha "$TARGET_SHA" \
            '
              .id == $run_id and
              .name == "OpenClaw NPM Release" and
              .path == ".github/workflows/openclaw-npm-release.yml" and
              .event == "workflow_dispatch" and
              .status == "completed" and
              .conclusion == "success" and
              .run_attempt == 1 and
              .head_sha == $target_sha
            ' <<< "$run_json" >/dev/null || {
              echo "npm preflight run does not match the exact successful target workflow." >&2
              exit 1
            }

          artifact_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${PREFLIGHT_ARTIFACT_ID}")"

          jq -e \
            --argjson artifact_id "$PREFLIGHT_ARTIFACT_ID" \
            --argjson run_id "$PREFLIGHT_RUN_ID" \
            --arg digest "$PREFLIGHT_ARTIFACT_DIGEST" \
            --arg target_sha "$TARGET_SHA" \
            '
              .id == $artifact_id and
              .expired == false and
              .digest == $digest and
              .workflow_run.id == $run_id and
              .workflow_run.head_sha == $target_sha
            ' <<< "$artifact_json" >/dev/null || {
              echo "npm preflight artifact identity, digest, run, or target SHA differs." >&2
              exit 1
            }
          artifact_name="$(jq -r '.name' <<< "$artifact_json")"
          [[ "$artifact_name" == "openclaw-npm-preflight-${TARGET_SHA}" ]] || {
            echo "npm preflight artifact must be the exact target-SHA artifact; got: $artifact_name" >&2
            exit 1
          }

          archive="$RUNNER_TEMP/npm-preflight-${PREFLIGHT_ARTIFACT_ID}.zip"
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${PREFLIGHT_ARTIFACT_ID}/zip" > "$archive"
          actual_artifact_digest="sha256:$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$actual_artifact_digest" == "$PREFLIGHT_ARTIFACT_DIGEST" ]] || {
            echo "Raw npm preflight artifact ZIP digest mismatch." >&2
            exit 1
          }

          input_dir=".artifacts/package-candidate-input"
          dependency_dir=".artifacts/exact-openwebui-dependencies"
          rm -rf "$input_dir" "$dependency_dir"
          mkdir -p "$input_dir" "$dependency_dir"
          mapfile -t archive_entries < <(unzip -Z1 "$archive")
          entry_count() {
            local expected="$1"
            local count=0
            local entry
            for entry in "${archive_entries[@]}"; do
              [[ "$entry" == "$expected" ]] && count=$((count + 1))
            done
            printf '%s' "$count"
          }
          [[ "$(entry_count preflight-manifest.json)" == "1" ]] || {
            echo "npm preflight artifact must contain one root preflight-manifest.json." >&2
            exit 1
          }
          unzip -p "$archive" preflight-manifest.json > "$input_dir/preflight-manifest.json"

          manifest_values="$(
            node - "$input_dir/preflight-manifest.json" "$TARGET_SHA" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const [manifestPath, targetSha] = process.argv.slice(2);
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          const sha256 = /^[0-9a-f]{64}$/u;
          const safeTarball = /^[A-Za-z0-9._-]+\.tgz$/u;
          const ai = Array.isArray(manifest.dependencyTarballs)
            ? manifest.dependencyTarballs.find((entry) => entry?.packageName === "@openclaw/ai")
            : undefined;
          if (
            manifest.version !== 1 ||
            manifest.releaseSha !== targetSha ||
            manifest.packageName !== "openclaw" ||
            typeof manifest.packageVersion !== "string" ||
            !manifest.packageVersion ||
            manifest.releaseTag !== `v${manifest.packageVersion}` ||
            manifest.npmDistTag !== "beta" ||
            typeof manifest.tarballName !== "string" ||
            manifest.tarballName !== path.basename(manifest.tarballName) ||
            !safeTarball.test(manifest.tarballName) ||
            !sha256.test(manifest.tarballSha256 ?? "") ||
            manifest.dependencyTarballs?.length !== 1 ||
            !ai ||
            ai.packageVersion !== manifest.packageVersion ||
            typeof ai.tarballName !== "string" ||
            ai.tarballName !== path.basename(ai.tarballName) ||
            !safeTarball.test(ai.tarballName) ||
            !sha256.test(ai.tarballSha256 ?? "") ||
            ai.tarballName === manifest.tarballName
          ) {
            throw new Error("npm preflight manifest does not describe one exact root and @openclaw/ai package set");
          }
          process.stdout.write(
            [
              manifest.packageVersion,
              manifest.tarballName,
              manifest.tarballSha256,
              ai.tarballName,
              ai.tarballSha256,
            ].join("\t"),
          );
          NODE
          )"
          IFS=$'\t' read -r package_version root_name root_sha256 ai_name ai_sha256 <<< "$manifest_values"
          for tarball_name in "$root_name" "$ai_name"; do
            [[ "$(entry_count "$tarball_name")" == "1" ]] || {
              echo "npm preflight artifact must contain one ${tarball_name}." >&2
              exit 1
            }
          done
          unzip -p "$archive" "$root_name" > "$input_dir/$root_name"
          unzip -p "$archive" "$ai_name" > "$dependency_dir/$ai_name"
          [[ "$(sha256sum "$input_dir/$root_name" | awk '{print $1}')" == "$root_sha256" ]] || {
            echo "npm preflight root tarball digest mismatch." >&2
            exit 1
          }
          [[ "$(sha256sum "$dependency_dir/$ai_name" | awk '{print $1}')" == "$ai_sha256" ]] || {
            echo "npm preflight @openclaw/ai tarball digest mismatch." >&2
            exit 1
          }
          node - "$input_dir/$root_name" "$dependency_dir/$ai_name" "$package_version" <<'NODE'
          const childProcess = require("node:child_process");
          const [rootTarball, aiTarball, expectedVersion] = process.argv.slice(2);
          const readManifest = (tarball) =>
            JSON.parse(
              childProcess.execFileSync("tar", ["-xOf", tarball, "package/package.json"], {
                encoding: "utf8",
              }),
            );
          const root = readManifest(rootTarball);
          const ai = readManifest(aiTarball);
          if (root.name !== "openclaw" || root.version !== expectedVersion) {
            throw new Error("root package metadata differs from npm preflight manifest");
          }
          if (ai.name !== "@openclaw/ai" || ai.version !== expectedVersion) {
            throw new Error("@openclaw/ai package metadata differs from npm preflight manifest");
          }
          childProcess.execFileSync(
            "tar",
            ["-xOf", aiTarball, "package/dist/internal/runtime.mjs"],
            {
              encoding: "utf8",
              stdio: ["ignore", "ignore", "pipe"],
            },
          );
          NODE
          mv "$input_dir/$root_name" "$input_dir/openclaw-current.tgz"
          mv "$dependency_dir/$ai_name" "$dependency_dir/openclaw-ai-current.tgz"
          jq -n \
            --arg packageRef "$TARGET_SHA" \
            --arg packageSourceSha "$TARGET_SHA" \
            --arg sha256 "$root_sha256" \
            '{
              packageRef: $packageRef,
              packageSourceSha: $packageSourceSha,
              packageTrustedReason: "npm-preflight-artifact",
              sha256: $sha256
            }' > "$input_dir/package-candidate.json"

          {
            echo "artifact_digest=$PREFLIGHT_ARTIFACT_DIGEST"
            echo "artifact_id=$PREFLIGHT_ARTIFACT_ID"
            echo "artifact_name=$artifact_name"
            echo "ai_sha256=$ai_sha256"
            echo "ai_version=$package_version"
            echo "manifest_sha256=$(sha256sum "$input_dir/preflight-manifest.json" | awk '{print $1}')"
            echo "package_version=$package_version"
            echo "root_sha256=$root_sha256"
            echo "run_id=$PREFLIGHT_RUN_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Download current-run package artifact input
        if: inputs.source == 'artifact' && inputs.openwebui_mode != 'exact-target-local' && inputs.artifact_run_id == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifacts/package-candidate-input

      - name: Download previous-run package artifact input
        if: inputs.source == 'artifact' && inputs.openwebui_mode != 'exact-target-local' && inputs.artifact_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ARTIFACT_NAME// }" ]]; then
            echo "artifact_name is required when source=artifact." >&2
            exit 1
          fi
          mkdir -p .artifacts/package-candidate-input
          gh run download "$ARTIFACT_RUN_ID" -n "$ARTIFACT_NAME" -D .artifacts/package-candidate-input

      - name: Resolve package candidate
        id: resolve
        env:
          SOURCE: ${{ inputs.source }}
          PACKAGE_REF: ${{ inputs.package_ref }}
          PACKAGE_SPEC: ${{ inputs.package_spec }}
          PACKAGE_URL: ${{ inputs.package_url }}
          PACKAGE_SHA256: ${{ steps.exact_preflight.outputs.root_sha256 || inputs.package_sha256 }}
          TRUSTED_SOURCE_ID: ${{ inputs.trusted_source_id }}
          OPENCLAW_TRUSTED_PACKAGE_TOKEN: ${{ secrets.OPENCLAW_TRUSTED_PACKAGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir=""
          if [[ "$SOURCE" == "artifact" ]]; then
            artifact_dir=".artifacts/package-candidate-input"
          fi

          node scripts/resolve-openclaw-package-candidate.mjs \
            --source "$SOURCE" \
            --package-ref "$PACKAGE_REF" \
            --package-spec "$PACKAGE_SPEC" \
            --package-url "$PACKAGE_URL" \
            --package-sha256 "$PACKAGE_SHA256" \
            --trusted-source-id "$TRUSTED_SOURCE_ID" \
            --artifact-dir "${artifact_dir:-.}" \
            --output-dir .artifacts/docker-e2e-package \
            --output-name openclaw-current.tgz \
            --metadata .artifacts/docker-e2e-package/package-candidate.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Stage exact OpenWebUI package set
        id: stage_exact_package
        if: inputs.openwebui_mode == 'exact-target-local'
        env:
          AI_SHA256: ${{ steps.exact_preflight.outputs.ai_sha256 }}
          AI_VERSION: ${{ steps.exact_preflight.outputs.ai_version }}
          NPM_PREFLIGHT_ARTIFACT_DIGEST: ${{ steps.exact_preflight.outputs.artifact_digest }}
          NPM_PREFLIGHT_ARTIFACT_ID: ${{ steps.exact_preflight.outputs.artifact_id }}
          NPM_PREFLIGHT_ARTIFACT_NAME: ${{ steps.exact_preflight.outputs.artifact_name }}
          NPM_PREFLIGHT_MANIFEST_SHA256: ${{ steps.exact_preflight.outputs.manifest_sha256 }}
          NPM_PREFLIGHT_RUN_ID: ${{ steps.exact_preflight.outputs.run_id }}
          ROOT_SHA256: ${{ steps.resolve.outputs.sha256 }}
          ROOT_VERSION: ${{ steps.resolve.outputs.package_version }}
          TARGET_SHA: ${{ inputs.target_sha }}
          EXPECTED_TRUSTED_WORKFLOW_SHA: ${{ github.workflow_sha }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          package_dir=".artifacts/docker-e2e-package"
          ai_source=".artifacts/exact-openwebui-dependencies/openclaw-ai-current.tgz"
          ai_target="$package_dir/openclaw-ai-current.tgz"
          cp "$ai_source" "$ai_target"

          [[ "$(sha256sum "$package_dir/openclaw-current.tgz" | awk '{print $1}')" == "$ROOT_SHA256" ]] || {
            echo "Resolved root package bytes differ from the npm preflight tarball." >&2
            exit 1
          }
          [[ "$(sha256sum "$ai_target" | awk '{print $1}')" == "$AI_SHA256" ]] || {
            echo "Staged @openclaw/ai bytes differ from the npm preflight tarball." >&2
            exit 1
          }
          trusted_workflow_sha="$(git rev-parse HEAD)"
          [[ "$trusted_workflow_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Trusted package-acceptance workflow ref did not resolve to a commit SHA." >&2
            exit 1
          }
          [[ "$trusted_workflow_sha" == "$EXPECTED_TRUSTED_WORKFLOW_SHA" ]] || {
            echo "Exact package acceptance checkout differs from github.workflow_sha." >&2
            exit 1
          }

          manifest="$package_dir/exact-package-set.json"
          jq -n \
            --arg targetSha "$TARGET_SHA" \
            --arg trustedWorkflowSha "$trusted_workflow_sha" \
            --argjson trustedWorkflowRunId "$WORKFLOW_RUN_ID" \
            --argjson trustedWorkflowRunAttempt "$WORKFLOW_RUN_ATTEMPT" \
            --argjson npmPreflightRunId "$NPM_PREFLIGHT_RUN_ID" \
            --argjson npmPreflightArtifactId "$NPM_PREFLIGHT_ARTIFACT_ID" \
            --arg npmPreflightArtifactName "$NPM_PREFLIGHT_ARTIFACT_NAME" \
            --arg npmPreflightArtifactDigest "$NPM_PREFLIGHT_ARTIFACT_DIGEST" \
            --arg npmPreflightManifestSha256 "$NPM_PREFLIGHT_MANIFEST_SHA256" \
            --arg rootVersion "$ROOT_VERSION" \
            --arg rootSha256 "$ROOT_SHA256" \
            --arg aiVersion "$AI_VERSION" \
            --arg aiSha256 "$AI_SHA256" \
            '{
              schema: "openclaw.openwebui-package-set/v1",
              targetSha: $targetSha,
              trustedWorkflow: {
                path: ".github/workflows/package-acceptance.yml",
                sha: $trustedWorkflowSha,
                runId: $trustedWorkflowRunId,
                runAttempt: $trustedWorkflowRunAttempt
              },
              npmPreflightArtifact: {
                runId: $npmPreflightRunId,
                id: $npmPreflightArtifactId,
                name: $npmPreflightArtifactName,
                digest: $npmPreflightArtifactDigest,
                manifestSha256: $npmPreflightManifestSha256
              },
              root: {
                file: "openclaw-current.tgz",
                name: "openclaw",
                version: $rootVersion,
                sha256: $rootSha256
              },
              ai: {
                file: "openclaw-ai-current.tgz",
                name: "@openclaw/ai",
                version: $aiVersion,
                sha256: $aiSha256
              }
            }' > "$manifest"
          {
            echo "ai_sha256=$AI_SHA256"
            echo "ai_version=$AI_VERSION"
            echo "manifest_sha256=$(sha256sum "$manifest" | awk '{print $1}')"
            echo "trusted_workflow_sha=$trusted_workflow_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Select acceptance profile
        id: profile
        env:
          SOURCE: ${{ inputs.source }}
          SUITE_PROFILE: ${{ inputs.suite_profile }}
          CUSTOM_DOCKER_LANES: ${{ inputs.docker_lanes }}
          OPENWEBUI_MODE: ${{ inputs.openwebui_mode }}
          TELEGRAM_MODE: ${{ inputs.telegram_mode }}
        shell: bash
        run: |
          set -euo pipefail

          exact_openwebui=false
          include_release_path_suites=false
          include_openwebui=false
          include_live_suites=false
          docker_lanes=""

          if [[ "$OPENWEBUI_MODE" == "exact-target-local" ]]; then
            exact_openwebui=true
            include_openwebui=true
          else
            case "$SUITE_PROFILE" in
              smoke)
                docker_lanes="npm-onboard-channel-agent gateway-network config-reload"
                ;;
              package)
                docker_lanes="npm-onboard-channel-agent doctor-switch update-channel-switch skill-install update-corrupt-plugin upgrade-survivor published-upgrade-survivor root-managed-vps-upgrade update-restart-auth plugins-offline plugin-update"
                ;;
              product)
                docker_lanes="npm-onboard-channel-agent doctor-switch update-channel-switch skill-install update-corrupt-plugin upgrade-survivor published-upgrade-survivor root-managed-vps-upgrade update-restart-auth plugins plugin-update mcp-channels cron-mcp-cleanup openai-web-search-minimal openwebui"
                include_openwebui=true
                ;;
              full)
                include_release_path_suites=true
                include_openwebui=true
                ;;
              custom)
                docker_lanes="$CUSTOM_DOCKER_LANES"
                if [[ -z "${docker_lanes// }" ]]; then
                  echo "docker_lanes is required when suite_profile=custom." >&2
                  exit 1
                fi
                if [[ "$docker_lanes" == *"openwebui"* ]]; then
                  include_openwebui=true
                fi
                ;;
              *)
                echo "Unknown suite_profile: $SUITE_PROFILE" >&2
                exit 1
                ;;
            esac
          fi

          telegram_enabled=false
          if [[ "$TELEGRAM_MODE" != "none" ]]; then
            telegram_enabled=true
          fi

          {
            echo "docker_lanes=$docker_lanes"
            echo "exact_openwebui=$exact_openwebui"
            echo "include_release_path_suites=$include_release_path_suites"
            echo "include_openwebui=$include_openwebui"
            echo "include_live_suites=$include_live_suites"
            echo "telegram_enabled=$telegram_enabled"
            echo "telegram_mode=$TELEGRAM_MODE"
            echo "package_artifact_name=${PACKAGE_ARTIFACT_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve published upgrade survivor baselines
        id: upgrade_survivor_baselines
        env:
          FALLBACK_BASELINE: ${{ inputs.published_upgrade_survivor_baseline }}
          REQUESTED_BASELINES: ${{ inputs.published_upgrade_survivor_baselines }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${REQUESTED_BASELINES// }" ]]; then
            echo "baselines=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          releases_json=""
          npm_versions_json=""
          if [[ "$REQUESTED_BASELINES" == *"release-history"* || "$REQUESTED_BASELINES" == *"all-since-"* || "$REQUESTED_BASELINES" == *"last-stable-"* ]]; then
            releases_json=".artifacts/package-candidate-input/openclaw-releases.json"
            npm_versions_json=".artifacts/package-candidate-input/openclaw-npm-versions.json"
            mkdir -p "$(dirname "$releases_json")"
            gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,publishedAt,isPrerelease > "$releases_json"
            npm view openclaw versions --json > "$npm_versions_json"
          fi
          args=(
            --requested "$REQUESTED_BASELINES"
            --fallback "$FALLBACK_BASELINE"
            --github-output "$GITHUB_OUTPUT"
          )
          if [[ -n "$releases_json" ]]; then
            args+=(
              --releases-json "$releases_json"
              --npm-versions-json "$npm_versions_json"
              --history-count 6
              --include-version 2026.4.23
              --pre-date 2026-03-15T00:00:00Z
            )
          fi
          node scripts/resolve-upgrade-survivor-baselines.mjs "${args[@]}" >/dev/null

      - name: Upload package-under-test artifact
        id: upload_package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_ARTIFACT_NAME }}
          path: |
            .artifacts/docker-e2e-package/openclaw-current.tgz
            .artifacts/docker-e2e-package/openclaw-ai-current.tgz
            .artifacts/docker-e2e-package/package-candidate.json
            .artifacts/docker-e2e-package/exact-package-set.json
          retention-days: 14
          if-no-files-found: error

      - name: Summarize package candidate
        env:
          PACKAGE_SHA256: ${{ steps.resolve.outputs.sha256 }}
          PACKAGE_VERSION: ${{ steps.resolve.outputs.package_version }}
          PACKAGE_REF: ${{ inputs.package_ref }}
          TRUSTED_SOURCE_ID: ${{ inputs.trusted_source_id }}
          SOURCE: ${{ inputs.source }}
          SUITE_PROFILE: ${{ inputs.suite_profile }}
          OPENWEBUI_MODE: ${{ inputs.openwebui_mode }}
          WORKFLOW_REF: ${{ inputs.workflow_ref }}
          PUBLISHED_UPGRADE_SURVIVOR_BASELINE: ${{ inputs.published_upgrade_survivor_baseline }}
          PUBLISHED_UPGRADE_SURVIVOR_BASELINES: ${{ steps.upgrade_survivor_baselines.outputs.baselines }}
          PUBLISHED_UPGRADE_SURVIVOR_SCENARIOS: ${{ inputs.published_upgrade_survivor_scenarios }}
        shell: bash
        run: |
          {
            echo "## Package acceptance"
            echo
            echo "- Source: \`${SOURCE}\`"
            echo "- Workflow ref: \`${WORKFLOW_REF}\`"
            if [[ "${SOURCE}" == "ref" ]]; then
              echo "- Package ref: \`${PACKAGE_REF}\`"
            fi
            if [[ "${SOURCE}" == "trusted-url" ]]; then
              echo "- Trusted source: \`${TRUSTED_SOURCE_ID}\`"
            fi
            echo "- Version: \`${PACKAGE_VERSION}\`"
            echo "- SHA-256: \`${PACKAGE_SHA256}\`"
            echo "- Profile: \`${SUITE_PROFILE}\`"
            echo "- OpenWebUI mode: \`${OPENWEBUI_MODE}\`"
            echo "- Published upgrade survivor baseline: \`${PUBLISHED_UPGRADE_SURVIVOR_BASELINE}\`"
            echo "- Published upgrade survivor baselines: \`${PUBLISHED_UPGRADE_SURVIVOR_BASELINES}\`"
            echo "- Published upgrade survivor scenarios: \`${PUBLISHED_UPGRADE_SURVIVOR_SCENARIOS}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  package_integrity:
    name: Package integrity
    needs: resolve_package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout package workflow ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.openwebui_mode == 'exact-target-local' && github.workflow_sha || inputs.workflow_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download package-under-test artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.resolve_package.outputs.package_artifact_name }}
          path: .artifacts/docker-e2e-package

      - name: Enforce public package integrity
        env:
          OPENCLAW_PACKAGE_TARBALL_CHECK_TIMINGS: "0"
        shell: bash
        run: |
          set -euo pipefail
          node scripts/check-openclaw-package-tarball.mjs .artifacts/docker-e2e-package/openclaw-current.tgz

  docker_acceptance:
    name: Docker product acceptance
    needs: [resolve_package, package_integrity]
    if: needs.resolve_package.outputs.exact_openwebui != 'true'
    permissions:
      actions: read
      contents: read
      packages: write
      pull-requests: read
    uses: ./.github/workflows/openclaw-live-and-e2e-checks-reusable.yml
    with:
      advisory: ${{ inputs.advisory }}
      ref: ${{ needs.resolve_package.outputs.package_source_sha || inputs.workflow_ref }}
      include_repo_e2e: false
      include_release_path_suites: ${{ needs.resolve_package.outputs.include_release_path_suites == 'true' }}
      include_openwebui: ${{ needs.resolve_package.outputs.include_openwebui == 'true' }}
      docker_lanes: ${{ needs.resolve_package.outputs.docker_lanes }}
      published_upgrade_survivor_baseline: ${{ inputs.published_upgrade_survivor_baseline }}
      published_upgrade_survivor_baselines: ${{ needs.resolve_package.outputs.published_upgrade_survivor_baselines }}
      published_upgrade_survivor_scenarios: ${{ needs.resolve_package.outputs.published_upgrade_survivor_scenarios }}
      package_artifact_name: ${{ needs.resolve_package.outputs.package_artifact_name }}
      include_live_suites: ${{ needs.resolve_package.outputs.include_live_suites == 'true' }}
      live_models_only: false
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_API_KEY_OLD: ${{ secrets.ANTHROPIC_API_KEY_OLD }}
      ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
      BYTEPLUS_API_KEY: ${{ secrets.BYTEPLUS_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
      OPENCLAW_LIVE_BROWSER_CDP_URL: ${{ secrets.OPENCLAW_LIVE_BROWSER_CDP_URL }}
      OPENCLAW_LIVE_SETUP_TOKEN: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN }}
      OPENCLAW_LIVE_SETUP_TOKEN_MODEL: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_MODEL }}
      OPENCLAW_LIVE_SETUP_TOKEN_PROFILE: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_PROFILE }}
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_VALUE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      VYDRA_API_KEY: ${{ secrets.VYDRA_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
      BYTEPLUS_ACCESS_KEY_ID: ${{ secrets.BYTEPLUS_ACCESS_KEY_ID }}
      BYTEPLUS_SECRET_ACCESS_KEY: ${{ secrets.BYTEPLUS_SECRET_ACCESS_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCLAW_CODEX_AUTH_JSON: ${{ secrets.OPENCLAW_CODEX_AUTH_JSON }}
      OPENCLAW_CODEX_CONFIG_TOML: ${{ secrets.OPENCLAW_CODEX_CONFIG_TOML }}
      OPENCLAW_CLAUDE_JSON: ${{ secrets.OPENCLAW_CLAUDE_JSON }}
      OPENCLAW_CLAUDE_CREDENTIALS_JSON: ${{ secrets.OPENCLAW_CLAUDE_CREDENTIALS_JSON }}
      OPENCLAW_CLAUDE_SETTINGS_JSON: ${{ secrets.OPENCLAW_CLAUDE_SETTINGS_JSON }}
      OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON }}
      OPENCLAW_GEMINI_SETTINGS_JSON: ${{ secrets.OPENCLAW_GEMINI_SETTINGS_JSON }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

  openwebui_exact_target:
    name: Focused exact-target OpenWebUI package acceptance
    needs: [resolve_package, package_integrity]
    if: needs.resolve_package.outputs.exact_openwebui == 'true'
    permissions:
      actions: read
      contents: read
      pull-requests: read
    uses: ./.github/workflows/openclaw-live-and-e2e-checks-reusable.yml
    with:
      advisory: false
      ref: ${{ inputs.target_sha }}
      include_repo_e2e: false
      include_release_path_suites: false
      include_openwebui: true
      docker_lanes: ""
      package_artifact_name: ${{ needs.resolve_package.outputs.package_artifact_name }}
      package_artifact_id: ${{ needs.resolve_package.outputs.package_artifact_id }}
      package_artifact_digest: ${{ needs.resolve_package.outputs.package_artifact_digest }}
      package_ai_sha256: ${{ needs.resolve_package.outputs.package_ai_sha256 }}
      package_ai_version: ${{ needs.resolve_package.outputs.package_ai_version }}
      package_set_manifest_sha256: ${{ needs.resolve_package.outputs.package_set_manifest_sha256 }}
      package_sha256: ${{ needs.resolve_package.outputs.package_sha256 }}
      package_version: ${{ needs.resolve_package.outputs.package_version }}
      npm_preflight_run_id: ${{ needs.resolve_package.outputs.preflight_run_id }}
      npm_preflight_artifact_id: ${{ needs.resolve_package.outputs.preflight_artifact_id }}
      npm_preflight_artifact_digest: ${{ needs.resolve_package.outputs.preflight_artifact_digest }}
      npm_preflight_artifact_name: ${{ needs.resolve_package.outputs.preflight_artifact_name }}
      npm_preflight_manifest_sha256: ${{ needs.resolve_package.outputs.preflight_manifest_sha256 }}
      trusted_workflow_sha: ${{ needs.resolve_package.outputs.trusted_workflow_sha }}
      shared_image_policy: artifact
      include_live_suites: false
      live_models_only: false
      release_test_profile: full
      use_github_hosted_runners: true
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

  package_telegram:
    name: Telegram package acceptance
    needs: [resolve_package, package_integrity]
    if: needs.resolve_package.outputs.telegram_enabled == 'true'
    uses: ./.github/workflows/npm-telegram-beta-e2e.yml
    with:
      advisory: ${{ inputs.advisory }}
      package_spec: ${{ inputs.package_spec }}
      package_artifact_name: ${{ needs.resolve_package.outputs.package_artifact_name }}
      package_label: openclaw@${{ needs.resolve_package.outputs.package_version }}
      harness_ref: ${{ needs.resolve_package.outputs.package_source_sha || inputs.workflow_ref }}
      provider_mode: ${{ needs.resolve_package.outputs.telegram_mode }}
      scenario: ${{ inputs.telegram_scenarios }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENCLAW_QA_CONVEX_SITE_URL: ${{ secrets.OPENCLAW_QA_CONVEX_SITE_URL }}
      OPENCLAW_QA_CONVEX_SECRET_CI: ${{ secrets.OPENCLAW_QA_CONVEX_SECRET_CI }}

  summary:
    name: Verify package acceptance
    needs:
      [
        resolve_package,
        package_integrity,
        docker_acceptance,
        openwebui_exact_target,
        package_telegram,
      ]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify package acceptance results
        env:
          ADVISORY: ${{ inputs.advisory }}
          DOCKER_RESULT: ${{ needs.docker_acceptance.result }}
          EXACT_OPENWEBUI_ENABLED: ${{ needs.resolve_package.outputs.exact_openwebui }}
          EXACT_OPENWEBUI_RESULT: ${{ needs.openwebui_exact_target.result }}
          PACKAGE_INTEGRITY_RESULT: ${{ needs.package_integrity.result }}
          PACKAGE_TELEGRAM_RESULT: ${{ needs.package_telegram.result }}
          RESOLVE_RESULT: ${{ needs.resolve_package.result }}
          TELEGRAM_ENABLED: ${{ needs.resolve_package.outputs.telegram_enabled }}
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for item in \
            "resolve_package=${RESOLVE_RESULT}" \
            "package_integrity=${PACKAGE_INTEGRITY_RESULT}" \
            "docker_acceptance=${DOCKER_RESULT}" \
            "openwebui_exact_target=${EXACT_OPENWEBUI_RESULT:-skipped}" \
            "package_telegram=${PACKAGE_TELEGRAM_RESULT}"
          do
            name="${item%%=*}"
            result="${item#*=}"
            result_failed=false
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              result_failed=true
            fi
            if [[ "$name" == "package_telegram" &&
                  "$TELEGRAM_ENABLED" == "true" &&
                  "$result" != "success" ]]; then
              result_failed=true
            fi
            if [[ "$name" == "openwebui_exact_target" &&
                  "${EXACT_OPENWEBUI_ENABLED:-false}" == "true" &&
                  "$result" != "success" ]]; then
              result_failed=true
            fi
            if [[ "$result_failed" == "true" ]]; then
              if [[ "$ADVISORY" == "true" && "$name" != "resolve_package" ]]; then
                echo "::warning::${name} ended with ${result}; package acceptance is advisory for this caller."
                continue
              fi
              echo "::error::${name} ended with ${result}"
              failed=1
            fi
          done
          exit "$failed"
