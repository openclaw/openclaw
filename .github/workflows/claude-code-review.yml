name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: "true"
          prompt: |
            You are the code review assistant for OpenFinClaw, a financial AI assistant gateway (fork of OpenClaw).

            ## Review Focus:
            1. **Security** — Financial data handling, API key leaks, injection attacks, OWASP top 10
            2. **TypeScript Quality** — Strict typing (no `any`), ESM compliance, error handling
            3. **Architecture** — Zero core intrusion principle (all finance features via extensions/fin-*)
            4. **Test Coverage** — New code >= 80%, core logic >= 90%
            5. **Performance** — No N+1 queries, memory leaks, or unnecessary blocking

            ## Project Conventions:
            - Conventional Commits (type(scope): description)
            - Files stay under ~500 LOC
            - Plugin deps in extension's own package.json
            - Never modify OpenClaw core — extend only via extensions

            ## Output:
            - Reply in English
            - Use GitHub Markdown with inline code comments
            - Flag critical issues with a warning, suggestions with a lightbulb
