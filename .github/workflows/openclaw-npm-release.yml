name: OpenClaw NPM Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, or a full 40-character workflow-branch commit SHA for validation-only preflight (for example v2026.3.22 or 0123456789abcdef0123456789abcdef01234567)
        required: true
        type: string
      preflight_only:
        description: Run validation/build only and skip the gated publish job
        required: true
        default: false
        type: boolean
      preflight_run_id:
        description: Existing successful preflight workflow run id to promote without rebuilding
        required: false
        type: string
      full_release_validation_run_id:
        description: Successful Full Release Validation run id for this tag/SHA, required for real publish
        required: false
        type: string
      release_publish_run_id:
        description: Approved OpenClaw Release Publish workflow run id
        required: false
        type: string
      npm_dist_tag:
        description: npm dist-tag to publish to
        required: false
        type: string
      policy_mode:
        description: Release policy migration mode
        required: true
        default: legacy
        type: choice
        options:
          - legacy
          - strict
      release_selector:
        description: Strict release selector (alpha, beta, daily, or stable); omit in legacy mode
        required: false
        type: string
      publish_manifest_run_id:
        description: Strict child producer run id; all four publish manifest fields are required together
        required: false
        type: string
      publish_manifest_run_attempt:
        description: Strict child producer run attempt
        required: false
        type: string
      publish_manifest_artifact_name:
        description: Strict child attempt-qualified publish manifest artifact name
        required: false
        type: string
      publish_manifest_payload_sha256:
        description: Strict child publish manifest payload SHA-256
        required: false
        type: string

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && inputs.preflight_only && format('openclaw-npm-release-{0}-{1}-preflight', inputs.tag, inputs.npm_dist_tag) || github.event_name == 'workflow_dispatch' && format('openclaw-npm-release-{0}-{1}-publish-{2}', inputs.tag, inputs.npm_dist_tag, github.run_id) || format('openclaw-npm-release-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' && inputs.preflight_only && inputs.npm_dist_tag == 'alpha' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"

jobs:
  # PLEASE DON'T ADD LONG-RUNNING OR FLAKY CHECKS TO THE npm RELEASE PATH.
  # KEEP THIS WORKFLOW SHORT AND DETERMINISTIC OR IT CAN GET STUCK AND JEOPARDIZE THE RELEASE.
  # RELEASE-TIME LIVE OR END-TO-END VALIDATION BELONGS IN openclaw-release-checks.yml.
  # SECURITY NOTE: TOKEN-BASED npm dist-tag mutation moved to
  # openclaw/releases/.github/workflows/openclaw-npm-dist-tags.yml
  # so this source workflow can stay focused on OIDC publish only.
  release_policy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      publish_eligible: ${{ steps.policy.outputs.publish_eligible }}
      release_policy: ${{ steps.policy.outputs.release_policy }}
      release_policy_sha256: ${{ steps.policy.outputs.release_policy_sha256 }}
    steps:
      - name: Validate release policy and immutable publish evidence
        id: policy
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ inputs.tag }}
          PREFLIGHT_ONLY: ${{ inputs.preflight_only && 'true' || 'false' }}
          PREFLIGHT_RUN_ID: ${{ inputs.preflight_run_id }}
          FULL_RELEASE_VALIDATION_RUN_ID: ${{ inputs.full_release_validation_run_id }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
          POLICY_MODE: ${{ inputs.policy_mode }}
          RELEASE_SELECTOR: ${{ inputs.release_selector }}
          PUBLISH_MANIFEST_RUN_ID: ${{ inputs.publish_manifest_run_id }}
          PUBLISH_MANIFEST_RUN_ATTEMPT: ${{ inputs.publish_manifest_run_attempt }}
          PUBLISH_MANIFEST_ARTIFACT_NAME: ${{ inputs.publish_manifest_artifact_name }}
          PUBLISH_MANIFEST_PAYLOAD_SHA256: ${{ inputs.publish_manifest_payload_sha256 }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          case "$POLICY_MODE" in
            legacy|strict) ;;
            *)
              echo "policy_mode must be legacy or strict." >&2
              exit 1
              ;;
          esac
          npm_dist_tag="$(printf '%s' "$RELEASE_NPM_DIST_TAG" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          descriptor_values=(
            "$PUBLISH_MANIFEST_RUN_ID"
            "$PUBLISH_MANIFEST_RUN_ATTEMPT"
            "$PUBLISH_MANIFEST_ARTIFACT_NAME"
            "$PUBLISH_MANIFEST_PAYLOAD_SHA256"
          )
          descriptor_count=0
          for value in "${descriptor_values[@]}"; do
            if [[ -n "$value" ]]; then
              descriptor_count=$((descriptor_count + 1))
            fi
          done
          if [[ "$descriptor_count" != "0" && "$descriptor_count" != "4" ]]; then
            echo "publish_manifest_run_id, publish_manifest_run_attempt, publish_manifest_artifact_name, and publish_manifest_payload_sha256 must be absent or supplied together." >&2
            exit 1
          fi
          if [[ "$POLICY_MODE" == "legacy" ]]; then
            if [[ -n "$RELEASE_SELECTOR" ]]; then
              echo "release_selector must be omitted in legacy mode." >&2
              exit 1
            fi
            if [[ "$descriptor_count" != "0" ]]; then
              echo "Compatibility top-level dispatch requires all publish manifest descriptor inputs absent." >&2
              exit 1
            fi
            case "$npm_dist_tag" in
              alpha|beta|latest) ;;
              *)
                echo "Legacy mode requires npm_dist_tag alpha, beta, or latest." >&2
                exit 1
                ;;
            esac
          else
            case "$RELEASE_SELECTOR" in
              alpha|beta|daily|stable) ;;
              *)
                echo "Strict mode requires release_selector alpha, beta, daily, or stable." >&2
                exit 1
                ;;
            esac
            if [[ "$PREFLIGHT_ONLY" == "true" && "$descriptor_count" != "0" ]]; then
              echo "Strict preflight cannot consume a publish manifest." >&2
              exit 1
            fi
            if [[ "$PREFLIGHT_ONLY" != "true" && "$descriptor_count" != "4" ]]; then
              echo "Strict child publish requires all four publish manifest descriptor inputs." >&2
              exit 1
            fi
          fi

          if [[ ! "$RELEASE_REF" =~ ^v[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*((-(alpha|beta)\.[1-9][0-9]*)|(-[1-9][0-9]*))?$ ]] && [[ ! "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Invalid release ref format: $RELEASE_REF" >&2
            exit 1
          fi
          if [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ && "$PREFLIGHT_ONLY" != "true" ]]; then
            echo "Full commit SHA input is only supported for validation-only preflight runs." >&2
            exit 1
          fi

          canonical_url="https://github.com/openclaw/openclaw.git"
          policy_root="$RUNNER_TEMP/openclaw-release-policy-main"
          rm -rf "$policy_root"
          git init --quiet "$policy_root"
          git -C "$policy_root" remote add origin "$canonical_url"
          git -C "$policy_root" fetch --quiet --no-tags --no-recurse-submodules origin \
            +refs/heads/main:refs/remotes/origin/main
          git -C "$policy_root" checkout --quiet --detach refs/remotes/origin/main
          policy_sha="$(git -C "$policy_root" rev-parse HEAD^{commit})"

          target_repo="$RUNNER_TEMP/openclaw-release-policy-target.git"
          rm -rf "$target_repo"
          git init --quiet --bare "$target_repo"
          if [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            verifier_operation="sha-preflight"
            git -C "$target_repo" fetch --quiet --no-tags --no-recurse-submodules "$canonical_url" \
              +refs/heads/main:refs/verify/target
            target_sha="$(git -C "$target_repo" rev-parse refs/verify/target^{commit})"
            if [[ "${RELEASE_REF,,}" != "$target_sha" ]]; then
              echo "Validation-only SHA mode requires the current protected main tip." >&2
              exit 1
            fi
            if [[ "$WORKFLOW_REF" != "refs/heads/main" ]]; then
              echo "Validation-only SHA mode must run from refs/heads/main." >&2
              exit 1
            fi
            release_version="$(git -C "$target_repo" show "$target_sha:package.json" | jq -er '.version')"
            release_tag="v${release_version}"
            target_ref=""
            authorized_source_ref=""
          else
            verifier_operation="tag-preflight"
            release_tag="$RELEASE_REF"
            release_version="${RELEASE_REF#v}"
            target_ref="refs/tags/${RELEASE_REF}"
            authorized_source_ref="$WORKFLOW_REF"
            git -C "$target_repo" fetch --quiet --no-tags --no-recurse-submodules "$canonical_url" \
              "+${target_ref}:refs/verify/target" \
              "+${authorized_source_ref}:refs/verify/source"
            target_sha="$(git -C "$target_repo" rev-parse refs/verify/target^{commit})"
          fi

          # Call the shared closed strict ingress explicitly before any planner or artifact writer.
          if [[ "$POLICY_MODE" == "strict" ]]; then
            node --input-type=module - "$policy_root" "$release_version" "$RELEASE_SELECTOR" <<'NODE'
          import path from "node:path";
          import { pathToFileURL } from "node:url";
          const [policyRoot, version, releaseSelector] = process.argv.slice(2);
          const { validateStrictPublishPolicy } = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/release-version-policy.mjs")).href
          );
          validateStrictPublishPolicy({ version, releaseSelector });
          NODE
          fi

          verifier_input="$RUNNER_TEMP/release-operation.json"
          RELEASE_VERSION="$release_version" TARGET_SHA="$target_sha" TARGET_REF="$target_ref" AUTHORIZED_SOURCE_REF="$authorized_source_ref" VERIFIER_OPERATION="$verifier_operation" POLICY_SHA="$policy_sha" node <<'NODE' > "$verifier_input"
          const input = {
            schemaVersion: 1,
            operation: process.env.VERIFIER_OPERATION,
            releaseVersion: process.env.RELEASE_VERSION,
            releaseSelector: process.env.POLICY_MODE === "legacy" ? null : process.env.RELEASE_SELECTOR,
            policyMode: process.env.POLICY_MODE,
            expectedPolicySourceSha: process.env.POLICY_SHA,
            execution: {
              event: "workflow_dispatch",
              workflowPath: ".github/workflows/openclaw-npm-release.yml",
              executionRef: process.env.WORKFLOW_REF,
              runHeadSha: process.env.WORKFLOW_SHA,
              runId: process.env.WORKFLOW_RUN_ID,
              runAttempt: process.env.WORKFLOW_RUN_ATTEMPT,
            },
            target:
              process.env.VERIFIER_OPERATION === "sha-preflight"
                ? {
                    targetRef: null,
                    targetSha: process.env.TARGET_SHA,
                    releaseTag: null,
                    authorizedSourceRef: null,
                  }
                : {
                    targetRef: process.env.TARGET_REF,
                    targetSha: process.env.TARGET_SHA,
                    releaseTag: process.env.RELEASE_REF,
                    authorizedSourceRef: process.env.AUTHORIZED_SOURCE_REF,
                  },
          };
          process.stdout.write(`${JSON.stringify(input)}\n`);
          NODE

          verifier_dir="$RUNNER_TEMP/openclaw-release-operation-verifier"
          rm -rf "$verifier_dir"
          mkdir -p "$verifier_dir"
          verifier_result="$verifier_dir/release-operation-verifier-v1.json"
          node "$policy_root/scripts/verify-release-operation.mjs" verify \
            --contract-version 1 \
            --policy-root "$policy_root" \
            --input "$verifier_input" > "$verifier_result"

          release_class="$(jq -er '.releaseClass' "$verifier_result")"
          if [[ "$POLICY_MODE" == "legacy" && ( "$release_class" == "stable-base" || "$release_class" == "stable-patch" ) ]]; then
            echo "Legacy publication rejects uncorrected final patch 33 and greater." >&2
            exit 1
          fi
          if [[ "$POLICY_MODE" == "strict" ]]; then
            if [[ "$release_class" == "stable-base" || "$release_class" == "stable-patch" ]]; then
              expected_dist_tag=""
            else
              expected_dist_tag="$(node --input-type=module - "$policy_root" "$release_version" <<'NODE'
          import path from "node:path";
          import { pathToFileURL } from "node:url";
          const [policyRoot, version] = process.argv.slice(2);
          const { resolveNpmPublishPlan } = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/npm-publish-plan.mjs")).href
          );
          process.stdout.write(resolveNpmPublishPlan(version).publishTag);
          NODE
              )"
            fi
            if [[ "$npm_dist_tag" != "$expected_dist_tag" ]]; then
              echo "Strict npm_dist_tag does not match the existing downstream plan." >&2
              exit 1
            fi
          fi

          stable_policy=false
          if [[ "$POLICY_MODE" == "strict" && ( "$release_class" == "stable-base" || "$release_class" == "stable-patch" ) ]]; then
            stable_policy=true
            if [[ "$PREFLIGHT_ONLY" != "true" ]]; then
              echo "policy-only strict stable preflight requires preflight_only=true." >&2
              exit 1
            fi
            if [[ -n "$PREFLIGHT_RUN_ID" || "$descriptor_count" != "0" ]]; then
              echo "policy-only strict stable preflight cannot be promoted." >&2
              exit 1
            fi
          fi

          policy_path="$RUNNER_TEMP/release-policy.json"
          POLICY_PATH="$policy_path" VERIFIER_RESULT="$verifier_result" STABLE_POLICY="$stable_policy" node --input-type=module - "$policy_root" <<'NODE'
          import { appendFileSync, readFileSync, writeFileSync } from "node:fs";
          import path from "node:path";
          import { pathToFileURL } from "node:url";
          const [policyRoot] = process.argv.slice(2);
          const evidence = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/release-policy-evidence.mjs")).href
          );
          const verification = JSON.parse(readFileSync(process.env.VERIFIER_RESULT, "utf8"));
          const policy = evidence.validateReleasePolicy({
            version: 1,
            releaseVersion: verification.releaseVersion,
            releaseClass: verification.releaseClass,
            releaseSelector: verification.releaseSelector,
            policyMode: verification.policyMode,
            publishEligible: process.env.STABLE_POLICY !== "true",
            authorizedSourceRef: verification.target.authorizedSourceRef,
            policySource: verification.policySource,
          });
          const digest = evidence.releasePolicySha256(policy);
          writeFileSync(process.env.POLICY_PATH, evidence.canonicalJsonWithNewline(policy));
          appendFileSync(process.env.GITHUB_OUTPUT, `publish_eligible=${policy.publishEligible}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `release_policy=${evidence.canonicalJson(policy)}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `release_policy_sha256=${digest}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `release_version=${policy.releaseVersion}\n`);
          NODE

          if [[ "$stable_policy" == "true" ]]; then
            policy_artifact="$RUNNER_TEMP/openclaw-npm-policy-only-preflight"
            rm -rf "$policy_artifact"
            mkdir -p "$policy_artifact"
            printf '%s\n' "$release_tag" > "$policy_artifact/release-tag.txt"
            printf '%s\n' "$target_sha" > "$policy_artifact/release-sha.txt"
            POLICY_ARTIFACT="$policy_artifact" POLICY_PATH="$policy_path" RELEASE_TAG="$release_tag" RELEASE_SHA="$target_sha" node --input-type=module - "$policy_root" <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          import path from "node:path";
          import { pathToFileURL } from "node:url";
          const [policyRoot] = process.argv.slice(2);
          const evidence = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/release-policy-evidence.mjs")).href
          );
          const releasePolicy = JSON.parse(readFileSync(process.env.POLICY_PATH, "utf8"));
          const manifest = evidence.validatePreflightManifest({
            version: 2,
            releaseTag: process.env.RELEASE_TAG,
            releaseSha: process.env.RELEASE_SHA,
            npmDistTag: null,
            packageName: "openclaw",
            packageVersion: releasePolicy.releaseVersion,
            tarballName: null,
            tarballSha256: null,
            dependencyEvidenceDir: null,
            dependencyEvidenceManifest: null,
            releasePolicy,
            releasePolicySha256: evidence.releasePolicySha256(releasePolicy),
          });
          writeFileSync(
            path.join(process.env.POLICY_ARTIFACT, "preflight-manifest.json"),
            evidence.canonicalJsonWithNewline(manifest),
          );
          NODE
          fi

          if [[ "$POLICY_MODE" == "strict" && "$descriptor_count" == "4" ]]; then
            if [[ ! "$PUBLISH_MANIFEST_RUN_ID" =~ ^[1-9][0-9]*$ || ! "$PUBLISH_MANIFEST_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]; then
              echo "publish manifest run id and attempt must be positive decimal strings." >&2
              exit 1
            fi
            expected_artifact="release-publish-manifest-${PUBLISH_MANIFEST_RUN_ID}-${PUBLISH_MANIFEST_RUN_ATTEMPT}"
            if [[ "$PUBLISH_MANIFEST_ARTIFACT_NAME" != "$expected_artifact" ]]; then
              echo "publish manifest artifact name is not attempt-qualified." >&2
              exit 1
            fi
            if [[ ! "$PUBLISH_MANIFEST_PAYLOAD_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
              echo "publish manifest payload digest must be 64 lowercase hexadecimal characters." >&2
              exit 1
            fi

            producer_json="$RUNNER_TEMP/publish-manifest-producer.json"
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PUBLISH_MANIFEST_RUN_ID}" > "$producer_json"
            jq -e \
              --arg id "$PUBLISH_MANIFEST_RUN_ID" \
              --arg attempt "$PUBLISH_MANIFEST_RUN_ATTEMPT" \
              --arg repository "$GITHUB_REPOSITORY" \
              '.id | tostring == $id' "$producer_json" >/dev/null
            jq -e \
              --arg attempt "$PUBLISH_MANIFEST_RUN_ATTEMPT" \
              --arg repository "$GITHUB_REPOSITORY" \
              '(.run_attempt | tostring) == $attempt and .repository.full_name == $repository and .event == "workflow_dispatch" and .path == ".github/workflows/openclaw-release-publish.yml" and (.status == "in_progress" or (.status == "completed" and .conclusion == "success"))' \
              "$producer_json" >/dev/null
            producer_head_sha="$(jq -er '.head_sha' "$producer_json")"

            publish_dir="$RUNNER_TEMP/release-publish-manifest"
            rm -rf "$publish_dir"
            mkdir -p "$publish_dir"
            gh run download "$PUBLISH_MANIFEST_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$PUBLISH_MANIFEST_ARTIFACT_NAME" \
              --dir "$publish_dir"
            mapfile -t publish_files < <(find "$publish_dir" -type f -print)
            publish_manifest="$publish_dir/release-publish-manifest.json"
            if [[ "${#publish_files[@]}" != "1" || "${publish_files[0]}" != "$publish_manifest" ]]; then
              echo "Publish manifest artifact must contain exactly one release-publish-manifest.json and no extra payload." >&2
              exit 1
            fi
            actual_publish_digest="$(sha256sum "$publish_manifest" | awk '{print $1}')"
            if [[ "$actual_publish_digest" != "$PUBLISH_MANIFEST_PAYLOAD_SHA256" ]]; then
              echo "publish manifest payload digest mismatch" >&2
              exit 1
            fi

            manifest_preflight_run_id="$(jq -er '.preflight.runId' "$publish_manifest")"
            manifest_preflight_run_attempt="$(jq -er '.preflight.runAttempt' "$publish_manifest")"
            manifest_full_run_id="$(jq -er '.fullValidation.runId' "$publish_manifest")"
            manifest_full_run_attempt="$(jq -er '.fullValidation.runAttempt' "$publish_manifest")"
            if [[ "$PREFLIGHT_RUN_ID" != "$manifest_preflight_run_id" || "$FULL_RELEASE_VALIDATION_RUN_ID" != "$manifest_full_run_id" ]]; then
              echo "publish manifest predecessor mismatch" >&2
              exit 1
            fi

            authenticate_completed_run() {
              local run_id="$1" run_attempt="$2" workflow_path="$3" output="$4"
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" > "$output"
              jq -e --arg id "$run_id" --arg attempt "$run_attempt" --arg path "$workflow_path" --arg repository "$GITHUB_REPOSITORY" \
                '(.id | tostring) == $id and (.run_attempt | tostring) == $attempt and .repository.full_name == $repository and .event == "workflow_dispatch" and .path == $path and .status == "completed" and .conclusion == "success"' \
                "$output" >/dev/null
            }
            authenticate_completed_run "$manifest_preflight_run_id" "$manifest_preflight_run_attempt" \
              ".github/workflows/openclaw-npm-release.yml" "$RUNNER_TEMP/preflight-run.json"
            authenticate_completed_run "$manifest_full_run_id" "$manifest_full_run_attempt" \
              ".github/workflows/full-release-validation.yml" "$RUNNER_TEMP/full-validation-run.json"

            preflight_dir="$RUNNER_TEMP/strict-preflight-predecessor"
            full_validation_dir="$RUNNER_TEMP/strict-full-validation-predecessor"
            rm -rf "$preflight_dir" "$full_validation_dir"
            mkdir -p "$preflight_dir" "$full_validation_dir"
            gh run download "$manifest_preflight_run_id" --repo "$GITHUB_REPOSITORY" \
              --name "openclaw-npm-preflight-${release_tag}" --dir "$preflight_dir"
            gh run download "$manifest_full_run_id" --repo "$GITHUB_REPOSITORY" \
              --name "full-release-validation-${manifest_full_run_id}" --dir "$full_validation_dir"
            mapfile -t preflight_manifests < <(find "$preflight_dir" -type f -name preflight-manifest.json -print)
            mapfile -t full_manifests < <(find "$full_validation_dir" -type f -name full-release-validation-manifest.json -print)
            if [[ "${#preflight_manifests[@]}" != "1" || "${#full_manifests[@]}" != "1" ]]; then
              echo "publish manifest predecessors must each contain exactly one manifest." >&2
              exit 1
            fi
            preflight_manifest="${preflight_manifests[0]}"
            full_validation_manifest="${full_manifests[0]}"
            mapfile -t full_validation_files < <(find "$full_validation_dir" -type f -print)
            if [[ "${#full_validation_files[@]}" != "1" || "${full_validation_files[0]}" != "$full_validation_manifest" ]]; then
              echo "Full Validation predecessor artifact must contain exactly its manifest." >&2
              exit 1
            fi
            tarball_name="$(jq -er '.tarballName' "$preflight_manifest")"
            dependency_dir="$(jq -er '.dependencyEvidenceDir' "$preflight_manifest")"
            dependency_manifest="$(jq -er '.dependencyEvidenceManifest' "$preflight_manifest")"
            if [[ "$dependency_dir" != "dependency-evidence" || "$dependency_manifest" != "dependency-evidence/dependency-evidence-manifest.json" ||
              ! -f "$preflight_dir/$tarball_name" || ! -f "$preflight_dir/$dependency_manifest" ]]; then
              echo "Strict preflight dependency-evidence closure is incomplete." >&2
              exit 1
            fi
            mapfile -t preflight_root_files < <(find "$preflight_dir" -mindepth 1 -maxdepth 1 -type f -exec basename {} \; | sort)
            mapfile -t expected_preflight_root_files < <(printf '%s\n' \
              preflight-manifest.json release-npm-dist-tag.txt release-sha.txt release-tag.txt "$tarball_name" | sort)
            if [[ "${preflight_root_files[*]}" != "${expected_preflight_root_files[*]}" ]]; then
              echo "Strict preflight artifact root file set is not closed." >&2
              exit 1
            fi
            if [[ "$(sha256sum "$preflight_manifest" | awk '{print $1}')" != "$(jq -er '.preflight.payloadSha256' "$publish_manifest")" || \
                  "$(sha256sum "$full_validation_manifest" | awk '{print $1}')" != "$(jq -er '.fullValidation.payloadSha256' "$publish_manifest")" ]]; then
              echo "publish manifest predecessor mismatch" >&2
              exit 1
            fi

            git -C "$target_repo" show refs/verify/target:CHANGELOG.md > "$RUNNER_TEMP/target-CHANGELOG.md"
            git -C "$target_repo" show refs/verify/source:CHANGELOG.md > "$RUNNER_TEMP/source-CHANGELOG.md"
            POLICY_PATH="$policy_path" VERIFIER_RESULT="$verifier_result" PUBLISH_MANIFEST="$publish_manifest" PREFLIGHT_MANIFEST="$preflight_manifest" FULL_VALIDATION_MANIFEST="$full_validation_manifest" PRODUCER_HEAD_SHA="$producer_head_sha" TARGET_CHANGELOG="$RUNNER_TEMP/target-CHANGELOG.md" SOURCE_CHANGELOG="$RUNNER_TEMP/source-CHANGELOG.md" node --input-type=module - "$policy_root" <<'NODE'
          import { createHash } from "node:crypto";
          import { readFileSync } from "node:fs";
          import path from "node:path";
          import { pathToFileURL } from "node:url";
          const [policyRoot] = process.argv.slice(2);
          const evidence = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/release-policy-evidence.mjs")).href
          );
          const { extractStableChangelogSection } = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/stable-release-closeout.mjs")).href
          );
          const readJson = (name) => JSON.parse(readFileSync(process.env[name], "utf8"));
          const same = (left, right) => evidence.canonicalJson(left) === evidence.canonicalJson(right);
          const policy = evidence.validateReleasePolicy(readJson("POLICY_PATH"));
          const verification = evidence.validateReleaseOperationResult(readJson("VERIFIER_RESULT"));
          const manifest = evidence.validatePublishManifest(readJson("PUBLISH_MANIFEST"));
          const preflight = evidence.validatePreflightManifest(readJson("PREFLIGHT_MANIFEST"));
          const fullValidation = evidence.validateFullValidationManifest(
            readJson("FULL_VALIDATION_MANIFEST"),
          );
          if (
            !same(manifest.releasePolicy, policy) ||
            manifest.releasePolicySha256 !== evidence.releasePolicySha256(policy)
          ) {
            throw new Error("publish manifest policy mismatch");
          }
          if (
            preflight.version !== 2 ||
            fullValidation.version !== 3 ||
            !same(preflight.releasePolicy, policy) ||
            !same(fullValidation.releasePolicy, policy) ||
            preflight.releasePolicySha256 !== manifest.releasePolicySha256 ||
            fullValidation.releasePolicySha256 !== manifest.releasePolicySha256
          ) {
            throw new Error("publish manifest predecessor mismatch");
          }
          if (
            manifest.execution.runId !== process.env.PUBLISH_MANIFEST_RUN_ID ||
            manifest.execution.runAttempt !== process.env.PUBLISH_MANIFEST_RUN_ATTEMPT ||
            manifest.execution.runHeadSha !== process.env.PRODUCER_HEAD_SHA
          ) {
            throw new Error("publish manifest execution mismatch");
          }
          if (
            manifest.target.targetRef !== verification.target.targetRef ||
            manifest.target.targetSha !== verification.target.targetSha ||
            manifest.target.releaseTag !== verification.target.releaseTag ||
            manifest.target.authorizedSourceRef !== verification.target.authorizedSourceRef ||
            manifest.target.authorizedSourceTipSha !== verification.target.authorizedSourceTipSha ||
            manifest.target.targetReachableFromAuthorizedSource !== true
          ) {
            throw new Error("publish manifest target mismatch");
          }
          const targetSection = extractStableChangelogSection(
            readFileSync(process.env.TARGET_CHANGELOG, "utf8"),
            policy.releaseVersion,
          );
          const sourceSection = extractStableChangelogSection(
            readFileSync(process.env.SOURCE_CHANGELOG, "utf8"),
            policy.releaseVersion,
          );
          const sectionDigest =
            targetSection === null
              ? null
              : createHash("sha256").update(targetSection).digest("hex");
          if (
            targetSection === null ||
            targetSection !== sourceSection ||
            manifest.changelogEvidence.tag !== manifest.target.releaseTag ||
            manifest.changelogEvidence.sourceRef !== manifest.target.authorizedSourceRef ||
            manifest.changelogEvidence.sectionHeading !== `## ${policy.releaseVersion}` ||
            manifest.changelogEvidence.sectionSha256 !== sectionDigest
          ) {
            throw new Error("publish manifest changelog mismatch");
          }
          NODE
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_version=$release_version"
            echo "verifier_operation=$verifier_operation"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release operation verifier evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-operation-verifier-v1-${{ steps.policy.outputs.verifier_operation }}-${{ steps.policy.outputs.release_version }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/openclaw-release-operation-verifier
          if-no-files-found: error

      - name: Upload policy-only stable preflight
        if: ${{ steps.policy.outputs.publish_eligible == 'false' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-npm-preflight-${{ steps.policy.outputs.release_tag }}
          path: ${{ runner.temp }}/openclaw-npm-policy-only-preflight
          if-no-files-found: error

  preflight_openclaw_npm:
    needs: [release_policy]
    if: ${{ inputs.preflight_only && needs.release_policy.outputs.publish_eligible == 'true' }}
    # Preflight builds the full release package before publish; ubuntu-latest can OOM in tsdown.
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Validate release ref input format
        env:
          RELEASE_REF: ${{ inputs.tag }}
          PREFLIGHT_ONLY: ${{ inputs.preflight_only }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_REF}" =~ ^v[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*((-(alpha|beta)\.[1-9][0-9]*)|(-[1-9][0-9]*))?$ ]] && [[ ! "${RELEASE_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Invalid release ref format: ${RELEASE_REF}"
            exit 1
          fi
          if [[ "${RELEASE_REF}" =~ ^[0-9a-fA-F]{40}$ ]] && [[ "${PREFLIGHT_ONLY}" != "true" ]]; then
            echo "Full commit SHA input is only supported for validation-only preflight runs."
            exit 1
          fi
          if [[ "${RELEASE_REF}" == *"-alpha."* && "${RELEASE_NPM_DIST_TAG}" != "alpha" ]]; then
            echo "Alpha prerelease tags must publish to npm dist-tag alpha."
            exit 1
          fi
          if [[ "${RELEASE_REF}" == *"-beta."* && "${RELEASE_NPM_DIST_TAG}" != "beta" ]]; then
            echo "Beta prerelease tags must publish to npm dist-tag beta."
            exit 1
          fi

      - name: Forbid preflight artifact promotion on validation-only runs
        if: ${{ inputs.preflight_only && inputs.preflight_run_id != '' }}
        run: |
          echo "preflight_run_id is only valid for real publish runs."
          exit 1

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate Tideclaw alpha preflight target
        if: startsWith(github.ref, 'refs/heads/tideclaw/alpha/')
        env:
          RELEASE_REF: ${{ inputs.tag }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_REF}" == *"-alpha."* && ! "${RELEASE_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Tideclaw alpha preflight runs must target an alpha prerelease tag or SHA." >&2
            exit 1
          fi
          if [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            echo "Tideclaw alpha preflight runs must run from tideclaw/alpha/YYYY-MM-DD-HHMMZ." >&2
            exit 1
          fi
          alpha_branch="${WORKFLOW_REF#refs/heads/}"
          git fetch --no-tags origin "+refs/heads/${alpha_branch}:refs/remotes/origin/${alpha_branch}"
          if ! git merge-base --is-ancestor HEAD "refs/remotes/origin/${alpha_branch}"; then
            echo "Alpha preflight target must be reachable from ${alpha_branch}." >&2
            exit 1
          fi

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "true"

      - name: Ensure version is not already published
        env:
          PREFLIGHT_ONLY: ${{ inputs.preflight_only }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "openclaw@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            if [[ "${PREFLIGHT_ONLY}" == "true" ]]; then
              echo "openclaw@${PACKAGE_VERSION} is already published on npm; continuing because preflight_only=true."
              exit 0
            fi
            echo "openclaw@${PACKAGE_VERSION} is already published on npm."
            exit 1
          fi

          echo "Publishing openclaw@${PACKAGE_VERSION}"

      - name: Check
        env:
          OPENCLAW_LOCAL_CHECK: "0"
        run: pnpm check

      - name: Check test types
        env:
          OPENCLAW_LOCAL_CHECK: "0"
        run: pnpm check:test-types

      - name: Check architecture
        env:
          OPENCLAW_LOCAL_CHECK: "0"
        run: pnpm check:architecture

      - name: Build
        run: pnpm build

      - name: Build Control UI
        run: pnpm ui:build

      - name: Validate release metadata
        if: ${{ inputs.preflight_run_id == '' }}
        env:
          OPENCLAW_NPM_RELEASE_SKIP_PACK_CHECK: "1"
          RELEASE_REF: ${{ inputs.tag }}
          PREFLIGHT_ONLY: ${{ inputs.preflight_only }}
          WORKFLOW_REF_NAME: ${{ github.ref_name }}
          OPENCLAW_NPM_PUBLISH_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -euo pipefail
          RELEASE_SHA=$(git rev-parse HEAD)
          RELEASE_BRANCH_REF="refs/remotes/origin/${WORKFLOW_REF_NAME}"
          export RELEASE_SHA RELEASE_BRANCH_REF
          # Fetch the workflow branch so merge-base ancestry checks keep working
          # for older tagged commits contained in a release branch.
          git fetch --no-tags origin "+refs/heads/${WORKFLOW_REF_NAME}:refs/remotes/origin/${WORKFLOW_REF_NAME}"
          if [[ "${RELEASE_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            BRANCH_SHA="$(git rev-parse "${RELEASE_BRANCH_REF}")"
            if [[ "${RELEASE_SHA}" != "${BRANCH_SHA}" ]]; then
              echo "Validation-only SHA mode only supports the current ${WORKFLOW_REF_NAME} HEAD." >&2
              exit 1
            fi
            RELEASE_TAG="v$(node -p "require('./package.json').version")"
            export RELEASE_TAG
            echo "Validation-only SHA mode: using synthetic release tag ${RELEASE_TAG} for package metadata checks."
          else
            RELEASE_TAG="${RELEASE_REF}"
            export RELEASE_TAG
          fi
          RELEASE_MAIN_REF="${RELEASE_BRANCH_REF}"
          export RELEASE_MAIN_REF
          pnpm release:openclaw:npm:check

      # KEEP THIS LANE LIMITED TO FAST, REPEATABLE RELEASE READINESS CHECKS.
      # IF A CHECK CAN TAKE A LONG TIME, NEEDS LIVE CREDENTIALS, OR IS KNOWN TO BE FLAKY,
      # IT BELONGS IN openclaw-release-checks.yml INSTEAD OF BLOCKING npm PUBLISH.
      - name: Verify release contents
        run: pnpm release:check

      - name: Generate dependency release evidence
        id: dependency_evidence
        env:
          RELEASE_REF: ${{ inputs.tag }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -euo pipefail
          node scripts/generate-dependency-release-evidence.mjs \
            --release-ref "$RELEASE_REF" \
            --npm-dist-tag "$RELEASE_NPM_DIST_TAG" \
            --output-dir "$RUNNER_TEMP/openclaw-release-dependency-evidence" \
            --github-output "$GITHUB_OUTPUT" \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Pack prepared npm tarball
        id: packed_tarball
        env:
          OPENCLAW_PREPACK_PREPARED: "1"
          RELEASE_REF: ${{ inputs.tag }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
          DEPENDENCY_EVIDENCE_DIR: ${{ steps.dependency_evidence.outputs.dir }}
          POLICY_MODE: ${{ inputs.policy_mode }}
          RELEASE_POLICY: ${{ needs.release_policy.outputs.release_policy }}
          RELEASE_POLICY_SHA256: ${{ needs.release_policy.outputs.release_policy_sha256 }}
        run: |
          set -euo pipefail
          PACK_OUTPUT="$RUNNER_TEMP/npm-pack-output.txt"
          npm pack --json 2>&1 | tee "$PACK_OUTPUT"
          PACK_NAME="$(node - "$PACK_OUTPUT" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const input = fs.readFileSync(process.argv[2], "utf8");

          function resolveTarballFileName(value) {
            const fileName = typeof value === "string" ? value.trim() : "";
            if (
              !fileName.endsWith(".tgz") ||
              fileName.includes("\0") ||
              fileName !== path.basename(fileName) ||
              fileName !== path.win32.basename(fileName)
            ) {
              console.error(`npm pack reported unsafe tarball filename ${JSON.stringify(fileName)}.`);
              process.exit(1);
            }
            return fileName;
          }

          function arrayEndFrom(start) {
            let depth = 0;
            let inString = false;
            let escape = false;
            for (let i = start; i < input.length; i += 1) {
              const char = input[i];
              if (inString) {
                if (escape) {
                  escape = false;
                } else if (char === "\\") {
                  escape = true;
                } else if (char === "\"") {
                  inString = false;
                }
                continue;
              }
              if (char === "\"") {
                inString = true;
              } else if (char === "[") {
                depth += 1;
              } else if (char === "]") {
                depth -= 1;
                if (depth === 0) {
                  return i + 1;
                }
              }
            }
            return -1;
          }

          for (const match of input.matchAll(/\[/g)) {
            const start = match.index;
            const end = arrayEndFrom(start);
            if (end === -1) {
              continue;
            }
            try {
              const parsed = JSON.parse(input.slice(start, end));
              const first = Array.isArray(parsed) ? parsed[0] : null;
              if (first && Object.prototype.hasOwnProperty.call(first, "filename")) {
                process.stdout.write(resolveTarballFileName(first.filename));
                process.exit(0);
              }
            } catch {
              // Keep scanning; npm lifecycle output can legally precede the JSON.
            }
          }

          console.error("Could not find npm pack --json output with a filename.");
          process.exit(1);
          NODE
          )"
          PACK_PATH="$PWD/$PACK_NAME"
          if [[ -z "$PACK_PATH" || ! -f "$PACK_PATH" ]]; then
            echo "npm pack did not produce a tarball file." >&2
            exit 1
          fi
          RELEASE_SHA="$(git rev-parse HEAD)"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${RELEASE_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            RELEASE_TAG="v${PACKAGE_VERSION}"
          else
            RELEASE_TAG="${RELEASE_REF}"
          fi
          TARBALL_NAME="$PACK_NAME"
          TARBALL_SHA256="$(sha256sum "$PACK_PATH" | awk '{print $1}')"
          ARTIFACT_DIR="$RUNNER_TEMP/openclaw-npm-preflight"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp "$PACK_PATH" "$ARTIFACT_DIR/"
          cp -R "$DEPENDENCY_EVIDENCE_DIR" "$ARTIFACT_DIR/dependency-evidence"
          printf '%s\n' "$RELEASE_TAG" > "$ARTIFACT_DIR/release-tag.txt"
          printf '%s\n' "$RELEASE_SHA" > "$ARTIFACT_DIR/release-sha.txt"
          printf '%s\n' "$RELEASE_NPM_DIST_TAG" > "$ARTIFACT_DIR/release-npm-dist-tag.txt"
          policy_root="$RUNNER_TEMP/openclaw-preflight-policy-main"
          rm -rf "$policy_root"
          git init --quiet "$policy_root"
          git -C "$policy_root" remote add origin "https://github.com/openclaw/openclaw.git"
          git -C "$policy_root" fetch --quiet --no-tags --no-recurse-submodules origin \
            +refs/heads/main:refs/remotes/origin/main
          expected_policy_sha="$(printf '%s' "$RELEASE_POLICY" | jq -er '.policySource.sha')"
          if [[ "$(git -C "$policy_root" rev-parse refs/remotes/origin/main^{commit})" != "$expected_policy_sha" ]]; then
            echo "Protected-main policy moved after initial preflight authorization; rerun preflight." >&2
            exit 1
          fi
          git -C "$policy_root" checkout --quiet --detach "$expected_policy_sha"
          ARTIFACT_DIR="$ARTIFACT_DIR" RELEASE_TAG="$RELEASE_TAG" RELEASE_SHA="$RELEASE_SHA" RELEASE_NPM_DIST_TAG="$RELEASE_NPM_DIST_TAG" PACKAGE_VERSION="$PACKAGE_VERSION" TARBALL_NAME="$TARBALL_NAME" TARBALL_SHA256="$TARBALL_SHA256" node --input-type=module - "$policy_root" <<'NODE'
          import fs from "node:fs";
          import path from "node:path";
          import { pathToFileURL } from "node:url";
          const [policyRoot] = process.argv.slice(2);
          const {
            canonicalJsonWithNewline,
            validatePreflightManifest,
          } = await import(
            pathToFileURL(path.join(policyRoot, "scripts/lib/release-policy-evidence.mjs")).href
          );
          const policyMode = process.env.POLICY_MODE;
          const manifest = validatePreflightManifest({
            version: policyMode === "strict" ? 2 : 1,
            releaseTag: process.env.RELEASE_TAG,
            releaseSha: process.env.RELEASE_SHA,
            npmDistTag: process.env.RELEASE_NPM_DIST_TAG,
            packageName: "openclaw",
            packageVersion: process.env.PACKAGE_VERSION,
            tarballName: process.env.TARBALL_NAME,
            tarballSha256: process.env.TARBALL_SHA256,
            dependencyEvidenceDir: "dependency-evidence",
            dependencyEvidenceManifest: "dependency-evidence/dependency-evidence-manifest.json",
            ...(policyMode === "strict"
              ? {
                  releasePolicy: JSON.parse(process.env.RELEASE_POLICY),
                  releasePolicySha256: process.env.RELEASE_POLICY_SHA256,
                }
              : {}),
          });
          fs.writeFileSync(
            path.join(process.env.ARTIFACT_DIR, "preflight-manifest.json"),
            policyMode === "strict"
              ? canonicalJsonWithNewline(manifest)
              : `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE
          echo "dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify prepared npm tarball install
        env:
          PREFLIGHT_ARTIFACT_DIR: ${{ steps.packed_tarball.outputs.dir }}
        run: |
          set -euo pipefail
          TARBALL_PATH="$(find "$PREFLIGHT_ARTIFACT_DIR" -maxdepth 1 -type f -name '*.tgz' -print | sort | tail -n 1)"
          if [[ -z "$TARBALL_PATH" ]]; then
            echo "Prepared preflight tarball not found." >&2
            ls -la "$PREFLIGHT_ARTIFACT_DIR" >&2 || true
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          node --import tsx scripts/openclaw-npm-prepublish-verify.ts "$TARBALL_PATH" "$PACKAGE_VERSION"

      - name: Upload dependency release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-release-dependency-evidence-${{ inputs.tag }}
          path: ${{ steps.dependency_evidence.outputs.dir }}
          if-no-files-found: error

      - name: Upload dependency release evidence tag alias
        if: ${{ steps.packed_tarball.outputs.release_tag != inputs.tag }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-release-dependency-evidence-${{ steps.packed_tarball.outputs.release_tag }}
          path: ${{ steps.dependency_evidence.outputs.dir }}
          if-no-files-found: error

      - name: Upload prepared npm publish bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-npm-preflight-${{ inputs.tag }}
          path: ${{ steps.packed_tarball.outputs.dir }}
          if-no-files-found: error

      - name: Upload prepared npm publish bundle tag alias
        if: ${{ steps.packed_tarball.outputs.release_tag != inputs.tag }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openclaw-npm-preflight-${{ steps.packed_tarball.outputs.release_tag }}
          path: ${{ steps.packed_tarball.outputs.dir }}
          if-no-files-found: error

  validate_publish_request:
    needs: [release_policy]
    if: ${{ !inputs.preflight_only && needs.release_policy.outputs.publish_eligible == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Require trusted workflow ref for publish
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tideclaw_alpha_publish=false
          if [[ "${RELEASE_TAG}" == *"-alpha."* && "${RELEASE_NPM_DIST_TAG}" == "alpha" && "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            tideclaw_alpha_publish=true
          fi
          if [[ "${WORKFLOW_REF}" != "refs/heads/main" ]] && [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/release/[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*$ ]] && [[ "${tideclaw_alpha_publish}" != "true" ]]; then
            echo "Real publish runs must be dispatched from main, release/YYYY.M.PATCH, or a Tideclaw alpha branch for alpha prereleases. Use preflight_only=true for other branch validation."
            exit 1
          fi

      - name: Require preflight artifact promotion on real publish
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
          PREFLIGHT_RUN_ID: ${{ inputs.preflight_run_id }}
          FULL_RELEASE_VALIDATION_RUN_ID: ${{ inputs.full_release_validation_run_id }}
          RELEASE_PUBLISH_RUN_ID: ${{ inputs.release_publish_run_id }}
        run: |
          set -euo pipefail
          if [[ -z "${PREFLIGHT_RUN_ID}" ]]; then
            echo "Real publish requires preflight_run_id from a successful npm preflight run." >&2
            exit 1
          fi
          if [[ -z "${FULL_RELEASE_VALIDATION_RUN_ID}" ]]; then
            if [[ "${RELEASE_TAG}" == *"-beta."* && "${RELEASE_NPM_DIST_TAG}" == "beta" ]]; then
              echo "::warning::Beta publish is proceeding from npm preflight only; full release validation remains required before stable/latest promotion."
            else
              echo "Real publish requires full_release_validation_run_id from a successful Full Release Validation run." >&2
              exit 1
            fi
          fi
          if [[ -z "${RELEASE_PUBLISH_RUN_ID// }" && "${GITHUB_ACTOR}" == "github-actions[bot]" ]]; then
            echo "Workflow-dispatched real publish requires release_publish_run_id from the approved OpenClaw Release Publish workflow." >&2
            exit 1
          fi

      - name: Validate release publish approval run
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PUBLISH_RUN_ID: ${{ inputs.release_publish_run_id }}
          EXPECTED_WORKFLOW_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_PUBLISH_RUN_ID// }" ]]; then
            if [[ "${GITHUB_ACTOR}" == "github-actions[bot]" ]]; then
              echo "OpenClaw npm publish dispatched by another workflow must include release_publish_run_id." >&2
              exit 1
            fi
            echo "Direct OpenClaw npm publish; relying on this workflow's npm-release environment approval."
            exit 0
          fi
          direct_recovery=false
          if [[ "${GITHUB_ACTOR}" != "github-actions[bot]" ]]; then
            direct_recovery=true
            echo "Direct OpenClaw npm recovery with release_publish_run_id; relying on this workflow's npm-release environment approval."
          fi
          RUN_JSON="$(gh run view "$RELEASE_PUBLISH_RUN_ID" --repo "$GITHUB_REPOSITORY" --json workflowName,headBranch,event,status,conclusion,url)"
          printf '%s' "$RUN_JSON" | DIRECT_RELEASE_RECOVERY="${direct_recovery}" node scripts/validate-release-publish-approval.mjs

  publish_openclaw_npm:
    # KEEP THE REAL RELEASE/PUBLISH PATH ON A GITHUB-HOSTED RUNNER.
    # npm trusted publishing + provenance requires this to stay on ubuntu-latest.
    needs: [release_policy, validate_publish_request]
    if: ${{ !inputs.preflight_only && needs.release_policy.outputs.publish_eligible == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Validate tag input format
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*((-(alpha|beta)\.[1-9][0-9]*)|(-[1-9][0-9]*))?$ ]]; then
            echo "Invalid release tag format: ${RELEASE_TAG}"
            exit 1
          fi
          if [[ "${RELEASE_TAG}" == *"-alpha."* && "${RELEASE_NPM_DIST_TAG}" != "alpha" ]]; then
            echo "Alpha prerelease tags must publish to npm dist-tag alpha."
            exit 1
          fi
          if [[ "${RELEASE_TAG}" == *"-beta."* && "${RELEASE_NPM_DIST_TAG}" != "beta" ]]; then
            echo "Beta prerelease tags must publish to npm dist-tag beta."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate Tideclaw alpha publish target
        if: startsWith(github.ref, 'refs/heads/tideclaw/alpha/')
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" == *"-alpha."* ]]; then
            echo "Tideclaw alpha publish runs must target an alpha prerelease tag." >&2
            exit 1
          fi
          if [[ ! "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            echo "Tideclaw alpha publish runs must run from tideclaw/alpha/YYYY-MM-DD-HHMMZ." >&2
            exit 1
          fi
          alpha_branch="${WORKFLOW_REF#refs/heads/}"
          git fetch --no-tags origin "+refs/heads/${alpha_branch}:refs/remotes/origin/${alpha_branch}"
          if ! git merge-base --is-ancestor HEAD "refs/remotes/origin/${alpha_branch}"; then
            echo "Alpha publish tag must be reachable from ${alpha_branch}." >&2
            exit 1
          fi

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "false"

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "openclaw@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "openclaw@${PACKAGE_VERSION} is already published on npm."
            exit 1
          fi

          echo "Publishing openclaw@${PACKAGE_VERSION}"

      - name: Verify preflight run metadata
        env:
          GH_TOKEN: ${{ github.token }}
          PREFLIGHT_RUN_ID: ${{ inputs.preflight_run_id }}
        run: |
          set -euo pipefail
          RUN_JSON="$(gh run view "$PREFLIGHT_RUN_ID" --repo "$GITHUB_REPOSITORY" --json workflowName,headBranch,event,conclusion,url)"
          printf '%s' "$RUN_JSON" | node -e 'const fs = require("node:fs"); const run = JSON.parse(fs.readFileSync(0, "utf8")); const checks = [["workflowName", "OpenClaw NPM Release"], ["event", "workflow_dispatch"], ["conclusion", "success"]]; for (const [key, expected] of checks) { if (run[key] !== expected) { console.error(`Referenced npm preflight run ${process.env.PREFLIGHT_RUN_ID} must have ${key}=${expected}, got ${run[key] ?? "<missing>"}.`); process.exit(1); } } console.log(`Using npm preflight run ${process.env.PREFLIGHT_RUN_ID} from ${run.headBranch}: ${run.url}`);'

      - name: Verify full release validation run metadata
        if: ${{ inputs.full_release_validation_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          FULL_RELEASE_VALIDATION_RUN_ID: ${{ inputs.full_release_validation_run_id }}
        run: |
          set -euo pipefail
          RUN_JSON="$(gh run view "$FULL_RELEASE_VALIDATION_RUN_ID" --repo "$GITHUB_REPOSITORY" --json workflowName,headBranch,event,status,conclusion,url)"
          printf '%s' "$RUN_JSON" | node -e 'const fs = require("node:fs"); const run = JSON.parse(fs.readFileSync(0, "utf8")); const checks = [["workflowName", "Full Release Validation"], ["event", "workflow_dispatch"], ["status", "completed"], ["conclusion", "success"]]; for (const [key, expected] of checks) { if (run[key] !== expected) { console.error(`Referenced full release validation run ${process.env.FULL_RELEASE_VALIDATION_RUN_ID} must have ${key}=${expected}, got ${run[key] ?? "<missing>"}.`); process.exit(1); } } console.log(`Using full release validation run ${process.env.FULL_RELEASE_VALIDATION_RUN_ID} from ${run.headBranch}: ${run.url}`);'

      - name: Download prepared npm tarball
        env:
          GH_TOKEN: ${{ github.token }}
          PREFLIGHT_RUN_ID: ${{ inputs.preflight_run_id }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          download_preflight_artifact() {
            local preferred_name fallback_name
            preferred_name="openclaw-npm-preflight-${RELEASE_TAG}"
            rm -rf preflight-tarball
            mkdir -p preflight-tarball

            download_named_artifact() {
              local artifact_name="$1"
              for attempt in 1 2 3; do
                if gh run download "${PREFLIGHT_RUN_ID}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --name "${artifact_name}" \
                  --dir preflight-tarball; then
                  return 0
                fi
                if [[ "$attempt" != "3" ]]; then
                  echo "::warning::Artifact download for ${artifact_name} failed on attempt ${attempt}; retrying."
                  sleep $((attempt * 10))
                fi
              done
              return 1
            }

            if download_named_artifact "${preferred_name}"; then
              echo "Downloaded ${preferred_name}."
              return 0
            fi

            echo "::warning::${preferred_name} not found; checking run artifacts for a single compatible preflight artifact."
            mapfile -t matches < <(gh api -X GET "repos/${GITHUB_REPOSITORY}/actions/runs/${PREFLIGHT_RUN_ID}/artifacts" \
              --jq '.artifacts[] | select(.expired != true) | .name' |
              grep '^openclaw-npm-preflight-' || true)
            if [[ "${#matches[@]}" != "1" ]]; then
              echo "Expected ${preferred_name}, or exactly one openclaw-npm-preflight-* fallback artifact in run ${PREFLIGHT_RUN_ID}." >&2
              printf 'Available preflight candidates:\n' >&2
              printf -- '- %s\n' "${matches[@]:-<none>}" >&2
              exit 1
            fi
            fallback_name="${matches[0]}"
            download_named_artifact "${fallback_name}"
            echo "Downloaded fallback preflight artifact ${fallback_name}."
          }

          download_preflight_artifact

      - name: Download full release validation manifest
        if: ${{ inputs.full_release_validation_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: full-release-validation-${{ inputs.full_release_validation_run_id }}
          path: full-release-validation
          repository: ${{ github.repository }}
          run-id: ${{ inputs.full_release_validation_run_id }}
          github-token: ${{ github.token }}

      - name: Validate release tag and package metadata
        if: ${{ inputs.preflight_run_id == '' }}
        env:
          OPENCLAW_NPM_RELEASE_SKIP_PACK_CHECK: "1"
          RELEASE_TAG: ${{ inputs.tag }}
          WORKFLOW_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          RELEASE_SHA=$(git rev-parse HEAD)
          RELEASE_MAIN_REF="refs/remotes/origin/${WORKFLOW_REF_NAME}"
          export RELEASE_SHA RELEASE_TAG RELEASE_MAIN_REF
          # Fetch the workflow branch so merge-base ancestry checks keep working
          # for older tagged commits contained in a release branch.
          git fetch --no-tags origin "+refs/heads/${WORKFLOW_REF_NAME}:refs/remotes/origin/${WORKFLOW_REF_NAME}"
          pnpm release:openclaw:npm:check

      - name: Verify prepared tarball provenance
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -euo pipefail
          EXPECTED_RELEASE_SHA="$(git rev-parse HEAD)"
          MANIFEST_FILE="preflight-tarball/preflight-manifest.json"
          if [[ ! -f "$MANIFEST_FILE" ]]; then
            echo "Prepared preflight metadata is missing." >&2
            ls -la preflight-tarball >&2 || true
            exit 1
          fi
          ARTIFACT_RELEASE_TAG="$(jq -r '.releaseTag // ""' "$MANIFEST_FILE")"
          ARTIFACT_RELEASE_SHA="$(jq -r '.releaseSha // ""' "$MANIFEST_FILE")"
          ARTIFACT_RELEASE_NPM_DIST_TAG="$(jq -r '.npmDistTag // ""' "$MANIFEST_FILE")"
          ARTIFACT_TARBALL_NAME="$(jq -r '.tarballName // ""' "$MANIFEST_FILE")"
          ARTIFACT_TARBALL_SHA256="$(jq -r '.tarballSha256 // ""' "$MANIFEST_FILE")"
          if [[ "$ARTIFACT_RELEASE_TAG" != "$RELEASE_TAG" ]]; then
            echo "Prepared preflight tag mismatch: expected $RELEASE_TAG, got $ARTIFACT_RELEASE_TAG" >&2
            exit 1
          fi
          if [[ "$ARTIFACT_RELEASE_SHA" != "$EXPECTED_RELEASE_SHA" ]]; then
            echo "Prepared preflight SHA mismatch: expected $EXPECTED_RELEASE_SHA, got $ARTIFACT_RELEASE_SHA" >&2
            exit 1
          fi
          if [[ "$ARTIFACT_RELEASE_NPM_DIST_TAG" != "$RELEASE_NPM_DIST_TAG" ]]; then
            echo "Prepared preflight npm dist-tag mismatch: expected $RELEASE_NPM_DIST_TAG, got $ARTIFACT_RELEASE_NPM_DIST_TAG" >&2
            exit 1
          fi
          if [[ -z "$ARTIFACT_TARBALL_NAME" || ! -f "preflight-tarball/$ARTIFACT_TARBALL_NAME" ]]; then
            echo "Prepared preflight tarball named in manifest is missing: $ARTIFACT_TARBALL_NAME" >&2
            exit 1
          fi
          actual_tarball_sha256="$(sha256sum "preflight-tarball/$ARTIFACT_TARBALL_NAME" | awk '{print $1}')"
          if [[ "$actual_tarball_sha256" != "$ARTIFACT_TARBALL_SHA256" ]]; then
            echo "Prepared preflight tarball digest mismatch." >&2
            exit 1
          fi

      - name: Verify full release validation target
        if: ${{ inputs.full_release_validation_run_id != '' }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          EXPECTED_RELEASE_SHA="$(git rev-parse HEAD)"
          MANIFEST_FILE="full-release-validation/full-release-validation-manifest.json"
          if [[ ! -f "$MANIFEST_FILE" ]]; then
            echo "Full release validation manifest is missing." >&2
            ls -la full-release-validation >&2 || true
            exit 1
          fi
          WORKFLOW_NAME="$(jq -r '.workflowName // ""' "$MANIFEST_FILE")"
          TARGET_SHA="$(jq -r '.targetSha // ""' "$MANIFEST_FILE")"
          RERUN_GROUP="$(jq -r '.rerunGroup // ""' "$MANIFEST_FILE")"
          RUN_RELEASE_SOAK="$(jq -r '.runReleaseSoak // ""' "$MANIFEST_FILE")"
          PERFORMANCE_BLOCKING="$(jq -r '.controls.performanceBlocking // false' "$MANIFEST_FILE")"
          if [[ "$WORKFLOW_NAME" != "Full Release Validation" ]]; then
            echo "Full release validation manifest workflow mismatch: $WORKFLOW_NAME" >&2
            exit 1
          fi
          if [[ "$TARGET_SHA" != "$EXPECTED_RELEASE_SHA" ]]; then
            echo "Full release validation target SHA mismatch: expected $EXPECTED_RELEASE_SHA, got $TARGET_SHA" >&2
            exit 1
          fi
          if [[ "$RERUN_GROUP" != "all" ]]; then
            echo "Full release validation must run rerun_group=all before npm publish; got $RERUN_GROUP" >&2
            exit 1
          fi
          if [[ "$PERFORMANCE_BLOCKING" != "true" ]]; then
            echo "Full release validation manifest does not record blocking product performance evidence." >&2
            exit 1
          fi
          if [[ "$RELEASE_TAG" != *"-alpha."* && "$RELEASE_TAG" != *"-beta."* && "$RUN_RELEASE_SOAK" != "true" ]]; then
            echo "Stable releases require Full Release Validation with runReleaseSoak=true." >&2
            exit 1
          fi

      - name: Resolve publish tarball
        id: publish_tarball
        run: |
          set -euo pipefail
          TARBALL_PATH="$(find preflight-tarball -type f -name '*.tgz' -print | sort | tail -n 1)"
          if [[ -z "$TARBALL_PATH" ]]; then
            echo "Prepared preflight tarball not found." >&2
            ls -la preflight-tarball >&2 || true
            exit 1
          fi
          echo "path=$TARBALL_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish
        env:
          OPENCLAW_PREPACK_PREPARED: "1"
          OPENCLAW_NPM_PUBLISH_TAG: ${{ inputs.npm_dist_tag }}
          PUBLISH_TARBALL_PATH: ${{ steps.publish_tarball.outputs.path }}
        run: |
          set -euo pipefail
          publish_target="${PUBLISH_TARBALL_PATH}"
          if [[ -n "${publish_target}" ]]; then
            publish_target="./${publish_target}"
          fi
          bash scripts/openclaw-npm-publish.sh --publish "${publish_target}"
