name: build-runtime-image

# Builds and pushes the per-tenant multitenant runtime image to GHCR and Fly's
# private registry.
# Triggered on changes to anything that affects the image, and manually.
#
# Jobs:
#   1. build         — buildx + push to:
#                      - ghcr.io/rockielab/rockielab-runtime-multitenant:{sha,latest}
#                      - registry.fly.io/rockielab-runtime-multitenant:{sha,latest}
#   2. rollout-dev   — env-scoped rollout against the fixed dev API host.
#   3. rollout-prod  — manual no-input full-fleet compatibility leg, gated by
#                      the GitHub production environment.
#
# Dockerfile.multitenant uses `COPY --from=skills` which expects a
# named build-context. We vendor Rockielab/platform-skills (a private
# sibling repo) into the runner before building.
#
# Required CI secrets (set in Rockielab/platform-runtime Actions secrets):
#   - PLATFORM_SKILLS_READ_TOKEN  (fine-grained PAT with Contents:Read on
#     Rockielab/platform-skills only. Required because platform-skills is
#     private and the default GITHUB_TOKEN is scoped to this repo only.)
#   - FLY_API_TOKEN  (used to push the private runtime image to Fly's registry;
#     tenant Machines pull registry.fly.io images from inside Fly)
#
# GHCR push auth uses the workflow's auto-minted GITHUB_TOKEN (the
# job-level `permissions: packages: write` block grants the necessary
# scope). No long-lived PAT to rotate.
#
# Optional CI secrets:
#   - PLATFORM_CONTEXT_DISPATCH_TOKEN  (PAT with `actions:write` on
#     Rockielab/platform-context). Lets a successful build automatically
#     trigger the Hetzner deploy. Skip if you'd rather click the deploy
#     manually after a build.

on:
  push:
    branches: [main]
    # Only rebuild when paths that affect the runtime image actually change.
    # Skipping image-irrelevant paths (root *.md governance, designs/, plans/,
    # test/, .github/ non-this-workflow) cuts ~30 min of useless build time
    # per unrelated push. Anything `COPY . .` in Dockerfile.multitenant's
    # build stage walks — or that downstream `pnpm build:docker`/`ui:build`/
    # `qa:lab:build` compiles into dist/ — must be enumerated here. See
    # rockie-workspace#914 for the audit that produced this list.
    paths:
      - "Dockerfile.multitenant"
      - ".dockerignore"
      - "overlay/multitenant/**"
      - "apps/broker/**"
      - "apps/shared/**"
      - "src/**"
      - "ui/**"
      - "qa/**"
      - "packages/**"
      - "extensions/**"
      - "scripts/**"
      - "patches/**"
      - "skills/**"
      - "config/**"
      - "docs/**"
      - "vendor/a2ui/**"
      - "openclaw.mjs"
      - "tsconfig*.json"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - "package.json"
      - "bun.lockb"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-runtime-image.yml"
  workflow_dispatch:
    inputs:
      skills_ref:
        description: "platform-skills branch/SHA for a dev preview build"
        required: false
        type: string
      rollout_target:
        description: "Rollout target. Manual default is full-fleet fan-out."
        required: false
        default: full-fleet
        type: choice
        options: [dev, full-fleet]
      rollout_tenant_id:
        description: "Optional single tenant id to roll after the image push"
        required: false
        type: string
      rollout_canary_count:
        description: "Optional canary tenant count for this rollout"
        required: false
        type: string
      rollout_canary_wait_sec:
        description: "Optional canary health wait seconds for this rollout"
        required: false
        type: string
      rollout_wave_delay_sec:
        description: "Optional delay seconds between rollout waves"
        required: false
        type: string
      rollout_wave_size:
        description: "Optional tenant count per post-canary wave"
        required: false
        type: string
  repository_dispatch:
    # Fired by Rockielab/platform-skills when its `main` updates, so the
    # baked-in skills overlay gets a fresh build. The dispatcher
    # workflow lives on platform-skills (TODO if it doesn't exist yet).
    types: [skills-updated]

concurrency:
  group: build-runtime-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      platform_skills_sha: ${{ steps.skills_sha.outputs.platform_skills_sha }}
    permissions:
      contents: read
      packages: write
    env:
      GHCR_IMAGE: ghcr.io/rockielab/rockielab-runtime-multitenant
      FLY_IMAGE: registry.fly.io/rockielab-runtime-multitenant
      # Map the secret to env so we can `if:` on it (secrets context is
      # not available in step-level if expressions; env is).
      SKILLS_READ_TOKEN: ${{ secrets.PLATFORM_SKILLS_READ_TOKEN }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Preflight — require PLATFORM_SKILLS_READ_TOKEN
        if: env.SKILLS_READ_TOKEN == ''
        run: |
          echo "::error::PLATFORM_SKILLS_READ_TOKEN secret is not set on this repo."
          echo "Generate a fine-grained PAT with Contents:Read on Rockielab/platform-skills,"
          echo "then: gh secret set PLATFORM_SKILLS_READ_TOKEN --repo Rockielab/platform-runtime --body '<pat>'"
          exit 1

      - name: Preflight — require FLY_API_TOKEN
        if: env.FLY_API_TOKEN == ''
        run: |
          echo "::error::FLY_API_TOKEN secret is not set on this repo."
          echo "It is required to push the private runtime image to registry.fly.io for tenant Machines."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout platform-skills (vendored at build time)
        uses: actions/checkout@v4
        with:
          repository: Rockielab/platform-skills
          path: vendor/platform-skills
          token: ${{ secrets.PLATFORM_SKILLS_READ_TOKEN }}
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || (github.event_name == 'workflow_dispatch' && inputs.skills_ref) || 'main' }}
          fetch-depth: 1

      - name: Record platform-skills SHA
        id: skills_sha
        run: |
          echo "platform_skills_sha=$(git -C vendor/platform-skills rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Start setup timer
        id: setup_timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Free up runner disk
        run: |
          # GH default runners come with caches/SDKs we don't need for this build.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Use the workflow's built-in GITHUB_TOKEN (with packages:write via
        # the job-level `permissions:` block above) instead of a PAT. PATs
        # need manual rotation when they expire / get revoked — GITHUB_TOKEN
        # is minted per-run and auto-scoped to the repo's package namespace.
        # This unblocked the 2026-05-11 BYOK runtime-image push when the
        # long-lived GHCR_TOKEN PAT started 401-ing.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Start build timer
        id: build_timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.multitenant
          # Dockerfile.multitenant has `COPY --from=skills .` which
          # resolves via this named build-context, fed from the
          # vendored checkout above.
          build-contexts: |
            skills=vendor/platform-skills
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.FLY_IMAGE }}:latest
            ${{ env.FLY_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            rockielab.platform_skills_sha=${{ steps.skills_sha.outputs.platform_skills_sha }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max

      - name: Record pushed image ref
        id: image
        run: |
          image_ref="${{ env.FLY_IMAGE }}:${{ github.sha }}"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Record runtime image platform proof
        env:
          RUNTIME_IMAGE_REF: ${{ env.FLY_IMAGE }}:${{ github.sha }}
          TARGET_PLATFORM: linux/amd64
        run: |
          set -eEuo pipefail

          proof_dir=".artifacts/runtime-image-platform"
          proof_file="$proof_dir/broker-platform-proof.txt"
          mkdir -p "$proof_dir"

          run_with_timeout() {
            local label="$1"
            local seconds="$2"
            shift 2

            set +e
            timeout --kill-after=15s "${seconds}s" "$@"
            local status="$?"
            set -e

            if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
              echo "::error::${label} timed out after ${seconds}s" >&2
              return "$status"
            fi

            if [ "$status" -ne 0 ]; then
              echo "::error::${label} failed with exit code ${status}" >&2
              return "$status"
            fi
          }

          container_id=""
          cleanup() {
            if [ -n "$container_id" ]; then
              run_with_timeout "docker rm runtime image proof container" 30 docker rm -f "$container_id" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          trap 'status=$?; trap - ERR; if [ "$status" -ne 0 ] && [ -f "$proof_file" ]; then { echo "::group::runtime image platform proof (partial)"; cat "$proof_file"; echo "::endgroup::"; } >&2; fi' ERR

          docker_server="$(run_with_timeout "docker version" 30 docker version --format '{{.Server.Version}}')"
          buildx_version="$(run_with_timeout "docker buildx version" 30 docker buildx version)"

          {
            echo "runtime_image=$RUNTIME_IMAGE_REF"
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "target_platform=$TARGET_PLATFORM"
            echo "docker_server=$docker_server"
            echo "buildx_version=$buildx_version"
            echo ""
            echo "## Manifest"
            run_with_timeout "docker buildx imagetools inspect" 120 docker buildx imagetools inspect "$RUNTIME_IMAGE_REF"
          } > "$proof_file"

          container_id="$(run_with_timeout "docker create runtime image" 120 docker create --platform "$TARGET_PLATFORM" "$RUNTIME_IMAGE_REF")"
          run_with_timeout "docker cp broker binary" 60 docker cp "$container_id:/usr/local/bin/broker" "$proof_dir/broker"

          {
            echo ""
            echo "## Broker binary"
            run_with_timeout "file broker binary" 30 file "$proof_dir/broker"
            run_with_timeout "shasum broker binary" 30 shasum -a 256 "$proof_dir/broker"
          } >> "$proof_file"

          if ! run_with_timeout "file broker binary" 30 file "$proof_dir/broker" | grep -Eq 'ELF 64-bit.*(x86-64|x86_64)'; then
            echo "::error::broker binary is not linux/amd64"
            cat "$proof_file"
            exit 1
          fi

          cat "$proof_file"

          {
            echo "## Runtime image platform proof"
            echo ""
            echo "- runner: \`${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown}\`"
            echo "- target platform: \`$TARGET_PLATFORM\`"
            echo "- runtime image: \`$RUNTIME_IMAGE_REF\`"
            echo ""
            echo "### Broker binary"
            echo '```'
            run_with_timeout "file broker binary" 30 file "$proof_dir/broker"
            run_with_timeout "shasum broker binary" 30 shasum -a 256 "$proof_dir/broker"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime image platform proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-image-platform-proof
          path: .artifacts/runtime-image-platform/broker-platform-proof.txt
          if-no-files-found: ignore

      - name: Summary
        run: |
          build_elapsed=$(( $(date +%s) - ${{ steps.build_timer.outputs.started_at }} ))
          setup_elapsed=$(( ${{ steps.build_timer.outputs.started_at }} - ${{ steps.setup_timer.outputs.started_at }} ))
          echo "## Pushed runtime image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- GHCR audit image: \`${{ env.GHCR_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- GHCR audit image: \`${{ env.GHCR_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Fly rollout image: \`${{ env.FLY_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Fly rollout image: \`${{ env.FLY_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- platform-skills SHA: \`${{ steps.skills_sha.outputs.platform_skills_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- setup duration: \`${setup_elapsed}s\`" >> $GITHUB_STEP_SUMMARY
          echo "- build+push duration: \`${build_elapsed}s\`" >> $GITHUB_STEP_SUMMARY
          echo "- queue metadata: run \`${{ github.run_id }}\` attempt \`${{ github.run_attempt }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set \`ROCKIELAB_RUNTIME_IMAGE=${{ env.FLY_IMAGE }}:${{ github.sha }}\` in platform-context's Hetzner .env to roll forward." >> $GITHUB_STEP_SUMMARY

  rollout-dev:
    # Step 7 of #816: after the runtime image is pushed to GHCR, roll
    # every tenant's Fly machine forward to the new SHA so the freshly-
    # baked-in skills/hooks/overlay are live for users on the next chat
    # turn — without an operator needing to click anything.
    #
    # Calls POST /api/admin/tenants/rollout (shipped 2026-05-29) which
    # iterates Tenant.get_all(), caps concurrency at 10 Fly Machines
    # API calls in flight, and reports per-tenant outcomes (updated /
    # skipped / failed). Idempotent: re-running the same SHA on a
    # tenant that's already on it is a no-op.
    #
    # Admin rollout auth uses X-Admin-Token only. FLY_API_TOKEN is
    # required so the fallback path can enumerate tenant Fly apps and
    # call the same admin rollout route per tenant after transient
    # failures.
    needs: build
    runs-on: [self-hosted, macOS, ARM64, rockie]
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    if: ${{ github.event_name == 'repository_dispatch' && vars.DEPLOY_SPLIT_ACTIVATED == 'true' || github.event_name == 'workflow_dispatch' && (inputs.skills_ref != '' || inputs.rollout_target == 'dev' || inputs.rollout_target == '' || inputs.rollout_target == 'full-fleet') }}
    env:
      API_URL: ${{ secrets.ROCKIELAB_DEV_API_URL }}
      ADMIN_TOKEN: ${{ secrets.ROCKIELAB_DEV_ADMIN_TOKEN }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      IMAGE_TAG: ${{ needs.build.outputs.image_ref }}
      ROLLOUT_ENV: dev
      ROLLOUT_TENANT_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout_tenant_id || '' }}
      ROLLOUT_CANARY_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout_canary_count || '' }}
      ROLLOUT_CANARY_WAIT_SEC: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout_canary_wait_sec || '' }}
      ROLLOUT_WAVE_DELAY_SEC: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout_wave_delay_sec || '' }}
      ROLLOUT_WAVE_SIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout_wave_size || '' }}
      ROLLOUT_ARTIFACT_DIR: .artifacts/runtime-rollout
      ROLLOUT_MAX_ATTEMPTS: "5"
      ROLLOUT_CURL_MAX_TIME: "180"
      ROLLOUT_FALLBACK_AFTER_TRANSIENTS: "2"
      DEPLOY_SPLIT_ACTIVATED: ${{ vars.DEPLOY_SPLIT_ACTIVATED }}
    steps:
      - name: Preflight — required secrets present
        id: preflight
        run: |
          mkdir -p "$ROLLOUT_ARTIFACT_DIR"
          missing=""
          [ -z "$API_URL" ] && missing="$missing ROCKIELAB_API_URL"
          [ -z "$ADMIN_TOKEN" ] && missing="$missing ROCKIELAB_ADMIN_TOKEN"
          [ -z "$FLY_API_TOKEN" ] && missing="$missing FLY_API_TOKEN"
          if [ -n "$missing" ]; then
            if [ "$DEPLOY_SPLIT_ACTIVATED" = "true" ]; then
              echo "::error::Activated dev rollout requires fixed dev secrets:$missing"
              exit 1
            fi
            echo "::warning::Skipping dev rollout. Missing secrets on Rockielab/platform-runtime:$missing"
            echo "skipped=true" >> $GITHUB_OUTPUT
            {
              echo "## Cross-tenant rollout SKIPPED"
              echo ""
              echo "Required secrets missing:$missing"
              echo ""
              echo "Set them with \`gh secret set <NAME> --repo Rockielab/platform-runtime --body '<value>'\`."
              echo ""
              echo "ROCKIELAB_DEV_API_URL: full https url of the dev api host"
              echo "ROCKIELAB_DEV_ADMIN_TOKEN: sent as X-Admin-Token to the admin rollout route"
              echo "FLY_API_TOKEN: used to enumerate tenant Fly apps for per-tenant fallback after Cloudflare 524s"
              echo "GHCR_PULL_TOKEN: optional preflight token for private runtime image pulls; required unless the GHCR package is public"
            } >> $GITHUB_STEP_SUMMARY
            {
              echo "# Cross-tenant rollout skipped"
              echo ""
              echo "Image: \`$IMAGE_TAG\`"
              echo "Image SHA: \`$GITHUB_SHA\`"
              echo ""
              echo "Missing secrets:$missing"
              echo ""
              echo "Final result: skipped"
            } > "$ROLLOUT_ARTIFACT_DIR/rollout-summary.md"
            jq -n \
              --arg image "$IMAGE_TAG" \
              --arg result "skipped" \
              --arg missing "$missing" \
              '{image: $image, final_result: $result, missing_secrets: ($missing | split(" ") | map(select(. != "")))}' \
              > "$ROLLOUT_ARTIFACT_DIR/rollout-summary.json"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync dev catalog to bound platform-skills SHA
        if: ${{ steps.preflight.outputs.skipped == 'false' && github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_CONTEXT_DISPATCH_TOKEN }}
          SKILLS_SHA: ${{ needs.build.outputs.platform_skills_sha }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PLATFORM_CONTEXT_DISPATCH_TOKEN is required to sync the dev context catalog before manual dev rollout."
            exit 1
          fi
          before="$(gh run list --repo Rockielab/platform-context --workflow sync-skills-to-hetzner.yml --limit 20 --json databaseId --jq '[.[].databaseId]')"
          request_id="runtime-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-dev"
          expected_title="sync platform-skills dev $SKILLS_SHA $request_id"
          gh workflow run sync-skills-to-hetzner.yml \
            --repo Rockielab/platform-context \
            --ref main \
            -f target_env=dev \
            -f skills_sha="$SKILLS_SHA" \
            -f dry_run=false \
            -f request_id="$request_id"
          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(BEFORE="$before" EXPECTED_TITLE="$expected_title" gh run list --repo Rockielab/platform-context --workflow sync-skills-to-hetzner.yml --event workflow_dispatch --limit 50 --json databaseId,displayTitle --jq 'map(select(.displayTitle == env.EXPECTED_TITLE and ((env.BEFORE | fromjson | index(.databaseId)) | not))) | first | .databaseId // empty')"
            [ -n "$run_id" ] && break
            sleep 2
          done
          [ -n "$run_id" ] || { echo "::error::could not find dev catalog sync run"; exit 1; }
          gh run view "$run_id" --repo Rockielab/platform-context --json displayTitle --jq '.displayTitle' | grep -Fx "$expected_title"
          gh run watch "$run_id" --repo Rockielab/platform-context --exit-status
          gh run view "$run_id" --repo Rockielab/platform-context --json conclusion --jq '.conclusion' | grep -qx success

      - name: Checkout rollout script
        uses: actions/checkout@v4
        if: steps.preflight.outputs.skipped == 'false'
        with:
          fetch-depth: 1

      - name: Roll dev tenants to the new image SHA
        if: steps.preflight.outputs.skipped == 'false'
        run: |
          started_at="$(date +%s)"
          set +e
          node scripts/runtime-rollout.mjs
          rc=$?
          set -e
          elapsed=$(( $(date +%s) - started_at ))
          {
            echo ""
            echo "## Runtime rollout timing"
            echo ""
            echo "- image: \`${IMAGE_TAG}\`"
            echo "- rollout duration: \`${elapsed}s\`"
            echo "- rollout exit code: \`${rc}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"

      - name: Upload rollout summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-rollout-dev-summary-${{ github.sha }}
          path: ${{ env.ROLLOUT_ARTIFACT_DIR }}
          if-no-files-found: ignore

  rollout-prod:
    needs: [build, rollout-dev]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skills_ref == '' && (inputs.rollout_target == '' || inputs.rollout_target == 'full-fleet') && inputs.rollout_tenant_id == '' && inputs.rollout_canary_count == '' && inputs.rollout_canary_wait_sec == '' && inputs.rollout_wave_delay_sec == '' && inputs.rollout_wave_size == '' }}
    environment: production
    runs-on: [self-hosted, macOS, ARM64, rockie]
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    env:
      API_URL: ${{ secrets.ROCKIELAB_PROD_API_URL }}
      ADMIN_TOKEN: ${{ secrets.ROCKIELAB_PROD_ADMIN_TOKEN }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      IMAGE_TAG: ${{ needs.build.outputs.image_ref }}
      ROLLOUT_ENV: prod
      ROLLOUT_ARTIFACT_DIR: .artifacts/runtime-rollout-prod
      ROLLOUT_MAX_ATTEMPTS: "5"
      ROLLOUT_CURL_MAX_TIME: "180"
      ROLLOUT_FALLBACK_AFTER_TRANSIENTS: "2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Preflight prod API environment before catalog sync
        run: |
          set -euo pipefail
          headers="$(mktemp)"
          curl -fsS -D "$headers" -o /tmp/rockielab-prod-health "${API_URL%/}/health"
          actual="$(grep -i '^X-Rockielab-Env:' "$headers" | tail -n1 | cut -d: -f2- | tr -d '[:space:]')"
          if [ "$actual" != "prod" ]; then
            echo "::error::Prod API health env mismatch before catalog sync: expected prod, got ${actual:-<missing>}"
            exit 1
          fi

      - name: Sync prod catalog to bound platform-skills SHA
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_CONTEXT_DISPATCH_TOKEN }}
          SKILLS_SHA: ${{ needs.build.outputs.platform_skills_sha }}
        run: |
          before="$(gh run list --repo Rockielab/platform-context --workflow sync-skills-to-hetzner.yml --limit 20 --json databaseId --jq '[.[].databaseId]')"
          request_id="runtime-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-prod"
          expected_title="sync platform-skills prod $SKILLS_SHA $request_id"
          gh workflow run sync-skills-to-hetzner.yml \
            --repo Rockielab/platform-context \
            --ref main \
            -f target_env=prod \
            -f skills_sha="$SKILLS_SHA" \
            -f dry_run=false \
            -f request_id="$request_id"
          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(BEFORE="$before" EXPECTED_TITLE="$expected_title" gh run list --repo Rockielab/platform-context --workflow sync-skills-to-hetzner.yml --event workflow_dispatch --limit 50 --json databaseId,displayTitle --jq 'map(select(.displayTitle == env.EXPECTED_TITLE and ((env.BEFORE | fromjson | index(.databaseId)) | not))) | first | .databaseId // empty')"
            [ -n "$run_id" ] && break
            sleep 2
          done
          [ -n "$run_id" ] || { echo "::error::could not find prod catalog sync run"; exit 1; }
          gh run view "$run_id" --repo Rockielab/platform-context --json displayTitle --jq '.displayTitle' | grep -Fx "$expected_title"
          gh run watch "$run_id" --repo Rockielab/platform-context --exit-status
          gh run view "$run_id" --repo Rockielab/platform-context --json conclusion --jq '.conclusion' | grep -qx success

      - name: Roll prod tenants to the new image SHA
        run: |
          node scripts/runtime-rollout.mjs

      - name: Upload prod rollout summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-rollout-prod-summary-${{ github.sha }}
          path: ${{ env.ROLLOUT_ARTIFACT_DIR }}
          if-no-files-found: ignore
