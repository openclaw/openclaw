name: OpenClaw Scheduled Live And E2E Checks

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: openclaw-scheduled-live-checks-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dispatch_live_and_e2e_checks:
    name: Dispatch stable live and E2E checks
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    outputs:
      run_id: ${{ steps.dispatch.outputs.run_id }}
      url: ${{ steps.dispatch.outputs.url }}
      conclusion: ${{ steps.dispatch.outputs.conclusion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Run workflow sanity preflight
        run: node scripts/check-workflows.mjs

      - name: Dispatch stable live and E2E checks
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          CHILD_WORKFLOW: openclaw-live-and-e2e-checks-reusable.yml
          CHILD_WORKFLOW_REF: ${{ github.ref_name }}
          CHILD_WORKFLOW_FIELDS: |
            ref=${{ github.sha }}
            include_repo_e2e=true
            include_release_path_suites=true
            include_openwebui=false
            docker_lanes=config-reload mcp-channels plugin-update
            include_live_suites=true
            live_models_only=true
            live_model_providers=openai
            release_test_profile=stable
        run: bash scripts/github/dispatch-and-monitor-workflow.sh
