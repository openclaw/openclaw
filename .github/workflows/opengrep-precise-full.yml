name: OpenGrep — Full

# Manual repository-wide scan for the high-precision OpenGrep rule super-config.
# This is intentionally separate from PR scanning so broad/backlog findings do
# not block unrelated pull requests.

on:
  workflow_dispatch:

concurrency:
  group: opengrep-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan full repository (precise)
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.9.2

      - name: Install opengrep
        env:
          # Pin the binary version and fetch release assets directly. Avoid the
          # upstream install script's GitHub API release-list lookup so CI does
          # not fail when api.github.com is transiently unavailable/rate-limited.
          OPENGREP_VERSION: v1.19.0
        run: |
          install_dir="$HOME/.opengrep/cli/${OPENGREP_VERSION}"
          latest_dir="$HOME/.opengrep/cli/latest"
          mkdir -p "$install_dir"
          curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86" \
            -o "$install_dir/opengrep"
          chmod a+x "$install_dir/opengrep"
          if command -v cosign >/dev/null 2>&1; then
            curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86.cert" \
              -o "$install_dir/opengrep.cert"
            curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86.sig" \
              -o "$install_dir/opengrep.sig"
            cosign verify-blob \
              --cert "$install_dir/opengrep.cert" \
              --signature "$install_dir/opengrep.sig" \
              --certificate-identity-regexp "https://github.com/opengrep/opengrep.+" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$install_dir/opengrep"
          else
            echo "::error::cosign is required to verify the downloaded opengrep binary."
            exit 1
          fi
          rm -f "$latest_dir"
          ln -s "$install_dir" "$latest_dir"
          echo "$latest_dir" >> "$GITHUB_PATH"

      - name: Verify opengrep
        run: opengrep --version

      - name: Run full opengrep scan
        # Manual full scans cover all first-party source paths so maintainers can
        # audit the complete rulepack without making PRs inherit unrelated backlog.
        run: |
          mkdir -p .opengrep-out
          scripts/run-opengrep.sh --sarif --error

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        # Only upload if the scan actually produced a SARIF file.
        if: always() && hashFiles('.opengrep-out/precise.sarif') != ''
        with:
          sarif_file: .opengrep-out/precise.sarif
          category: opengrep-full

      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: opengrep-full-sarif
          path: .opengrep-out/precise.sarif
          if-no-files-found: warn
          retention-days: 30
