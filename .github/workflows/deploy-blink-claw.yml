name: Deploy Blink Claw

# Triggers on every push to main that touches Blink-relevant code.
# Skips pure doc/upstream-only changes.
# Also has a manual trigger for emergency re-deploys.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
  workflow_dispatch:

# Never cancel an in-progress deploy — queue it instead.
# A half-deployed image would leave agents in a bad state.
concurrency:
  group: deploy-blink-claw
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build → Push → Update agents
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Fly registry uses the API token as the password; username is ignored.
      - name: Login to Fly Registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      # Registry-based layer cache stored at registry.fly.io/blink-claw:buildcache.
      # The heavy Chromium + system-deps layers are ~1 GB and rarely change.
      # After the first run they stay cached → subsequent builds drop from
      # ~15 min down to ~3-5 min (only the compile + copy layers rebuild).
      - name: Build and push to Fly Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_EXTENSIONS=telegram discord slack
          tags: registry.fly.io/blink-claw:latest
          push: true
          provenance: false
          cache-from: type=registry,ref=registry.fly.io/blink-claw:buildcache
          cache-to: type=registry,ref=registry.fly.io/blink-claw:buildcache,mode=max

      # Update every running blink-claw-* machine to the new image.
      # Skips the registry-only app (blink-claw) and the manager.
      - name: Update all running Blink Claw agents
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"

          APPS=$(fly apps list --org blink-new --json \
            | jq -r '.[].Name' \
            | grep "^blink-claw-" \
            | grep -v "^blink-claw-manager$")

          if [ -z "$APPS" ]; then
            echo "No agent apps found — nothing to update."
            exit 0
          fi

          echo "Apps to update:"
          echo "$APPS"

          FAILED=0
          for APP in $APPS; do
            MACHINES=$(fly machines list --app "$APP" --json 2>/dev/null \
              | jq -r '.[].id' 2>/dev/null || true)

            if [ -z "$MACHINES" ]; then
              echo "  $APP: no machines, skipping"
              continue
            fi

            for MACHINE in $MACHINES; do
              echo "  Updating $APP / $MACHINE ..."
              fly machines update "$MACHINE" \
                --image registry.fly.io/blink-claw:latest \
                --app "$APP" \
                --yes \
              || { echo "  WARNING: failed to update $MACHINE in $APP"; FAILED=1; }
            done
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::warning::One or more machines failed to update. Check logs above."
          fi

          echo "Done."
