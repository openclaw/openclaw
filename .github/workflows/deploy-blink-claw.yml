name: Deploy Blink Claw

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel mid-deploy — queue it instead.
concurrency:
  group: deploy-blink-claw
  cancel-in-progress: false

jobs:
  deploy:
    name: Build on Fly → Update all agents
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Build on Fly's remote infrastructure — no Docker setup needed.
      # Fly's remote builders are fast, dedicated machines with their own layer cache.
      # --build-only: build the image but don't deploy machines
      # --remote-only: build on Fly's builders, not locally
      # --push: push the result to registry.fly.io/blink-claw:latest
      - name: Build image on Fly remote builder
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --build-only \
            --remote-only \
            --push \
            --app blink-claw \
            --build-arg OPENCLAW_INSTALL_BROWSER=1 \
            --build-arg "OPENCLAW_EXTENSIONS=telegram discord slack"

      # Update every running blink-claw-* machine to the new image.
      # Skips the registry-only app (blink-claw) and the manager.
      - name: Update all running Blink Claw agents
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APPS=$(flyctl apps list --org blink-new --json \
            | jq -r '.[].Name' \
            | grep "^blink-claw-" \
            | grep -v "^blink-claw-manager$")

          if [ -z "$APPS" ]; then
            echo "No agent apps found — nothing to update."
            exit 0
          fi

          echo "Apps to update: $APPS"

          FAILED=0
          for APP in $APPS; do
            MACHINES=$(flyctl machines list --app "$APP" --json 2>/dev/null \
              | jq -r '.[].id' 2>/dev/null || true)

            if [ -z "$MACHINES" ]; then
              echo "  $APP: no machines, skipping"
              continue
            fi

            for MACHINE in $MACHINES; do
              echo "  Updating $APP / $MACHINE ..."
              flyctl machines update "$MACHINE" \
                --image registry.fly.io/blink-claw:latest \
                --app "$APP" \
                --yes \
              || { echo "  WARNING: failed to update $MACHINE in $APP"; FAILED=1; }
            done
          done

          [ "$FAILED" -eq 1 ] && echo "::warning::One or more machines failed to update."
          echo "Done."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — check the logs above."
          # Add Slack/Telegram webhook here if desired:
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -d '{"text":"❌ Blink Claw deploy failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
