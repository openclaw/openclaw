name: Deploy Blink Claw

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'pre-release-test = build :pre-release + run Fly smoke test (no production update). production = build :latest + update all agents.'
        required: true
        default: 'pre-release-test'
        type: choice
        options:
          - pre-release-test
          - production

concurrency:
  group: deploy-blink-claw
  cancel-in-progress: false

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-24.04

    outputs:
      image_tag: ${{ steps.resolve_tag.outputs.image_tag }}
      is_production: ${{ steps.resolve_tag.outputs.is_production }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Push to main always goes to :latest (production).
      # Manual dispatch can choose pre-release-test (builds :pre-release, no production update)
      # or production (builds :latest, updates all agents — same as push to main).
      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.mode }}" = "production" ]; then
            echo "image_tag=registry.fly.io/blink-claw:latest" >> "$GITHUB_OUTPUT"
            echo "is_production=true" >> "$GITHUB_OUTPUT"
            echo "Mode: PRODUCTION (:latest + update all agents)"
          else
            echo "image_tag=registry.fly.io/blink-claw:pre-release" >> "$GITHUB_OUTPUT"
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "Mode: PRE-RELEASE TEST (:pre-release, Fly smoke test only)"
          fi

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl auth docker

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.resolve_tag.outputs.image_tag }}
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_EXTENSIONS=telegram discord slack whatsapp
            OPENCLAW_DOCKER_APT_PACKAGES=gh jq python3 python3-pip ffmpeg tmux ripgrep sqlite3 unzip zip wget fzf fd-find bat
            OPENCLAW_INSTALL_BLINK_TOOLS=1
          cache-from: type=registry,ref=registry.fly.io/blink-claw:buildcache
          cache-to: type=registry,ref=registry.fly.io/blink-claw:buildcache,mode=max

  smoke-test:
    name: Fly smoke test (pre-release only)
    runs-on: ubuntu-24.04
    needs: build
    # Only run smoke test for pre-release builds
    if: needs.build.outputs.is_production == 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Run Fly smoke test (WhatsApp QR + memory)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: bash .github/scripts/fly-smoke-test.sh registry.fly.io/blink-claw:pre-release

  deploy-production:
    name: Update all production agents
    runs-on: ubuntu-24.04
    needs: build
    # Only run for production builds
    if: needs.build.outputs.is_production == 'true'

    steps:
      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      # Zero-downtime update strategy:
      #   • Stopped machines  → updated immediately in parallel (no user impact)
      #   • Running machines  → updated with --detach (non-blocking; machine config
      #     is updated and the restart happens asynchronously so in-flight agent
      #     tasks are not interrupted by this workflow waiting on them)
      # All updates fire in parallel so every agent converges within seconds,
      # not sequentially over potentially many minutes.
      - name: Update all running Blink Claw agents
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          IMAGE="registry.fly.io/blink-claw:latest"
          echo "Updating all agents to: $IMAGE"

          APPS=$(flyctl apps list --org blink-new --json \
            | jq -r '.[].Name' \
            | grep "^blink-claw-" \
            | grep -v "^blink-claw-manager$" \
            | grep -v "^blink-claw-test-runner$")

          if [ -z "$APPS" ]; then
            echo "No agent apps found — nothing to update."
            exit 0
          fi

          echo "Found $(echo "$APPS" | wc -l) agent apps"

          PIDS=()
          for APP in $APPS; do
            MACHINES_JSON=$(flyctl machines list --app "$APP" --json 2>/dev/null || echo "[]")

            STOPPED=$(echo "$MACHINES_JSON" | jq -r '.[] | select(.state == "stopped") | .id' 2>/dev/null || true)
            RUNNING=$(echo "$MACHINES_JSON" | jq -r '.[] | select(.state == "started") | .id' 2>/dev/null || true)

            # Stopped machines: update and wait (they're idle, safe to block briefly)
            for MACHINE in $STOPPED; do
              echo "  [stopped] $APP / $MACHINE — updating in background"
              flyctl machines update "$MACHINE" --image "$IMAGE" --app "$APP" --yes 2>&1 \
                | sed "s/^/  [$APP\/$MACHINE] /" &
              PIDS+=($!)
            done

            # Running machines: fire-and-forget with --detach so in-flight tasks aren't
            # interrupted by this workflow blocking on the restart
            for MACHINE in $RUNNING; do
              echo "  [running] $APP / $MACHINE — detached update (restarts asynchronously)"
              flyctl machines update "$MACHINE" --image "$IMAGE" --app "$APP" --yes --detach 2>&1 \
                | sed "s/^/  [$APP\/$MACHINE] /" &
              PIDS+=($!)
            done
          done

          # Wait for all background jobs and collect exit codes
          FAILED=0
          for PID in "${PIDS[@]}"; do
            wait "$PID" || FAILED=1
          done

          [ "$FAILED" -eq 1 ] && echo "::warning::One or more machine updates reported an error."
          echo "Done — all updates fired."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy failed — check the logs above."
