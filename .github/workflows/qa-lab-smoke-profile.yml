name: QA Lab Smoke Profile

run-name: ${{ format('QA Lab Smoke Profile smoke-ci {0}', inputs.ref) }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Trusted OpenClaw branch, tag, or SHA to test
        required: true
        default: main
        type: string
      expected_sha:
        description: Optional full SHA that ref must resolve to
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: qa-lab-smoke-profile-${{ inputs.expected_sha || inputs.ref }}
  cancel-in-progress: false

jobs:
  smoke_ci_profile_evidence:
    uses: ./.github/workflows/qa-profile-evidence.yml
    with:
      ref: ${{ inputs.ref }}
      expected_sha: ${{ inputs.expected_sha }}
      qa_profile: smoke-ci
