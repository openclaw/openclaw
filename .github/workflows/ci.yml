name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  checkout-benchmark:
    name: checkout-benchmark-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner:
          - blacksmith-8vcpu-ubuntu-2404
          - blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Compare current checkout with aria2c archive
        shell: bash
        env:
          CHECKOUT_REPO: ${{ github.repository }}
          CHECKOUT_SHA: ${{ github.sha }}
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          command -v git
          command -v aria2c
          command -v tar
          command -v node

          bench_dir="$(mktemp -d "${RUNNER_TEMP}/checkout-benchmark.XXXXXX")"
          results_tsv="${bench_dir}/results.tsv"
          summary_json="${bench_dir}/summary.json"
          export results_tsv summary_json
          echo -e "method\ttrial\tmilliseconds\tattempts\tsize_kib\tarchive_kib" > "$results_tsv"

          now_ms() {
            date +%s%3N
          }

          reset_checkout_dir() {
            local workdir="$1"
            mkdir -p "$workdir"
            find "$workdir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          }

          verify_checkout() {
            test -f "$1/.github/actions/setup-node-env/action.yml"
          }

          git_checkout_attempt() {
            local workdir="$1"
            reset_checkout_dir "$workdir"
            git init "$workdir" >/dev/null
            git config --global --add safe.directory "$workdir"
            git -C "$workdir" remote add origin "https://github.com/${CHECKOUT_REPO}.git"
            git -C "$workdir" config gc.auto 0
            timeout --signal=TERM --kill-after=10s 120s git -C "$workdir" \
              -c protocol.version=2 \
              fetch --no-tags --prune --no-recurse-submodules --depth=1 origin \
              "+${CHECKOUT_SHA}:refs/remotes/origin/ci-target" || return 1
            git -C "$workdir" checkout --force --detach "$CHECKOUT_SHA" || return 1
            verify_checkout "$workdir"
          }

          aria_checkout_attempt() {
            local workdir="$1"
            local archive_dir archive_path
            archive_dir="$(mktemp -d)"
            archive_path="${archive_dir}/source.tar.gz"
            reset_checkout_dir "$workdir"
            if ! timeout --signal=TERM --kill-after=10s 120s aria2c \
              --quiet=true \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --max-connection-per-server=8 \
              --split=8 \
              --min-split-size=1M \
              --dir "$archive_dir" \
              --out source.tar.gz \
              --header "Authorization: Bearer ${CHECKOUT_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${CHECKOUT_REPO}/tarball/${CHECKOUT_SHA}"; then
              rm -rf "$archive_dir"
              return 1
            fi
            if ! tar -xzf "$archive_path" --strip-components=1 -C "$workdir"; then
              rm -rf "$archive_dir"
              return 1
            fi
            verify_checkout "$workdir" || {
              rm -rf "$archive_dir"
              return 1
            }
            echo "$(du -sk "$archive_path" | awk '{print $1}')"
            rm -rf "$archive_dir"
          }

          run_with_retries() {
            local method="$1"
            local workdir="$2"
            local attempts=0
            local archive_kib=""
            for attempt in 1 2 3 4 5; do
              attempts="$attempt"
              if [[ "$method" == "git-depth1" ]]; then
                if git_checkout_attempt "$workdir"; then
                  echo "${attempts}|"
                  return 0
                fi
              else
                if archive_kib="$(aria_checkout_attempt "$workdir")"; then
                  echo "${attempts}|${archive_kib}"
                  return 0
                fi
              fi
              sleep $((attempt * 5))
            done
            return 1
          }

          record_trial() {
            local method="$1"
            local trial="$2"
            local workdir="${bench_dir}/${method}-${trial}"
            local start_ms end_ms retry_result attempts archive_kib size_kib
            start_ms="$(now_ms)"
            retry_result="$(run_with_retries "$method" "$workdir")"
            end_ms="$(now_ms)"
            attempts="${retry_result%%|*}"
            archive_kib="${retry_result#*|}"
            size_kib="$(du -sk "$workdir" | awk '{print $1}')"
            echo -e "${method}\t${trial}\t$((end_ms - start_ms))\t${attempts}\t${size_kib}\t${archive_kib}" >> "$results_tsv"
          }

          for trial in 1 2 3 4 5; do
            record_trial git-depth1 "$trial"
            record_trial aria2c-tarball "$trial"
          done

          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";

          const rows = readFileSync(process.env.results_tsv, "utf8")
            .trim()
            .split("\n")
            .slice(1)
            .map((line) => {
              const [method, trial, milliseconds, attempts, sizeKiB, archiveKiB] = line.split("\t");
              return {
                method,
                trial: Number(trial),
                seconds: Number(milliseconds) / 1000,
                attempts: Number(attempts),
                sizeKiB: Number(sizeKiB),
                archiveKiB: archiveKiB ? Number(archiveKiB) : null,
              };
            });

          function stats(values) {
            const xs = [...values].sort((a, b) => a - b);
            const mean = xs.reduce((sum, value) => sum + value, 0) / xs.length;
            const median = xs.length % 2
              ? xs[(xs.length - 1) / 2]
              : (xs[xs.length / 2 - 1] + xs[xs.length / 2]) / 2;
            const variance = xs.reduce((sum, value) => sum + (value - mean) ** 2, 0) / (xs.length - 1);
            return {
              n: xs.length,
              min: Number(xs[0].toFixed(3)),
              median: Number(median.toFixed(3)),
              mean: Number(mean.toFixed(3)),
              max: Number(xs[xs.length - 1].toFixed(3)),
              sd: Number(Math.sqrt(variance).toFixed(3)),
            };
          }

          const summary = Object.fromEntries(["git-depth1", "aria2c-tarball"].map((method) => [
            method,
            {
              seconds: stats(rows.filter((row) => row.method === method).map((row) => row.seconds)),
              attempts: rows.filter((row) => row.method === method).map((row) => row.attempts),
            },
          ]));

          const payload = {
            repo: process.env.CHECKOUT_REPO,
            sha: process.env.CHECKOUT_SHA,
            runner: process.env.RUNNER_NAME,
            summary,
            rows,
          };
          writeFileSync(process.env.summary_json, `${JSON.stringify(payload, null, 2)}\n`);
          console.log(JSON.stringify(payload, null, 2));
          EOF

          {
            echo "## Checkout benchmark"
            echo
            echo '```json'
            cat "$summary_json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          find "$bench_dir" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +

      - name: Upload checkout benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: checkout-benchmark-${{ matrix.runner }}
          path: |
            ${{ runner.temp }}/checkout-benchmark.*/summary.json
            ${{ runner.temp }}/checkout-benchmark.*/results.tsv
          retention-days: 3
