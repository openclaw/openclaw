name: Ceviz Watch CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Run Backend Tests
      working-directory: watch-ceviz
      run: |
        export PYTHONPATH=backend
        pytest tests/

  xcode-build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app || echo "Using default Xcode"
    - name: Install XcodeGen
      run: brew install xcodegen
    - name: Generate Xcode Project
      working-directory: watch-ceviz
      run: xcodegen generate
    - name: Build iOS App for Device
      working-directory: watch-ceviz
      run: |
        xcodebuild clean build \
          -project CevizWatch.xcodeproj \
          -scheme CevizBridge \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CONFIGURATION_BUILD_DIR="$(pwd)/build"
    - name: Inspect Build Output
      working-directory: watch-ceviz
      run: |
        set -euo pipefail
        echo "== build tree =="
        find build -maxdepth 4 -print | sort
        echo "== app bundle tree =="
        find build/CevizBridge.app -maxdepth 4 -print | sort
        echo "== embedded watch bundles =="
        find build/CevizBridge.app -type d \( -name '*.app' -o -name '*.appex' -o -name 'Watch' \) | sort

        IOS_APP="build/CevizBridge.app"
        WATCH_APP="$IOS_APP/Watch/CevizWatchApp.app"

        echo "== plist summary =="
        /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$IOS_APP/Info.plist"
        /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$IOS_APP/Info.plist"
        /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$IOS_APP/Info.plist"

        if [ ! -f "$WATCH_APP/Info.plist" ]; then
          echo 'ERROR: Watch companion app bundle not found at expected path'
          exit 1
        fi

        /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$WATCH_APP/Info.plist"
        /usr/libexec/PlistBuddy -c 'Print :WKCompanionAppBundleIdentifier' "$WATCH_APP/Info.plist"
        /usr/libexec/PlistBuddy -c 'Print :WKRunsIndependently' "$WATCH_APP/Info.plist"
        /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$WATCH_APP/Info.plist"
        /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$WATCH_APP/Info.plist"

        echo "== code signing artifacts =="
        find "$IOS_APP" -maxdepth 4 \( -name 'embedded.mobileprovision' -o -name '_CodeSignature' \) -print | sort

        if [ ! -d "$WATCH_APP/_CodeSignature" ]; then
          echo 'WARNING: Watch companion app has no _CodeSignature. Expected for unsigned builds. Sideloadly will handle signing.'
        fi

        if [ ! -f "$WATCH_APP/embedded.mobileprovision" ]; then
          echo 'WARNING: Watch companion app has no embedded.mobileprovision. Expected for unsigned builds. Sideloadly will handle signing.'
        fi

    - name: Package IPA
      working-directory: watch-ceviz
      run: |
        set -euo pipefail
        mkdir -p Payload
        cp -R build/CevizBridge.app Payload/
        ditto -c -k --sequesterRsrc --keepParent Payload CevizWatch.ipa
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CevizWatch-IPA
        path: watch-ceviz/CevizWatch.ipa