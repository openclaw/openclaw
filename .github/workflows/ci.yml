name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  checkout-benchmark:
    name: checkout-benchmark-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner:
          - blacksmith-8vcpu-ubuntu-2404
          - blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Compare current Git checkout with aria2c archive
        shell: bash
        env:
          CHECKOUT_REPO: zats/openclaw
          CHECKOUT_SHA: ea60971150a6b4dbbf619b8b1ccea6990354d652
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          command -v git
          command -v aria2c
          command -v tar
          command -v node

          bench_dir="$(mktemp -d "${RUNNER_TEMP}/checkout-benchmark.XXXXXX")"
          results_path="${bench_dir}/results.json"
          tsv_path="${bench_dir}/results.tsv"
          export CHECKOUT_REPO CHECKOUT_SHA CHECKOUT_TOKEN bench_dir results_path tsv_path

          node --input-type=module <<'EOF'
          import { existsSync, mkdirSync, writeFileSync } from "node:fs";
          import path from "node:path";
          import { performance } from "node:perf_hooks";
          import { spawnSync } from "node:child_process";

          const repo = process.env.CHECKOUT_REPO;
          const sha = process.env.CHECKOUT_SHA;
          const token = process.env.CHECKOUT_TOKEN;
          const benchDir = process.env.bench_dir;
          const resultsPath = process.env.results_path;
          const tsvPath = process.env.tsv_path;
          const rows = [];

          function run(command, args) {
            const result = spawnSync(command, args, {
              encoding: "utf8",
              maxBuffer: 20 * 1024 * 1024,
              timeout: 300_000,
            });
            if (result.status !== 0) {
              throw new Error([
                `$ ${command} ${args.join(" ")}`,
                `status=${result.status} signal=${result.signal ?? ""}`,
                "--- stdout ---",
                result.stdout ?? "",
                "--- stderr ---",
                result.stderr ?? "",
              ].join("\n"));
            }
          }

          function sizeKiB(target) {
            const result = spawnSync("du", ["-sk", target], { encoding: "utf8" });
            return result.status === 0 ? Number(result.stdout.trim().split(/\s+/)[0]) : null;
          }

          function verify(workspace) {
            const marker = path.join(workspace, ".github/actions/setup-node-env/action.yml");
            if (!existsSync(marker)) {
              throw new Error(`missing marker ${marker}`);
            }
          }

          function gitAttempt(attempt) {
            const workspace = path.join(benchDir, `git-${attempt}`);
            mkdirSync(workspace);
            const started = performance.now();
            run("git", ["init", workspace]);
            run("git", ["config", "--global", "--add", "safe.directory", workspace]);
            run("git", ["-C", workspace, "remote", "add", "origin", `https://github.com/${repo}.git`]);
            run("git", ["-C", workspace, "config", "gc.auto", "0"]);
            run("git", [
              "-C",
              workspace,
              "-c",
              "protocol.version=2",
              "fetch",
              "--no-tags",
              "--prune",
              "--no-recurse-submodules",
              "--depth=1",
              "origin",
              `+${sha}:refs/remotes/origin/ci-target`,
            ]);
            run("git", ["-C", workspace, "checkout", "--force", "--detach", sha]);
            verify(workspace);
            rows.push({
              method: "git-depth1",
              attempt,
              seconds: (performance.now() - started) / 1000,
              sizeKiB: sizeKiB(workspace),
            });
          }

          function ariaAttempt(attempt) {
            const workspace = path.join(benchDir, `aria-${attempt}`);
            const archiveDir = path.join(benchDir, `aria-archive-${attempt}`);
            const archivePath = path.join(archiveDir, "source.tar.gz");
            mkdirSync(workspace);
            mkdirSync(archiveDir);
            const args = [
              "--quiet=true",
              "--allow-overwrite=true",
              "--auto-file-renaming=false",
              "--max-connection-per-server=8",
              "--split=8",
              "--min-split-size=1M",
              "--dir",
              archiveDir,
              "--out",
              "source.tar.gz",
              "--header",
              "Accept: application/vnd.github+json",
              "--header",
              "X-GitHub-Api-Version: 2022-11-28",
            ];
            if (token) {
              args.push("--header", `Authorization: Bearer ${token}`);
            }
            args.push(`https://api.github.com/repos/${repo}/tarball/${sha}`);
            const started = performance.now();
            run("aria2c", args);
            const downloaded = performance.now();
            run("tar", ["-xzf", archivePath, "--strip-components=1", "-C", workspace]);
            verify(workspace);
            rows.push({
              method: "aria2c-tarball",
              attempt,
              downloadSeconds: (downloaded - started) / 1000,
              seconds: (performance.now() - started) / 1000,
              sizeKiB: sizeKiB(workspace),
              archiveKiB: sizeKiB(archivePath),
            });
          }

          for (let attempt = 1; attempt <= 5; attempt += 1) {
            gitAttempt(attempt);
            ariaAttempt(attempt);
          }

          function stats(values) {
            const xs = [...values].sort((a, b) => a - b);
            const mean = xs.reduce((sum, value) => sum + value, 0) / xs.length;
            const median = xs.length % 2
              ? xs[(xs.length - 1) / 2]
              : (xs[xs.length / 2 - 1] + xs[xs.length / 2]) / 2;
            const variance = xs.reduce((sum, value) => sum + (value - mean) ** 2, 0) / (xs.length - 1);
            return {
              n: xs.length,
              min: Number(xs[0].toFixed(3)),
              median: Number(median.toFixed(3)),
              mean: Number(mean.toFixed(3)),
              max: Number(xs[xs.length - 1].toFixed(3)),
              sd: Number(Math.sqrt(variance).toFixed(3)),
            };
          }

          const summary = {
            gitDepth1: stats(rows.filter((row) => row.method === "git-depth1").map((row) => row.seconds)),
            aria2cTarballDownloadExtract: stats(rows.filter((row) => row.method === "aria2c-tarball").map((row) => row.seconds)),
            aria2cTarballDownloadOnly: stats(rows.filter((row) => row.method === "aria2c-tarball").map((row) => row.downloadSeconds)),
          };

          const tsv = [
            "method\tattempt\tseconds\tdownload_seconds\tsize_kib\tarchive_kib",
            ...rows.map((row) => [
              row.method,
              row.attempt,
              row.seconds.toFixed(3),
              row.downloadSeconds?.toFixed(3) ?? "",
              row.sizeKiB ?? "",
              row.archiveKiB ?? "",
            ].join("\t")),
          ].join("\n") + "\n";

          writeFileSync(tsvPath, tsv);
          writeFileSync(resultsPath, `${JSON.stringify({ repo, sha, summary, rows }, null, 2)}\n`);
          console.log(tsv);
          console.log(JSON.stringify(summary, null, 2));
          EOF

          {
            echo "## Checkout benchmark"
            echo
            echo '```json'
            node -e 'const p=require(process.env.results_path); console.log(JSON.stringify(p.summary, null, 2));'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          rm -rf "$bench_dir"/git-* "$bench_dir"/aria-* "$bench_dir"/aria-archive-*

      - name: Upload checkout benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: checkout-benchmark-${{ matrix.runner }}
          path: |
            ${{ runner.temp }}/checkout-benchmark.*/results.json
            ${{ runner.temp }}/checkout-benchmark.*/results.tsv
          retention-days: 3
