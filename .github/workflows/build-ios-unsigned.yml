name: Build OpenClaw iOS (unsigned)

# Reusable workflow for building the OpenClaw iOS companion app without
# Apple code signing. Produces an unsigned .xcarchive that can be signed
# and exported to an IPA later using a development/distribution identity.
#
# No tmate here. For interactive debugging, use a separate exploratory branch
# or temporarily add mxschmitt/action-tmate to this workflow.

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number override (digits only; defaults to commit count)'
        required: false
        type: string
      xcode_path:
        description: 'Path to Xcode.app to use'
        required: false
        default: '/Applications/Xcode_26.3.app'
        type: string
  push:
    branches:
      - ci/build-ios-unsigned

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - name: Checkout OpenClaw
        uses: actions/checkout@v4

      - name: Set up Node.js + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install repo dependencies
        run: pnpm install

      - name: Select Xcode version
        run: sudo xcode-select -s "${{ inputs.xcode_path || '/Applications/Xcode_26.3.app' }}/Contents/Developer"

      - name: Show toolchain versions
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Install iOS build tools
        run: |
          set -euo pipefail
          brew update --quiet || true
          brew install xcodegen swiftformat swiftlint
          xcodegen --version
          swiftformat --version
          swiftlint --version

      - name: Write iOS version xcconfig
        run: ./scripts/ios-write-version-xcconfig.sh ${{ inputs.build_number && format('--build-number {0}', inputs.build_number) || '' }}

      - name: Disable code signing for unsigned build
        run: |
          set -euo pipefail
          cat > apps/ios/Signing.xcconfig <<'EOF'
          // Auto-generated by CI for an unsigned, local-only build.
          // Do not commit.
          OPENCLAW_CODE_SIGN_STYLE = Manual
          OPENCLAW_CODE_SIGN_IDENTITY =
          OPENCLAW_DEVELOPMENT_TEAM =
          OPENCLAW_APP_BUNDLE_ID = ai.openclawfoundation.app
          OPENCLAW_SHARE_BUNDLE_ID = ai.openclawfoundation.app.share
          OPENCLAW_ACTIVITY_WIDGET_BUNDLE_ID = ai.openclawfoundation.app.activitywidget
          OPENCLAW_WATCH_APP_BUNDLE_ID = ai.openclawfoundation.app.watchkitapp
          OPENCLAW_APP_GROUP_ID = group.ai.openclawfoundation.app.shared
          OPENCLAW_APP_PROFILE =
          OPENCLAW_SHARE_PROFILE =
          OPENCLAW_ACTIVITY_WIDGET_PROFILE =
          OPENCLAW_WATCH_APP_PROFILE =
          EOF

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          cd apps/ios
          xcodegen generate --project .

      - name: Archive unsigned iOS app (device)
        run: |
          set -euo pipefail
          cd apps/ios
          xcodebuild \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/OpenClaw-unsigned.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            archive

      - name: Show build products
        if: always()
        run: |
          set -euo pipefail
          ls -la apps/ios/build/ || true
          ls -la apps/ios/build/OpenClaw-unsigned.xcarchive/Products/Applications/ || true

      - name: Upload unsigned xcarchive
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS-unsigned-xcarchive
          path: |
            apps/ios/build/OpenClaw-unsigned.xcarchive
          if-no-files-found: error
          retention-days: 14
