<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="modern-title">
  <title id="modern-title">DNA Modern Logo</title>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
  </defs>
  
  <!-- Stylized double helix with dots -->
  <g transform="translate(60, 60)">
    <!-- Left flowing strand -->
    <path d="M-25,-40 Q-10,-25 -25,-10 Q-40,5 -25,20 Q-10,35 -25,50" 
          stroke="url(#grad1)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Right flowing strand -->
    <path d="M25,-40 Q10,-25 25,-10 Q40,5 25,20 Q10,35 25,50" 
          stroke="url(#grad2)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Connection nodes (stylized base pairs) -->
    <circle cx="-18" cy="-32" r="4" fill="#6366F1"/>
    <circle cx="18" cy="-32" r="4" fill="#818CF8"/>
    <line x1="-14" y1="-32" x2="14" y2="-32" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    
    <circle cx="-25" cy="-10" r="5" fill="#7C3AED"/>
    <circle cx="25" cy="-10" r="5" fill="#A78BFA"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    
    <circle cx="-18" cy="12" r="4" fill="#8B5CF6"/>
    <circle cx="18" cy="12" r="4" fill="#C4B5FD"/>
    <line x1="-14" y1="12" x2="14" y2="12" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
    
    <circle cx="-25" cy="34" r="5" fill="#A78BFA"/>
    <circle cx="25" cy="34" r="5" fill="#DDD6FE"/>
    <line x1="-20" y1="34" x2="20" y2="34" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
  </g>
</svg>