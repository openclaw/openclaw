  <!-- DNA Wordmark -->
  <text x="100" y="42" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="42" fill="url(#primaryGrad)" letter-spacing="-1">DNA</text>
