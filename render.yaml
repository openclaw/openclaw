services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    # Render Docker services use PORT env var, not the port field 
    envVars:
      - key: PORT
        value: 10000
      - key: OPENCLAW_GATEWAY_PORT
        value: 10000
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      # ADD ANY OTHER MISSING KEYS HERE:
      # - key: DATABASE_URL
      #   value: your_db_url_here
