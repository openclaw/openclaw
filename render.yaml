services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health

    envVars:
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_GATEWAY_PORT
        value: "10000"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_SANDBOX_MODE
        value: off
      - key: OPENCLAW_TOOLS_PROFILE
        value: full
      - key: OPENCLAW_TOOLS_ALLOW_JSON
        value: "[]"
      - key: OPENCLAW_TOOLS_DENY_JSON
        value: "[]"
      - key: OPENCLAW_EXEC_HOST
        value: gateway
      - key: OPENCLAW_EXEC_SECURITY
        value: full
      - key: OPENCLAW_EXEC_ASK
        value: off

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 5
