services:
  - type: web
    name: activi
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ACTIVI_STATE_DIR
        value: /data/.activi
      - key: ACTIVI_WORKSPACE_DIR
        value: /data/workspace
      - key: ACTIVI_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: activi-data
      mountPath: /data
      sizeGB: 1
