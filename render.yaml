services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health

    envVars:
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_GATEWAY_PORT
        value: "10000"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_SANDBOX_MODE
        value: off

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 5
