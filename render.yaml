services:
  - type: web
    name: openclaw
    runtime: docker
    plan: starter
    dockerCommand: sh -lc 'node openclaw.mjs gateway --allow-unconfigured --bind lan --port "${PORT:-8080}"'
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
