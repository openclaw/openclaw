services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: OPENCLAW_GATEWAY_PORT
        value: 10000
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK
        value: "true"
      # ADD ANY OTHER MISSING KEYS HERE:
      # - key: DATABASE_URL
      #   value: your_db_url_here
