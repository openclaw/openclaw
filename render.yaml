services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    dockerCommand: /app/render-start.sh
    healthCheckPath: /health

    envVars:
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_GATEWAY_PORT
        value: "10000"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 5
