services:
  - type: web
    name: dna
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: DNA_STATE_DIR
        value: /data/.dna
      - key: DNA_WORKSPACE_DIR
        value: /data/workspace
      - key: DNA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: dna-data
      mountPath: /data
      sizeGB: 1
