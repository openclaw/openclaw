services:
  - type: web
    name: mullusi
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MULLUSI_GATEWAY_PORT
        value: "8080"
      - key: MULLUSI_STATE_DIR
        value: /data/.mullusi
      - key: MULLUSI_WORKSPACE_DIR
        value: /data/workspace
      - key: MULLUSI_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: mullusi-data
      mountPath: /data
      sizeGB: 1
