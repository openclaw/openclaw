services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health
    dockerCommand: "sh -c 'test -f /data/openclaw.render.json || cp /app/sophia/openclaw.render.json /data/openclaw.render.json; exec node openclaw.mjs gateway --bind lan --port 8080'"
    envVars:
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"
      - key: OPENCLAW_CONFIG_PATH
        value: /data/openclaw.render.json
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - fromGroup: Sophia-Claw
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
